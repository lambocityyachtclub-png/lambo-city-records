<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambo City VIP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

.container {
  text-align: center;
  padding: 50px;
}

.box {
  border: 2px solid gold;
  padding: 30px;
  margin-top: 100px;
}

input {
  padding: 12px;
  width: 70%;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.vip {
  display: none;
  margin-top: 50px;
}

h1 {
  color: gold;
}
</style>
</head>

<body>

<div class="container">

<h1>LAMBO CITY VIP ACCESS</h1>

<div id="lock" class="box">
  <h2>Enter Boarding Pass Code</h2>
  <input type="password" id="code" placeholder="Enter Code">
  <br>
  <button onclick="unlock()">ENTER</button>
</div>

<div id="vip" class="vip">
  <h2>WELCOME INSIDER</h2>
  <p>You now have access to private drops and events.</p>
  <button onclick="alert('VIP Drop Loading...')">View Drop</button>
</div>

</div>

<script>
const CODE = "LAMBO2026";

function unlock() {
  const val = document.getElementById("code").value;

  if (val === CODE) {
    localStorage.setItem("vip", "true");
    document.getElementById("lock").style.display = "none";
    document.getElementById("vip").style.display = "block";
  } else {
    alert("Invalid Boarding Pass");
  }
}

window.onload = function () {
  if (localStorage.getItem("vip") === "true") {
    document.getElementById("lock").style.display = "none";
    document.getElementById("vip").style.display = "block";
  }
};
</script>

</body>
</html>
