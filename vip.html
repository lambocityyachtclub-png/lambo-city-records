<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | YACHT CLUB</title>

<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* CINEMATIC BACKGROUND */
    .bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top, #111, #000);
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    /* TOP HUD */
    .hud {
        position: absolute;
        top: 20px;
        left: 20px;
        letter-spacing: 4px;
        font-size: 14px;
        opacity: 0.7;
    }

    /* TITLE */
    .title {
        text-align: center;
        font-size: 28px;
        letter-spacing: 6px;
        margin-top: 60px;
        color: gold;
    }

    /* STREAM FRAME */
    .stream {
        display: flex;
        justify-content: center;
        margin-top: 40px;
    }

    iframe {
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 0 60px rgba(255,215,0,0.08);
        width: 85%;
        max-width: 1000px;
        height: 520px;
    }

    /* STATUS BAR */
    .status {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.6;
    }

    /* BUTTONS */
    .controls {
        position: absolute;
        bottom: 40px;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    button {
        background: transparent;
        border: 1px solid white;
        color: white;
        padding: 10px 18px;
        cursor: pointer;
        letter-spacing: 2px;
        transition: 0.3s;
    }

    button:hover {
        background: white;
        color: black;
    }

    /* LIGHT GLOW EFFECT */
    .glow {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at bottom, rgba(255,0,120,0.08), transparent);
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="hud">LAMBO CITY // YACHT CLUB ACCESS GRANTED</div>

<div class="title">VIP YACHT CLUB</div>

<div class="stream">
    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>
</div>

<div class="status">
    LIVE STREAM ACTIVE • LAMBO CITY RADIO FEED LINKED
</div>

<div class="controls">
    <button onclick="goCity()">EXIT TO CITY</button>
    <button onclick="refreshStream()">REFRESH STREAM</button>
</div>

<script>
function goCity() {
    window.location.href = "index.html";
}

function refreshStream() {
    location.reload();
}
</script>

</body>
</html>
