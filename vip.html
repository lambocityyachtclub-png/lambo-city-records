<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP YACHT CLUB</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

/* FADE SYSTEM */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 1;
    transition: 1.2s ease;
    z-index: 10;
}

/* VIP ROOM */
.center {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
}

.title {
    margin-top: 50px;
    font-size: 28px;
    color: gold;
    letter-spacing: 6px;
}

iframe {
    width: 85%;
    max-width: 1000px;
    height: 520px;
    margin-top: 30px;
}

button {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<div id="fade"></div>

<div class="center">
    <div class="title">YACHT CLUB VIP</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <br>

    <button onclick="exitWorld()">EXIT TO CITY</button>
</div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById("fade").style.opacity = "0";
    }, 500);
};

function exitWorld() {
    document.getElementById("fade").style.opacity = "1";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 900);
}
</script>

</body>
</html>
