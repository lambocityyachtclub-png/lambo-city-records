<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambo City Boarding Portal</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

.container {
  padding: 50px;
}

.box {
  border: 2px solid gold;
  padding: 30px;
  margin-top: 70px;
  display: inline-block;
  width: 80%;
  max-width: 600px;
  background: rgba(255,255,255,0.05);
}

input {
  padding: 12px;
  width: 80%;
  text-align: center;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 12px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

h1 {
  color: gold;
}

.hidden {
  display: none;
}

.level {
  color: lightgreen;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>BOARDING PASS SYSTEM</h1>

<div class="box" id="login">
  <h3>Enter Access Code</h3>
  <input id="code" placeholder="Enter Boarding Code">
  <br>
  <button onclick="unlock()">UNLOCK</button>
</div>

<div class="box hidden" id="portal">
  <h2 id="level"></h2>
  <p id="msg"></p>

  <button onclick="alert('Loading private drop...')">VIEW DROP</button>
  <button onclick="logout()">LOGOUT</button>
</div>

</div>

<script>
const level = localStorage.getItem("accessLevel");

const codes = {
  guest: "GUEST123",
  vip: "VIP2026",
  founder: "FOUNDER777"
};

function unlock() {
  const input = document.getElementById("code").value;

  if (input === codes[level]) {
    localStorage.setItem("logged", "true");
    showPortal();
  } else {
    alert("INVALID BOARDING PASS");
  }
}

function showPortal() {
  document.getElementById("login").style.display = "none";
  document.getElementById("portal").style.display = "inline-block";

  document.getElementById("level").innerText =
    level.toUpperCase() + " ACCESS GRANTED";

  document.getElementById("msg").innerText =
    "Welcome to the " + level + " zone of Lambo City";
}

function logout() {
  localStorage.clear();
  location.reload();
}

window.onload = function () {
  if (localStorage.getItem("logged") === "true") {
    showPortal();
  }
};
</script>

</body>
</html>
