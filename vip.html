<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | VIP YACHT CLUB</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* LOADING SCREEN */
#loading {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    letter-spacing: 3px;
    transition: opacity 1.2s ease;
    z-index: 10;
}

/* VIP ROOM */
#vip {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #111, #000);
    opacity: 0;
    transition: opacity 1.5s ease;
}

.hud {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 12px;
    opacity: 0.6;
    letter-spacing: 3px;
}

.title {
    text-align: center;
    margin-top: 60px;
    font-size: 28px;
    letter-spacing: 6px;
    color: gold;
}

.stream {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

iframe {
    width: 85%;
    max-width: 1000px;
    height: 520px;
    border: 1px solid rgba(255,255,255,0.2);
}

.controls {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    background: transparent;
    border: 1px solid white;
    color: white;
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

.glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at bottom, rgba(255,0,120,0.08), transparent);
    pointer-events: none;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    CONNECTING TO LAMBO CITY...
</div>

<!-- VIP -->
<div id="vip">
    <div class="glow"></div>

    <div class="hud">VIP ACCESS GRANTED</div>

    <div class="title">YACHT CLUB</div>

    <div class="stream">
        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>
    </div>

    <div class="controls">
        <button onclick="exitCity()">EXIT TO CITY</button>
        <button onclick="reload()">REFRESH</button>
    </div>
</div>

<script>
window.onload = function () {
    setTimeout(() => {
        document.getElementById("loading").style.opacity = "0";

        setTimeout(() => {
            document.getElementById("loading").style.display = "none";
            document.getElementById("vip").style.opacity = "1";
        }, 1200);

    }, 1800);
};

function exitCity() {
    window.location.href = "portal.html";
}

function reload() {
    location.reload();
}
</script>

</body>
</html>
