<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lambo City Access</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

.container {
  padding: 50px;
}

.box {
  border: 2px solid gold;
  padding: 30px;
  margin-top: 80px;
  display: inline-block;
  width: 80%;
  max-width: 600px;
}

input {
  padding: 12px;
  width: 80%;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 12px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

h1 {
  color: gold;
}

.locked {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>LAMBO CITY BOARDING PORTAL</h1>

<div class="box" id="loginBox">
  <h3>Enter Boarding Code</h3>
  <input id="code" placeholder="Enter Access Code">
  <br>
  <button onclick="unlock()">ENTER</button>
</div>

<div class="box locked" id="content">
  <h2 id="levelTitle"></h2>
  <p id="message"></p>

  <button onclick="alert('Drop unlocked')">View Drop</button>
  <button onclick="logout()">Logout</button>
</div>

</div>

<script>
const access = localStorage.getItem("accessLevel");

const codes = {
  guest: "GUEST123",
  vip: "VIP2026",
  founder: "FOUNDER777"
};

function unlock() {
  const input = document.getElementById("code").value;

  if (input === codes[access]) {
    showAccess(access);
    localStorage.setItem("loggedIn", "true");
  } else {
    alert("Invalid Boarding Pass Code");
  }
}

function showAccess(level) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("levelTitle").innerText =
    level.toUpperCase() + " ACCESS GRANTED";

  document.getElementById("message").innerText =
    "Welcome to " + level + " zone of Lambo City";
}

function logout() {
  localStorage.clear();
  location.reload();
}

window.onload = function () {
  if (localStorage.getItem("loggedIn") === "true") {
    showAccess(access);
  }
};
</script>

</body>
</html>
