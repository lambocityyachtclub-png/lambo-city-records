<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PORTAL | LAMBO CITY</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

/* GLOBAL FADE LAYER */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: 1s ease;
}

/* CENTER UI */
.center {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 12px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<div class="center">
    <h2>ACCESS GATE</h2>
    <button onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="fade"></div>

<script>
function enterWorld() {
    document.getElementById("fade").style.opacity = "1";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 900);
}
</script>

</body>
</html>
