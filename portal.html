<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | PORTAL</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

.center {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 12px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

.fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: 1s ease;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="center">
    <h2>LAMBO CITY ACCESS GATE</h2>
    <button onclick="enter()">ENTER CITY</button>
</div>

<div class="fade" id="fade"></div>

<script>
function enter() {
    document.getElementById("fade").style.opacity = "1";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1000);
}
</script>

</body>
</html>
