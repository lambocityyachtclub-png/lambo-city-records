<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | PORTAL</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

/* ENTRY SCREEN */
.entry {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #111, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    letter-spacing: 3px;
    transition: opacity 1.2s ease;
}

.title {
    font-size: 26px;
    margin-bottom: 20px;
}

.btn {
    border: 1px solid white;
    padding: 12px 20px;
    cursor: pointer;
    background: transparent;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* FADE OUT LAYER */
.fade {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
}
</style>
</head>

<body>

<div class="entry" id="entry">
    <div class="title">LAMBO CITY ACCESS GATE</div>
    <button class="btn" onclick="enter()">ENTER CITY</button>
</div>

<div class="fade" id="fade"></div>

<script>
function enter() {
    document.getElementById("fade").style.opacity = "1";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1200);
}
</script>

</body>
</html>
