<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V25 — RESTORED ENGINE FIX</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V25 — RESTORED FIX</div>
<div id="zone">ZONE: INITIALIZING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE (FIXED BUT PRESERVES WORLD)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

// FIX: controlled fog (NOT sky wash)
scene.fog = new THREE.FogExp2(0x0a1220, 0.0009);

// FIX: stable sky color (prevents green haze)
scene.background = new THREE.Color(0x0b1a2e);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 10000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (BALANCED RESTORE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 1));

const sun = new THREE.DirectionalLight(0xaaccff, 1.3);
sun.position.set(200,300,150);
scene.add(sun);

const glow = new THREE.PointLight(0x00ccff, 1.5, 1200);
glow.position.set(0,40,0);
scene.add(glow);

/////////////////////////////////////////////////////
// DEBUG ANCHOR (YOU MUST SEE THIS)
/////////////////////////////////////////////////////

const anchor = new THREE.Mesh(
new THREE.BoxGeometry(4,4,4),
new THREE.MeshStandardMaterial({color:0xff0000})
);
anchor.position.set(0,5,0);
scene.add(anchor);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// YOUR ORIGINAL WORLD (PRESERVED)
/////////////////////////////////////////////////////

function cabin(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y = 5;

const glow = new THREE.PointLight(0x00ccff,1.2,60);
glow.position.y = 6;

g.add(base);
g.add(house);
g.add(glow);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

/////////////////////////////////////////////////////
// DOCK
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

/////////////////////////////////////////////////////
// STAGE
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

/////////////////////////////////////////////////////
// JUMBOTRON
/////////////////////////////////////////////////////

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({color:0x061a2b})
);
water.rotation.x = -Math.PI/2;
water.position.y = -2;
scene.add(water);

/////////////////////////////////////////////////////
// CAMERA FIX (CRITICAL RESTORE POINT)
/////////////////////////////////////////////////////

camera.position.set(0,18,30);
camera.lookAt(0,0,0);

/////////////////////////////////////////////////////
// MOVE
/////////////////////////////////////////////////////

function move(){
if(keys.w) player.position.z -= 0.35;
if(keys.s) player.position.z += 0.35;
if(keys.a) player.position.x -= 0.35;
if(keys.d) player.position.x += 0.35;
}

/////////////////////////////////////////////////////
// CAMERA FOLLOW (STABLE)
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y + 10) - camera.position.y)*0.06;
camera.position.z += ((player.position.z + 20) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// ZONE UPDATE (SIMPLE)
/////////////////////////////////////////////////////

function updateZone(){
let z = "CENTER DOCK";
if(player.position.z < -120) z = "STAGE AREA";
if(player.position.x > 40) z = "RIGHT CABINS";
if(player.position.x < -40) z = "LEFT CABINS";
document.getElementById("zone").innerText = "ZONE: " + z;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();
updateZone();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
