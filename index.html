<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — AAA UPGRADED</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#intro img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.9;
}

#enter{
position:relative;
z-index:2;
padding:18px 40px;
font-size:20px;
background:rgba(0,0,0,0.6);
border:2px solid #00aaff;
color:white;
cursor:pointer;
letter-spacing:3px;
}
</style>
</head>

<body>

<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — AAA ENGINE UPGRADE</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// STATE
/////////////////////////////////////////////////////

let started = false;

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

// 🌌 AAA ATMOSPHERE (MORE DEPTH)
scene.fog = new THREE.FogExp2(0x060b18, 0.0013);
scene.background = new THREE.Color(0x050714);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 6000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth, innerHeight);

/////////////////////////////////////////////////////
// LIGHTING (AAA UPGRADE)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x4a6f8f, 0.18);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff0d0, 3.2);
sun.position.set(300, 380, 150);
scene.add(sun);

// ocean bounce glow (fake GI feel)
const oceanGlow = new THREE.PointLight(0x1aaaff, 1.4, 1200);
oceanGlow.position.set(0, 30, -120);
scene.add(oceanGlow);

/////////////////////////////////////////////////////
// PLAYER (SMOOTHER AAA FEEL)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let vel = new THREE.Vector3();
const speed = 0.13;     // slightly stronger feel
const friction = 0.86;

function move(){

let x=0,z=0;

if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.sqrt(x*x+z*z);
if(len>0){x/=len;z/=len;}

vel.x += x*speed;
vel.z += z*speed;

vel.x *= friction;
vel.z *= friction;

player.position.x += vel.x;
player.position.z += vel.z;
}

/////////////////////////////////////////////////////
// CAMERA (AAA CINEMATIC WEIGHT)
/////////////////////////////////////////////////////

let camVel = new THREE.Vector3();

function cam(){

const target = new THREE.Vector3(
player.position.x,
player.position.y + 32,
player.position.z + 105
);

// spring camera (AAA feel)
camVel.x += (target.x - camera.position.x) * 0.055;
camVel.y += (target.y - camera.position.y) * 0.055;
camVel.z += (target.z - camera.position.z) * 0.055;

camVel.multiplyScalar(0.80);

camera.position.add(camVel);

// speed-based cinematic FOV
let sp = Math.abs(vel.x) + Math.abs(vel.z);
camera.fov = 70 + sp * 20;
camera.updateProjectionMatrix();

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(7000,7000),
new THREE.MeshStandardMaterial({
color:0x08293d,
metalness:0.75,
roughness:0.22,
emissive:0x001822
})
);
water.rotation.x = -Math.PI/2;
water.position.z = -200;
scene.add(water);

const beach = new THREE.Mesh(
new THREE.PlaneGeometry(1800,900),
new THREE.MeshStandardMaterial({color:0xcbb27a})
);
beach.rotation.x=-Math.PI/2;
beach.position.set(0,-0.2,180);
scene.add(beach);

const dock = new THREE.Mesh(
new THREE.BoxGeometry(30,1,200),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-160);
scene.add(stage);

/////////////////////////////////////////////////////
// OCEAN MOTION (AAA WAVES FEEL)
/////////////////////////////////////////////////////

function ocean(){

water.position.x = Math.sin(t * 1.2) * 3;
water.position.z = -200 + Math.cos(t * 1.0) * 3;

water.rotation.z = Math.sin(t * 0.25) * 0.003;

}

/////////////////////////////////////////////////////
// ATMOSPHERE SYSTEM (REAL AAA LOOK MAGIC)
/////////////////////////////////////////////////////

let t = 0;

function time(){

t += 0.0011;

// day/night feel
let day = Math.sin(t);

// fog color shift (HUGE AAA TRICK)
scene.fog.color = new THREE.Color(
0.02 + day * 0.05,
0.06 + day * 0.08,
0.12 + day * 0.15
);

// lighting mood shift
ambient.intensity = 0.15 + (1 - day) * 0.25;
sun.intensity = 2.2 + day * 1.3;

// ocean color shift
water.material.color.setRGB(
0.01 + day * 0.03,
0.07,
0.12 + day * 0.05
);

}

/////////////////////////////////////////////////////
// INTRO
/////////////////////////////////////////////////////

document.getElementById("enter").onclick = () => {
document.getElementById("intro").style.display = "none";
started = true;
};

/////////////////////////////////////////////////////
// LOOP (AAA ORDER)
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

if(!started) return;

move();
time();
ocean();
cam();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
