<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMBO CITY</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* MAIN /
#main {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  background:black;
}

#enterBtn {
  padding:15px 30px;
  background:gold;
  border:none;
  cursor:pointer;
}

/ WORLD /
#world {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
}

/ VIDEO /
#bgVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/ DARK OVERLAY /
#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/ GLOW /
.glow {
  text-shadow:0 0 10px gold, 0 0 20px gold;
}

/ HUD /
#hud {
  position:absolute;
  width:100%;
  height:100%;
}

/ ACTIVITY /
#activity {
  position:absolute;
  top:20px;
  left:20px;
  font-size:14px;
}

/ TOP RIGHT /
#exitBtn {
  position:absolute;
  top:20px;
  right:20px;
}

/ BOTTOM LEFT CONTROLS /
#controls {
  position:absolute;
  bottom:20px;
  left:20px;
}

button {
  margin:5px;
  padding:10px;
  background:black;
  color:white;
  border:1px solid gold;
  cursor:pointer;
}

/ TWITCH SCREEN /
#twitchBox {
  position:absolute;
  top:20%;
  left:25%;
  width:50%;
  height:50%;
  border:2px solid gold;
  box-shadow:0 0 20px gold;
}

/ VIP */
#vip {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
}

#vip h2 {
  text-align:center;
  margin-top:100px;
}
</style>
</head>

<body>

<div id="main">
  <h1 class="glow">LAMBO CITY</h1>
  <button id="enterBtn" onclick="openWorld()">ENTER</button>
</div>

<div id="world">

  <video id="bgVideo" autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-ocean-waves-1600.mp4" type="video/mp4">
  </video>

  <div id="overlay"></div>

  <div id="hud">

    <div id="activity">City initializing...</div>

    <button id="exitBtn" onclick="closeWorld()">EXIT</button>

    <div id="controls">
      <button onclick="playRadio()">RADIO</button>
      <button onclick="playLive()">LIVE</button>
      <button onclick="openVIP()">YACHT CLUB</button>
    </div>

    <div id="twitchBox">
      <iframe id="twitch"
        src="https://player.twitch.tv/?channel=twitch&parent=lambocityrecords.com"
        width="100%" height="100%"
        frameborder="0"
        allowfullscreen="true">
      </iframe>
    </div>

  </div>

  <audio id="radio" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <div id="vip">
    <button id="exitBtn" onclick="closeVIP()">EXIT VIP</button>
    <h2 class="glow">YACHT CLUB ACCESS GRANTED</h2>
  </div>

</div>

<script>
function openWorld(){
  document.getElementById("world").style.display="block";
  startActivity();
  playRadio();
}

function closeWorld(){
  document.getElementById("world").style.display="none";
}

function playRadio(){
  document.getElementById("radio").play();
}

function playLive(){
  document.getElementById("radio").pause();
}

function openVIP(){
  document.getElementById("vip").style.display="block";
}

function closeVIP(){
  document.getElementById("vip").style.display="none";
}

function startActivity(){
  const messages=[
    "DJ HERO live now",
    "Dock lights active",
    "Yacht club preparing access",
    "Live broadcast running",
    "Members entering lounge",
    "Radio synced"
  ];
  let i=0;
  setInterval(()=>{
    document.getElementById("activity").innerText=messages[i%messages.length];
    i++;
  },2000);
}
</script>

</body>
</html>
