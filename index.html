<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING STREETS v50</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* 🌆 CITY BACKGROUND */
#city {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, #120a08, #000, #0a0f1a);
    background-size: 400% 400%;
    animation: cityMove 12s ease infinite;
}

@keyframes cityMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🚗 ROAD LAYER */
.road {
    position: absolute;
    width: 100%;
    height: 200px;
    top: 60%;
    background: rgba(0,0,0,0.4);
    transform: skewY(-2deg);
}

/* 🚗 CARS */
.car {
    position: absolute;
    width: 60px;
    height: 30px;
    background: red;
    border-radius: 4px;
    opacity: 0.9;
}

/* NPCS */
.npc {
    position: absolute;
    width: 15px;
    height: 30px;
    background: white;
    opacity: 0.7;
    border-radius: 2px;
}

/* 🌫 ATMOSPHERE */
#fog {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8));
    pointer-events: none;
}

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="city"></div>
<div class="road"></div>
<div id="fog"></div>
<div id="hud">LAMBO CITY // STREET LIFE ACTIVE</div>

<script>

const city = document.getElementById("city");

/* =========================
   🚗 SPAWN CARS (LOOPING TRAFFIC)
========================= */
function spawnCar() {

    const car = document.createElement("div");
    car.className = "car";

    const y = 55 + Math.random() * 10;
    car.style.top = y + "%";
    car.style.left = "-80px";

    document.body.appendChild(car);

    let pos = -80;

    let speed = 2 + Math.random() * 3;

    function move() {
        pos += speed;
        car.style.left = pos + "px";

        if (pos > window.innerWidth + 100) {
            car.remove();
        } else {
            requestAnimationFrame(move);
        }
    }

    move();
}

/* =========================
   🚶 NPC WALKERS
========================= */
function spawnNPC() {

    const npc = document.createElement("div");
    npc.className = "npc";

    npc.style.left = Math.random() * window.innerWidth + "px";
    npc.style.top = (60 + Math.random() * 20) + "%";

    document.body.appendChild(npc);

    let drift = 0;

    function walk() {
        drift += (Math.random() - 0.5) * 2;
        npc.style.transform = `translateX(${drift}px)`;

        if (Math.random() < 0.01) {
            npc.remove();
        } else {
            requestAnimationFrame(walk);
        }
    }

    walk();
}

/* =========================
   🌆 WORLD LOOP (THIS IS THE "LIVING CITY")
========================= */
setInterval(spawnCar, 1200);   // cars every 1.2 sec
setInterval(spawnNPC, 900);    // NPCs constantly spawning

</script>

</body>
</html>
