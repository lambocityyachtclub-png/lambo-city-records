<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMBO CITY</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.active {
  display: flex;
}

/* ENTRY /
#entry {
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#entry h1 {
  font-size: 32px;
  letter-spacing: 2px;
}

button {
  padding: 15px 30px;
  background: gold;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

/ DOCK /
#dock {
  flex-direction: column;
  background: linear-gradient(to top, #000000, #111111);
}

#activity {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.8;
}

/ YACHT /
#yacht {
  flex-direction: column;
  align-items: center;
  background: radial-gradient(circle, #111, #000);
}

#yacht h2 {
  margin-top: 40px;
}

/ TWITCH */
#twitch {
  width: 60%;
  height: 50%;
  border: 2px solid gold;
  margin-top: 40px;
}
</style>
</head>

<body>

<div id="entry" class="screen active">
  <h1>WELCOME TO LAMBO CITY</h1>
  <button onclick="enterCity()">ENTER</button>
</div>

<div id="dock" class="screen">
  <div id="activity">Initializing...</div>
</div>

<div id="yacht" class="screen">
  <h2>YACHT CLUB</h2>
  <iframe id="twitch"
    src="https://player.twitch.tv/?channel=twitch&parent=lambocityrecords.com"
    frameborder="0"
    allowfullscreen="true">
  </iframe>
</div>

<script>
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function enterCity() {
  showScreen('dock');
  startActivity();
  setTimeout(() => {
    showScreen('yacht');
  }, 4000);
}

function startActivity() {
  const messages = [
    "DJ HERO joined the city",
    "Boarding pass verified",
    "Yacht access initializing",
    "Live broadcast starting",
    "3 members in lounge",
    "Dock activity detected"
  ];
  let i = 0;
  setInterval(() => {
    document.getElementById('activity').innerText = messages[i % messages.length];
    i++;
  }, 2000);
}
</script>

</body>
</html>
