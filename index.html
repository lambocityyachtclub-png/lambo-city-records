<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — V4 CORE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY V4 CORE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// SCENE CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x0a1020, 0.004);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  3000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (FIXED — NO DARK WORLD)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x3a4f6a, 1.2));

const sun = new THREE.DirectionalLight(0x88ccff, 1.2);
sun.position.set(80, 120, 50);
scene.add(sun);

const fill = new THREE.PointLight(0x4da3ff, 1.2, 1200);
fill.position.set(0, 80, 0);
scene.add(fill);

/////////////////////////////////////////////////////
// PLAYER + CAMERA
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);

player.position.set(0,1,-20);
scene.add(player);

camera.position.set(0,8,10);

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move(){
  if(keys["w"]) player.position.z -= 0.3;
  if(keys["s"]) player.position.z += 0.3;
  if(keys["a"]) player.position.x -= 0.3;
  if(keys["d"]) player.position.x += 0.3;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
  camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (WORKING WAVE SYSTEM)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2000,2000,80,80);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x0a1a2a,
  metalness: 0.3,
  roughness: 0.6,
  emissive: 0x001122,
  emissiveIntensity: 0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🌉 DOCK + WALKWAY
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(200,200,2,64),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
dock.position.set(0,0,-80);
scene.add(dock);

const walkway = new THREE.Mesh(
  new THREE.BoxGeometry(6,0.5,200),
  new THREE.MeshStandardMaterial({ color:0x111111, emissive:0x001122, emissiveIntensity:0.2 })
);
walkway.position.set(0,0.25,-60);
scene.add(walkway);

/////////////////////////////////////////////////////
// 🏡 VILLAS
/////////////////////////////////////////////////////

function createVilla(x,z){
  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x101010 })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(16,6,16),
    new THREE.MeshStandardMaterial({ color:0x151515 })
  );
  body.position.y = 3.5;
  g.add(body);

  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(18,1,18),
    new THREE.MeshStandardMaterial({ color:0x0a0a0a })
  );
  roof.position.y = 7.5;
  g.add(roof);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<6;i++){
  createVilla(-25,-20-i*25);
  createVilla(25,-20-i*25);
}

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(16,4,45),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO NPC
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY V4";
    }
  }
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  const time = Date.now()*0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.02+time)*0.4 +
      Math.cos(v.z*0.02+time*1.3)*0.4;

    waterPos.setY(i,wave);
  }

  waterPos.needsUpdate = true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
