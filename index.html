<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | ONLINE WORLD v5</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

/* =========================
   HUD
========================= */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.85;
    z-index: 20;
}

/* =========================
   MAP UI
========================= */
#map {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 180px;
    height: 180px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.5);
    z-index: 20;
    padding: 8px;
    font-size: 10px;
    color: white;
}

/* =========================
   STORE UI
========================= */
#storeUI {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 220px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px;
    z-index: 20;
    display:none;
}

/* =========================
   OBJECTIVE
========================= */
#objective {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    z-index: 20;
}

/* =========================
   CROSSHAIR
========================= */
#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: white;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    z-index: 10;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // ONLINE ARCHITECTURE v5</div>
<div id="map">MAP: CITY | YACHT | STORE</div>
<div id="storeUI">
    <b>STORE</b><br><br>
    👕 HERO Tee<br>
    🧢 Lambo Cap<br>
    🎟 Yacht Pass<br><br>
    <button onclick="closeStore()">CLOSE</button>
</div>

<div id="objective">MISSION: Enter the City</div>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🌍 ENGINE CORE
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* =========================
   🌆 WORLD BUILD
========================= */
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshBasicMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ZONES */
function zone(x,z,color){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(6,6,6),
        new THREE.MeshBasicMaterial({color})
    );
    m.position.set(x,3,z);
    scene.add(m);
    return m;
}

const city = zone(0,0,0x333333);
const yacht = zone(15,0,0x113355);
const store = zone(-15,0,0x331111);

/* =========================
   🎮 PLAYER
========================= */
const player = {
    rotY:0,
    speed:0.12
};

camera.position.set(0,2,8);

/* =========================
   INPUT
========================= */
let keys={};

document.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()] = true;

    if(e.key.toLowerCase()==="b"){
        openStore();
    }
});

document.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()] = false;
});

document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
    if(document.pointerLockElement===document.body){
        player.rotY -= e.movementX*0.002;
    }
});

/* =========================
   🎯 MISSION SYSTEM (DATA DRIVEN)
========================= */
const missions = [
    "Enter City Center",
    "Reach Yacht Zone",
    "Visit Store"
];

let missionIndex = 0;

function updateMission(){
    document.getElementById("objective").innerText =
    "MISSION: " + missions[missionIndex];
}

/* =========================
   🚶 MOVEMENT SYSTEM
========================= */
function move(){

    let forward = new THREE.Vector3(
        -Math.sin(player.rotY),0,-Math.cos(player.rotY)
    );

    let right = new THREE.Vector3(
        Math.cos(player.rotY),0,-Math.sin(player.rotY)
    );

    if(keys["w"]) camera.position.addScaledVector(forward,player.speed);
    if(keys["s"]) camera.position.addScaledVector(forward,-player.speed);
    if(keys["a"]) camera.position.addScaledVector(right,-player.speed);
    if(keys["d"]) camera.position.addScaledVector(right,player.speed);

    camera.rotation.y = player.rotY;
}

/* =========================
   🌐 WORLD STATE SYSTEM (MULTIPLAYER READY CORE)
========================= */
const worldState = {
    players: {}, // future multiplayer
    npcs: [],
    vehicles: []
};

/* =========================
   🎯 INTERACTION LOGIC
========================= */
function interactZones(){

    if(camera.position.distanceTo(city.position)<3 && missionIndex===0){
        missionIndex=1;
        updateMission();
    }

    if(camera.position.distanceTo(yacht.position)<3 && missionIndex===1){
        missionIndex=2;
        updateMission();
    }

    if(camera.position.distanceTo(store.position)<3){
        openStore();
    }
}

/* =========================
   🛒 STORE SYSTEM
========================= */
function openStore(){
    document.getElementById("storeUI").style.display="block";
}

function closeStore(){
    document.getElementById("storeUI").style.display="none";
}

/* =========================
   🎮 GAME LOOP
========================= */
function animate(){
    requestAnimationFrame(animate);

    move();
    interactZones();

    renderer.render(scene,camera);
}
animate();

updateMission();

/* RESIZE */
window.addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
