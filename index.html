<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — AAA FIXED WORLD BASE</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;left:20px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY — AAA FIXED ENGINE</div>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

// FIX: controlled fog ONLY (not color wash)
scene.fog = new THREE.Fog(0x0a1220, 60, 500);

// IMPORTANT: background NOT green tint
scene.background = new THREE.Color(0x87b5ff); // sky blue = orientation fix

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 10000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (HORIZON FIX)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,300,100);
scene.add(sun);

/////////////////////////////////////////////////////
// GROUND (FORCED VISUAL CONTRAST)
/////////////////////////////////////////////////////

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1000,1000),
new THREE.MeshStandardMaterial({color:0x2a6b3d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/////////////////////////////////////////////////////
// CAR (CLEAR VISIBILITY)
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({
color:0xffcc00,
emissive:0x553300,
emissiveIntensity:0.4
})
);

car.position.set(0,1,0);
scene.add(car);

/////////////////////////////////////////////////////
// OCEAN (BACKGROUND ONLY)
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x0b1f33})
);

ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// CAMERA (CRITICAL FIX)
/////////////////////////////////////////////////////

camera.position.set(0,18,30); // LOWER + FORWARD (fix sky feeling)
camera.lookAt(0,0,0);

/////////////////////////////////////////////////////
// MOVE
/////////////////////////////////////////////////////

function move(){
if(keys.w) car.position.z -= 0.4;
if(keys.s) car.position.z += 0.4;
if(keys.a) car.position.x -= 0.4;
if(keys.d) car.position.x += 0.4;
}

/////////////////////////////////////////////////////
// CAMERA FOLLOW (AAA STYLE)
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (car.position.x - camera.position.x)*0.08;
camera.position.y += ((car.position.y + 10) - camera.position.y)*0.08;
camera.position.z += ((car.position.z + 20) - camera.position.z)*0.08;

camera.lookAt(car.position);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
