<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING MULTIPLAYER CITY</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* CAMERA LAYER */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.2);
    transition: 0.6s ease;
    z-index: 999;
}

/* HUD */
#hud {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 11px;
    opacity: 0.7;
    letter-spacing: 3px;
    z-index: 50;
}

/* LIVE ACTIVITY FEED */
#feed {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-size: 10px;
    opacity: 0.5;
    max-width: 300px;
}

/* WORLD */
.world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* ===== DISTINCT WORLD IDENTITY ===== */

/* PORTAL = cold / blue tone */
#portal {
    background: radial-gradient(circle at center, #0a0a1a, #000);
}

/* CITY = neon warm chaos */
#city {
    background: radial-gradient(circle at top, #1a120a, #000);
}

/* VIP = luxury dark gold tone */
#vip {
    background: radial-gradient(circle at center, #11110a, #000);
}

/* TITLE */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* BUTTONS */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

/* VIP STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* TRANSITION FLASH */
.flash {
    animation: flash 0.5s ease;
}

@keyframes flash {
    0% { filter: brightness(1); }
    50% { filter: brightness(2); }
    100% { filter: brightness(1); }
}
</style>
</head>

<body>

<div id="camera"></div>
<div id="hud">LAMBO CITY // MULTIPLAYER SIMULATION ACTIVE</div>
<div id="feed"></div>

<!-- PORTAL -->
<div id="portal" class="world">
    <div class="title">CITY GATE</div>
    <button onclick="travel('city')">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="world">
    <div class="title">LAMBO CITY</div>
    <button onclick="travel('vip')">YACHT CLUB</button>
    <button onclick="travel('portal')">EXIT WORLD</button>
</div>

<!-- VIP -->
<div id="vip" class="world">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="travel('city')">BACK TO CITY</button>
</div>

<script>

const camera = document.getElementById("camera");
const feed = document.getElementById("feed");

window.onload = () => {
    show("portal");
    simulatePlayers();
};

/* WORLD SWITCH */
function show(id) {
    document.querySelectorAll(".world").forEach(w => w.style.display = "none");
    document.getElementById(id).style.display = "flex";

    updateHUD(id);
    flashWorld();
}

/* HUD UPDATE */
function updateHUD(id) {
    const names = {
        portal: "CITY GATE",
        city: "LAMBO CITY CENTER",
        vip: "YACHT CLUB VIP"
    };

    document.getElementById("hud").innerText =
        "LAMBO CITY // " + (names[id] || "UNKNOWN ZONE");
}

/* STRONG TRANSITION (NOW VISUALLY OBVIOUS) */
function travel(destination) {

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.25)";

    setTimeout(() => {

        show(destination);

        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
        }, 250);

    }, 500);
}

/* ZONE FLASH (MAKES CHANGE OBVIOUS) */
function flashWorld() {
    document.body.classList.add("flash");

    setTimeout(() => {
        document.body.classList.remove("flash");
    }, 400);
}

/* FAKE MULTIPLAYER ACTIVITY */
function simulatePlayers() {
    const messages = [
        "DJ HERO entered City Center",
        "User connected to Yacht Club stream",
        "Citizen roaming downtown",
        "VIP access session active",
        "Neon traffic increasing in City"
    ];

    setInterval(() => {
        const msg = messages[Math.floor(Math.random() * messages.length)];
        feed.innerText = "LIVE: " + msg;
    }, 2500);
}

</script>

</body>
</html>
