<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION LAYER v4</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex; justify-content:center; align-items:center;
flex-direction:column;
background:black; color:white;
z-index:10;
}

#ui {
position:absolute; top:20px; left:20px;
color:white; font-size:13px;
font-family:Arial;
}

#zone {
position:absolute; top:20px; right:20px;
color:#00ffff;
font-family:Arial;
}

#msg {
position:absolute; bottom:30px; left:50%;
transform:translateX(-50%);
color:white;
padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
font-family:Arial;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏡 Villas → 🌊 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">INITIALIZING...</div>
<div id="msg">IMMERSION LAYER v4 ACTIVE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// 1. CORE ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.1));

const light = new THREE.PointLight(0x00ffff,2);
light.position.set(0,10,10);
scene.add(light);

/////////////////////////////////////////////////////
// 2. PLAYER SYSTEM
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);
player.position.set(0,1,20);

const keys = {};
let started = false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
document.getElementById("start").style.display="none";
started = true;
setZone("WELCOME TO LAMBO CITY");
}

function setZone(t){
document.getElementById("zone").innerText = t;
}

/////////////////////////////////////////////////////
// 3. WORLD ASSETS
/////////////////////////////////////////////////////

// WATER
const water = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<3000;i++){
arr.push(
(Math.random()-0.5)*1500,
Math.random()*600,
(Math.random()-0.5)*1500
);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
const dock = new THREE.Mesh(
new THREE.BoxGeometry(80,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-100);
scene.add(dock);

// STAGE
const stage = new THREE.Mesh(
new THREE.BoxGeometry(20,2,12),
new THREE.MeshStandardMaterial({color:0x6600aa, emissive:0x220022})
);
stage.position.set(-15,1,-80);
scene.add(stage);

// YACHT
const yacht = new THREE.Mesh(
new THREE.BoxGeometry(40,6,20),
new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x002222})
);
yacht.position.set(0,3,-250);
scene.add(yacht);

/////////////////////////////////////////////////////
// 4. CABINS (IMMERSION LAYER v4 UPGRADE)
/////////////////////////////////////////////////////

const cabins = [];
const cabinInteriorLights = [];

for(let i=0;i<5;i++){

// LEFT CABIN
const left = new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
left.position.set(-20,2.5,-20-(i*25));
scene.add(left);
cabins.push(left);

// RIGHT CABIN
const right = left.clone();
right.position.x = 20;
scene.add(right);
cabins.push(right);

// INTERIOR LIGHT GLOW (simple immersion upgrade)
const glow = new THREE.PointLight(0x00ffff,0.3,20);
glow.position.set(left.position.x,3,left.position.z);
scene.add(glow);

cabinInteriorLights.push(glow);
}

/////////////////////////////////////////////////////
// 5. STARS ATMOSPHERE
/////////////////////////////////////////////////////

/////////////////////////////////////////////////////
// 6. INPUT LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!started) return;

// movement
if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;

// camera follow
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += (6 - camera.position.y)*0.05;
camera.position.z += (player.position.z + 12 - camera.position.z)*0.06;
camera.lookAt(player.position);

// zone detection
if(player.position.distanceTo(stage.position)<8){
setZone("🎤 STAGE ACTIVE");
}

if(player.position.distanceTo(yacht.position)<15){
setZone("🚤 YACHT VIEW");
}

// cabin vibe pulse
const t = Date.now()*0.001;
cabinInteriorLights.forEach((l,i)=>{
l.intensity = 0.2 + Math.sin(t + i)*0.1;
});

stars.rotation.y += 0.0003;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
