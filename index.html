<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION WORLD v8 CLEAN</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
color:white;
font-family:Arial;
font-size:13px;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#start {
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:20;
}

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 16px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
position:absolute;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LOADING WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

let started = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x080816, 0.012);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"), antialias:true});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.PointLight(0x66ccff, 1.5, 200);
light.position.set(0,30,30);
scene.add(light);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,-30);
scene.add(player);

const keys = {};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// START
/////////////////////////////////////////////////////

function start(){
document.getElementById("start").style.display="none";
started = true;
document.getElementById("zone").innerText="LAMBO CITY ACTIVE";
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(1500,1500,50,50);
const waterMat = new THREE.MeshStandardMaterial({
color:0x020b1a,
metalness:0.7,
roughness:0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
waterBase.push({
x:waterPos.getX(i),
z:waterPos.getZ(i)
});
}

/////////////////////////////////////////////////////
// CABINS
/////////////////////////////////////////////////////

const cabins = [];

function createCabin(x,z){

const cabin = new THREE.Mesh(
new THREE.BoxGeometry(10,5,10),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);

cabin.position.set(x,2.5,z);
scene.add(cabin);

cabins.push(cabin);
}

for(let i=0;i<5;i++){
createCabin(-20,-20-i*15);
createCabin(20,-20-i*15);
}

/////////////////////////////////////////////////////
// YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(15,4,40),
new THREE.MeshStandardMaterial({color:0xf2f2f2})
);

hull.position.y = 2;
yacht.add(hull);

yacht.position.set(40,0,-80);
scene.add(yacht);

let insideYacht = false;

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff})
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// INTERACTION UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
hint.style.display="block";
hint.innerText=t;
}

function hide(){
hint.style.display="none";
}

/////////////////////////////////////////////////////
// INTERACTION
/////////////////////////////////////////////////////

function checkInteractions(){

const heroDist = player.position.distanceTo(hero.position);
if(heroDist < 3) show("PRESS E TO TALK");

else hide();

}

document.addEventListener("keydown",e=>{

if(e.key.toLowerCase()==="e"){

if(player.position.distanceTo(hero.position)<3){
document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY";
}

if(player.position.distanceTo(yacht.position)<10){
insideYacht = !insideYacht;
player.position.set(40,1,-80);
document.getElementById("zone").innerText="YACHT ZONE";
}

}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

if(!started){
renderer.render(scene,camera);
return;
}

move();
updateCamera();
checkInteractions();

const t = Date.now()*0.001;

for(let i=0;i<waterPos.count;i++){
const v = waterBase[i];
waterPos.setY(i,
Math.sin(v.x*0.02+t)*0.4 +
Math.cos(v.z*0.02+t)*0.4
);
}

waterPos.needsUpdate=true;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
