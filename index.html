<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V27 — CINEMATIC WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V27 — CINEMATIC UPGRADE</div>
<div id="zone">ZONE: LOADING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE CINEMATIC ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

// SKY GRADIENT (AAA BASE)
const skyGeo = new THREE.SphereGeometry(6000, 32, 32);
const skyMat = new THREE.ShaderMaterial({
side: THREE.BackSide,
uniforms: {
top: { value: new THREE.Color(0x7fb6ff) },
bottom: { value: new THREE.Color(0x050814) }
},
vertexShader: `
varying vec3 vPos;
void main(){
vPos = position;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`,
fragmentShader: `
uniform vec3 top;
uniform vec3 bottom;
varying vec3 vPos;
void main(){
float h = normalize(vPos).y * 0.5 + 0.5;
gl_FragColor = vec4(mix(bottom, top, h), 1.0);
}
`
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// FOG (CINEMATIC DEPTH)
scene.fog = new THREE.Fog(0x0a1220, 100, 800);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 12000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC SUNSET STYLE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.8));

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(200,400,100);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88aaff, 0.5);
fill.position.set(-200,100,-100);
scene.add(fill);

/////////////////////////////////////////////////////
// WORLD (PRESERVED STRUCTURE)
/////////////////////////////////////////////////////

function cabin(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y = 5;

g.add(base);
g.add(house);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// OCEAN (REAL MOVING CINEMATIC WATER)
/////////////////////////////////////////////////////

const oceanGeo = new THREE.PlaneGeometry(5000,5000,100,100);
const oceanMat = new THREE.MeshStandardMaterial({
color:0x061a2b,
metalness:0.4,
roughness:0.9
});
const ocean = new THREE.Mesh(oceanGeo,oceanMat);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

const oceanPos = ocean.geometry.attributes.position;
const oceanBase = [];

for(let i=0;i<oceanPos.count;i++){
oceanBase.push({
x:oceanPos.getX(i),
z:oceanPos.getZ(i)
});
}

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// YACHT (CINEMATIC MOVEMENT)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(20,2,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
hull.position.y = 1;

const cabinY = new THREE.Mesh(
new THREE.BoxGeometry(10,4,20),
new THREE.MeshStandardMaterial({color:0x222222})
);
cabinY.position.y = 5;

yacht.add(hull);
yacht.add(cabinY);
yacht.position.set(60,0,-120);
scene.add(yacht);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// CAMERA CINEMATIC SYSTEM
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

let camShake = 0;

function updateCamera(){

// cinematic follow with slight delay + weight
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.y += ((player.position.y + 14) - camera.position.y)*0.05;
camera.position.z += ((player.position.z + 25) - camera.position.z)*0.05;

// subtle cinematic shake (very light)
camera.position.x += Math.sin(Date.now()*0.001)*0.02*camShake;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT (SMOOTHER CINEMATIC FEEL)
/////////////////////////////////////////////////////

function move(){
const speed = 0.32;

if(keys.w) player.position.z -= speed;
if(keys.s) player.position.z += speed;
if(keys.a) player.position.x -= speed;
if(keys.d) player.position.x += speed;
}

/////////////////////////////////////////////////////
// OCEAN ANIMATION (REAL WAVE MOTION)
/////////////////////////////////////////////////////

function animateOcean(t){
for(let i=0;i<oceanPos.count;i+=2){
const v = oceanBase[i];
oceanPos.setY(i,
Math.sin(v.x*0.02 + t)*0.8 +
Math.cos(v.z*0.02 + t*1.2)*0.8
);
}
oceanPos.needsUpdate = true;
}

/////////////////////////////////////////////////////
// YACHT MOTION (CINEMATIC FLOAT)
/////////////////////////////////////////////////////

function animateYacht(t){
yacht.position.z += Math.sin(t*0.5)*0.05;
yacht.position.x += Math.cos(t*0.3)*0.03;
}

/////////////////////////////////////////////////////
// ZONE SYSTEM
/////////////////////////////////////////////////////

function updateZone(){
let z = "DOCK";
if(player.position.z < -120) z = "STAGE";
if(player.position.x > 40) z = "RIGHT CABINS";
if(player.position.x < -40) z = "LEFT CABINS";
document.getElementById("zone").innerText = "ZONE: " + z;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

const t = performance.now()*0.001;

move();
updateCamera();
animateOcean(t);
animateYacht(t);
updateZone();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
