<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY - DOCK SYSTEM</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* CANVAS */
canvas {
  display: block;
}

/* UI */
#ui {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

/* HUD */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.85;
}

/* BUTTONS */
button {
  padding: 10px;
  background: black;
  border: 1px solid gold;
  color: white;
  cursor: pointer;
  pointer-events: auto;
  margin-right: 6px;
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.95);
  z-index: 20;
  text-align:center;
  padding-top:120px;
}

/* ENTRY */
#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: rgba(0,0,0,0.6);
  pointer-events:auto;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

  <div id="home">
    <h1>LAMBO CITY</h1>
    <button onclick="enterWorld()">ENTER WORLD</button>
  </div>

  <div id="hud">
    <div id="status">SYSTEM OFFLINE</div>
    <button onclick="toggleVIP()">VIP</button>
  </div>

  <div id="vip">
    <button onclick="closeVIP()" style="position:absolute;top:20px;right:20px;">EXIT VIP</button>
    <h1>YACHT CLUB INTERIOR</h1>
  </div>

</div>

<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== SCENE SETUP =====
let scene, camera, renderer;
let ocean, yacht;
let mode = "idle";
let t = 0;

// yacht position (target dock)
const dockTarget = new THREE.Vector3(0, 0, -10);

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 8, 25);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);

  // 🌊 OCEAN
  const geo = new THREE.PlaneGeometry(200, 200, 80, 80);
  const mat = new THREE.MeshBasicMaterial({ color: 0x001a33, wireframe: true });
  ocean = new THREE.Mesh(geo, mat);
  ocean.rotation.x = -Math.PI / 2;
  scene.add(ocean);

  // 🛥 YACHT (simple block representation)
  const yachtGeo = new THREE.BoxGeometry(2, 1, 6);
  const yachtMat = new THREE.MeshBasicMaterial({ color: 0xd4af37 });
  yacht = new THREE.Mesh(yachtGeo, yachtMat);
  yacht.position.set(0, 0.5, -10);
  scene.add(yacht);

  animate();
}

// ===== ANIMATION LOOP =====
function animate() {
  requestAnimationFrame(animate);

  t += 0.02;

  // ocean wave illusion
  const pos = ocean.geometry.attributes.position.array;

  for (let i = 0; i < pos.length; i += 3) {
    pos[i + 2] = Math.sin((i + t) * 0.05) * 1.2;
  }

  ocean.geometry.attributes.position.needsUpdate = true;

  // camera behavior
  if (mode === "approach") {

    camera.position.x += (yacht.position.x - camera.position.x) * 0.02;
    camera.position.z += (yacht.position.z + 8 - camera.position.z) * 0.02;
    camera.position.y += (5 - camera.position.y) * 0.02;

    camera.lookAt(yacht.position);

    // trigger VIP when close
    if (camera.position.distanceTo(yacht.position) < 6) {
      openVIP();
      mode = "vip";
    }

  } else {
    camera.lookAt(0, 0, 0);
  }

  renderer.render(scene, camera);
}

// ===== GAME FLOW =====

function enterWorld() {
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "Ocean online - Yacht detected";

  mode = "approach";

  document.getElementById("radio").play().catch(()=>{});
}

function openVIP() {
  document.getElementById("vip").style.display = "block";
}

function closeVIP() {
  document.getElementById("vip").style.display = "none";
  mode = "idle";
}

function toggleVIP() {
  const vip = document.getElementById("vip");
  vip.style.display = vip.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
