<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
  opacity:0.9;
}

#prompt {
  position:absolute;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.8);
  border:1px solid gold;
  padding:12px 16px;
  display:none;
  pointer-events:auto;
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  transition:opacity 0.8s;
}

button {
  padding:12px 16px;
  margin-top:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="hud">
  <div id="status">CABIN LOBBY</div>
  <div id="zone">ZONE: BOARDING CABIN</div>
  <div id="radio">RADIO: AMBIENT</div>
</div>

<div id="prompt">
  <p>🚪 EXIT TO DOCK</p>
  <button onclick="enterDock()">GO OUTSIDE</button>
</div>

<div id="fade"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let keys = {};

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x050510, 5, 100);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,2.5,5);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // LIGHTING
  scene.add(new THREE.AmbientLight(0x2a2a40));
  const light = new THREE.PointLight(0x00aaff, 2, 100);
  light.position.set(0,8,0);
  scene.add(light);

  // PLAYER
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,0);
  scene.add(player);

  // 🟦 CABIN ROOM (NOW WITH WINDOW OPENING)
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({
      color:0x0b0b1a,
      side:THREE.BackSide
    })
  );
  cabin.position.y = 3;
  scene.add(cabin);

  // 🪟 WINDOW VIEW FRAME (this is the upgrade)
  const windowFrame = new THREE.Mesh(
    new THREE.BoxGeometry(8,3,0.2),
    new THREE.MeshStandardMaterial({color:0x222233})
  );
  windowFrame.position.set(0,3,-6.8);
  scene.add(windowFrame);

  // DOCK PLATFORM OUTSIDE WINDOW
  const dock = new THREE.Mesh(
    new THREE.BoxGeometry(40,0.2,40),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  dock.position.set(0,0,-30);
  scene.add(dock);

  // YACHT IN DISTANCE (visible through window)
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(5,2,12),
    new THREE.MeshStandardMaterial({
      color:0xffd700,
      emissive:0x553300
    })
  );
  yacht.position.set(0,1,-55);
  scene.add(yacht);

  const yachtLight = new THREE.PointLight(0xffaa00, 3, 120);
  yachtLight.position.set(0,6,-55);
  scene.add(yachtLight);

  // STARS
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0;i<1500;i++){
    pos.push((Math.random()-0.5)*250, Math.random()*80, (Math.random()-0.5)*250);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff,size:0.5})));

  document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z -= 0.12;
  if(keys["s"]) player.position.z += 0.12;
  if(keys["a"]) player.position.x -= 0.12;
  if(keys["d"]) player.position.x += 0.12;

  camera.position.x += (player.position.x - camera.position.x)*0.05;
  camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
  camera.lookAt(player.position);

  checkExit();

  renderer.render(scene,camera);
}

function checkExit(){
  const dist = Math.hypot(player.position.x, player.position.z + 6);

  if(dist < 2.5){
    document.getElementById("prompt").style.display="block";
  } else {
    document.getElementById("prompt").style.display="none";
  }
}

function enterDock(){
  document.getElementById("fade").style.opacity = 1;

  setTimeout(()=>{
    document.getElementById("zone").innerText = "DOCK AREA";
    document.getElementById("fade").style.opacity = 0;
  },800);
}

</script>

</body>
</html>
