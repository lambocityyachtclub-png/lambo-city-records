<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | OPEN WORLD v4</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.85;
    z-index: 10;
}

/* UI OBJECTIVE */
#objective {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: white;
    font-size: 13px;
    z-index: 10;
}

/* INTERACTION PROMPT */
#prompt {
    position: fixed;
    bottom: 50px;
    left: 20px;
    color: #aaa;
    font-size: 11px;
    z-index: 10;
}

/* CROSSHAIR */
#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: white;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    z-index: 10;
}

/* FADE */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: 0.4s;
    z-index: 20;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // OPEN WORLD v4</div>
<div id="objective">MISSION: Steal or Drive a Car</div>
<div id="prompt">E: Enter/Exit Vehicle or Interior</div>
<div id="crosshair"></div>
<div id="fade"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🌍 WORLD
========================= */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 90);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* =========================
   🌆 WORLD GROUND
========================= */
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshBasicMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* =========================
   🏙 BUILDINGS
========================= */
function building(x,z,h){
    const b = new THREE.Mesh(
        new THREE.BoxGeometry(5,h,5),
        new THREE.MeshBasicMaterial({color:0x333333})
    );
    b.position.set(x,h/2,z);
    scene.add(b);
}

for(let i=0;i<70;i++){
    building(
        (Math.random()-0.5)*90,
        (Math.random()-0.5)*90,
        Math.random()*12+3
    );
}

/* =========================
   🚪 INTERIORS
========================= */
const interior = new THREE.Mesh(
    new THREE.BoxGeometry(6,6,6),
    new THREE.MeshBasicMaterial({color:0x224466})
);
interior.position.set(10,3,-10);
scene.add(interior);

/* =========================
   🚗 PLAYER VEHICLE SYSTEM
========================= */
let inCar = false;

const car = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,1,3),
    new THREE.MeshBasicMaterial({color:0xff3333})
);
car.position.set(0,0.5,5);
scene.add(car);

/* =========================
   🧍 PLAYER (FPS MODE)
========================= */
const player = {
    speed:0.12,
    rotY:0
};

camera.position.set(0,2,8);

/* =========================
   🎮 INPUT
========================= */
let keys={};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;

    if(e.key.toLowerCase()==="e") interact();
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
});

document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
    if(document.pointerLockElement===document.body){
        player.rotY -= e.movementX*0.002;
    }
});

/* =========================
   🚗 ENTER / EXIT SYSTEM
========================= */
function interact(){

    let distCar = camera.position.distanceTo(car.position);
    let distInt = camera.position.distanceTo(interior.position);

    /* ENTER CAR */
    if(!inCar && distCar < 3){
        inCar = true;
        camera.position.y = 1;
    }

    /* EXIT CAR */
    else if(inCar){
        inCar = false;
        camera.position.y = 2;
    }

    /* INTERIOR ENTRY */
    if(distInt < 3){
        camera.position.set(12,2,-10);
    }
}

/* =========================
   🚶 MOVEMENT
========================= */
function move(){

    let forward = new THREE.Vector3(
        -Math.sin(player.rotY),0,-Math.cos(player.rotY)
    );

    let right = new THREE.Vector3(
        Math.cos(player.rotY),0,-Math.sin(player.rotY)
    );

    if(keys["w"]){
        if(inCar){
            car.position.addScaledVector(forward,0.2);
            camera.position.copy(car.position).add(new THREE.Vector3(0,1,0));
        } else {
            camera.position.addScaledVector(forward,player.speed);
        }
    }

    if(keys["s"]){
        if(inCar){
            car.position.addScaledVector(forward,-0.2);
        } else {
            camera.position.addScaledVector(forward,-player.speed);
        }
    }

    if(keys["a"]){
        if(!inCar) camera.position.addScaledVector(right,-player.speed);
    }

    if(keys["d"]){
        if(!inCar) camera.position.addScaledVector(right,player.speed);
    }

    camera.rotation.y = player.rotY;
}

/* =========================
   🎮 LOOP
========================= */
function animate(){
    requestAnimationFrame(animate);

    move();

    if(inCar){
        camera.position.x = car.position.x;
        camera.position.z = car.position.z;
    }

    renderer.render(scene,camera);
}
animate();

/* RESIZE */
window.addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
