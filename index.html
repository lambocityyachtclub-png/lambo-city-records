<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY - FINAL CORE</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  display: block;
}

/* UI LAYER */
#ui {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ENTRY SCREEN */
#home {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.65);
  pointer-events: auto;
}

/* HUD */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.85;
}

/* VIP OVERLAY */
#vip {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 10;
  text-align: center;
  padding-top: 120px;
}

/* BUTTONS */
button {
  padding: 10px 14px;
  background: black;
  border: 1px solid gold;
  color: white;
  cursor: pointer;
  pointer-events: auto;
  margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

  <!-- ENTRY -->
  <div id="home">
    <h1>LAMBO CITY</h1>
    <button onclick="enterWorld()">ENTER WORLD</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="status">SYSTEM OFFLINE</div>
    <div id="zone">ZONE: NONE</div>
    <div>WASD = MOVE | ENTER YACHT = VIP</div>
  </div>

  <!-- VIP -->
  <div id="vip">
    <button onclick="closeVIP()" style="position:absolute;top:20px;right:20px;">EXIT VIP</button>
    <h1>YACHT CLUB INTERIOR</h1>
  </div>

</div>

<!-- AUDIO -->
<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, ocean, yacht, city;

let mode = "idle";
let keys = {};

// WORLD ZONES
const zones = {
  dock:  { x: 0, z: 6,   radius: 6 },
  ocean: { x: 0, z: 0,   radius: 25 },
  yacht: { x: 0, z: -18, radius: 4 },
  city:  { x: 18, z: 10, radius: 14 }
};

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("c"),
    alpha: true
  });

  renderer.setSize(innerWidth, innerHeight);

  // 🌊 OCEAN
  ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshBasicMaterial({ color:0x001a33, wireframe:true })
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // 🧍 PLAYER
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({ color:0xffffff })
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 YACHT (VIP TARGET)
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,6),
    new THREE.MeshBasicMaterial({ color:0xd4af37 })
  );
  yacht.position.set(0,0.5,-18);
  scene.add(yacht);

  // 🏙 CITY ANCHOR (EXPANSION POINT)
  city = new THREE.Mesh(
    new THREE.BoxGeometry(4,4,4),
    new THREE.MeshBasicMaterial({ color:0x444444 })
  );
  city.position.set(18,2,10);
  scene.add(city);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  ocean.rotation.z += 0.0004;

  if (mode === "play") {

    // PLAYER MOVEMENT
    if (keys["w"]) player.position.z -= 0.15;
    if (keys["s"]) player.position.z += 0.15;
    if (keys["a"]) player.position.x -= 0.15;
    if (keys["d"]) player.position.x += 0.15;

    // CAMERA FOLLOW (cinematic)
    camera.position.x += (player.position.x - camera.position.x) * 0.08;
    camera.position.z += (player.position.z + 10 - camera.position.z) * 0.08;
    camera.lookAt(player.position);

    updateZones();
  }

  renderer.render(scene, camera);
}

// 🌍 ZONE SYSTEM
function updateZones() {

  let dDock = distance(player, zones.dock);
  let dOcean = distance(player, zones.ocean);
  let dYacht = distance(player, zones.yacht);
  let dCity = distance(player, zones.city);

  if (dYacht < zones.yacht.radius) {
    document.getElementById("zone").innerText = "ZONE: YACHT (VIP ACCESS)";
    openVIP();
    mode = "vip";
  }
  else if (dCity < zones.city.radius) {
    document.getElementById("zone").innerText = "ZONE: CITY DISTRICT";
  }
  else if (dDock < zones.dock.radius) {
    document.getElementById("zone").innerText = "ZONE: DOCK";
  }
  else if (dOcean < zones.ocean.radius) {
    document.getElementById("zone").innerText = "ZONE: OCEAN";
  }
}

// DISTANCE HELPER
function distance(a,b){
  return Math.sqrt(
    (a.position.x - b.x)**2 +
    (a.position.z - b.z)**2
  );
}

// START WORLD
function enterWorld() {
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE - FINAL CORE ACTIVE";
  mode = "play";
  document.getElementById("radio").play().catch(()=>{});
}

// VIP SYSTEM
function openVIP(){
  document.getElementById("vip").style.display = "block";
}

function closeVIP(){
  document.getElementById("vip").style.display = "none";
  mode = "play";
}

</script>

</body>
</html>
