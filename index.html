<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY — YACHT PARTY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

.screen {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  background:black;
  z-index:999;
  letter-spacing:4px;
  text-align:center;
}

#hud { position:absolute; top:20px; left:20px; color:white; font-size:13px; }

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  display:none;
}

#djScreen {
  position:absolute;
  top:20px;
  right:20px;
  width:300px;
  height:170px;
  border:2px solid gold;
  display:none;
  z-index:1000;
}
</style>
</head>

<body>

<div id="intro" class="screen">
LAMBO CITY<br><span style="font-size:12px;">ENTER THE EXPERIENCE</span>
</div>

<div id="vip" class="screen" style="display:none;">
YACHT PARTY ACTIVE<br>
<span style="font-size:12px;">WELCOME TO VIP ENERGY</span>
</div>

<div id="hud">ZONE: CABIN</div>
<div id="prompt">PRESS E</div>

<video id="djScreen" autoplay muted loop>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== STATE =====
let scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02030a, 0.02);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,5);

let renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);

let keys = {};
let started=false, hasPass=false, doorOpen=false, boarding=false, inVIP=false;

// AUDIO
let music = new Audio("https://cdn.pixabay.com/audio/2023/06/15/audio_45f5b1.mp3");
music.loop = true;

// ===== LIGHTS =====
scene.add(new THREE.AmbientLight(0x1a1a2a,1.2));

let clubLight = new THREE.PointLight(0xff00ff,0);
clubLight.position.set(0,5,-22);
scene.add(clubLight);

// ===== PLAYER =====
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// ===== FLOOR =====
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ===== WATER EFFECT =====
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:0x001a2d, transparent:true, opacity:0.5})
);
water.rotation.x = -Math.PI/2;
water.position.y = -0.2;
scene.add(water);

// ===== DOOR =====
let door = new THREE.Mesh(
  new THREE.BoxGeometry(2,3,0.2),
  new THREE.MeshStandardMaterial({color:0x333333})
);
door.position.set(0,1.5,-5);
scene.add(door);

// ===== DOCK =====
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(20,0.3,20),
  new THREE.MeshStandardMaterial({color:0x222222})
);
dock.position.z = -15;
scene.add(dock);

// ===== YACHT (GLOW) =====
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,5),
  new THREE.MeshStandardMaterial({color:0xffd700, emissive:0xffaa00, emissiveIntensity:0.5})
);
yacht.position.set(0,0.5,-22);
scene.add(yacht);

// ===== STARS =====
let starGeo = new THREE.BufferGeometry();
let starArr = [];
for(let i=0;i<1500;i++){
  starArr.push((Math.random()-0.5)*300, Math.random()*150, (Math.random()-0.5)*300);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.7})));

// ===== CROWD =====
let crowd=[];
for(let i=0;i<25;i++){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1.5,0.5),
    new THREE.MeshStandardMaterial({color:0x000000})
  );
  c.position.set((Math.random()-0.5)*8,0.75,-22+(Math.random()-0.5)*4);
  scene.add(c);
  crowd.push(c);
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="e"){

    let d1 = player.position.distanceTo(door.position);
    let d2 = player.position.distanceTo(yacht.position);

    if(!hasPass){
      hasPass=true;
      hud.innerHTML="ACCESS GRANTED";
    }

    if(hasPass && d1<3 && !doorOpen){
      doorOpen=true;
    }

    if(doorOpen && d2<3 && !boarding){
      boarding=true;
      prompt.style.display="block";
      prompt.innerHTML="VERIFYING...";

      setTimeout(()=>{
        prompt.innerHTML="WELCOME TO PARTY";

        setTimeout(()=>{
          inVIP=true;
          vip.style.display="flex";
          djScreen.style.display="block";
          music.play();
        },1200);

      },1200);
    }
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// ===== INTRO =====
setTimeout(()=>{
  intro.style.display="none";
  started=true;
},2000);

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  if(started && !inVIP){

    if(keys["w"]) player.position.z -= 0.08;
    if(keys["s"]) player.position.z += 0.08;
    if(keys["a"]) player.position.x -= 0.08;
    if(keys["d"]) player.position.x += 0.08;

    camera.position.x += (player.position.x - camera.position.x)*0.05;
    camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
    camera.lookAt(player.position);

    if(doorOpen && door.rotation.y > -Math.PI/2){
      door.rotation.y -= 0.05;
    }

    let d1 = player.position.distanceTo(door.position);
    let d2 = player.position.distanceTo(yacht.position);

    if(hasPass && !doorOpen && d1<3){
      prompt.style.display="block";
      prompt.innerHTML="OPEN DOOR";
    }
    else if(doorOpen && d2<3 && !boarding){
      prompt.style.display="block";
      prompt.innerHTML="BOARD YACHT";
    }
    else{
      prompt.style.display="none";
    }
  }

  // VIP MODE
  if(inVIP){

    // COLOR LIGHTS
    let t = Date.now()*0.002;
    clubLight.color.setHSL((t%1),1,0.5);
    clubLight.intensity = 4;

    // CROWD MOVEMENT
    crowd.forEach(c=>{
      c.position.y = 0.75 + Math.sin(Date.now()*0.005 + c.position.x)*0.25;
    });

    // WATER MOTION
    water.material.opacity = 0.4 + Math.sin(Date.now()*0.002)*0.1;
  }

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
