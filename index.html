<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | FIRST PERSON WORLD</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* 🌌 SKY */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    animation: sky 10s infinite alternate;
    z-index: 0;
}

@keyframes sky {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
    100% { filter: brightness(0.9); }
}

/* 🌫 FOG */
#fog {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85));
    z-index: 1;
    pointer-events: none;
}

/* 🎮 WORLD (THIS MOVES = “YOU MOVE”) */
#world {
    position: fixed;
    width: 300%;
    height: 100%;
    display: flex;
    transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 2;
}

/* 🌍 ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* ENVIRONMENTS */
#city { background: radial-gradient(circle, #2a1a0a, #000); }
#yacht { background: radial-gradient(circle, #0a0f1a, #000); }
#store { background: radial-gradient(circle, #1a0a0a, #000); }

/* 🎮 UI */
.title {
    font-size: 40px;
    letter-spacing: 6px;
    margin-bottom: 10px;
}

button {
    margin: 8px;
    padding: 10px 16px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* 📺 STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
}

/* 🧭 HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
    z-index: 10;
}

/* 🎮 CONTROLS */
#controls {
    position: fixed;
    bottom: 15px;
    left: 15px;
    z-index: 20;
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="fog"></div>
<div id="hud">LAMBO CITY // FIRST PERSON MODE</div>

<!-- WORLD -->
<div id="world">

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <button onclick="move(1)">GO TO YACHT CLUB →</button>
        <button onclick="move(2)">GO TO STORE →</button>
    </div>

    <!-- YACHT -->
    <div class="zone" id="yacht">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="move(0)">← BACK TO CITY</button>
    </div>

    <!-- STORE -->
    <div class="zone" id="store">
        <div class="title">STORE</div>

        <button>HERO DROP</button>
        <button onclick="move(0)">← BACK TO CITY</button>
    </div>

</div>

<!-- 🧭 MOBILE / KEY CONTROLS -->
<div id="controls">
    <button onclick="move(0)">CITY</button>
    <button onclick="move(1)">YACHT</button>
    <button onclick="move(2)">STORE</button>
</div>

<script>

const world = document.getElementById("world");

/* CURRENT POSITION (LIKE PLAYER POSITION) */
let position = 0;

/* 🎮 FIRST PERSON MOVEMENT SYSTEM */
function move(zone) {

    position = zone;

    world.style.transform = `translateX(-${zone * 100}vw)`;

    // camera shake illusion
    document.body.style.filter = "brightness(1.3)";
    setTimeout(() => {
        document.body.style.filter = "brightness(1)";
    }, 300);
}

/* OPTIONAL: KEYBOARD MOVEMENT (FEELS LIKE WALKING) */
document.addEventListener("keydown", (e) => {

    if (e.key === "ArrowRight") {
        if (position < 2) move(position + 1);
    }

    if (e.key === "ArrowLeft") {
        if (position > 0) move(position - 1);
    }
});

</script>

</body>
</html>
