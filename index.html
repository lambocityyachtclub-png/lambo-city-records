<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY - PROGRESSION CORE</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000814;
  font-family: Arial;
  color: white;
}

canvas { display:block; }

#ui {
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* HOME */
#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle, rgba(0,10,30,0.8), black);
  pointer-events:auto;
}

/* HUD */
#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
  opacity:0.8;
  line-height:1.5;
}

/* PROFILE PANEL */
#profile {
  position:absolute;
  bottom:20px;
  left:20px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.4);
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background:black;
  z-index:10;
  text-align:center;
  padding-top:120px;
}

/* INPUT */
input {
  padding:10px;
  margin-top:10px;
  background:black;
  border:1px solid white;
  color:white;
}

/* BUTTON */
button {
  padding:12px 16px;
  margin-top:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<!-- START -->
<div id="home">
  <h1>LAMBO CITY</h1>
  <p>Create Identity</p>
  <input id="nameInput" placeholder="Enter Name"/>
  <button onclick="start()">ENTER WORLD</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="status">OFFLINE</div>
  <div id="zone">ZONE: NONE</div>
  <div id="xp">XP: 0</div>
</div>

<!-- PROFILE -->
<div id="profile">
  <div id="playerName">NAME: NONE</div>
  <div id="level">LEVEL: 1</div>
</div>

<!-- VIP -->
<div id="vip">
  <h1>YACHT CLUB</h1>
  <button onclick="exitVIP()">EXIT</button>
</div>

</div>

<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, ocean, yacht;

let mode = "idle";
let keys = {};

let xp = 0;
let level = 1;
let playerName = "Unknown";

const zones = {
  yacht: { x:0, z:-18, r:4 },
  city:  { x:18, z:10, r:14 }
};

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000814, 10, 80);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c") });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000814);

  // ocean
  ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshBasicMaterial({ color:0x003b6f })
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({ color:0xffffff })
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // yacht
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,6),
    new THREE.MeshBasicMaterial({ color:0xd4af37 })
  );
  yacht.position.set(0,0.5,-18);
  scene.add(yacht);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  ocean.rotation.z += 0.0002;

  if(mode === "play"){

    if(keys["w"]) player.position.z -= 0.15;
    if(keys["s"]) player.position.z += 0.15;
    if(keys["a"]) player.position.x -= 0.15;
    if(keys["d"]) player.position.x += 0.15;

    camera.position.x += (player.position.x - camera.position.x)*0.07;
    camera.position.z += (player.position.z+10 - camera.position.z)*0.07;
    camera.lookAt(player.position);

    checkZones();
  }

  renderer.render(scene,camera);
}

function checkZones(){

  let d = dist(zones.yacht);

  if(d < zones.yacht.r){
    document.getElementById("zone").innerText = "ZONE: YACHT (VIP)";
    document.getElementById("vip").style.display = "block";
    mode = "vip";
    addXP(50);
  }
  else {
    document.getElementById("zone").innerText = "ZONE: WORLD";
    addXP(1);
  }
}

function dist(z){
  return Math.sqrt(
    (player.position.x - z.x)**2 +
    (player.position.z - z.z)**2
  );
}

/* IDENTITY SYSTEM */
function start(){
  playerName = document.getElementById("nameInput").value || "Citizen";

  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE";

  document.getElementById("playerName").innerText = "NAME: " + playerName;

  mode = "play";
  document.getElementById("radio").play().catch(()=>{});
}

/* PROGRESSION */
function addXP(amount){
  xp += amount;

  if(xp > 100){
    level++;
    xp = 0;
  }

  document.getElementById("xp").innerText = "XP: " + xp;
  document.getElementById("level").innerText = "LEVEL: " + level;
}

/* VIP */
function exitVIP(){
  document.getElementById("vip").style.display = "none";
  mode = "play";
}

</script>

</body>
</html>
