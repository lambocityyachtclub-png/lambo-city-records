<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | WALKABLE WORLD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* CAMERA (NOW ACTS LIKE PLAYER POSITION) */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    transition: 0.8s ease;
    z-index: 999;
}

/* WORLD LAYER (THIS MOVES = “WALKING”) */
#world {
    position: absolute;
    width: 300%;
    height: 100%;
    display: flex;
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ZONES AS SPACES (NOT SCREENS) */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* DISTINCT ENVIRONMENTS */
#portal { background: radial-gradient(circle, #0a0f1f, #000); }
#city   { background: radial-gradient(circle at top, #2a1a0a, #000); }
#vip    { background: radial-gradient(circle, #11110a, #000); }

/* TITLE */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* BUTTONS (NOW ACT LIKE “DOORS”) */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

/* VIP STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="camera"></div>

<!-- WORLD IS NOW ONE CONTINUOUS SPACE -->
<div id="world">

    <!-- PORTAL (LEFT) -->
    <div class="zone" id="portal">
        <div class="title">CITY GATE</div>
        <button onclick="walkTo(0)">ENTER CITY</button>
    </div>

    <!-- CITY (CENTER) -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>
        <button onclick="walkTo(1)">YACHT CLUB</button>
    </div>

    <!-- VIP (RIGHT) -->
    <div class="zone" id="vip">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="walkTo(1)">BACK TO CITY</button>
    </div>

</div>

<script>

const world = document.getElementById("world");
const camera = document.getElementById("camera");

/* START */
window.onload = () => {
    camera.style.opacity = "0";
    walkTo(0);
};

/* 🧠 WALKING SYSTEM (KEY CHANGE) */
function walkTo(zoneIndex) {

    // camera “body movement”
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.35)";

    setTimeout(() => {

        // MOVE WORLD (THIS IS THE “WALK”)
        world.style.transform = `translateX(-${zoneIndex * 100}vw)`;

        // settle camera
        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
        }, 400);

    }, 400);
}

</script>

</body>
</html>
