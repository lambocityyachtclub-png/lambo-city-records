<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FIXED WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">LOADING WORLD...</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;

let player;
let keys = {};

// FIXED INIT
function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,3,8);

renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c")
});
renderer.setSize(window.innerWidth, window.innerHeight);

// LIGHTS (IMPORTANT FIX)
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

let light = new THREE.PointLight(0x00aaff, 2);
light.position.set(0,5,5);
scene.add(light);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// FLOOR (BRIGHTER)
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x222233})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DOCK LANDMARK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(10,1,10),
  new THREE.MeshStandardMaterial({color:0x444444})
);
dock.position.set(0,0.5,-20);
scene.add(dock);

// YACHT (VISIBLE FIX)
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(6,2,12),
  new THREE.MeshStandardMaterial({color:0x3366ff})
);
yacht.position.set(0,1,-40);
scene.add(yacht);

// INPUT
document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// START
animate();
}

// ENTER WORLD
function enterWorld(){
document.getElementById("start").style.display="none";
document.getElementById("ui").innerText="MOVE: W A S D";
init();
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
if(keys["w"]) player.position.z -= 0.15;
if(keys["s"]) player.position.z += 0.15;
if(keys["a"]) player.position.x -= 0.15;
if(keys["d"]) player.position.x += 0.15;

// CAMERA FOLLOW
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.z += (player.position.z + 6 - camera.position.z)*0.08;
camera.lookAt(player.position);

// RENDER
renderer.render(scene,camera);
}

</script>

</body>
</html>
