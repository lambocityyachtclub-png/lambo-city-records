<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V16 — PLAYABLE LUXURY CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • EXPLORE LAMBO CITY V16</div>
<div id="zone">LUXURY WORLD ACTIVE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"), antialias:true});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 1));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(50,100,50);
scene.add(sun);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,-20);
scene.add(player);

camera.position.set(0,8,12);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (JET SKI ZONE VISUAL)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2200,2200,80,80);

const waterMat = new THREE.MeshStandardMaterial({
color:0x021428,
metalness:0.4,
roughness:0.6,
emissive:0x001122,
emissiveIntensity:0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
waterBase.push({x:waterPos.getX(i), z:waterPos.getZ(i)});
}

/////////////////////////////////////////////////////
// 🏡 VILLAS (LUXURY DISTRICT)
/////////////////////////////////////////////////////

function villa(x,z,color=0x1a1a1a){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(16,1,16),
new THREE.MeshStandardMaterial({color})
);
base.position.y=0.5;
g.add(base);

const main = new THREE.Mesh(
new THREE.BoxGeometry(14,6,14),
new THREE.MeshStandardMaterial({color:0x2a2a2a})
);
main.position.y=4;
g.add(main);

const light = new THREE.PointLight(0x66ccff,1,40);
light.position.set(0,5,0);
g.add(light);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
villa(-25,-20-i*25);
villa(25,-20-i*25);
}

/////////////////////////////////////////////////////
// 🚤 YACHT / DOCK
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(16,4,45),
new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO NPC
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff})
);
hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// 🎬 JUMBOTRON (UPGRADED V7 VERSION)
/////////////////////////////////////////////////////

const screen = new THREE.Mesh(
new THREE.BoxGeometry(30,15,1),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0033ff,
emissiveIntensity:1.2
})
);
screen.position.set(0,10,-140);
scene.add(screen);

/////////////////////////////////////////////////////
// 🛹 SKATE ZONE
/////////////////////////////////////////////////////

const skateZone = new THREE.Mesh(
new THREE.BoxGeometry(40,1,40),
new THREE.MeshStandardMaterial({color:0x111111})
);
skateZone.position.set(-60,0,-40);
scene.add(skateZone);

/////////////////////////////////////////////////////
// ⛳ GOLF ZONE
/////////////////////////////////////////////////////

const golfZone = new THREE.Mesh(
new THREE.BoxGeometry(60,1,60),
new THREE.MeshStandardMaterial({color:0x0b3d0b})
);
golfZone.position.set(80,0,-60);
scene.add(golfZone);

/////////////////////////////////////////////////////
// 🚗 DRIVE LANE (LAMBO ROAD FEEL)
/////////////////////////////////////////////////////

const road = new THREE.Mesh(
new THREE.BoxGeometry(10,0.5,400),
new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
road.position.set(0,0.2,100);
scene.add(road);

/////////////////////////////////////////////////////
// INTERACTION
/////////////////////////////////////////////////////

const hint=document.getElementById("hint");

function show(t){hint.style.display="block";hint.innerText=t;}
function hide(){hint.style.display="none";}

function check(){
const d = player.position.distanceTo(hero.position);
if(d<3) show("PRESS E TO TALK");
else hide();
}

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
if(player.position.distanceTo(hero.position)<3){
document.getElementById("zone").innerText="HERO: Welcome to V16 LAMBO CITY";
}
}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();
check();

const time=Date.now()*0.001;

for(let i=0;i<waterPos.count;i++){
const v=waterBase[i];

const wave=
Math.sin(v.x*0.02+time)*0.4+
Math.cos(v.z*0.02+time*1.3)*0.4;

waterPos.setY(i,wave);
}

waterPos.needsUpdate=true;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
