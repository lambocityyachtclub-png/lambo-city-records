<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V18 — COMPLETE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V18 — COMPLETE WORLD</div>
<div id="zone">LOADING LUXURY SIM</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02040a);
scene.fog = new THREE.FogExp2(0x02040a, 0.0035);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC WORLD)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x1b2a3a, 0.9));

const sun = new THREE.DirectionalLight(0x88bbff, 1.1);
sun.position.set(80,120,60);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff, 1.5, 500);
glow.position.set(0,20,0);
scene.add(glow);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mode="walk";

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,-20);
scene.add(player);

/////////////////////////////////////////////////////
// LAMBORGHINI (UPGRADED LOOK)
/////////////////////////////////////////////////////

const car = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(3,0.8,6),
new THREE.MeshStandardMaterial({
color:0xffcc00,
metalness:0.7,
roughness:0.25
})
);
body.position.y=0.5;

const cabin = new THREE.Mesh(
new THREE.BoxGeometry(2.4,0.8,2.5),
new THREE.MeshStandardMaterial({
color:0x111111,
metalness:0.9,
roughness:0.2
})
);
cabin.position.set(0,1.2,-0.5);

car.add(body);
car.add(cabin);
car.position.set(0,0,40);
scene.add(car);

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// YACHT (FULL STRUCTURE)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(18,2,50),
new THREE.MeshStandardMaterial({color:0xffffff,metalness:0.3})
);
hull.position.y=1;

const cabinY = new THREE.Mesh(
new THREE.BoxGeometry(10,4,20),
new THREE.MeshStandardMaterial({color:0x222222})
);
cabinY.position.y=4;

const yachtLight = new THREE.PointLight(0x00ccff,1.5,100);
yachtLight.position.set(0,6,0);

yacht.add(hull);
yacht.add(cabinY);
yacht.add(yachtLight);
yacht.position.set(40,0,-90);
scene.add(yacht);

/////////////////////////////////////////////////////
// OCEAN (SMOOTH CINEMATIC)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,100,100);

const waterMat = new THREE.MeshStandardMaterial({
color:0x01111f,
metalness:0.6,
roughness:0.6,
emissive:0x001122
});

const water = new THREE.Mesh(waterGeo,waterMat);
water.rotation.x=-Math.PI/2;
scene.add(water);

const waterPos=water.geometry.attributes.position;
const base=[];

for(let i=0;i<waterPos.count;i++){
base.push({x:waterPos.getX(i),z:waterPos.getZ(i)});
}

/////////////////////////////////////////////////////
// VILLAS
/////////////////////////////////////////////////////

function villa(x,z){
const g=new THREE.Group();

const baseM=new THREE.Mesh(
new THREE.BoxGeometry(14,1,14),
new THREE.MeshStandardMaterial({color:0x111111})
);

const house=new THREE.Mesh(
new THREE.BoxGeometry(12,6,12),
new THREE.MeshStandardMaterial({color:0x2a2a2a})
);
house.position.y=4;

const light=new THREE.PointLight(0x00aaff,0.8,50);
light.position.y=5;

g.add(baseM);
g.add(house);
g.add(light);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=-80;i<=80;i+=40){
villa(i,-60);
villa(i,80);
}

/////////////////////////////////////////////////////
// JUMBOTRON (MUSIC READY CORE)
/////////////////////////////////////////////////////

const jumbotron = new THREE.Mesh(
new THREE.BoxGeometry(30,15,1),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:1.8
})
);
jumbotron.position.set(0,10,-120);
scene.add(jumbotron);

/////////////////////////////////////////////////////
// NPCS
/////////////////////////////////////////////////////

const npcs=[];

function npc(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffaa66})
);

n.position.set(x,1,z);
n.userData={dir:Math.random()*Math.PI*2,speed:0.03};

scene.add(n);
npcs.push(n);
}

for(let i=0;i<10;i++){
npc(-20+i*3,-40);
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){
let tx,ty,tz;

if(mode==="walk"){
tx=player.position.x;
ty=player.position.y+8;
tz=player.position.z+14;
}else{
tx=car.position.x+Math.sin(car.rotation.y)*-12;
ty=car.position.y+6;
tz=car.position.z+Math.cos(car.rotation.y)*-12;
}

camera.position.x+=(tx-camera.position.x)*0.06;
camera.position.y+=(ty-camera.position.y)*0.06;
camera.position.z+=(tz-camera.position.z)*0.06;

camera.lookAt(mode==="walk"?player.position:car.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
const speed=0.25;

if(mode==="walk"){
if(keys.w)player.position.z-=speed;
if(keys.s)player.position.z+=speed;
if(keys.a)player.position.x-=speed;
if(keys.d)player.position.x+=speed;
}

if(mode==="car"){
if(keys.w)car.position.z-=speed;
if(keys.s)car.position.z+=speed;
if(keys.a)car.rotation.y+=0.03;
if(keys.d)car.rotation.y-=0.03;
}
}

/////////////////////////////////////////////////////
// ENTER / EXIT CAR
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
const d=player.position.distanceTo(car.position);

if(mode==="walk"&&d<4){
mode="car";
player.visible=false;
}

else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// LOOP (FINAL STABLE SYSTEM)
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){
requestAnimationFrame(animate);

const t=performance.now()*0.001;

// ocean
for(let i=0;i<waterPos.count;i++){
const v=base[i];
waterPos.setY(i,
Math.sin(v.x*0.02+t)*0.4+
Math.cos(v.z*0.02+t*1.1)*0.4
);
}
waterPos.needsUpdate=true;

move();
updateCamera();

// NPC motion
for(let n of npcs){
n.position.x+=Math.cos(n.userData.dir)*n.userData.speed;
n.position.z+=Math.sin(n.userData.dir)*n.userData.speed;
n.userData.dir+=(Math.random()-0.5)*0.01;
}

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
