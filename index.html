<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — INTERACTIVE CLUB</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}

#prompt {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="ui">ZONE: CABIN</div>
<div id="prompt">INTERACT</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0x404040, 1.5));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// WALLS
function wall(x,y,z,ry){
  let w = new THREE.Mesh(
    new THREE.PlaneGeometry(20,4),
    new THREE.MeshStandardMaterial({color:0x222233, side:THREE.DoubleSide})
  );
  w.position.set(x,y,z);
  w.rotation.y = ry;
  scene.add(w);
}

wall(0,2,-10,0);
wall(0,2,10,Math.PI);
wall(-10,2,0,Math.PI/2);
wall(10,2,0,-Math.PI/2);

// DOOR
let door = new THREE.Mesh(
  new THREE.BoxGeometry(2,3,0.2),
  new THREE.MeshStandardMaterial({color:0x444444})
);
door.position.set(0,1.5,-9.9);
scene.add(door);

// DOCK + CLUB
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,40),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-40);
dock.visible = false;
scene.add(dock);

let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(20,4,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,2,-60);
yacht.visible = false;
scene.add(yacht);

// 🎧 MUSIC TRACKS
let tracks = [
  new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3"),
  new Audio("https://cdn.pixabay.com/download/audio/2022/03/14/audio_1f7cdb.mp3")
];
let currentTrack = 0;
tracks.forEach(t=>{ t.loop=true; t.volume=0.5; });

// 📺 SCREEN
let screen = new THREE.Mesh(
  new THREE.BoxGeometry(6,3,0.2),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
screen.position.set(0,3,-55);
screen.visible = false;
scene.add(screen);

// 🛍 MERCH
let merch = new THREE.Mesh(
  new THREE.BoxGeometry(3,3,3),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
merch.position.set(-6,1.5,-60);
merch.visible = false;
scene.add(merch);

// 🎛 RADIO
let radio = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,1),
  new THREE.MeshStandardMaterial({color:0xffff00})
);
radio.position.set(6,1,-60);
radio.visible = false;
scene.add(radio);

// CROWD
let crowd = [];
for(let i=0;i<20;i++){
  let p = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1,0.5),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*10,0.5,-60+(Math.random()-0.5)*10);
  p.visible = false;
  scene.add(p);
  crowd.push(p);
}

// INPUT
let keys = {};
let inDock = false;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});
document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=> interact());

// INTERACT SYSTEM
function interact(){

// ENTER DOCK
if(!inDock && player.position.distanceTo(door.position) < 3){

  inDock = true;

  scene.children.forEach(obj=>{
    if(obj !== player && obj !== dock && obj !== yacht &&
       obj !== screen && obj !== merch && obj !== radio &&
       !crowd.includes(obj)){
      obj.visible = false;
    }
  });

  dock.visible = true;
  yacht.visible = true;
  screen.visible = true;
  merch.visible = true;
  radio.visible = true;

  crowd.forEach(p=> p.visible = true);

  player.position.set(0,1,-30);
  document.getElementById("ui").innerText = "ZONE: YACHT CLUB";

  tracks[0].play();
  return;
}

// RADIO
if(player.position.distanceTo(radio.position) < 3){
  tracks[currentTrack].pause();
  currentTrack = (currentTrack + 1) % tracks.length;
  tracks[currentTrack].play();
  document.getElementById("ui").innerText = "RADIO SWITCHED";
}

// SCREEN
if(player.position.distanceTo(screen.position) < 4){
  document.getElementById("ui").innerText = "SCREEN ACTIVE (LINK YOUR TWITCH)";
}

// MERCH
if(player.position.distanceTo(merch.position) < 3){
  document.getElementById("ui").innerText = "MERCH STORE OPEN (CONNECT SITE)";
}

}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z -= 0.1;
if(keys["s"]) player.position.z += 0.1;
if(keys["a"]) player.position.x -= 0.1;
if(keys["d"]) player.position.x += 0.1;

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
camera.lookAt(player.position);

// CROWD MOVE
crowd.forEach(p=>{
  p.position.y = 0.5 + Math.sin(Date.now()*0.005)*0.2;
});

// PROMPT
let near = (
  player.position.distanceTo(door.position) < 3 ||
  player.position.distanceTo(radio.position) < 3 ||
  player.position.distanceTo(merch.position) < 3 ||
  player.position.distanceTo(screen.position) < 4
);

document.getElementById("prompt").style.display = near ? "block" : "none";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
