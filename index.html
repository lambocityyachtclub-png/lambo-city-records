<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — V5 WORLD ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY V5 — WORLD ENGINE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1020, 0.003);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 4000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// 🌤️ LIGHTING SYSTEM (DAY/NIGHT CORE)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x3a4f6a, 1.1);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0x88ccff, 1.3);
sun.position.set(100, 150, 50);
scene.add(sun);

const oceanGlow = new THREE.PointLight(0x4da3ff, 1.0, 2000);
oceanGlow.position.set(0, 100, 0);
scene.add(oceanGlow);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-20);
scene.add(player);

camera.position.set(0,8,10);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
  const speed = 0.28;
  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
  camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN ENGINE (SMOOTH + STABLE)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2500,2500,100,100);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x081a2a,
  metalness: 0.25,
  roughness: 0.65,
  emissive: 0x001122,
  emissiveIntensity: 0.35
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🌉 WORLD STRUCTURE
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(220,220,2,64),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
dock.position.set(0,0,-90);
scene.add(dock);

const walkway = new THREE.Mesh(
  new THREE.BoxGeometry(6,0.5,260),
  new THREE.MeshStandardMaterial({
    color:0x0f0f0f,
    emissive:0x001122,
    emissiveIntensity:0.25
  })
);
walkway.position.set(0,0.25,-60);
scene.add(walkway);

/////////////////////////////////////////////////////
// 🏡 VILLAS (STABLE GRID)
/////////////////////////////////////////////////////

function createVilla(x,z){
  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(18,1,18),
    new THREE.MeshStandardMaterial({ color:0x101010 })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(18,7,18),
    new THREE.MeshStandardMaterial({ color:0x151515 })
  );
  body.position.y = 4;
  g.add(body);

  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(20,1,20),
    new THREE.MeshStandardMaterial({ color:0x0a0a0a })
  );
  roof.position.y = 8;
  g.add(roof);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<7;i++){
  createVilla(-30,-25-i*28);
  createVilla(30,-25-i*28);
}

/////////////////////////////////////////////////////
// 🚤 YACHT (FLOATING CORE)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(18,4,50),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText =
      "HERO: Welcome to LAMBO CITY V5 — The World is Alive";
    }
  }
});

/////////////////////////////////////////////////////
// 🌊 WAVE ENGINE (SMOOTH IMPROVED)
/////////////////////////////////////////////////////

function updateOcean(time){
  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin((v.x * 0.015) + time) * 0.6 +
      Math.cos((v.z * 0.015) + time * 1.2) * 0.6;

    waterPos.setY(i, wave);
  }
  waterPos.needsUpdate = true;
}

/////////////////////////////////////////////////////
// 🚤 YACHT FLOAT SYSTEM (NEW)
/////////////////////////////////////////////////////

function updateYacht(time){
  yacht.position.y = 2 + Math.sin(time * 1.2) * 0.5;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  const time = Date.now() * 0.001;

  move();
  updateCamera();
  check();

  updateOcean(time);
  updateYacht(time);

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
