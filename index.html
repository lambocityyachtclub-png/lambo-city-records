<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAMBO CITY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1508057198894-247b23fe5ade') center/cover no-repeat;
      filter: brightness(0.4);
    }

    .title {
      position: absolute;
      top: 10%;
      width: 100%;
      text-align: center;
      font-size: 3rem;
      letter-spacing: 5px;
    }

    .menu {
      position: absolute;
      bottom: 15%;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 15px 25px;
      border: 1px solid white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    #panel {
      position:absolute;
      top:40%;
      width:100%;
      text-align:center;
      font-size:1.2rem;
      opacity:0.9;
    }
  </style>
</head>
<body>
<div class="background"></div>
<div class="title">LAMBO CITY</div>
<div id="panel">
  <p>System ready...</p>
</div>
<div id="panel">
  <p>System ready...</p>
</div>
<div class="menu">
  <div class="btn" onclick="enterCity()">ENTER CITY</div>
  <div class="btn" onclick="openYacht()">YACHT CLUB</div>
  <div class="btn" onclick="openRadio()">RADIO</div>
</div>
<audio autoplay loop>
  <source src="" type="audio/mpeg">
</audio>
<script>
function enterCity() {
  document.getElementById("panel").innerHTML = `
    <h2>WELCOME TO LAMBO CITY</h2>
    <p>The city is active. Citizens are moving.</p>
    <p>New drops are loading...</p>
  `;
}

function openYacht() {
  document.getElementById("panel").innerHTML = `
    <h2>YACHT CLUB</h2>
    <p>🔒 ACCESS LOCKED</p>
    <p>Complete Access Protocol to enter.</p>
  `;
}

function openRadio() {
  document.getElementById("panel").innerHTML = `
    <h2>LAMBO CITY RADIO</h2>
    <p>Now Playing...</p>
    <p>Streaming from LAMBO CITY RECORDS</p>
  `;
}
</script>
</body>
</html>
