<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING WORLD v20</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* =========================
   🎮 CINEMATIC LOADING LOBBY
========================= */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #050510);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 3000;
    transition: opacity 1.2s ease;
}

#lobbyText {
    font-size: 14px;
    letter-spacing: 6px;
    opacity: 0.8;
}

#enterBtn {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🎥 CAMERA LAYER (REAL FEEL SHIFT)
========================= */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.4);
    transition: 0.6s ease;
    z-index: 999;
    filter: blur(0px);
}

/* =========================
   🌆 WORLD CONTAINER
========================= */
#world {
    position: absolute;
    width: 400%;
    height: 100%;
    display: flex;
    transition: transform 1.3s cubic-bezier(0.16, 1, 0.3, 1);
}

/* =========================
   🌍 ZONES (NOW FEEL LIKE PLACES)
========================= */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: filter 0.6s ease;
}

/* DISTINCT ENVIRONMENT IDENTITY */
#portal {
    background: radial-gradient(circle, #03040a, #000);
}

#city {
    background: radial-gradient(circle at top, #3a1f0a, #000);
}

#vip {
    background: radial-gradient(circle, #0b0b10, #000);
}

#store {
    background: radial-gradient(circle, #1a0505, #000);
}

/* =========================
   🎯 WORLD TITLE
========================= */
.title {
    font-size: 44px;
    letter-spacing: 8px;
    margin-bottom: 20px;
}

/* =========================
   🚪 INTERACTION BUTTONS
========================= */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.2s;
}

button:hover {
    background: white;
    color: black;
}

/* =========================
   🎥 VIP STREAM
========================= */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* =========================
   💬 WORLD ACTIVITY FEED
========================= */
#chat {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 260px;
    height: 180px;
    font-size: 10px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px;
    overflow: hidden;
    z-index: 1000;
}

/* =========================
   🎬 LOCATION OVERLAY (BIG GTA FEEL FIX)
========================= */
#location {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    letter-spacing: 6px;
    opacity: 0;
    z-index: 2000;
    transition: 0.4s ease;
}
</style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
    <div id="lobbyText">CONNECTING TO LAMBO CITY ONLINE SESSION...</div>
    <button id="enterBtn" onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="camera"></div>
<div id="location"></div>
<div id="chat"></div>

<!-- 🌆 WORLD -->
<div id="world">

    <div class="zone" id="portal">
        <div class="title">CITY GATE</div>
        <button onclick="travel(0)">ENTER CITY</button>
    </div>

    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>
        <button onclick="travel(2)">YACHT CLUB</button>
        <button onclick="travel(3)">STORE</button>
    </div>

    <div class="zone" id="vip">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="travel(1)">BACK TO CITY</button>
    </div>

    <div class="zone" id="store">
        <div class="title">LAMBO CITY STORE</div>

        <button onclick="alert('HERO DROP ACTIVE')">👕 HERO DROP</button>
        <button onclick="alert('CLASSIC COLLECTION')">🧢 COLLECTION</button>

        <button onclick="travel(1)">BACK TO CITY</button>
    </div>

</div>

<script>

const world = document.getElementById("world");
const camera = document.getElementById("camera");
const lobby = document.getElementById("lobby");
const chat = document.getElementById("chat");
const locationText = document.getElementById("location");

let currentZone = 0;

/* =========================
   🎮 ENTER WORLD
========================= */
function enterWorld() {
    lobby.style.opacity = "0";

    setTimeout(() => {
        lobby.style.display = "none";
        travel(0);
        startChat();
    }, 1000);
}

/* =========================
   🎬 LOCATION FEEL (IMPORTANT FIX)
========================= */
function showLocation(name) {
    locationText.innerText = name;
    locationText.style.opacity = "1";

    setTimeout(() => {
        locationText.style.opacity = "0";
    }, 1000);
}

/* =========================
   🌆 CINEMATIC TRAVEL SYSTEM
========================= */
function travel(zone) {

    const names = ["PORTAL", "CITY", "YACHT CLUB", "STORE"];

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.7)";
    document.body.style.filter = "brightness(2) contrast(1.5)";

    setTimeout(() => {

        world.style.transform = `translateX(-${zone * 100}vw)`;
        currentZone = zone;

        showLocation("ENTERING " + names[zone]);

        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
            document.body.style.filter = "brightness(1) contrast(1)";
        }, 500);

    }, 300);
}

/* =========================
   💬 WORLD ACTIVITY FEED
========================= */
function startChat() {

    const users = ["HERO", "CITY_RUNNER", "VIP_GUEST", "LONG_BEACH_LOCAL"];
    const msgs = ["is in the city", "entered Yacht Club", "is shopping", "is driving through Lambo City"];

    setInterval(() => {

        const u = users[Math.floor(Math.random() * users.length)];
        const m = msgs[Math.floor(Math.random() * msgs.length)];

        chat.innerHTML =
        "[" + ["PORTAL","CITY","VIP","STORE"][currentZone] + "] " +
        u + ": " + m + "<br>" + chat.innerHTML;

    }, 2200);
}

</script>

</body>
</html>
