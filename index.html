<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/yourimage.jpg') no-repeat center center/cover;
  filter: brightness(0.45);
  z-index: -2;
}

/* OVERLAY */
.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.70);
  padding: 20px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 60px;
  font-weight: bold;
  color: gold;
  letter-spacing: 3px;
}

/* SUBTEXT */
.subtitle {
  text-align: center;
  max-width: 800px;
  margin: 10px auto 25px;
  color: #ccc;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* STREAM */
.stream {
  border: 1px solid rgba(255,215,0,0.5);
  border-radius: 10px;
  overflow: hidden;
}

/* PANEL */
.panel {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,215,0,0.4);
  padding: 15px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}

/* ENTER BUTTON */
.enter {
  display: block;
  width: 300px;
  margin: 30px auto;
  padding: 15px;
  background: gold;
  color: black;
  text-align: center;
  font-weight: bold;
  text-decoration: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay">

<div class="title">LAMBO CITY</div>

<div class="subtitle">
Welcome to Lambo City — a digital luxury world of music, drops, and exclusive experiences.
</div>

<div class="container">

<div class="grid">

<!-- TWITCH -->
<div class="stream">
<iframe
src="https://player.twitch.tv/?channel=LamboCityRecords&parent=lambocityrecords.com"
width="100%"
height="420"
allowfullscreen>
</iframe>
</div>

<!-- PANEL -->
<div class="panel">
<h3>EXPLORE</h3>

<button onclick="location.href='map.html'">City Map</button>
<button onclick="location.href='vip.html'">Yacht Club Portal</button>
<button onclick="alert('Music hub coming soon')">Music Hub</button>
<button onclick="alert('Drop zone coming soon')">Drop Zone</button>

</div>

</div>

<a class="enter" href="map.html">ENTER CITY MAP</a>

</div>

</div>

</body>
</html>
