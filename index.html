<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — YACHT INTERIOR TRANSITION</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
  text-align:center;
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  transition: opacity 1.5s ease;
  z-index:999;
}

#login {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}
</style>
</head>

<body>

<div id="login">
<h2>LAMBO CITY</h2>
<button onclick="start()">ENTER EXPERIENCE</button>
</div>

<div id="hud">ZONE: DOCK</div>
<div id="prompt">PRESS E TO ENTER YACHT</div>
<div id="fade"></div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let keys = {};

let state = "OUTSIDE"; // OUTSIDE → TRANSITION → INTERIOR
let insideYacht = false;

// ================= START =================
function start(){

document.getElementById("login").style.display = "none";

// SCENE
scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);

// CAMERA
camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,5);

// RENDERER
renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS
scene.add(new THREE.AmbientLight(0x1a1a2a, 0.8));

const light = new THREE.PointLight(0x00aaff, 2);
light.position.set(0,5,-10);
scene.add(light);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// YACHT (OUTSIDE)
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(3,1,6),
  new THREE.MeshStandardMaterial({color:0xffd700})
);
yacht.position.set(0,0.5,-15);
scene.add(yacht);

// FLOOR OUTSIDE
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// STARS
const geo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<2000;i++){
  arr.push(
    (Math.random()-0.5)*400,
    Math.random()*200,
    (Math.random()-0.5)*400
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

scene.add(new THREE.Points(
  geo,
  new THREE.PointsMaterial({color:0xffffff, size:0.7})
));

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") trigger();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// LOOP
animate();

}

// ================= TRANSITION =================
function trigger(){

let dist = player.position.distanceTo(yacht.position);

if(state === "OUTSIDE" && dist < 3){

  state = "TRANSITION";

  document.getElementById("fade").style.opacity = 1;
  document.getElementById("prompt").innerText = "ENTERING YACHT...";

  setTimeout(()=>{

    loadInterior();

    document.getElementById("fade").style.opacity = 0;

  },1500);
}

}

// ================= INTERIOR (GTA STYLE SWAP) =================
function loadInterior(){

state = "INSIDE";
insideYacht = true;

document.getElementById("hud").innerText = "ZONE: YACHT INTERIOR";

// CLEAR WORLD
scene.clear();

// LIGHTS (INTERIOR CLUB FEEL)
scene.add(new THREE.AmbientLight(0x222244, 1));

const neon1 = new THREE.PointLight(0x00aaff, 3);
neon1.position.set(2,3,2);
scene.add(neon1);

const neon2 = new THREE.PointLight(0xff00ff, 2);
neon2.position.set(-2,3,-2);
scene.add(neon2);

// FLOOR INTERIOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// PLAYER (RESET POSITION)
player.position.set(0,0.5,2);
scene.add(player);

// INTERIOR YACHT SPACE
const bar = new THREE.Mesh(
  new THREE.BoxGeometry(6,2,1),
  new THREE.MeshStandardMaterial({color:0x333333})
);
bar.position.set(0,1,-4);
scene.add(bar);

// DJ BOOTH
const dj = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,2),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
dj.position.set(0,0.5,3);
scene.add(dj);

}

// ================= LOOP =================
function animate(){

requestAnimationFrame(animate);

// movement
if(keys["w"]) player.position.z -= 0.08;
if(keys["s"]) player.position.z += 0.08;
if(keys["a"]) player.position.x -= 0.08;
if(keys["d"]) player.position.x += 0.08;

// camera follow (smooth GTA feel)
camera.position.x += (player.position.x - camera.position.x)*0.04;
camera.position.z += (player.position.z + 6 - camera.position.z)*0.04;
camera.lookAt(player.position);

// yacht float (only outside)
if(state === "OUTSIDE"){
  yacht.position.y = 0.5 + Math.sin(Date.now()*0.002)*0.15;
  yacht.rotation.y += 0.002;
}

// prompt logic
if(state === "OUTSIDE"){
  let dist = player.position.distanceTo(yacht.position);

  if(dist < 3){
    document.getElementById("prompt").style.display = "block";
  } else {
    document.getElementById("prompt").style.display = "none";
  }
}

renderer.render(scene,camera);

}

</script>

</body>
</html>
