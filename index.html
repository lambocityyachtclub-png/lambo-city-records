<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V17 — LUXURY PLAYABLE BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E: ENTER/EXIT CAR • LAMBO CITY V17</div>
<div id="zone">LUXURY WORLD ACTIVE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(0x050814, 0.004);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTS
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 1));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(50,100,50);
scene.add(sun);

const glow = new THREE.PointLight(0x3366ff, 1.5, 300);
glow.position.set(0,30,0);
scene.add(glow);

/////////////////////////////////////////////////////
// INPUT SYSTEM (FIXED)
/////////////////////////////////////////////////////

const keys = {};

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase() === "e"){
    if(mode === "onFoot" && player.position.distanceTo(car.position) < 4){
      enterCar();
    } else if(mode === "inCar"){
      exitCar();
    }
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0xffffff,
    emissive:0x222222,
    emissiveIntensity:0.8
  })
);

player.position.set(0,1,-20);
scene.add(player);

/////////////////////////////////////////////////////
// CAR
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({
    color:0xff0000,
    emissive:0x220000,
    emissiveIntensity:0.6
  })
);

car.position.set(5,0.5,-10);
scene.add(car);

/////////////////////////////////////////////////////
// GAME STATE (FIXED)
/////////////////////////////////////////////////////

let mode = "onFoot";

function enterCar(){
  mode = "inCar";
  player.visible = false;
}

function exitCar(){
  mode = "onFoot";
  player.visible = true;

  player.position.set(
    car.position.x + 2,
    car.position.y,
    car.position.z
  );
}

/////////////////////////////////////////////////////
// CAMERA SYSTEM
/////////////////////////////////////////////////////

function updateCamera(){

  if(mode === "onFoot"){
    camera.position.x += (player.position.x - camera.position.x)*0.08;
    camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
    camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
    camera.lookAt(player.position);
  }

  if(mode === "inCar"){
    const ox = Math.sin(car.rotation.y) * -8;
    const oz = Math.cos(car.rotation.y) * -8;

    camera.position.x += (car.position.x + ox - camera.position.x)*0.08;
    camera.position.y += ((car.position.y+5) - camera.position.y)*0.08;
    camera.position.z += (car.position.z + oz - camera.position.z)*0.08;

    camera.lookAt(car.position);
  }
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

  if(mode === "onFoot"){
    if(keys["w"]) player.position.z -= 0.25;
    if(keys["s"]) player.position.z += 0.25;
    if(keys["a"]) player.position.x -= 0.25;
    if(keys["d"]) player.position.x += 0.25;
  }

  if(mode === "inCar"){
    if(keys["w"]) car.position.z -= 0.35;
    if(keys["s"]) car.position.z += 0.35;
    if(keys["a"]) car.rotation.y += 0.04;
    if(keys["d"]) car.rotation.y -= 0.04;
  }
}

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff})
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// NPCS
/////////////////////////////////////////////////////

const npcs = [];

function createNPC(x,z){
  const n = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xffaa00})
  );

  n.position.set(x,1,z);

  n.userData = {
    dir: Math.random()*Math.PI*2,
    speed: 0.05 + Math.random()*0.05
  };

  scene.add(n);
  npcs.push(n);
}

for(let i=0;i<6;i++){
  createNPC(-10+i*3,-30);
  createNPC(10+i*3,-60);
}

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2200,2200,80,80);

const water = new THREE.Mesh(
  waterGeo,
  new THREE.MeshStandardMaterial({
    color:0x021428,
    emissive:0x001122,
    metalness:0.4,
    roughness:0.6
  })
);

water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// WORLD OBJECTS (SIMPLIFIED BUT CLEAN)
/////////////////////////////////////////////////////

function villa(x,z){
  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({color:0x1a1a1a})
  );
  base.position.y = 0.5;

  const main = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({color:0x2a2a2a})
  );
  main.position.y = 4;

  g.add(base);
  g.add(main);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<6;i++){
  villa(-25,-20-i*25);
  villa(25,-20-i*25);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){
  requestAnimationFrame(animate);

  const t = performance.now()*0.001;

  move();
  updateCamera();

  // water
  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    waterPos.setY(i,
      Math.sin(v.x*0.02+t)*0.35 +
      Math.cos(v.z*0.02+t*1.2)*0.35
    );
  }
  waterPos.needsUpdate = true;

  // NPCS
  for(let n of npcs){
    n.position.x += Math.cos(n.userData.dir)*n.userData.speed;
    n.position.z += Math.sin(n.userData.dir)*n.userData.speed;
    n.userData.dir += (Math.random()-0.5)*0.02;
  }

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
