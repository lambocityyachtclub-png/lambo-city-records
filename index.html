<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FINAL BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#zone {
  position:absolute;
  top:20px;
  right:20px;
  color:gold;
}

#hint {
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.5);
  display:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏠 Cabin → 🌉 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">LOADING WORLD</div>
<div id="hint">WALK FORWARD</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// 🌍 WORLD CORE
/////////////////////////////////////////////////////

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.012);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 1.3));
let light = new THREE.PointLight(0x00aaff, 2);
light.position.set(0,5,5);
scene.add(light);

/////////////////////////////////////////////////////
// 🧍 PLAYER (FIXED — NOT JUST A CUBE FEEL)
/////////////////////////////////////////////////////

let player = new THREE.Group();

// body
let body = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,1.2,0.5),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y = 0.6;

// head
let head = new THREE.Mesh(
  new THREE.SphereGeometry(0.35,16,16),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
head.position.y = 1.4;

// simple “identity aura”
let aura = new THREE.Mesh(
  new THREE.RingGeometry(0.6,0.9,32),
  new THREE.MeshBasicMaterial({color:0x00aaff, side:THREE.DoubleSide})
);
aura.rotation.x = Math.PI/2;
aura.position.y = 0.05;

player.add(body);
player.add(head);
player.add(aura);

player.position.set(0,0,10);
scene.add(player);

/////////////////////////////////////////////////////
// 🌉 DOCK WORLD
/////////////////////////////////////////////////////

let dock = new THREE.Mesh(
  new THREE.BoxGeometry(220,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-140);
scene.add(dock);

/////////////////////////////////////////////////////
// 🏠 10 CABINS (REAL ESTATE)
/////////////////////////////////////////////////////

for(let i=0;i<10;i++){
  let cabin = new THREE.Mesh(
    new THREE.BoxGeometry(8,5,8),
    new THREE.MeshStandardMaterial({color:0x111111})
  );

  let side = i < 5 ? -1 : 1;
  let index = i % 5;

  cabin.position.set(side*20,2.5,-20-index*25);
  scene.add(cabin);
}

/////////////////////////////////////////////////////
// 🎤 STAGE (LEFT SIDE)
/////////////////////////////////////////////////////

let stage = new THREE.Mesh(
  new THREE.BoxGeometry(22,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(50,6,22),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-200);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌊 WATER
/////////////////////////////////////////////////////

let water = new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

/////////////////////////////////////////////////////
// ⭐ STARS
/////////////////////////////////////////////////////

const starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<2500;i++){
  arr.push((Math.random()-0.5)*800,Math.random()*300,(Math.random()-0.5)*800);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));

let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:0.8})
);
scene.add(stars);

/////////////////////////////////////////////////////
// 🎮 STATE
/////////////////////////////////////////////////////

let keys = {};
let inWorld = false;
let hasPass = false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
  document.getElementById("start").style.display="none";
  inWorld=true;
}

/////////////////////////////////////////////////////
// 🎯 STAGE TRIGGER
/////////////////////////////////////////////////////

function checkStage(){
  if(player.position.distanceTo(stage.position)<6 && !hasPass){
    hasPass = true;
    document.getElementById("zone").innerText = "🎟 STAGE PASS EARNED";

    setTimeout(()=>{
      alert("HERO: Welcome to VIP Networking Access.");
    },500);
  }
}

/////////////////////////////////////////////////////
// 🎬 LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!inWorld) return;

// movement
if(keys["w"]) player.position.z -= 0.15;
if(keys["s"]) player.position.z += 0.15;
if(keys["a"]) player.position.x -= 0.15;
if(keys["d"]) player.position.x += 0.15;

// stage logic
checkStage();

// camera (cinematic follow)
camera.position.x += (player.position.x-camera.position.x)*0.06;
camera.position.y += (3-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.06;

camera.lookAt(player.position);

// world motion
stars.rotation.y += 0.0004;
water.position.z = Math.sin(Date.now()*0.001)*1;

// UI hint
document.getElementById("hint").style.display =
player.position.distanceTo(stage.position)<6 ? "block" : "none";

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
