<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* HOME /
#home {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 20px;
  background: gold;
  border: none;
  cursor: pointer;
}

/ WORLD /
#world {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: radial-gradient(circle, #111, #000);
}

/ VIP (IMPORTANT FIX) */
#vip {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  top: 0;
  left: 0;
  text-align: center;
  padding-top: 100px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>LAMBO CITY</h1>
  <button onclick="enterWorld()">ENTER</button>
</div>

<!-- WORLD -->
<div id="world">

  <h2 style="padding:20px;">WORLD ACTIVE</h2>

  <button onclick="openVIP()">ENTER VIP</button>
  <button onclick="exitWorld()">EXIT</button>

  <!-- VIP -->
  <div id="vip">
    <h1>YACHT CLUB VIP</h1>
    <button onclick="closeVIP()">CLOSE VIP</button>
  </div>

</div>

<script>
function enterWorld() {
  document.getElementById("world").style.display = "block";
}

function exitWorld() {
  document.getElementById("world").style.display = "none";
}

function openVIP() {
  document.getElementById("vip").style.display = "block";
}

function closeVIP() {
  document.getElementById("vip").style.display = "none";
}
</script>

</body>
</html>
