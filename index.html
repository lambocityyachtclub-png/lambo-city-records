<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | WORLD ENGINE v6</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

/* HUD */
#hud {
  position:fixed; top:10px; left:10px;
  color:white; font-size:12px;
  z-index:10; opacity:0.8;
}

/* MAP */
#map {
  position:fixed; top:10px; right:10px;
  width:160px; height:160px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  padding:8px;
  color:white; font-size:10px;
  z-index:10;
}

/* STORE */
#store {
  position:fixed; bottom:10px; right:10px;
  width:200px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
  color:white;
  display:none;
  z-index:10;
}

/* MISSION */
#mission {
  position:fixed; bottom:10px; left:10px;
  color:white; font-size:12px;
  z-index:10;
}

/* CROSSHAIR */
#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:6px; height:6px;
  background:white;
  transform:translate(-50%,-50%);
  border-radius:50%;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY v6 // CORE ENGINE</div>
<div id="map">CITY • YACHT • STORE • INTERIOR</div>
<div id="mission">MISSION: Enter City</div>
<div id="store">
  <b>STORE</b><br><br>
  👕 HERO Tee<br>
  🧢 Lambo Cap<br>
  🎟 Yacht Pass<br><br>
  <button onclick="closeStore()">Close</button>
</div>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* ================= WORLD ================= */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 80);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* GROUND */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshBasicMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ================= BUILDINGS ================= */
function box(x,z,color){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(6,6,6),
    new THREE.MeshBasicMaterial({color})
  );
  m.position.set(x,3,z);
  scene.add(m);
  return m;
}

const city = box(0,0,0x333333);
const yacht = box(15,0,0x113355);
const store = box(-15,0,0x331111);
const interior = box(0,0,-15,0x552222);

/* ================= VEHICLE ================= */
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,1,3),
  new THREE.MeshBasicMaterial({color:0xff3333})
);
car.position.set(2,0.5,5);
scene.add(car);

let inCar = false;

/* ================= PLAYER ================= */
const player = {
  rotY:0,
  speed:0.12
};

camera.position.set(0,2,8);

/* ================= INPUT ================= */
let keys={};

document.addEventListener("keydown",(e)=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key==="e") interact();
  if(e.key==="b") openStore();
});

document.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()] = false;
});

document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement===document.body){
    player.rotY -= e.movementX*0.002;
  }
});

/* ================= STORE ================= */
function openStore(){
  document.getElementById("store").style.display="block";
}
function closeStore(){
  document.getElementById("store").style.display="none";
}

/* ================= MISSIONS ================= */
let mission = 0;
const missions = [
  "Enter City Zone",
  "Reach Yacht Club",
  "Visit Store",
  "Enter Interior"
];

function updateMission(){
  document.getElementById("mission").innerText =
    "MISSION: " + missions[mission];
}

/* ================= INTERACTIONS ================= */
function interact(){

  if(camera.position.distanceTo(city.position)<3 && mission===0){
    mission=1;
    updateMission();
  }

  if(camera.position.distanceTo(yacht.position)<3 && mission===1){
    mission=2;
    updateMission();
  }

  if(camera.position.distanceTo(store.position)<3){
    openStore();
  }

  if(camera.position.distanceTo(interior.position)<3){
    camera.position.set(0,2,-13);
  }

  if(camera.position.distanceTo(car.position)<3){
    inCar = !inCar;
  }
}

/* ================= MOVEMENT ================= */
function move(){

  let forward = new THREE.Vector3(
    -Math.sin(player.rotY),0,-Math.cos(player.rotY)
  );

  let right = new THREE.Vector3(
    Math.cos(player.rotY),0,-Math.sin(player.rotY)
  );

  if(keys["w"]){
    if(inCar){
      car.position.addScaledVector(forward,0.25);
      camera.position.copy(car.position).add(new THREE.Vector3(0,1,0));
    } else camera.position.addScaledVector(forward,player.speed);
  }

  if(keys["s"]){
    if(inCar){
      car.position.addScaledVector(forward,-0.25);
    } else camera.position.addScaledVector(forward,-player.speed);
  }

  if(keys["a"] && !inCar) camera.position.addScaledVector(right,-player.speed);
  if(keys["d"] && !inCar) camera.position.addScaledVector(right,player.speed);

  camera.rotation.y = player.rotY;
}

/* ================= LOOP ================= */
function animate(){
  requestAnimationFrame(animate);
  move();
  renderer.render(scene,camera);
}
animate();

updateMission();

window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
