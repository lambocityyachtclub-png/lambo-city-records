<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — AAA WORLD BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}

#intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#intro img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.9;
}

#enter{
position:relative;
z-index:2;
padding:18px 40px;
font-size:20px;
background:rgba(0,0,0,0.6);
border:2px solid #00aaff;
color:white;
cursor:pointer;
letter-spacing:3px;
}
</style>
</head>

<body>

<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — AAA WORLD</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070b18, 0.0022);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (AAA UPGRADE)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x5f7fa6,0.55);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff,2.0);
sun.position.set(200,260,120);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff,2,900);
glow.position.set(0,30,-120);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER (FIXED FEEL)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let vel = new THREE.Vector3();
const speed = 0.11;   // faster = AAA feel
const friction = 0.84;

/////////////////////////////////////////////////////
// MOVE SYSTEM
/////////////////////////////////////////////////////

function move(){

let x=0,z=0;

if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.sqrt(x*x+z*z);
if(len>0){x/=len;z/=len;}

vel.x += x*speed;
vel.z += z*speed;

vel.x *= friction;
vel.z *= friction;

player.position.x += vel.x;
player.position.z += vel.z;
}

/////////////////////////////////////////////////////
// CAMERA (SMOOTH AAA FOLLOW)
/////////////////////////////////////////////////////

function cam(){

const target = new THREE.Vector3(
player.position.x,
player.position.y+28,
player.position.z+85
);

camera.position.lerp(target,0.08);
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// OCEAN (REAL MOTION)
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({
color:0x0a2238,
metalness:0.5,
roughness:0.35
})
);
water.rotation.x=-Math.PI/2;
water.position.z=-200;
scene.add(water);

/////////////////////////////////////////////////////
// BEACH
/////////////////////////////////////////////////////

const beach = new THREE.Mesh(
new THREE.PlaneGeometry(1800,900),
new THREE.MeshStandardMaterial({color:0xcbb27a})
);
beach.rotation.x=-Math.PI/2;
beach.position.set(0,-0.2,180);
scene.add(beach);

/////////////////////////////////////////////////////
// DOCK + STAGE + SCREEN
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(30,1,200),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-160);
scene.add(stage);

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({color:0x0044ff})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// CABINS
/////////////////////////////////////////////////////

for(let i=0;i<6;i++){

let c1 = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x333333})
);
c1.position.set(-45,4,-20-i*30);
scene.add(c1);

let c2 = c1.clone();
c2.position.x=45;
scene.add(c2);

}

/////////////////////////////////////////////////////
// ZONES
/////////////////////////////////////////////////////

const golf = new THREE.Mesh(
new THREE.PlaneGeometry(200,120),
new THREE.MeshStandardMaterial({color:0x1f6b3a})
);
golf.rotation.x=-Math.PI/2;
golf.position.set(200,0,-120);
scene.add(golf);

const basketball = new THREE.Mesh(
new THREE.PlaneGeometry(120,80),
new THREE.MeshStandardMaterial({color:0x222244})
);
basketball.rotation.x=-Math.PI/2;
basketball.position.set(-200,0,-120);
scene.add(basketball);

const track = new THREE.Mesh(
new THREE.TorusGeometry(80,6,16,100),
new THREE.MeshStandardMaterial({color:0x222222})
);
track.rotation.x=Math.PI/2;
track.position.set(0,2,-300);
scene.add(track);

/////////////////////////////////////////////////////
// MOUNTAINS
/////////////////////////////////////////////////////

for(let i=0;i<12;i++){
const m = new THREE.Mesh(
new THREE.ConeGeometry(120,260,5),
new THREE.MeshStandardMaterial({color:0x0b0f14})
);
m.position.set(-1200+i*220,120,-900);
scene.add(m);
}

/////////////////////////////////////////////////////
// STARS (MOVING FEEL)
/////////////////////////////////////////////////////

const geo = new THREE.BufferGeometry();
let arr=[];

for(let i=0;i<900;i++){
arr.push((Math.random()-0.5)*3000,Math.random()*1200,(Math.random()-0.5)*3000);
}

geo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
geo,
new THREE.PointsMaterial({color:0xffffff,size:2})
);
scene.add(stars);

/////////////////////////////////////////////////////
// TIME SYSTEM (AAA LIGHTING SHIFT)
/////////////////////////////////////////////////////

let t=0;

function time(){

t+=0.0012;

// ambient day/night shift
ambient.intensity = 0.35 + Math.sin(t)*0.45;

// sun motion
sun.position.x = Math.sin(t*1.5)*250;
sun.position.y = Math.abs(Math.cos(t*1.2))*260;

// ocean tint
water.material.color.setRGB(
0.02 + Math.sin(t)*0.04,
0.08,
0.15 + Math.cos(t)*0.05
);
}

/////////////////////////////////////////////////////
// OCEAN MOTION
/////////////////////////////////////////////////////

function ocean(){
water.position.x = Math.sin(t*1.8)*2;
water.position.z = -200 + Math.cos(t*1.3)*2;
}

/////////////////////////////////////////////////////
// INTRO
/////////////////////////////////////////////////////

document.getElementById("enter").onclick=()=>{
document.getElementById("intro").style.display="none";
};

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

move();
cam();
time();
ocean();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
