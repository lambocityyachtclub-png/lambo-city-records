<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — V3 LIVING WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY — V3 LIVING WORLD</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070a12);

const camera = new THREE.PerspectiveCamera(
  75, innerWidth/innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// 🌙 ATMOSPHERE (BREATHING WORLD)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x3a4a6a, 0.8);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffcc88, 1.1);
sun.position.set(120, 200, 80);
scene.add(sun);

const fill = new THREE.PointLight(0x4da3ff, 0.7, 2500);
fill.position.set(0, 80, 0);
scene.add(fill);

/////////////////////////////////////////////////////
// PLAYER (MORE WEIGHT FEEL)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0xffffff,
    emissive:0x111111
  })
);

player.position.set(0,1,-10);
scene.add(player);

camera.position.set(0, 8, 14);

/////////////////////////////////////////////////////
// CONTROLS (SMOOTHER MOVEMENT)
/////////////////////////////////////////////////////

const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move(){
  const speed = 0.22; // slower = more cinematic feel

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;
}

/////////////////////////////////////////////////////
// 🎥 CAMERA (FILM FOLLOW)
/////////////////////////////////////////////////////

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x) * 0.05;
  camera.position.y += ((player.position.y + 9) - camera.position.y) * 0.05;
  camera.position.z += ((player.position.z + 16) - camera.position.z) * 0.05;

  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (V3 DEPTH MOTION)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(5000, 5000, 90, 90);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x061a2b,
  metalness: 0.25,
  roughness: 0.85,
  emissive: 0x001022,
  emissiveIntensity: 0.2
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🌫️ FOG (BREATHING ATMOSPHERE)
/////////////////////////////////////////////////////

scene.fog = new THREE.FogExp2(0x0a1020, 0.004);

/////////////////////////////////////////////////////
// 🌉 DOCK
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(300,300,2,64),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);

dock.position.set(0,0.5,-80);
scene.add(dock);

/////////////////////////////////////////////////////
// 🏡 VILLAS (STABLE GRID FEEL)
/////////////////////////////////////////////////////

function villa(x,z){

  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x0f0f0f })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({ color:0x151515 })
  );
  body.position.y = 4;
  g.add(body);

  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x0a0a0a })
  );
  roof.position.y = 8;
  g.add(roof);

  const light = new THREE.PointLight(0x66ccff, 1.1, 40);
  light.position.set(0,4,0);
  g.add(light);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<7;i++){
  villa(-28, -30 - i*25);
  villa(28, -30 - i*25);
}

/////////////////////////////////////////////////////
// 🚤 YACHT (LIVING OBJECT)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(18,4,50),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(8,1,-10);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText =
        "HERO: You are now inside the living world";
    }
  }
});

/////////////////////////////////////////////////////
// 🌅 WORLD TIME SHIFT (SUBTLE LIVING FEEL)
/////////////////////////////////////////////////////

let t = 0;

function updateWorld(){
  t += 0.002;

  // gentle lighting shift
  sun.intensity = 1.0 + Math.sin(t) * 0.15;

  scene.fog.density = 0.0035 + Math.sin(t * 0.5) * 0.0005;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();
  updateWorld();

  const time = Date.now() * 0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x * 0.012 + time) * 0.6 +
      Math.cos(v.z * 0.012 + time * 1.1) * 0.6;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  // yacht drift (more natural now)
  yacht.position.x += Math.sin(time * 0.15) * 0.01;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
