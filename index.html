<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V10.5 — WORLD ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">
WASD MOVE • E INTERACT • SHIFT SPRINT
<br>
SPACE = ACTION (future sports/vehicles)
</div>

<div id="zone">LAMBO CITY WORLD ENGINE LOADING...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE WORLD ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.005);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC LUXURY BASE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 1.0));

const sun = new THREE.DirectionalLight(0x66ccff, 1.3);
sun.position.set(80,120,60);
scene.add(sun);

const glow = new THREE.PointLight(0x4da3ff, 1.5, 2000);
glow.position.set(0,100,0);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER CONTROLLER (FOUNDATION FOR EVERYTHING)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.7, 1.2, 4, 8),
  new THREE.MeshStandardMaterial({
    color:0xffffff,
    emissive:0x111111
  })
);

player.position.set(0,1,-20);
scene.add(player);

camera.position.set(0,8,14);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let speed = 0.25;
let sprint = 0.45;

function move(){
  let s = keys["shift"] ? sprint : speed;

  if(keys["w"]) player.position.z -= s;
  if(keys["s"]) player.position.z += s;
  if(keys["a"]) player.position.x -= s;
  if(keys["d"]) player.position.x += s;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.06;
  camera.position.y += ((player.position.y+9)-camera.position.y)*0.06;
  camera.position.z += ((player.position.z+16)-camera.position.z)*0.06;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN SYSTEM
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,100,100);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021a33,
  metalness:0.3,
  roughness:0.7,
  emissive:0x001122,
  emissiveIntensity:0.4
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🏡 LUXURY VILLAS (DISTRICT STYLE)
/////////////////////////////////////////////////////

function createVilla(x,z,i){
  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(18,1,18),
    new THREE.MeshStandardMaterial({color:0x111111})
  );

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(18,7,18),
    new THREE.MeshStandardMaterial({
      color: new THREE.Color(`hsl(${200+i*15},50%,20%)`)
    })
  );

  body.position.y = 3.5;

  const light = new THREE.PointLight(0x66ccff,1.2,80);
  light.position.set(0,6,0);

  g.add(base);
  g.add(body);
  g.add(light);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<6;i++){
  createVilla(-30,-25-i*30,i);
  createVilla(30,-25-i*30,i+1);
}

/////////////////////////////////////////////////////
// 🚤 YACHT ZONE
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(18,4,50),
  new THREE.MeshStandardMaterial({color:0xf2f2f2})
);
yacht.position.set(50,2,-90);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌉 JUMBOTRON STAGE (MAIN EVENT AREA)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.BoxGeometry(40,2,16),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
stage.position.set(0,1,-180);
scene.add(stage);

const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(28,14),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.5
  })
);
screen.position.set(0,14,-190);
scene.add(screen);

/////////////////////////////////////////////////////
// 🌟 INTERACTION OBJECT (NPC CORE)
/////////////////////////////////////////////////////

const npc = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
npc.position.set(10,1,-20);
scene.add(npc);

/////////////////////////////////////////////////////
// 🔥 FUTURE SYSTEM HOOKS (IMPORTANT)
/////////////////////////////////////////////////////

let canSkate = false;
let canGolf = false;
let canJetSki = false;
let canBasketball = false;

/////////////////////////////////////////////////////
// INPUT SYSTEM (SPACE = ACTION SLOT)
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{

  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(npc.position)<3){
      document.getElementById("zone").innerText =
      "NPC: Welcome to LAMBO CITY";
    }
  }

  if(e.key===" "){
    // FUTURE ACTION SYSTEM
    document.getElementById("zone").innerText =
    "ACTION SLOT READY (sports/vehicles coming in next phase)";
  }

});

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  if(player.position.distanceTo(npc.position)<3){
    show("PRESS E TO TALK");
  } else hide();
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  const time = Date.now()*0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.02+time)*0.35 +
      Math.cos(v.z*0.02+time*1.2)*0.35;

    waterPos.setY(i,wave);
  }

  waterPos.needsUpdate=true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
