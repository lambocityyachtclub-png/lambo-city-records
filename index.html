<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/yourimage.jpg') no-repeat center center/cover;
  z-index: -1;
}

.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.title {
  text-align: center;
  font-size: 52px;
  font-weight: bold;
  color: gold;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-top: 20px;
}

.panel {
  border: 1px solid gold;
  padding: 15px;
  background: rgba(0,0,0,0.5);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.enter {
  display: block;
  text-align: center;
  margin: 30px auto;
  padding: 15px;
  width: 300px;
  background: gold;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 10px;
}

.feed {
  margin-top: 20px;
  border: 1px solid gold;
  padding: 10px;
  height: 120px;
  overflow: auto;
  background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay">
<div class="container">

<div class="title">LAMBO CITY</div>

<div class="grid">

<div>
<iframe
src="https://player.twitch.tv/?channel=LamboCityRecords&parent=lambocityrecords.com"
width="100%" height="420" allowfullscreen>
</iframe>
</div>

<div class="panel">
<h3>ACCESS PORTAL</h3>

<button onclick="enter('guest')">Enter Guest Zone</button>
<button onclick="enter('vip')">Enter VIP Zone</button>
<button onclick="enter('founder')">Enter Founder Zone</button>

<hr>

<button onclick="alert('Drop loading...')">Next Drop</button>
</div>

</div>

<a class="enter" href="/vip.html">OPEN BOARDING PASS PORTAL</a>

<div class="feed" id="feed">
<p>SYSTEM: Lambo City Network Online</p>
</div>

</div>
</div>

<script>
const feed = document.getElementById("feed");

function enter(level) {
  localStorage.setItem("accessLevel", level);
  window.location.href = "/vip.html";
}

setInterval(() => {
  const msgs = [
    "SYSTEM: VIP nodes syncing...",
    "SYSTEM: Yacht protocol active...",
    "SYSTEM: Boarding passes scanning...",
    "USER: Awaiting access level"
  ];

  const p = document.createElement("p");
  p.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  feed.appendChild(p);
  feed.scrollTop = feed.scrollHeight;
}, 4000);
</script>

</body>
</html>
