<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — YACHT PARTY MODE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}

#login {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}
</style>
</head>

<body>

<div id="login">
<h2>LAMBO CITY</h2>
<button onclick="start()">ENTER EXPERIENCE</button>
</div>

<div id="hud">YACHT STATUS: IDLE</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let keys = {};
let hasPass = false;
let inParty = false;

function start(){

document.getElementById("login").style.display = "none";

// SCENE
scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);

// CAMERA
camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,5);

// RENDERER
renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS (PARTY MODE)
scene.add(new THREE.AmbientLight(0x1a1a2a, 0.8));

const light1 = new THREE.PointLight(0x00aaff, 2);
light1.position.set(0,5,-10);
scene.add(light1);

const light2 = new THREE.PointLight(0xffd700, 1.5);
light2.position.set(3,3,-12);
scene.add(light2);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// YACHT
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(3,1,6),
  new THREE.MeshStandardMaterial({color:0xffd700})
);
yacht.position.set(0,0.5,-15);
scene.add(yacht);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// STARS
const geo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<2000;i++){
  arr.push(
    (Math.random()-0.5)*400,
    Math.random()*200,
    (Math.random()-0.5)*400
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
  geo,
  new THREE.PointsMaterial({color:0xffffff, size:0.7})
);

scene.add(stars);

// CROWD LIGHTS (FAKE PEOPLE ENERGY)
for(let i=0;i<10;i++){
  const glow = new THREE.PointLight(0xffffff, 0.6, 8);
  glow.position.set(
    (Math.random()-0.5)*6,
    1,
    -15 + (Math.random()-0.5)*4
  );
  scene.add(glow);
}

// MUSIC (auto play on click)
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3?filename=deep-house-ambient-110397.mp3");
music.loop = true;
music.volume = 0.35;
document.addEventListener("click", ()=> music.play());

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") action();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// ACTION
function action(){

  let dist = player.position.distanceTo(yacht.position);

  if(!hasPass){
    hasPass = true;
    hud.innerText = "PASS GRANTED — GO TO YACHT";
    return;
  }

  if(hasPass && dist < 3){
    inParty = true;
    hud.innerText = "VIP PARTY ACTIVE 🔥";
  }
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  // movement
  if(keys["w"]) player.position.z -= 0.08;
  if(keys["s"]) player.position.z += 0.08;
  if(keys["a"]) player.position.x -= 0.08;
  if(keys["d"]) player.position.x += 0.08;

  // camera smooth
  camera.position.x += (player.position.x - camera.position.x)*0.03;
  camera.position.z += (player.position.z + 6 - camera.position.z)*0.03;
  camera.lookAt(player.position);

  // yacht float = life feeling
  yacht.position.y = 0.5 + Math.sin(Date.now()*0.002)*0.15;
  yacht.rotation.y += 0.002;

  renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
