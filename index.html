<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB — LIVE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="ui">ZONE: ENTRY</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let keys = {};

// 🎵 MUSIC (life layer)
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3");
music.loop = true;
music.volume = 0.35;

// START WORLD
scene = new THREE.Scene();
scene.background = new THREE.Color(0x01020a);
scene.fog = new THREE.FogExp2(0x01020a, 0.03);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,6);

renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0x1a2a3a, 1));

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// YACHT CLUB
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(12,2,12),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,1,-45);
scene.add(yacht);

// DOCK
const dock = new THREE.Mesh(
  new THREE.BoxGeometry(60,1,15),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-15);
scene.add(dock);

// WATER
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// 🌟 LIFE STARS
const geo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<1200;i++){
  arr.push(
    (Math.random()-0.5)*200,
    Math.random()*80,
    (Math.random()-0.5)*200
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

scene.add(new THREE.Points(
  geo,
  new THREE.PointsMaterial({color:0xffffff, size:0.4})
));

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// start music on click (browser rule)
document.addEventListener("click", ()=> music.play());

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE PLAYER
if(keys["w"]) player.position.z -= 0.12;
if(keys["s"]) player.position.z += 0.12;
if(keys["a"]) player.position.x -= 0.12;
if(keys["d"]) player.position.x += 0.12;

// CAMERA FOLLOW
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 6 - camera.position.z)*0.05;
camera.lookAt(player.position);

// WATER MOTION
water.position.z = Math.sin(Date.now()*0.001)*0.5;

// 🌊 LIFE LAYER EFFECT (IMPORTANT)
scene.fog.density = 0.03 + Math.sin(Date.now()*0.002)*0.005;

// ZONE SYSTEM
let dist = player.position.distanceTo(yacht.position);

if(dist < 10){
  document.getElementById("ui").innerText = "ZONE: YACHT CLUB ACTIVE";
  document.getElementById("prompt").style.display = "block";
} else {
  document.getElementById("ui").innerText = "ZONE: ENTRY";
  document.getElementById("prompt").style.display = "none";
}

// RENDER
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
