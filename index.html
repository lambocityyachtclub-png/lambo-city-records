<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000814;
  font-family: Arial;
  color: white;
}

canvas { display:block; }

#ui {
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* HOME */
#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle, rgba(0,10,30,0.8), black);
  pointer-events:auto;
}

/* HUD */
#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
  opacity:0.85;
  line-height:1.6;
}

#zoneAlert {
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  font-size:22px;
  opacity:0;
  transition:opacity 0.5s;
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background:black;
  z-index:10;
  text-align:center;
  padding-top:120px;
}

button {
  padding:12px 16px;
  margin-top:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="home">
  <h1>LAMBO CITY</h1>
  <p style="opacity:0.6">Enter the world</p>
  <button onclick="enterWorld()">ENTER</button>
</div>

<div id="hud">
  <div id="status">OFFLINE</div>
  <div id="activity">...</div>
  <div id="radioUI">RADIO: OFF</div>
  <div id="zone">ZONE: NONE</div>
  <div>WASD MOVE</div>
</div>

<div id="zoneAlert"></div>

<div id="vip">
  <h1>YACHT CLUB</h1>
  <button onclick="closeVIP()">EXIT</button>
</div>

</div>

<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, ocean, yacht;

let mode = "idle";
let keys = {};

const activities = [
  "TRAFFIC FLOWING",
  "DJ HERO LIVE",
  "YACHT EVENT PREPARING",
  "CITIZENS ONLINE",
  "CITY LIGHTS ACTIVE"
];

const tracks = [
  "NIGHT DRIVE",
  "LAMBO CITY RADIO",
  "AFTER HOURS",
  "MIDNIGHT ENERGY"
];

const zones = {
  yacht: { x:0, z:-18, r:4 },
  city:  { x:18, z:10, r:14 }
};

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000814, 10, 80);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c") });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000814);

  // ocean
  ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshBasicMaterial({ color:0x003b6f })
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({ color:0xffffff })
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // yacht
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,6),
    new THREE.MeshBasicMaterial({ color:0xd4af37 })
  );
  yacht.position.set(0,0.5,-18);
  scene.add(yacht);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  // ocean motion
  ocean.rotation.z += 0.0003;

  // subtle camera sway
  camera.position.y += Math.sin(Date.now()*0.001) * 0.002;

  if(mode === "play"){

    if(keys["w"]) player.position.z -= 0.15;
    if(keys["s"]) player.position.z += 0.15;
    if(keys["a"]) player.position.x -= 0.15;
    if(keys["d"]) player.position.x += 0.15;

    camera.position.x += (player.position.x - camera.position.x)*0.07;
    camera.position.z += (player.position.z+10 - camera.position.z)*0.07;
    camera.lookAt(player.position);

    checkZones();
  }

  renderer.render(scene,camera);
}

function checkZones(){

  let d = dist(zones.yacht);

  if(d < zones.yacht.r){
    showZone("ENTERING YACHT CLUB");
    document.getElementById("vip").style.display = "block";
    mode = "vip";
  }
  else {
    document.getElementById("zone").innerText = "ZONE: WORLD";
  }
}

function showZone(text){
  const el = document.getElementById("zoneAlert");
  el.innerText = text;
  el.style.opacity = 1;
  setTimeout(()=> el.style.opacity = 0, 2000);
}

function dist(z){
  return Math.sqrt(
    (player.position.x - z.x)**2 +
    (player.position.z - z.z)**2
  );
}

function enterWorld(){
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE";
  mode = "play";

  const radio = document.getElementById("radio");
  radio.play().catch(()=>{});

  // start systems
  cycleActivity();
  cycleRadio();
}

function closeVIP(){
  document.getElementById("vip").style.display = "none";
  mode = "play";
}

// 🌍 world activity loop
function cycleActivity(){
  setInterval(()=>{
    const a = activities[Math.floor(Math.random()*activities.length)];
    document.getElementById("activity").innerText = a;
  }, 3000);
}

// 🎧 radio system UI
function cycleRadio(){
  setInterval(()=>{
    const t = tracks[Math.floor(Math.random()*tracks.length)];
    document.getElementById("radioUI").innerText = "NOW PLAYING: " + t;
  }, 5000);
}

</script>

</body>
</html>
