<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — MASTER WORLD v1</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone {
position:absolute;
color:white;
z-index:10;
font-family:Arial;
font-size:13px;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#start {
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:20;
}

#interaction {
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
color:white;
}
</style>

</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD MOVE</div>
<div id="zone">LOADING...</div>
<div id="interaction"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE STATE
/////////////////////////////////////////////////////

let started = false;
let coins = 0;

const WORLD = {
  stageEnabled: false // DISABLED UNTIL WORLD COMPLETE
};

/////////////////////////////////////////////////////
// SCENE / CAMERA / RENDERER
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x080816, 0.01);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  2000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const mainLight = new THREE.PointLight(0x00ffff, 1.5, 120);
mainLight.position.set(0,20,20);
scene.add(mainLight);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-20);
scene.add(player);

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/////////////////////////////////////////////////////
// UI SYSTEM
/////////////////////////////////////////////////////

const interactionUI = document.getElementById("interaction");

function showInteraction(t){
  interactionUI.style.display = "block";
  interactionUI.innerText = t;
}

function hideInteraction(){
  interactionUI.style.display = "none";
}

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.5
  })
);

hero.position.set(10,1,-10);
scene.add(hero);

let talking = false;

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.MeshStandardMaterial({ color:0x001122 })
);

ocean.rotation.x = -Math.PI/2;
scene.add(ocean);

/////////////////////////////////////////////////////
// YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const yachtBody = new THREE.Mesh(
  new THREE.BoxGeometry(10,3,30),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

yachtBody.position.y = 2;
yacht.add(yachtBody);

const yachtInterior = new THREE.Mesh(
  new THREE.BoxGeometry(8,2,20),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);

yachtInterior.position.y = 3;
yacht.add(yachtInterior);

yacht.position.set(25,0,-20);
scene.add(yacht);

let insideYacht = false;

/////////////////////////////////////////////////////
// CABINS
/////////////////////////////////////////////////////

const cabins = [];

function createCabin(x,z){

  const c = new THREE.Mesh(
    new THREE.BoxGeometry(4,3,4),
    new THREE.MeshStandardMaterial({ color:0x222222 })
  );

  c.position.set(x,1,z);
  scene.add(c);
  cabins.push(c);
}

for(let i=0;i<4;i++){
  createCabin(-10, -10 - i*8);
  createCabin(10, -10 - i*8);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

  if(keys["w"]) player.position.z -= 0.2;
  if(keys["s"]) player.position.z += 0.2;
  if(keys["a"]) player.position.x -= 0.2;
  if(keys["d"]) player.position.x += 0.2;

}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){

  camera.position.x += (player.position.x - camera.position.x) * 0.1;
  camera.position.y = 8;
  camera.position.z += (player.position.z + 12 - camera.position.z) * 0.1;

  camera.lookAt(player.position);

}

/////////////////////////////////////////////////////
// HERO INTERACTION
/////////////////////////////////////////////////////

function checkHero(){

  const d = player.position.distanceTo(hero.position);

  if(d < 3){
    showInteraction("PRESS E TO TALK");
  } else {
    hideInteraction();
  }
}

/////////////////////////////////////////////////////
// START
/////////////////////////////////////////////////////

function start(){
  document.getElementById("start").style.display = "none";
  started = true;
  document.getElementById("zone").innerText = "WORLD ACTIVE";
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

  requestAnimationFrame(animate);

  if(!started){
    renderer.render(scene,camera);
    return;
  }

  move();
  updateCamera();
  checkHero();

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
