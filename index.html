<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — SYSTEM WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  line-height:1.4em;
}

#zone {
  position:absolute;
  top:20px;
  right:20px;
  color:gold;
  font-size:13px;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">
🏠 CABIN = CONTROL<br>
🌉 DOCK = REAL ESTATE<br>
🎤 STAGE = EVENTS<br>
🚤 YACHT = VIP
</div>

<div id="zone">ZONE: LOADING</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,8);

let renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c")
});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.3));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,5);
scene.add(player);

// ================= CABIN =================
let cabin = new THREE.Mesh(
  new THREE.BoxGeometry(18,10,18),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.set(0,5,0);
scene.add(cabin);

// WINDOW VIEW (yacht far)
let yachtFar = new THREE.Mesh(
  new THREE.BoxGeometry(10,4,10),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yachtFar.position.set(0,3,-120);
scene.add(yachtFar);

// ================= BRIDGE =================
let bridge = new THREE.Mesh(
  new THREE.BoxGeometry(6,1,40),
  new THREE.MeshStandardMaterial({color:0x222222})
);
bridge.position.set(0,0,-30);
scene.add(bridge);

// ================= DOCK =================
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,120),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-90);
scene.add(dock);

// ================= REAL ESTATE (5 LEFT / 5 RIGHT) =================
function house(x,z){
  let h = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  h.position.set(x,2,z);
  scene.add(h);
}

for(let i=0;i<5;i++){
  house(-12,-40-(i*15));
  house(12,-40-(i*15));
}

// ================= STAGE (LEFT SIDE) =================
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(18,2,12),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-20,1,-130);
scene.add(stage);

// ================= YACHT (VIP END) =================
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(35,10,18),
  new THREE.MeshStandardMaterial({color:0x222255})
);
yacht.position.set(0,5,-170);
scene.add(yacht);

// ================= CROWD =================
let crowd = [];
for(let i=0;i<30;i++){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  c.position.set((Math.random()-0.5)*50,0.6,-80-(Math.random()*70));
  scene.add(c);
  crowd.push(c);
}

// ================= INPUT =================
let keys = {};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});
document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

function enterWorld(){
  document.getElementById("start").style.display="none";
}

// ================= GAME LOOP =================
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
if(keys["w"]) player.position.z -= 0.2;
if(keys["s"]) player.position.z += 0.2;
if(keys["a"]) player.position.x -= 0.2;
if(keys["d"]) player.position.x += 0.2;

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.z += (player.position.z + 8 - camera.position.z)*0.08;
camera.lookAt(player.position);

// LIFE
crowd.forEach(c=>{
  c.position.x += Math.sin(Date.now()*0.001 + c.position.z)*0.01;
});

// ZONE SYSTEM (PROGRESSION)
let z = player.position.z;

if(z > -10) document.getElementById("zone").innerText = "ZONE: CABIN (CONTROL)";
else if(z > -60) document.getElementById("zone").innerText = "ZONE: DOCK (REAL ESTATE)";
else if(z > -120) document.getElementById("zone").innerText = "ZONE: STAGE (EVENTS)";
else document.getElementById("zone").innerText = "ZONE: YACHT (VIP)";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
