<script>

/////////////////////////////////////////////////////
// CORE (YOUR ORIGINAL STRUCTURE KEPT)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070d);
scene.fog = new THREE.FogExp2(0x04070d, 0.0025);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect = innerWidth / innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (V19 CINEMATIC UPGRADE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x334455,0.9));

const moon = new THREE.DirectionalLight(0x88bbff,1.4);
moon.position.set(120,200,100);
scene.add(moon);

const cityGlow = new THREE.PointLight(0x00aaff,2.2,600);
cityGlow.position.set(0,40,0);
scene.add(cityGlow);

/////////////////////////////////////////////////////
// INPUT + STATE
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mode="walk";

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// 🚗 LAMBORGHINI (ENTER / EXIT SYSTEM)
/////////////////////////////////////////////////////

const car = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(3,0.8,6),
new THREE.MeshStandardMaterial({
color:0xffcc00,
metalness:0.8,
roughness:0.25
})
);

const cabin = new THREE.Mesh(
new THREE.BoxGeometry(2.4,0.8,2.5),
new THREE.MeshStandardMaterial({
color:0x111111,
metalness:0.9,
roughness:0.2
})
);

body.position.y=0.5;
cabin.position.set(0,1.2,-0.5);

car.add(body);
car.add(cabin);
car.position.set(0,0,60);
scene.add(car);

/////////////////////////////////////////////////////
// 🚤 YACHT (V19 LIGHTING UPGRADE)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(18,2,50),
new THREE.MeshStandardMaterial({color:0xffffff,metalness:0.4})
);
hull.position.y=1;

const cabinY = new THREE.Mesh(
new THREE.BoxGeometry(10,4,20),
new THREE.MeshStandardMaterial({color:0x222222})
);
cabinY.position.y=4;

const yachtLight = new THREE.PointLight(0x00ccff,2,120);
yachtLight.position.set(0,6,0);

yacht.add(hull);
yacht.add(cabinY);
yacht.add(yachtLight);
yacht.position.set(40,0,-90);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌊 OCEAN (V19 SMOOTHER WAVES)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(4000,4000,120,120);

const waterMat = new THREE.MeshStandardMaterial({
color:0x02131f,
metalness:0.6,
roughness:0.5,
emissive:0x001122,
emissiveIntensity:0.4
});

const water = new THREE.Mesh(waterGeo,waterMat);
water.rotation.x=-Math.PI/2;
scene.add(water);

const waterPos=water.geometry.attributes.position;
const base=[];

for(let i=0;i<waterPos.count;i++){
base.push({x:waterPos.getX(i),z:waterPos.getZ(i)});
}

/////////////////////////////////////////////////////
// 🏝 CABINS (YOUR ORIGINAL DESIGN + GLOW BOOST)
/////////////////////////////////////////////////////

function cabin(x,z){

const g=new THREE.Group();

const base=new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house=new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y=5;

const top=new THREE.Mesh(
new THREE.BoxGeometry(10,4,10),
new THREE.MeshStandardMaterial({color:0x555555})
);
top.position.y=11;

const glow=new THREE.PointLight(0x00ccff,1.5,50);
glow.position.y=6;

g.add(base);
g.add(house);
g.add(top);
g.add(glow);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

/////////////////////////////////////////////////////
// 🚶 WALKWAYS
/////////////////////////////////////////////////////

function walkway(x,z){
const w=new THREE.Mesh(
new THREE.BoxGeometry(8,0.5,28),
new THREE.MeshStandardMaterial({color:0x5b3d21})
);
w.position.set(x,0.3,z);
scene.add(w);
}

for(let i=0;i<6;i++){
walkway(-22,-20-i*35);
walkway(22,-20-i*35);
}

/////////////////////////////////////////////////////
// 🎬 JUMBOTRON (MUSIC REACTIVE CORE)
/////////////////////////////////////////////////////

const screen=new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:1.5
})
);

screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// 🧍 NPCS (V19 SMOOTH ROAM)
/////////////////////////////////////////////////////

const npcs=[];

function npc(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffaa66})
);

n.position.set(x,1,z);
n.userData={
dir:Math.random()*Math.PI*2,
speed:0.02+Math.random()*0.03
};

scene.add(n);
npcs.push(n);
}

for(let i=0;i<10;i++){
npc(-20+i*3,-40);
}

/////////////////////////////////////////////////////
// 🎮 MOVEMENT
/////////////////////////////////////////////////////

function move(){
const speed=0.35;

if(keys.w)player.position.z-=speed;
if(keys.s)player.position.z+=speed;
if(keys.a)player.position.x-=speed;
if(keys.d)player.position.x+=speed;
}

/////////////////////////////////////////////////////
// 🚗 ENTER / EXIT CAR
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
const d=player.position.distanceTo(car.position);

if(mode==="walk"&&d<4){
mode="car";
player.visible=false;
}

else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// 🎥 CAMERA (V19 SMOOTH CINEMATIC)
/////////////////////////////////////////////////////

camera.position.set(0,10,20);

function updateCamera(){

const tx=mode==="walk"?player.position.x:car.position.x;
const ty=mode==="walk"?player.position.y+8:car.position.y+6;
const tz=mode==="walk"?player.position.z+18:car.position.z+18;

camera.position.x+=(tx-camera.position.x)*0.05;
camera.position.y+=(ty-camera.position.y)*0.05;
camera.position.z+=(tz-camera.position.z)*0.05;

camera.lookAt(mode==="walk"?player.position:car.position);
}

/////////////////////////////////////////////////////
// 🎬 ANIMATION LOOP (V19 ENGINE)
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

const time=performance.now()*0.001;

/////////////////////////////////////////////////////
// OCEAN WAVES
/////////////////////////////////////////////////////

for(let i=0;i<waterPos.count;i++){
const v=base[i];

waterPos.setY(i,
Math.sin(v.x*0.01+time)*0.7+
Math.cos(v.z*0.01+time*1.2)*0.7
);
}
waterPos.needsUpdate=true;

/////////////////////////////////////////////////////
// JUMBOTRON MUSIC PULSE (SIMULATED)
/////////////////////////////////////////////////////

screen.material.emissiveIntensity =
1.2 + Math.sin(time*3)*0.8;

/////////////////////////////////////////////////////
// GAME LOOP
/////////////////////////////////////////////////////

move();
updateCamera();

/////////////////////////////////////////////////////
// NPC MOVEMENT
/////////////////////////////////////////////////////

for(let n of npcs){
n.position.x+=Math.cos(n.userData.dir)*n.userData.speed;
n.position.z+=Math.sin(n.userData.dir)*n.userData.speed;
n.userData.dir+=(Math.random()-0.5)*0.01;
}

renderer.render(scene,camera);
}

animate();

</script>
