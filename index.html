<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | MISSION WORLD v2</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.8;
    z-index: 10;
}

/* OBJECTIVE */
#objective {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: white;
    font-size: 13px;
    opacity: 0.9;
    z-index: 10;
}

/* CROSSHAIR */
#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: white;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    z-index: 10;
}

/* FADE */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: 0.5s;
    z-index: 20;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // MISSION ENGINE v2</div>
<div id="objective">MISSION: Enter the City Gate</div>
<div id="crosshair"></div>
<div id="fade"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🌍 WORLD SETUP
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1));

/* FLOOR */
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshBasicMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* =========================
   🏙 MISSION LOCATIONS
========================= */
function zone(x,z,color){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(6,6,6),
        new THREE.MeshBasicMaterial({color})
    );
    m.position.set(x,3,z);
    scene.add(m);
    return m;
}

const gate = zone(0,0,0x333333);
const city = zone(10,0,0x553311);
const yacht = zone(20,0,0x113355);

/* =========================
   🎮 PLAYER
========================= */
const player = {
    speed:0.12,
    rotY:0
};

camera.position.set(0,2,6);

/* =========================
   🎮 INPUT
========================= */
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
    if(document.pointerLockElement===document.body){
        player.rotY -= e.movementX*0.002;
    }
});

/* =========================
   🎯 MISSION SYSTEM
========================= */
let missionStage = 0;

const objective = document.getElementById("objective");
const fade = document.getElementById("fade");

/* =========================
   🚪 INTERACTION LOGIC
========================= */
function interact(){

    if(camera.position.distanceTo(gate.position)<3 && missionStage===0){
        missionStage = 1;
        objective.innerText = "MISSION: Enter the City";
    }

    if(camera.position.distanceTo(city.position)<3 && missionStage===1){
        missionStage = 2;
        objective.innerText = "MISSION: Go to Yacht Club";
    }

    if(camera.position.distanceTo(yacht.position)<3 && missionStage===2){
        missionStage = 3;
        objective.innerText = "MISSION COMPLETE: Welcome to Lambo City";
    }
}

/* =========================
   🚶 MOVEMENT
========================= */
function move(){

    let forward = new THREE.Vector3(
        -Math.sin(player.rotY),0,-Math.cos(player.rotY)
    );

    let right = new THREE.Vector3(
        Math.cos(player.rotY),0,-Math.sin(player.rotY)
    );

    if(keys["w"]) camera.position.addScaledVector(forward,player.speed);
    if(keys["s"]) camera.position.addScaledVector(forward,-player.speed);
    if(keys["a"]) camera.position.addScaledVector(right,-player.speed);
    if(keys["d"]) camera.position.addScaledVector(right,player.speed);

    camera.rotation.y = player.rotY;
}

/* =========================
   🎮 GAME LOOP
========================= */
function animate(){
    requestAnimationFrame(animate);

    move();
    interact();

    renderer.render(scene,camera);
}
animate();

/* RESIZE */
window.addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
