<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — AAA STABLE BASE</title>

<style>
body { margin:0; overflow:hidden; background:black; }

canvas { display:block; }

#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

#enter{
padding:18px 40px;
font-size:20px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
letter-spacing:3px;
}

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}

#hint{
position:absolute;
bottom:20px;
left:20px;
color:#aaa;
font-family:Arial;
font-size:12px;
z-index:10;
}
</style>
</head>

<body>

<div id="intro">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — AAA STABLE ENGINE</div>
<div id="hint">WASD to move</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

/////////////////////////////////////////////////////
// SAFE STATE
/////////////////////////////////////////////////////

let started = false;
let mode = "intro";
let t = 0;

/////////////////////////////////////////////////////
// BUTTON (100% SAFE)
/////////////////////////////////////////////////////

const enterBtn = document.getElementById("enter");

enterBtn.addEventListener("click", () => {
document.getElementById("intro").style.display = "none";
started = true;
mode = "play";
init();
animate();
});

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

let scene, camera, renderer, composer, bloom;

let player, vel;

function init(){

scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814, 0.0012);
scene.background = new THREE.Color(0x050714);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);

renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

/* POST FX */
composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

bloom = new THREE.UnrealBloomPass(
new THREE.Vector2(innerWidth, innerHeight),
1.2, 0.6, 0.2
);
composer.addPass(bloom);

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x6fa6c8, 0.25));

const sun = new THREE.DirectionalLight(0xffffff, 3);
sun.position.set(200,300,150);
scene.add(sun);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,20);
scene.add(player);

vel = new THREE.Vector3();

/////////////////////////////////////////////////////
// WORLD (STABLE AAA LAYERS)
/////////////////////////////////////////////////////

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x08293d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* dock */
const dock = new THREE.Mesh(
new THREE.BoxGeometry(30,1,200),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

/* stage */
const stage = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,2,64),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x002244,
emissiveIntensity:1.2
})
);
stage.position.set(0,1,-160);
scene.add(stage);

/* cabins */
for(let i=0;i<6;i++){
let c = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x333333})
);

c.position.set(-45,4,-20-i*30);
scene.add(c);

let c2 = c.clone();
c2.position.x = 45;
scene.add(c2);
}

/* stars */
const starGeo = new THREE.BufferGeometry();
let pos = [];

for(let i=0;i<1000;i++){
pos.push((Math.random()-0.5)*4000,
Math.random()*1500,
(Math.random()-0.5)*4000);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:2})
);

scene.add(stars);

}

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
let x=0,z=0;

if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.hypot(x,z);
if(len>0){x/=len;z/=len;}

vel.x += x*0.14;
vel.z += z*0.14;

vel.multiplyScalar(0.86);

player.position.add(vel);
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function cam(){

camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y+30) - camera.position.y)*0.06;
camera.position.z += ((player.position.z+90) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// DAY / ATMOSPHERE
/////////////////////////////////////////////////////

function time(){
t += 0.0012;
let day = Math.sin(t);

scene.fog.color = new THREE.Color(
0.02+day*0.06,
0.06+day*0.08,
0.12+day*0.16
);

bloom.strength = 1.0 + day*0.6;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

if(!started) return;

move();
cam();
time();

composer.render();
}

</script>

</body>
</html>
