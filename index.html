<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V35 — STABLE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;left:20px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V35 — WORLD FOUNDATION</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE WORLD
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x061018);
scene.fog = new THREE.FogExp2(0x061018, 0.0018);

const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});
renderer.setSize(window.innerWidth, window.innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CLEAR VISIBILITY FIX)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x6a7f90, 1.4));

const sun = new THREE.DirectionalLight(0x9ecbff, 1.3);
sun.position.set(100,200,80);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff, 2, 900);
glow.position.set(0,40,0);
scene.add(glow);

/////////////////////////////////////////////////////
// CAMERA FIX (IMPORTANT)
/////////////////////////////////////////////////////

camera.position.set(0, 35, 90);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// OCEAN (BEHIND WORLD)
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({
color:0x0a2233,
metalness:0.4,
roughness:0.6
})
);
water.rotation.x = -Math.PI/2;
water.position.z = -200;
scene.add(water);

/////////////////////////////////////////////////////
// MAIN DOCK (CENTER PIECE)
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(25,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

/////////////////////////////////////////////////////
// ROUND STAGE (FOCAL POINT)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x003355
})
);
stage.position.set(0,1,-150);
scene.add(stage);

/////////////////////////////////////////////////////
// JUMBOTRON
/////////////////////////////////////////////////////

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// CABINS (LEFT / RIGHT STRUCTURE)
/////////////////////////////////////////////////////

function cabin(x,z){
const g = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x333333})
);
g.position.set(x,4,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*30);
cabin(45,-20-i*30);
}

/////////////////////////////////////////////////////
// FUTURE ZONES (PLACEHOLDERS)
// (NO COMPLEXITY YET — JUST STRUCTURE)
/////////////////////////////////////////////////////

const basketballZone = new THREE.Mesh(
new THREE.PlaneGeometry(60,40),
new THREE.MeshStandardMaterial({color:0x112233})
);
basketballZone.rotation.x = -Math.PI/2;
basketballZone.position.set(-80,0,-120);
scene.add(basketballZone);

const golfZone = new THREE.Mesh(
new THREE.PlaneGeometry(80,60),
new THREE.MeshStandardMaterial({color:0x113322})
);
golfZone.rotation.x = -Math.PI/2;
golfZone.position.set(80,0,-160);
scene.add(golfZone);

const raceTrack = new THREE.Mesh(
new THREE.TorusGeometry(60,5,16,100),
new THREE.MeshStandardMaterial({color:0x222222})
);
raceTrack.rotation.x = Math.PI/2;
raceTrack.position.set(0,2,-250);
scene.add(raceTrack);

/////////////////////////////////////////////////////
// AAA MOVEMENT SYSTEM V1 (REPLACE MOVE FUNCTION)
/////////////////////////////////////////////////////

const velocity = new THREE.Vector3(0,0,0);

// tuning (feel control here)
const acceleration = 0.02;
const friction = 0.90;
const maxSpeed = 0.6;

function move(){

// input direction
let inputX = 0;
let inputZ = 0;

if(keys.w) inputZ -= 1;
if(keys.s) inputZ += 1;
if(keys.a) inputX -= 1;
if(keys.d) inputX += 1;

// normalize diagonal movement
const len = Math.sqrt(inputX*inputX + inputZ*inputZ);
if(len > 0){
inputX /= len;
inputZ /= len;
}

// apply acceleration
velocity.x += inputX * acceleration;
velocity.z += inputZ * acceleration;

// apply friction (natural slowing)
velocity.x *= friction;
velocity.z *= friction;

// clamp speed
velocity.x = Math.max(-maxSpeed, Math.min(maxSpeed, velocity.x));
velocity.z = Math.max(-maxSpeed, Math.min(maxSpeed, velocity.z));

// apply movement
player.position.x += velocity.x;
player.position.z += velocity.z;
}

/////////////////////////////////////////////////////
// AAA CAMERA SYSTEM V1 (REPLACE OLD CAMERA BLOCK)
/////////////////////////////////////////////////////

const cameraOffset = new THREE.Vector3(0, 12, 35);
const cameraLerp = 0.08;

function updateCamera(){

// desired cinematic position behind player
const desiredPosition = new THREE.Vector3(
player.position.x + cameraOffset.x,
player.position.y + cameraOffset.y,
player.position.z + cameraOffset.z
);

// smooth follow (AAA feel)
camera.position.lerp(desiredPosition, cameraLerp);

// cinematic look slightly above player center
const lookTarget = new THREE.Vector3(
player.position.x,
player.position.y + 2,
player.position.z
);

camera.lookAt(lookTarget);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
