<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V8 — LUXURY WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY V8 LOADED</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (LUXURY STACK)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 1.0));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(80, 120, 40);
scene.add(sun);

const glow = new THREE.PointLight(0x4da3ff, 1.5, 1200);
glow.position.set(0, 80, 0);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER + CAMERA
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-30);
scene.add(player);

// IMPORTANT FIX: proper starting camera position
camera.position.set(0, 8, 12);
camera.lookAt(player.position);

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move(){
  if(keys["w"]) player.position.z -= 0.3;
  if(keys["s"]) player.position.z += 0.3;
  if(keys["a"]) player.position.x -= 0.3;
  if(keys["d"]) player.position.x += 0.3;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x) * 0.08;
  camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.08;
  camera.position.z += ((player.position.z + 14) - camera.position.z) * 0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (STABLE LUXURY WATER)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2500, 2500, 80, 80);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x061a2b,
  metalness: 0.4,
  roughness: 0.55,
  emissive: 0x001122,
  emissiveIntensity: 0.25
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🌴 DOCK + WALKWAYS (LUXURY STRUCTURE)
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(220,220,2,64),
  new THREE.MeshStandardMaterial({ color:0x111111, roughness:0.7 })
);
dock.position.set(0,0,-90);
scene.add(dock);

const walkway = new THREE.Mesh(
  new THREE.BoxGeometry(8,1,220),
  new THREE.MeshStandardMaterial({ color:0x0a0a0a })
);
walkway.position.set(0,0.5,-80);
scene.add(walkway);

/////////////////////////////////////////////////////
// 🏡 LUXURY VILLAS (IDENTITY SYSTEM)
/////////////////////////////////////////////////////

function createVilla(x,z){
  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(14,1,14),
    new THREE.MeshStandardMaterial({ color:0x111111 })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({ color:0x151515 })
  );
  body.position.y = 4;
  g.add(body);

  const glow = new THREE.PointLight(0x66ccff, 1.2, 40);
  glow.position.set(0,5,0);
  g.add(glow);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<6;i++){
  createVilla(-30,-30-i*25);
  createVilla(30,-30-i*25);
}

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(18,4,50),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);
yacht.position.set(40,2,-90);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🎤 LUXURY STAGE (JUMBO TRON STYLE)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.BoxGeometry(30,8,10),
  new THREE.MeshStandardMaterial({ color:0x0a0a0a, emissive:0x002244 })
);
stage.position.set(0,4,40);
scene.add(stage);

const screen = new THREE.Mesh(
  new THREE.BoxGeometry(25,12,1),
  new THREE.MeshStandardMaterial({ color:0x111111, emissive:0x0044ff })
);
screen.position.set(0,10,35);
scene.add(screen);

/////////////////////////////////////////////////////
// 🌟 HERO NPC
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0x00ffff, emissive:0x00ffff })
);
hero.position.set(10,1,-15);
scene.add(hero);

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();

  const time = Date.now() * 0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.02 + time)*0.4 +
      Math.cos(v.z*0.02 + time*1.3)*0.4;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
