<script>

/////////////////////////////////////////////////////
// CORE WORLD (UNCHANGED BASE)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 0.9));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(80,120,50);
scene.add(sun);

const glow = new THREE.PointLight(0x4da3ff, 1.5, 2000);
glow.position.set(0,80,0);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER (BASE CHARACTER)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-30);
scene.add(player);

const keys = {};
document.addEventListener("keydown", e=> keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);

/////////////////////////////////////////////////////
// GAME MODES (THIS IS THE UPGRADE)
/////////////////////////////////////////////////////

let mode = "walk"; 
// walk | car | jet | skate

function setMode(m){
  mode = m;
  document.getElementById("zone").innerText = "MODE: " + m.toUpperCase();
}

/////////////////////////////////////////////////////
// MOVEMENT SYSTEM (MODE BASED)
/////////////////////////////////////////////////////

function move(){

  let speed = 0.25;

  if(mode === "car") speed = 0.6;
  if(mode === "jet") speed = 0.7;
  if(mode === "skate") speed = 0.45;

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x) * 0.08;
  camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.08;
  camera.position.z += ((player.position.z + 14) - camera.position.z) * 0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// OCEAN (JET SKI ENABLED AREA)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,100,100);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021428,
  metalness:0.4,
  roughness:0.5,
  emissive:0x001122,
  emissiveIntensity:0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// VILLAS + ZONES (GAME TRIGGERS)
/////////////////////////////////////////////////////

function zone(x,z,size,action,label){
  const g = new THREE.Mesh(
    new THREE.BoxGeometry(size,1,size),
    new THREE.MeshBasicMaterial({ visible:false })
  );

  g.position.set(x,0,z);
  g.userData = { action, label };
  scene.add(g);
  return g;
}

const zones = [];

zones.push(zone(40, -80, 30, ()=>setMode("car"), "CAR ZONE"));
zones.push(zone(0, -120, 40, ()=>setMode("jet"), "JET SKI ZONE"));
zones.push(zone(-40, -80, 30, ()=>setMode("skate"), "SKATE ZONE"));
zones.push(zone(10, -20, 20, ()=>setMode("walk"), "CITY HUB"));

/////////////////////////////////////////////////////
// VEHICLES (SIMPLE VISUAL OBJECTS)
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
  new THREE.BoxGeometry(3,1.2,5),
  new THREE.MeshStandardMaterial({ color:0xff0000 })
);
car.position.set(45,0.6,-80);
scene.add(car);

const jet = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({ color:0x00ffff })
);
jet.position.set(0,0.5,-120);
scene.add(jet);

/////////////////////////////////////////////////////
// INTERACTION / ZONES CHECK
/////////////////////////////////////////////////////

function checkZones(){

  for(const z of zones){
    const d = player.position.distanceTo(z.position);

    if(d < 6){
      document.getElementById("hint").style.display = "block";
      document.getElementById("hint").innerText =
        "ENTER " + z.userData.label + " (AUTO)";

      z.userData.action();
      return;
    }
  }

  document.getElementById("hint").style.display = "none";
}

/////////////////////////////////////////////////////
// OCEAN WAVES
/////////////////////////////////////////////////////

function updateWater(){
  const time = Date.now()*0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.02 + time)*0.4 +
      Math.cos(v.z*0.02 + time*1.3)*0.4;

    waterPos.setY(i,wave);
  }

  waterPos.needsUpdate = true;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  checkZones();
  updateWater();

  renderer.render(scene,camera);
}

animate();

</script>
