<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING WORLD ENGINE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* 🌌 SKY */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    animation: skyMove 10s infinite alternate;
    z-index: 0;
}

@keyframes skyMove {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.15) hue-rotate(10deg); }
    100% { filter: brightness(0.9); }
}

/* 🌫 FOG */
#fog {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.85));
    z-index: 1;
    pointer-events: none;
}

/* 🚗 CARS (FORCED VISIBILITY) */
.car {
    position: fixed;
    width: 70px;
    height: 30px;
    background: red;
    top: 65%;
    left: -100px;
    z-index: 5;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

/* 🚶 NPC */
.npc {
    position: fixed;
    width: 14px;
    height: 28px;
    background: white;
    opacity: 0.8;
    z-index: 5;
}

/* 🌍 UI */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
    z-index: 10;
}

/* 🌆 ZONES */
.zone {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 6;
}

#city { background: radial-gradient(circle, #2a1a0a, #000); }
#yacht { background: radial-gradient(circle, #0a0f1a, #000); }
#store { background: radial-gradient(circle, #1a0a0a, #000); }

/* 🎮 UI */
.title {
    font-size: 40px;
    letter-spacing: 6px;
    margin-bottom: 10px;
}

button {
    margin: 8px;
    padding: 10px 16px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* 📺 STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* FORCE RENDER LAYER */
#worldFix {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 2;
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="fog"></div>
<div id="hud">LAMBO CITY // ACTIVE WORLD SIMULATION</div>

<div id="worldFix"></div>

<!-- CITY -->
<div id="city" class="zone">
    <div class="title">LAMBO CITY</div>
    <button onclick="enter('yacht')">YACHT CLUB</button>
    <button onclick="enter('store')">STORE</button>
</div>

<!-- YACHT -->
<div id="yacht" class="zone">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="exit()">BACK TO CITY</button>
</div>

<!-- STORE -->
<div id="store" class="zone">
    <div class="title">STORE</div>
    <button>HERO DROP</button>
    <button onclick="exit()">BACK TO CITY</button>
</div>

<script>

const city = document.getElementById("city");
const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

/* START */
window.onload = () => {
    city.style.display = "flex";
    startWorld();
};

/* NAV */
function enter(type) {
    city.style.display = "none";

    if (type === "yacht") yacht.style.display = "flex";
    if (type === "store") store.style.display = "flex";
}

function exit() {
    yacht.style.display = "none";
    store.style.display = "none";
    city.style.display = "flex";
}

/* 🚗 CAR SYSTEM (FIXED VISIBILITY + MOTION) */
function spawnCar() {

    const car = document.createElement("div");
    car.className = "car";
    document.body.appendChild(car);

    let x = -120;
    let speed = 4 + Math.random() * 3;

    function move() {
        x += speed;
        car.style.left = x + "px";

        if (x < window.innerWidth + 120) {
            requestAnimationFrame(move);
        } else {
            car.remove();
        }
    }

    move();
}

/* 🚶 NPC SYSTEM (VISIBLE ON SCREEN ALWAYS) */
function spawnNPC() {

    const npc = document.createElement("div");
    npc.className = "npc";

    npc.style.left = Math.random() * window.innerWidth + "px";
    npc.style.top = (55 + Math.random() * 20) + "%";

    document.body.appendChild(npc);

    setTimeout(() => npc.remove(), 5000);
}

/* 🌍 WORLD LOOP (CONFIRMED RUNNING) */
function startWorld() {
    setInterval(() => {
        spawnCar();
    }, 900);

    setInterval(() => {
        spawnNPC();
    }, 700);
}

</script>

</body>
</html>
