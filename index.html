<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FIXED START</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#intro img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.9;
}

#enter{
position:relative;
z-index:2;
padding:18px 40px;
font-size:20px;
background:rgba(0,0,0,0.6);
border:2px solid #00aaff;
color:white;
cursor:pointer;
letter-spacing:3px;
}
</style>
</head>

<body>

<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — FIXED START SYSTEM</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// STATE SYSTEM (FIX = KEY PART)
/////////////////////////////////////////////////////

let started = false;

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814, 0.0018);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x4d6f8f,0.25);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff,2.8);
sun.position.set(250,320,120);
scene.add(sun);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let vel = new THREE.Vector3();
const speed = 0.12;
const friction = 0.85;

function move(){

let x=0,z=0;

if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.sqrt(x*x+z*z);
if(len>0){x/=len;z/=len;}

vel.x += x*speed;
vel.z += z*speed;

vel.x *= friction;
vel.z *= friction;

player.position.x += vel.x;
player.position.z += vel.z;
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function cam(){

let target = new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camera.position.lerp(target,0.06);
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(6000,6000),
new THREE.MeshStandardMaterial({
color:0x0a2f44,
metalness:0.7,
roughness:0.25
})
);
water.rotation.x=-Math.PI/2;
water.position.z=-200;
scene.add(water);

const beach = new THREE.Mesh(
new THREE.PlaneGeometry(1800,900),
new THREE.MeshStandardMaterial({color:0xcbb27a})
);
beach.rotation.x=-Math.PI/2;
beach.position.set(0,-0.2,180);
scene.add(beach);

const dock = new THREE.Mesh(
new THREE.BoxGeometry(30,1,200),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-160);
scene.add(stage);

/////////////////////////////////////////////////////
// MOVE WORLD (SAFE)
/////////////////////////////////////////////////////

let t=0;

function time(){
t += 0.0012;

ambient.intensity = 0.25 + Math.sin(t)*0.4;

sun.position.x = Math.sin(t*1.5)*300;
sun.position.y = Math.abs(Math.cos(t*1.2))*320;
}

function ocean(){
water.position.x = Math.sin(t*1.3)*2;
water.position.z = -200 + Math.cos(t*1.1)*2;
}

/////////////////////////////////////////////////////
// MAIN LOOP (ONLY RUNS AFTER ENTER)
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

// 🔥 KEY FIX: nothing runs until ENTER is clicked
if(!started) return;

move();
cam();
time();
ocean();

renderer.render(scene,camera);
}

animate();

/////////////////////////////////////////////////////
// ENTER BUTTON FIX
/////////////////////////////////////////////////////

document.getElementById("enter").onclick = () => {

document.getElementById("intro").style.display = "none";

// 🔥 START WORLD PROPERLY
started = true;

};

</script>

</body>
</html>
