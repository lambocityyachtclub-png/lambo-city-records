<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V29 — GAMEPLAY SYSTEM</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V29 — GAMEPLAY SYSTEM</div>
<div id="zone">ZONE: LOADING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// GAME STATE ENGINE
/////////////////////////////////////////////////////

const GAME = {
mode: "walk",
speed: 0.35
};

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2e);
scene.fog = new THREE.Fog(0x0a1220, 80, 700);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 10000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.9));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,400,150);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT SYSTEM
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;

// ENTER/EXIT CAR
if(e.key.toLowerCase()==="e"){

const d = player.position.distanceTo(car.position);

if(GAME.mode==="walk" && d < 5){
GAME.mode = "drive";
player.visible = false;
}

else if(GAME.mode==="drive"){
GAME.mode = "walk";
player.visible = true;
player.position.set(car.position.x+2,0,car.position.z);
}
}
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

/////////////////////////////////////////////////////
// PLAYER (GROUND LOCKED)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// CAR
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({
color:0xffcc00,
emissive:0x553300,
emissiveIntensity:0.5
})
);
car.position.set(0,0.5,60);
scene.add(car);

/////////////////////////////////////////////////////
// WORLD (YOUR STRUCTURE PRESERVED)
/////////////////////////////////////////////////////

function cabin(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y = 5;

g.add(base);
g.add(house);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x061a2b})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

/////////////////////////////////////////////////////
// CAMERA SYSTEM (FIXED GAME FEEL)
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

function updateCamera(){

let target = (GAME.mode==="walk") ? player.position : car.position;

camera.position.x += (target.x - camera.position.x)*0.06;
camera.position.y += ((target.y + 12) - camera.position.y)*0.06;
camera.position.z += ((target.z + 25) - camera.position.z)*0.06;

camera.lookAt(target);
}

/////////////////////////////////////////////////////
// MOVEMENT SYSTEM
/////////////////////////////////////////////////////

function move(){

if(GAME.mode==="walk"){
if(keys.w) player.position.z -= GAME.speed;
if(keys.s) player.position.z += GAME.speed;
if(keys.a) player.position.x -= GAME.speed;
if(keys.d) player.position.x += GAME.speed;
}

if(GAME.mode==="drive"){
if(keys.w) car.position.z -= GAME.speed;
if(keys.s) car.position.z += GAME.speed;
if(keys.a) car.rotation.y += 0.03;
if(keys.d) car.rotation.y -= 0.03;
}
}

/////////////////////////////////////////////////////
// ZONE SYSTEM
/////////////////////////////////////////////////////

function updateZone(){
let z="DOCK";
if(player.position.z < -120) z="STAGE";
if(player.position.x > 40) z="RIGHT CABINS";
if(player.position.x < -40) z="LEFT CABINS";

document.getElementById("zone").innerText = "ZONE: " + z;
}

/////////////////////////////////////////////////////
// LOOP (GAME ENGINE STRUCTURE)
/////////////////////////////////////////////////////

function update(){
move();
updateCamera();
updateZone();
}

function render(){
renderer.render(scene,camera);
}

function loop(){
requestAnimationFrame(loop);
update();
render();
}

loop();

</script>

</body>
</html>
