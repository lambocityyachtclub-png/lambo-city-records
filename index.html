<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V37 — CINEMATIC UPGRADE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}

/* INTRO */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#intro img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.9;
}

#enter{
z-index:2;
padding:18px 36px;
font-size:20px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
letter-spacing:3px;
}
</style>
</head>

<body>

<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY V37 — CINEMATIC WORLD</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050b18, 0.0028);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"),antialias:true});
renderer.setSize(innerWidth,innerHeight);

/////////////////////////////////////////////////////
// RESIZE
/////////////////////////////////////////////////////

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x6aa6ff,0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(100,200,50);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff,2,800);
glow.position.set(0,20,-120);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER (FAST + RESPONSIVE)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let vel = new THREE.Vector3();
const speed = 0.08;   // MUCH FASTER
const friction = 0.82;

/////////////////////////////////////////////////////
// OCEAN (REAL MOVEMENT FEEL)
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({
color:0x0a1f33,
metalness:0.3,
roughness:0.7
})
);
water.rotation.x = -Math.PI/2;
water.position.z = -200;
scene.add(water);

/////////////////////////////////////////////////////
// BEACH
/////////////////////////////////////////////////////

const beach = new THREE.Mesh(
new THREE.PlaneGeometry(1500,800),
new THREE.MeshStandardMaterial({color:0xcbb27a})
);
beach.rotation.x = -Math.PI/2;
beach.position.set(0,-0.2,180);
scene.add(beach);

/////////////////////////////////////////////////////
// DOCK + STAGE
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(30,1,200),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-160);
scene.add(stage);

/////////////////////////////////////////////////////
// SKY STARS (CINEMATIC BOOST)
/////////////////////////////////////////////////////

const starsGeo = new THREE.BufferGeometry();
const starCount = 800;

let pos = [];

for(let i=0;i<starCount;i++){
pos.push(
(Math.random()-0.5)*3000,
Math.random()*1200,
(Math.random()-0.5)*3000
);
}

starsGeo.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));

const stars = new THREE.Points(
starsGeo,
new THREE.PointsMaterial({color:0xffffff,size:2})
);

scene.add(stars);

/////////////////////////////////////////////////////
// MOUNTAINS
/////////////////////////////////////////////////////

for(let i=0;i<10;i++){
const m = new THREE.Mesh(
new THREE.ConeGeometry(120,260,5),
new THREE.MeshStandardMaterial({color:0x0b0f14})
);

m.position.set(-1000+i*220,120,-900);
scene.add(m);
}

/////////////////////////////////////////////////////
// INPUT + MOVE
/////////////////////////////////////////////////////

function move(){

let x=0,z=0;

if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.sqrt(x*x+z*z);
if(len>0){x/=len;z/=len;}

vel.x += x*speed;
vel.z += z*speed;

vel.x *= friction;
vel.z *= friction;

player.position.x += vel.x;
player.position.z += vel.z;

// boundaries
player.position.x = Math.max(-400,Math.min(400,player.position.x));
player.position.z = Math.max(-500,Math.min(250,player.position.z));
}

/////////////////////////////////////////////////////
// CAMERA (CINEMATIC BUT RESPONSIVE)
/////////////////////////////////////////////////////

function cam(){

const target = new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+80
);

camera.position.lerp(target,0.06);
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// DAY / NIGHT SYSTEM
/////////////////////////////////////////////////////

let t=0;

function timeCycle(){

t += 0.001;

sun.position.x = Math.sin(t*2)*200;
sun.position.y = Math.abs(Math.cos(t*1.5))*250;

// sky mood
let night = Math.sin(t)*0.5+0.5;

ambient.intensity = 0.3 + night*0.8;
sun.intensity = 0.8 + night*1.2;

// water color shift feel
water.material.color.setRGB(
0.02 + night*0.05,
0.08 + night*0.12,
0.15 + night*0.25
);
}

/////////////////////////////////////////////////////
// WATER MOVEMENT
/////////////////////////////////////////////////////

function ocean(){

water.position.x = Math.sin(t*2)*2;
water.position.z = -200 + Math.cos(t*1.5)*2;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

move();
cam();
timeCycle();
ocean();

renderer.render(scene,camera);
}

animate();

/////////////////////////////////////////////////////
// INTRO SCREEN
/////////////////////////////////////////////////////

document.getElementById("enter").onclick=()=>{
document.getElementById("intro").style.display="none";
};

</script>

</body>
</html>
