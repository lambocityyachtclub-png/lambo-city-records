<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V14 — PLAYABLE WORLD ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">
WASD MOVE • E INTERACT • R RESET
</div>

<div id="zone">LAMBO CITY V14 LOADED</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 4000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC STACK)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 0.9));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(80, 120, 50);
scene.add(sun);

const glow = new THREE.PointLight(0x4da3ff, 1.5, 1500);
glow.position.set(0, 80, 0);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-30);
scene.add(player);

const spawnPoint = player.position.clone();

const keys = {};

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  // RESET
  if(e.key.toLowerCase() === "r"){
    player.position.copy(spawnPoint);
    document.getElementById("zone").innerText = "RESET TO SPAWN";
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

function move(){
  if(keys["w"]) player.position.z -= 0.3;
  if(keys["s"]) player.position.z += 0.3;
  if(keys["a"]) player.position.x -= 0.3;
  if(keys["d"]) player.position.x += 0.3;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x) * 0.08;
  camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.08;
  camera.position.z += ((player.position.z + 14) - camera.position.z) * 0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// WORLD (WATER + STRUCTURE BASE)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,100,100);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021428,
  metalness:0.4,
  roughness:0.5,
  emissive:0x001122,
  emissiveIntensity:0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// VILLAS (IDENTITY SYSTEM START)
/////////////////////////////////////////////////////

const interactables = [];

function createVilla(x,z,name,color){

  const v = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x111111 })
  );
  base.position.y = 0.5;
  v.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({ color:color })
  );
  body.position.y = 4;
  v.add(body);

  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x0a0a0a })
  );
  roof.position.y = 8;
  v.add(roof);

  const light = new THREE.PointLight(color, 1.2, 50);
  light.position.set(0,5,0);
  v.add(light);

  v.position.set(x,0,z);
  v.userData = { type:"villa", name:name };

  scene.add(v);
  interactables.push(v);
}

createVilla(-30,-20,"Ocean Villa",0x66ccff);
createVilla(30,-20,"Sky Villa",0x00ffaa);
createVilla(-30,-60,"Night Villa",0x8844ff);
createVilla(30,-60,"Gold Villa",0xffcc66);

/////////////////////////////////////////////////////
// YACHT + DOCK
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(20,4,60),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);
yacht.position.set(50,2,-90);
scene.add(yacht);

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(250,250,1,64),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
dock.position.set(0,0,-90);
scene.add(dock);

/////////////////////////////////////////////////////
// INTERACTION SYSTEM (CORE V14 FEATURE)
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(text){
  hint.style.display="block";
  hint.innerText=text;
}

function hide(){
  hint.style.display="none";
}

function checkInteractions(){

  let near = null;

  for(const obj of interactables){
    const d = player.position.distanceTo(obj.position);
    if(d < 4){
      near = obj;
      break;
    }
  }

  if(near){
    show("PRESS E — " + near.userData.name);
  } else {
    hide();
  }
}

document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase()==="e"){

    for(const obj of interactables){
      if(player.position.distanceTo(obj.position) < 4){
        document.getElementById("zone").innerText =
          "ENTERING " + obj.userData.name;
      }
    }
  }
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  checkInteractions();

  const time = Date.now() * 0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x * 0.02 + time) * 0.4 +
      Math.cos(v.z * 0.02 + time * 1.3) * 0.4;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
