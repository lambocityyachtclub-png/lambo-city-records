<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* BACKGROUND - Miami Yacht Penthouse */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1950&q=80') no-repeat center center/cover;
  filter: brightness(0.55);
  z-index: -3;
}

/* OVERLAY */
.overlay {
  min-height: 100vh;
  background: radial-gradient(circle at top, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
  padding: 20px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 64px;
  font-weight: bold;
  color: gold;
  letter-spacing: 3px;
}

.subtitle {
  text-align: center;
  max-width: 800px;
  margin: 10px auto 20px;
  color: #ddd;
}

/* LAYOUT */
.lounge {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  max-width: 1200px;
  margin: auto;
}

/* TV (TWITCH) */
.tv {
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 12px;
  overflow: hidden;
}

/* PANEL */
.panel {
  background: rgba(0,0,0,0.5);
  border: 1px solid gold;
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
  color: black;
}

/* YACHT WINDOW VIEW */
.window {
  margin-top: 15px;
  height: 120px;
  background: url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1950&q=80') no-repeat center center/cover;
  border-radius: 10px;
  border: 1px solid rgba(255,215,0,0.3);
  position: relative;
}

.window::after {
  content: "MIAMI YACHT VIEW";
  position: absolute;
  bottom: 5px;
  right: 10px;
  font-size: 11px;
  color: gold;
}

/* FLOATING AVATAR */
.avatar {
  width: 55px;
  height: 55px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  bottom: 80px;
  left: 40px;
  box-shadow: 0 0 20px gold;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* DOOR */
.door {
  margin-top: 15px;
  padding: 12px;
  text-align: center;
  background: rgba(255,215,0,0.2);
  border: 1px solid gold;
  cursor: pointer;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay">

<div class="title">LAMBO CITY</div>

<div class="subtitle">
Miami Penthouse Lounge • Music • Live Streams • Yacht Club • Digital Luxury World
</div>

<div class="lounge">

<!-- TWITCH TV -->
<div class="tv">
<iframe
src="https://player.twitch.tv/?channel=LamboCityRecords&parent=lambocityrecords.com"
width="100%"
height="420"
allowfullscreen>
</iframe>
</div>

<!-- CONTROL PANEL -->
<div class="panel">

<h3>LOUNGE ACCESS</h3>

<button onclick="location.href='map.html'">ENTER CITY MAP</button>

<button onclick="location.href='vip.html'">ENTER YACHT CLUB</button>

<div class="door" onclick="location.href='vip.html'">
🚪 ENTER PRIVATE DOCK
</div>

<div class="window"></div>

</div>

</div>

<!-- AVATAR -->
<div class="avatar"></div>

</div>

</body>
</html>
