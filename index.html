<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | ONLINE WORLD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* CAMERA */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.2);
    transition: 0.6s ease;
    z-index: 999;
}

/* HUD */
#hud {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 11px;
    opacity: 0.7;
    letter-spacing: 3px;
    z-index: 50;
}

/* SERVER FEED */
#feed {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-size: 10px;
    opacity: 0.6;
    max-width: 320px;
    line-height: 1.4;
}

/* WORLD */
.world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* ZONES (strong identity differences) */
#portal {
    background: radial-gradient(circle, #0a0f1f, #000);
}

#city {
    background: radial-gradient(circle at top, #2a1a0a, #000);
}

#vip {
    background: radial-gradient(circle, #11110a, #000);
}

/* TITLE */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* BUTTONS */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

/* VIP STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="camera"></div>
<div id="hud">LAMBO CITY // ONLINE METAVERSE</div>
<div id="feed">CONNECTING TO WORLD SERVER...</div>

<!-- PORTAL -->
<div id="portal" class="world">
    <div class="title">CITY GATE</div>
    <button onclick="travel('city')">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="world">
    <div class="title">LAMBO CITY</div>
    <button onclick="travel('vip')">YACHT CLUB</button>
    <button onclick="travel('portal')">EXIT WORLD</button>
</div>

<!-- VIP -->
<div id="vip" class="world">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="travel('city')">BACK TO CITY</button>
</div>

<script>

const camera = document.getElementById("camera");
const feed = document.getElementById("feed");

let currentZone = "portal";
let population = {
    portal: 3,
    city: 12,
    vip: 5
};

/* INIT WORLD */
window.onload = () => {
    show("portal");
    startMetaverse();
};

/* WORLD SWITCH */
function show(id) {
    document.querySelectorAll(".world").forEach(w => w.style.display = "none");
    document.getElementById(id).style.display = "flex";

    currentZone = id;
}

/* TRANSITION ENGINE */
function travel(destination) {

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.25)";

    setTimeout(() => {

        show(destination);

        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
        }, 250);

    }, 500);
}

/* 🧠 METAVERSE SIMULATION ENGINE */
function startMetaverse() {

    const logs = [
        "Citizen joined session",
        "User moved between districts",
        "VIP stream engagement detected",
        "Traffic increasing in City Center",
        "New visitor entered Lambo City",
        "Yacht Club access requested"
    ];

    setInterval(() => {

        // simulate population fluctuation
        population.city += Math.floor(Math.random() * 3 - 1);
        population.city = Math.max(5, population.city);

        const msg = logs[Math.floor(Math.random() * logs.length)];

        feed.innerHTML =
        "ZONE: " + currentZone.toUpperCase() +
        "<br>POPULATION: " + population[currentZone] +
        "<br>SERVER: ACTIVE<br><br>" +
        "LIVE: " + msg;

    }, 2000);
}

</script>

</body>
</html>
