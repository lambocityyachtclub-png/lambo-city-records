<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | OPEN WORLD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* ===== WORLD FADE / CAMERA LAYER ===== */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    transform: scale(1.2);
    opacity: 1;
    transition: transform 1.2s ease, opacity 1s ease;
    z-index: 999;
}

/* ===== WORLD HUD ===== */
#hud {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.6;
    z-index: 50;
}

/* ===== WORLD AREAS ===== */
.world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: transform 1s ease, opacity 1s ease;
}

/* ENVIRONMENTS */
#portal {
    background: radial-gradient(circle, #111, #000);
}

#city {
    background: radial-gradient(circle at top, #111, #000);
}

#vip {
    background: black;
}

/* ===== TITLE ===== */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

/* ===== OPEN WORLD BUTTONS (HUD STYLE) ===== */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.3s;
    font-size: 12px;
}

button:hover {
    background: white;
    color: black;
}

/* ===== VIP STREAM ===== */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* ===== WORLD TRANSITION STATE ===== */
.entering {
    transform: scale(1.05);
    opacity: 0;
}

.active {
    transform: scale(1);
    opacity: 1;
}
</style>
</head>

<body>

<!-- CAMERA EFFECT LAYER -->
<div id="camera"></div>

<!-- HUD -->
<div id="hud">LAMBO CITY // OPEN WORLD ENGINE</div>

<!-- PORTAL -->
<div id="portal" class="world">
    <div class="title">CITY GATE</div>
    <button onclick="travel('city')">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="world">
    <div class="title">LAMBO CITY</div>

    <button onclick="travel('vip')">YACHT CLUB</button>
    <button onclick="travel('portal')">EXIT WORLD</button>
</div>

<!-- VIP -->
<div id="vip" class="world">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="travel('city')">BACK TO CITY</button>
</div>

<script>

const camera = document.getElementById("camera");

/* START WORLD (CINEMATIC DROP-IN) */
window.onload = () => {
    setTimeout(() => {
        camera.style.transform = "scale(1)";
        camera.style.opacity = "0";

        setTimeout(() => {
            show("portal");
        }, 900);

    }, 600);
};

/* WORLD SYSTEM */
function show(id) {
    document.querySelectorAll(".world").forEach(w => {
        w.style.display = "none";
        w.classList.remove("active");
    });

    const el = document.getElementById(id);
    el.style.display = "flex";

    setTimeout(() => {
        el.classList.add("active");
    }, 50);
}

/* OPEN WORLD TRANSITION ENGINE */
function travel(destination) {

    // cinematic zoom-out (camera pulls back)
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.2)";

    setTimeout(() => {

        show(destination);

        // cinematic zoom-in (camera returns)
        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
        }, 300);

    }, 700);
}

</script>

</body>
</html>
