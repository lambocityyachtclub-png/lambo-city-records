<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMBO CITY RECORDS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* MAIN SITE /
#main {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  text-align: center;
}

#main h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

/ ENTER BUTTON /
#enterBtn {
  margin-top: 20px;
  padding: 15px 30px;
  background: gold;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

/ WORLD OVERLAY /
#world {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  overflow: hidden;
}

/ ACTIVITY /
#activity {
  position: absolute;
  top: 20px;
  left: 20px;
  opacity: 0.8;
}

/ EXIT /
#exitBtn {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 10;
}

/ TWITCH /
#twitch {
  position: absolute;
  top: 20%;
  left: 25%;
  width: 50%;
  height: 50%;
  border: 2px solid gold;
}

/ AUDIO TOGGLE */
#audioBtn {
  position: absolute;
  bottom: 20px;
  left: 20px;
}
</style>

</head>

<body>

<!-- MAIN SITE -->
<div id="main">
  <h1>LAMBO CITY RECORDS</h1>
  <button id="enterBtn" onclick="openWorld()">ENTER LAMBO CITY</button>
</div>

<!-- WORLD -->
<div id="world">

  <button id="exitBtn" onclick="closeWorld()">EXIT</button>

  <div id="activity">Initializing...</div>

  <iframe id="twitch"
    src="https://player.twitch.tv/?channel=twitch&parent=lambocityrecords.com"
    frameborder="0"
    allowfullscreen="true">
  </iframe>

  <audio id="radio" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <button id="audioBtn" onclick="toggleAudio()">TOGGLE RADIO</button>

</div>

<script>
function openWorld() {
  document.getElementById("world").style.display = "block";
  startActivity();
}

function closeWorld() {
  document.getElementById("world").style.display = "none";
}

function toggleAudio() {
  const audio = document.getElementById("radio");
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

function startActivity() {
  const messages = [
    "DJ HERO live now",
    "Yacht access granted",
    "Members entering lounge",
    "Live stream active",
    "Radio synced",
    "Dock traffic increasing"
  ];

  let i = 0;

  setInterval(() => {
    document.getElementById("activity").innerText = messages[i % messages.length];
    i++;
  }, 2000);
}
</script>

</body>
</html>
