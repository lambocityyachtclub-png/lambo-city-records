<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
}

#prompt {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  display:none;
  color:white;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY YACHT CLUB</h1>
<button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">ENTER → MOVE → EXPLORE</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// SCENE
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// CABIN FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DOOR
let door = new THREE.Mesh(
  new THREE.BoxGeometry(2,3,0.2),
  new THREE.MeshStandardMaterial({color:0x444444})
);
door.position.set(0,1.5,-8);
scene.add(door);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(200,1,200),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-50);
dock.visible=false;
scene.add(dock);

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
water.visible=false;
scene.add(water);

// ⭐ STARS
const starGeo = new THREE.BufferGeometry();
const starArr=[];
for(let i=0;i<4000;i++){
  starArr.push(
    (Math.random()-0.5)*800,
    Math.random()*300,
    -50+(Math.random()-0.5)*800
  );
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));

let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1.2})
);
stars.visible=false;
scene.add(stars);

// 🚤 YACHT (MAIN PIECE)
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(40,8,18),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,4,-70);
yacht.visible=false;
scene.add(yacht);

// YACHT LIGHTS
let yachtLights=[];
for(let i=0;i<8;i++){
  let l=new THREE.PointLight(0x00ffff,3,120);
  l.position.set((i-4)*8,6,-70);
  l.visible=false;
  scene.add(l);
  yachtLights.push(l);
}

// CROWD
let crowd=[];
for(let i=0;i<30;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );

  p.position.set(
    (Math.random()-0.5)*40,
    0.6,
    -50+(Math.random()-0.5)*40
  );

  p.userData={
    dir:Math.random()*Math.PI*2,
    speed:0.02+Math.random()*0.03
  };

  p.visible=false;
  scene.add(p);
  crowd.push(p);
}

// LIGHT FX
let lights=[];
for(let i=0;i<10;i++){
  let l=new THREE.PointLight(0x00aaff,3,100);
  l.position.set((i-5)*8,5,-50);
  l.visible=false;
  scene.add(l);
  lights.push(l);
}

// INPUT
let keys={},inDock=false;

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==="e") interact();
});
document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()]=false;
});

function enterWorld(){
  document.getElementById("start").style.display="none";
}

// INTERACT
function interact(){

if(!inDock && player.position.distanceTo(door.position)<3){

  inDock=true;

  floor.visible=false;
  door.visible=false;

  dock.visible=true;
  water.visible=true;
  stars.visible=true;
  yacht.visible=true;

  crowd.forEach(p=>p.visible=true);
  lights.forEach(l=>l.visible=true);
  yachtLights.forEach(l=>l.visible=true);

  player.position.set(0,1,-40);

  document.getElementById("ui").innerText="YACHT CLUB — LIVE";

}

}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z-=0.15;
if(keys["s"]) player.position.z+=0.15;
if(keys["a"]) player.position.x-=0.15;
if(keys["d"]) player.position.x+=0.15;

// CAMERA
camera.position.x+=(player.position.x-camera.position.x)*0.08;
camera.position.z+=(player.position.z+8-camera.position.z)*0.08;
camera.lookAt(player.position);

// LIFE
if(inDock){

  water.position.z=Math.sin(Date.now()*0.001)*1;

  stars.rotation.y+=0.001;

  yacht.rotation.y+=0.0008;

  crowd.forEach(p=>{
    p.position.x+=Math.cos(p.userData.dir)*p.userData.speed;
    p.position.z+=Math.sin(p.userData.dir)*p.userData.speed;

    if(Math.random()<0.02){
      p.userData.dir+=(Math.random()-0.5);
    }
  });

  lights.forEach((l,i)=>{
    l.intensity=3+Math.sin(Date.now()*0.003+i)*3;
  });

  yachtLights.forEach((l,i)=>{
    l.intensity=2+Math.sin(Date.now()*0.002+i)*2;
  });

}

// PROMPT
document.getElementById("prompt").style.display =
player.position.distanceTo(door.position)<3 && !inDock
? "block":"none";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
