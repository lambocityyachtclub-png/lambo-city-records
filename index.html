<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FULL WORLD RESTORE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#zone {
  position:absolute;
  top:20px;
  right:20px;
  color:gold;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">MOVE → EXPLORE → PROGRESS</div>
<div id="zone">ZONE: CABIN</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c")});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff,1.3));

let light = new THREE.PointLight(0x00aaff,2);
light.position.set(0,5,0);
scene.add(light);

// PLAYER (START INSIDE CABIN)
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,2);
scene.add(player);

// ================= CABIN =================
let cabin = new THREE.Mesh(
  new THREE.BoxGeometry(18,10,18),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.set(0,5,0);
scene.add(cabin);

// WINDOW VIEW (YACHT FAR)
let yachtFar = new THREE.Mesh(
  new THREE.BoxGeometry(12,4,10),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yachtFar.position.set(0,3,-120);
scene.add(yachtFar);

// ================= BRIDGE =================
let bridge = new THREE.Mesh(
  new THREE.BoxGeometry(6,1,40),
  new THREE.MeshStandardMaterial({color:0x222222})
);
bridge.position.set(0,0,-30);
scene.add(bridge);

// ================= WATER (RESTORED) =================
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.MeshStandardMaterial({color:0x02121f})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// ================= STARS (RESTORED) =================
const starGeo = new THREE.BufferGeometry();
const starArr = [];

for(let i=0;i<3000;i++){
  starArr.push(
    (Math.random()-0.5)*800,
    Math.random()*300,
    -100 + (Math.random()-0.5)*800
  );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));

let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1})
);

scene.add(stars);

// ================= DOCK =================
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,120),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-90);
scene.add(dock);

// ================= REAL ESTATE =================
for(let i=0;i<5;i++){
  let left = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  left.position.set(-12,2,-40-(i*15));
  scene.add(left);

  let right = left.clone();
  right.position.x = 12;
  scene.add(right);
}

// ================= STAGE (LEFT SIDE) =================
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(18,2,12),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-20,1,-130);
scene.add(stage);

// ================= YACHT =================
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(35,10,18),
  new THREE.MeshStandardMaterial({color:0x222255})
);
yacht.position.set(0,5,-170);
scene.add(yacht);

// ================= CROWD =================
let crowd = [];
for(let i=0;i<25;i++){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  c.position.set((Math.random()-0.5)*50,0.6,-80-(Math.random()*70));
  scene.add(c);
  crowd.push(c);
}

// INPUT
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

function start(){
  document.getElementById("start").style.display="none";
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z -= 0.2;
if(keys["s"]) player.position.z += 0.2;
if(keys["a"]) player.position.x -= 0.2;
if(keys["d"]) player.position.x += 0.2;

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.z += (player.position.z + 8 - camera.position.z)*0.08;
camera.lookAt(player.position);

// LIFE
water.position.z = Math.sin(Date.now()*0.001)*1;
stars.rotation.y += 0.0005;

// CROWD
crowd.forEach(c=>{
  c.position.x += Math.sin(Date.now()*0.001 + c.position.z)*0.01;
});

// ZONES
let z = player.position.z;

if(z > -10) document.getElementById("zone").innerText="ZONE: CABIN";
else if(z > -60) document.getElementById("zone").innerText="ZONE: DOCK";
else if(z > -120) document.getElementById("zone").innerText="ZONE: STAGE";
else document.getElementById("zone").innerText="ZONE: YACHT";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
