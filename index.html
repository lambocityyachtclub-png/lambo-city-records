<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | SIMULATION ENGINE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* CAMERA LAYER */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    transform: scale(1.15);
    opacity: 1;
    transition: transform 0.9s ease, opacity 0.8s ease;
    z-index: 999;
}

/* HUD */
#hud {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 11px;
    opacity: 0.6;
    letter-spacing: 3px;
    z-index: 50;
}

/* WORLD */
.world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* ENVIRONMENTS */
#portal {
    background: radial-gradient(circle, #111, #000);
}

#city {
    background: radial-gradient(circle at top, #111, #000);
}

#vip {
    background: black;
}

/* TITLE */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* BUTTONS (SIMULATION STYLE) */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

button:hover {
    background: white;
    color: black;
}

/* VIP STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* CLICK FEEDBACK PULSE */
.pulse {
    animation: pulse 0.4s ease;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="camera"></div>
<div id="hud">LAMBO CITY // SIMULATION ACTIVE</div>

<!-- PORTAL -->
<div id="portal" class="world">
    <div class="title">CITY GATE</div>
    <button onclick="travel('city', this)">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="world">
    <div class="title">LAMBO CITY</div>
    <button onclick="travel('vip', this)">YACHT CLUB</button>
    <button onclick="travel('portal', this)">EXIT WORLD</button>
</div>

<!-- VIP -->
<div id="vip" class="world">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="travel('city', this)">BACK TO CITY</button>
</div>

<script>

const camera = document.getElementById("camera");

/* INIT WORLD */
window.onload = () => {
    setTimeout(() => {
        camera.style.transform = "scale(1)";
        camera.style.opacity = "0";
        show("portal");
    }, 600);
};

/* SHOW WORLD (SAFE SWITCH) */
function show(id) {
    document.querySelectorAll(".world").forEach(w => {
        w.style.display = "none";
    });

    const el = document.getElementById(id);
    el.style.display = "flex";
}

/* MAIN SIMULATION ENGINE */
function travel(destination, btn) {

    // instant feedback (fixes “button not working feeling”)
    if (btn) {
        btn.classList.add("pulse");
        setTimeout(() => btn.classList.remove("pulse"), 400);
    }

    // camera pull-back (enter transition)
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.15)";

    setTimeout(() => {

        show(destination);

        // camera settle-in (enter world)
        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
        }, 250);

    }, 650);
}

</script>

</body>
</html>
