<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — WORLD V1</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0;
  background:black; color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute; top:20px; left:20px;
  color:white; font-size:13px;
}

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}

#status {
  position:absolute; top:20px; right:20px;
  color:gold;
}

#vip {
  position:absolute; bottom:90px; left:50%;
  transform:translateX(-50%);
  color:#00ffff;
  border:1px solid #00ffff;
  padding:8px 12px;
  display:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏠 Cabin → 🌉 Dock → 🎤 Stage → 💼 VIP → 🚤 Yacht</div>
<div id="msg">I brought you here.</div>
<div id="status">STATUS: VISITOR</div>
<div id="vip">VIP ACCESS MOMENT</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= SCENE =================
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));
let light = new THREE.PointLight(0x00aaff,2);
light.position.set(0,5,5);
scene.add(light);

// ================= HERO / PLAYER =================
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);

// HERO IDENTITY (simple rule system)
let isHero = false;
let hasVIP = false;
let hasPerformer = false;

// URL CHECK (identity switch)
if(window.location.search.includes("hero=true")){
  isHero = true;
}

// ================= VOICE SYSTEM =================
function speak(text){
  document.getElementById("msg").innerText = text;
}

// ================= START =================
function start(){
  document.getElementById("start").style.display="none";

  if(isHero){
    player.position.set(-35,0.5,20);
    document.getElementById("status").innerText="STATUS: HERO (OWNER)";
    speak("Welcome back.");
  } else {
    player.position.set(-35,0.5,20);
    document.getElementById("status").innerText="STATUS: VISITOR";
    speak("I brought you here.");
  }
}

// ================= WORLD =================

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(800,800),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<4000;i++){
  arr.push((Math.random()-0.5)*800,Math.random()*300,(Math.random()-0.5)*800);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));
let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// ================= DOCK =================
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(240,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// ================= 10 CABINS (REAL ESTATE) =================
function cabin(x,z){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  c.position.set(x,2.5,z);
  scene.add(c);
}

for(let i=0;i<5;i++){
  cabin(-35,-20-(i*30));
  cabin(35,-20-(i*30));
}

// ================= STAGE =================
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(22,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// ================= VIP ZONE (BEHIND STAGE) =================
let vipZone = new THREE.Mesh(
  new THREE.BoxGeometry(22,1,20),
  new THREE.MeshStandardMaterial({color:0x001f2f})
);
vipZone.position.set(-30,0,-120);
scene.add(vipZone);

// ================= YACHT =================
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(50,6,22),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-350);
scene.add(yacht);

// ================= CROWD =================
let crowd=[];
for(let i=0;i<25;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*40,0.6,-80+(Math.random()-0.5)*60);
  scene.add(p);
  crowd.push(p);
}

// ================= INPUT =================
let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= GAME LOOP =================
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z-=0.15;
if(keys["s"]) player.position.z+=0.15;
if(keys["a"]) player.position.x-=0.15;
if(keys["d"]) player.position.x+=0.15;

// ================= PROGRESSION FLOW =================

// CABIN EXIT
if(player.position.z < 10){
  speak("This is a cool city… you’ll see.");
}

// STAGE EVENT
if(player.position.distanceTo(stage.position)<6 && !hasPerformer){
  hasPerformer = true;
  document.getElementById("vip").style.display="block";
  speak("You want some VIP tickets?");
}

// VIP ZONE
if(player.position.distanceTo(vipZone.position)<8 && hasPerformer){
  hasVIP = true;
  document.getElementById("status").innerText="STATUS: VIP MEMBER";
  speak("This is where connections happen.");
}

// YACHT LOCK
if(player.position.z < -320){
  player.position.z = -320;
  speak("You’re not there yet.");
}

// ================= LIFE =================
stars.rotation.y += 0.0005;
water.position.z = Math.sin(Date.now()*0.001)*1;

// CAMERA
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (4-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.05;
camera.lookAt(player.position);

// UI CLEANUP
document.getElementById("vip").style.display =
(hasPerformer && !hasVIP) ? "block" : "none";

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
