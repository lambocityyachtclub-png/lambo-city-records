<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | WORLD ENGINE v30</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* =========================
   🎮 LOBBY (ENTRY)
========================= */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #050510);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 5000;
    transition: opacity 1s ease;
}

/* =========================
   🎥 CAMERA FX LAYER
========================= */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    transition: 0.5s ease;
    z-index: 999;
}

/* =========================
   🌆 CITY HUB
========================= */
#city {
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: radial-gradient(circle at top, #3a1f0a, #000);
}

/* =========================
   🏠 INTERIORS
========================= */
.interior {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Yacht */
#yacht {
    background: radial-gradient(circle, #0a0f1a, #000);
}

/* Store */
#store {
    background: radial-gradient(circle, #1a0a0a, #000);
}

/* =========================
   🎯 UI
========================= */
.title {
    font-size: 42px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🎥 STREAM
========================= */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* =========================
   🔊 AUDIO (hidden)
========================= */
audio { display: none; }

/* =========================
   🌐 WORLD CHAT (ambient feel)
========================= */
#chat {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 240px;
    height: 150px;
    font-size: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px;
    overflow: hidden;
}
</style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
    <div>CONNECTING TO LAMBO CITY ONLINE SESSION...</div>
    <button onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="camera"></div>
<div id="chat"></div>

<!-- 🌆 CITY -->
<div id="city">
    <div class="title">LAMBO CITY</div>

    <button onclick="enter('yacht')">YACHT CLUB</button>
    <button onclick="enter('store')">STORE</button>
</div>

<!-- 🚤 YACHT -->
<div id="yacht" class="interior">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- 🛍 STORE -->
<div id="store" class="interior">
    <div class="title">STORE</div>

    <button>HERO DROP</button>
    <button>CLASSIC LINE</button>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- 🔊 AUDIO -->
<audio id="cityAudio" loop>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<audio id="insideAudio" loop>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3">
</audio>

<script>

const lobby = document.getElementById("lobby");
const camera = document.getElementById("camera");
const city = document.getElementById("city");
const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

const cityAudio = document.getElementById("cityAudio");
const insideAudio = document.getElementById("insideAudio");
const chat = document.getElementById("chat");

/* =========================
   🎮 ENTER WORLD
========================= */
function enterWorld() {

    lobby.style.opacity = "0";

    setTimeout(() => {
        lobby.style.display = "none";
        city.style.display = "flex";

        flash();

        cityAudio.currentTime = 0;
        cityAudio.volume = 0.4;
        cityAudio.play().catch(()=>{});

        startChat();

    }, 1000);
}

/* =========================
   🎬 CAMERA FX (GTA SNAP FEEL)
========================= */
function flash() {
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.5)";
    document.body.style.filter = "brightness(2)";

    setTimeout(() => {
        camera.style.opacity = "0";
        document.body.style.filter = "none";
    }, 400);
}

/* =========================
   🚪 ENTER INTERIOR
========================= */
function enter(type) {

    flash();

    setTimeout(() => {

        city.style.display = "none";

        cityAudio.pause();

        insideAudio.currentTime = 0;
        insideAudio.volume = 0.4;
        insideAudio.play().catch(()=>{});

        if (type === "yacht") yacht.style.display = "flex";
        if (type === "store") store.style.display = "flex";

    }, 300);
}

/* =========================
   🚪 EXIT INTERIOR
========================= */
function exitInterior() {

    flash();

    setTimeout(() => {

        yacht.style.display = "none";
        store.style.display = "none";

        insideAudio.pause();

        city.style.display = "flex";

        cityAudio.play();

    }, 300);
}

/* =========================
   💬 AMBIENT WORLD CHAT
========================= */
function startChat() {

    const users = ["HERO", "CITY_RUNNER", "VIP_GUEST", "LONG_BEACH_LOCAL"];
    const msgs = ["is in Lambo City", "entered Yacht Club", "is shopping", "is driving around"];

    setInterval(() => {

        const u = users[Math.floor(Math.random()*users.length)];
        const m = msgs[Math.floor(Math.random()*msgs.length)];

        chat.innerHTML = u + ": " + m + "<br>" + chat.innerHTML;

    }, 2500);
}

</script>

</body>
</html>
