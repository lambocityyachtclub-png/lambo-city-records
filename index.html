<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V20 — FINAL WORLD ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V20 — ENGINE</div>
<div id="zone">LOADING WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02040a);
scene.fog = new THREE.FogExp2(0x02040a, 0.0028);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x1a2a3a, 1.2));

const sun = new THREE.DirectionalLight(0x88ccff, 1.4);
sun.position.set(120,200,80);
scene.add(sun);

const neon = new THREE.PointLight(0x00ffff, 1.2, 800);
neon.position.set(0,10,0);
scene.add(neon);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mode = "walk";

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,-20);
scene.add(player);

/////////////////////////////////////////////////////
// HERO (IDENTITY NPC)
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// 🚗 LAMBO-STYLE CAR (NOT A CUBE ANYMORE)
/////////////////////////////////////////////////////

const carBody = new THREE.Mesh(
new THREE.BoxGeometry(3,0.8,5),
new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0x332200})
);

const carCabin = new THREE.Mesh(
new THREE.BoxGeometry(2,0.8,2),
new THREE.MeshStandardMaterial({color:0x111111,emissive:0x000000})
);

carCabin.position.y = 0.8;
carCabin.position.z = -0.3;

const car = new THREE.Group();
car.add(carBody);
car.add(carCabin);

car.position.set(0,0.5,40);
scene.add(car);

/////////////////////////////////////////////////////
// 🛥 YACHT (SILHOUETTE IN WATER)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(6,1,18),
new THREE.MeshStandardMaterial({color:0x111111,emissive:0x003344})
);
yacht.position.set(20,0.5,-200);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌊 OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(4000,4000,120,120);
const waterMat = new THREE.MeshStandardMaterial({
color:0x031a2a,
metalness:0.4,
roughness:0.3,
emissive:0x001522,
emissiveIntensity:0.4
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
waterBase.push({
x:waterPos.getX(i),
z:waterPos.getZ(i)
});
}

/////////////////////////////////////////////////////
// 🎬 JUMBOTRON (YOUR CORE IDENTITY)
/////////////////////////////////////////////////////

const jumbotron = new THREE.Mesh(
new THREE.BoxGeometry(35,16,1),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0055ff,
emissiveIntensity:0.8
})
);
jumbotron.position.set(0,10,-10);
scene.add(jumbotron);

/////////////////////////////////////////////////////
// WORLD ZONES
/////////////////////////////////////////////////////

const court = new THREE.Mesh(
new THREE.PlaneGeometry(80,40),
new THREE.MeshStandardMaterial({color:0x111111})
);
court.rotation.x = -Math.PI/2;
court.position.set(-90,0,20);
scene.add(court);

const golf = new THREE.Mesh(
new THREE.PlaneGeometry(120,120),
new THREE.MeshStandardMaterial({color:0x0b4d22})
);
golf.rotation.x = -Math.PI/2;
golf.position.set(120,0,40);
scene.add(golf);

const strip = new THREE.Mesh(
new THREE.BoxGeometry(10,0.5,300),
new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
strip.position.set(0,0.2,150);
scene.add(strip);

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

const speed = 0.25;

if(mode==="walk"){
player.position.x += (keys.d?speed:0)-(keys.a?speed:0);
player.position.z += (keys.s?speed:0)-(keys.w?speed:0);
}

if(mode==="car"){
const moveSpeed = 0.5;
const turn = 0.03;

if(keys.a) car.rotation.y += turn;
if(keys.d) car.rotation.y -= turn;

car.position.x -= Math.sin(car.rotation.y)*moveSpeed;
car.position.z -= Math.cos(car.rotation.y)*moveSpeed;
}
}

/////////////////////////////////////////////////////
// CAMERA (CINEMATIC)
/////////////////////////////////////////////////////

function updateCamera(){

let tx,ty,tz;

if(mode==="walk"){
tx = player.position.x;
ty = player.position.y + 7;
tz = player.position.z + 12;
}

if(mode==="car"){
tx = car.position.x + Math.sin(car.rotation.y)*-12;
ty = car.position.y + 6;
tz = car.position.z + Math.cos(car.rotation.y)*-12;
}

camera.position.x += (tx-camera.position.x)*0.06;
camera.position.y += (ty-camera.position.y)*0.06;
camera.position.z += (tz-camera.position.z)*0.06;

camera.lookAt(mode==="walk" ? player.position : car.position);
}

/////////////////////////////////////////////////////
// SWITCH MODE
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
const dist = player.position.distanceTo(car.position);

if(mode==="walk" && dist<4){
mode="car";
player.visible=false;
}

else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){

const time = performance.now()*0.001;

// ocean motion
for(let i=0;i<waterPos.count;i++){
const v = waterBase[i];
waterPos.setY(i,
Math.sin(v.x*0.01+time)*0.6 +
Math.cos(v.z*0.01+time*1.2)*0.6
);
}
waterPos.needsUpdate = true;

move();
updateCamera();

renderer.render(scene,camera);
requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
