<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V18 — STABLE CINEMATIC BUILD</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{
top:20px;
left:20px;
}

#zone{
top:20px;
right:20px;
color:#00ffff;
}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V18 • WASD MOVE • E ENTER CAR</div>
<div id="zone">CINEMATIC WORLD ACTIVE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x02040a);
scene.fog = new THREE.FogExp2(0x02040a,0.003);

const camera = new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
4000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{

camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(innerWidth,innerHeight);

});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x223344,1));

const moon = new THREE.DirectionalLight(0x99ccff,1.2);
moon.position.set(100,200,80);
scene.add(moon);

const cityGlow = new THREE.PointLight(0x00aaff,1.6,600);
cityGlow.position.set(0,40,0);
scene.add(cityGlow);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// STATE
/////////////////////////////////////////////////////

let mode = "walk";

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(

new THREE.BoxGeometry(1,2,1),

new THREE.MeshStandardMaterial({
color:0xffffff,
emissive:0x222222,
emissiveIntensity:0.8
})

);

player.position.set(0,1,-20);

scene.add(player);

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(

new THREE.BoxGeometry(1.2,2.2,1.2),

new THREE.MeshStandardMaterial({
color:0x00ffff,
emissive:0x00ffff
})

);

hero.position.set(0,1,0);

scene.add(hero);

/////////////////////////////////////////////////////
// LAMBORGHINI
/////////////////////////////////////////////////////

const car = new THREE.Group();

const carBody = new THREE.Mesh(

new THREE.BoxGeometry(3,0.8,6),

new THREE.MeshStandardMaterial({
color:0xffcc00,
metalness:0.7,
roughness:0.3
})

);

carBody.position.y = 0.6;

const carCabin = new THREE.Mesh(

new THREE.BoxGeometry(2.2,0.9,2.5),

new THREE.MeshStandardMaterial({
color:0x111111,
metalness:0.8,
roughness:0.2
})

);

carCabin.position.set(0,1.2,-0.4);

car.add(carBody);
car.add(carCabin);

car.position.set(0,0,40);

scene.add(car);

/////////////////////////////////////////////////////
// ENTER / EXIT CAR
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{

if(e.key.toLowerCase()==="e"){

const dist = player.position.distanceTo(car.position);

if(mode==="walk" && dist<5){

mode="car";
player.visible=false;

document.getElementById("zone").innerText =
"DRIVING LAMBORGHINI";

}

else if(mode==="car"){

mode="walk";
player.visible=true;

player.position.set(
car.position.x+4,
1,
car.position.z
);

document.getElementById("zone").innerText =
"ON FOOT";

}
}
});

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const waterGeo =
new THREE.PlaneGeometry(3000,3000,120,120);

const waterMat =
new THREE.MeshStandardMaterial({

color:0x021428,
metalness:0.5,
roughness:0.4,
emissive:0x001122,
emissiveIntensity:0.4

});

const water = new THREE.Mesh(waterGeo,waterMat);

water.rotation.x = -Math.PI/2;

scene.add(water);

const waterPos =
water.geometry.attributes.position;

const waterBase = [];

for(let i=0;i<waterPos.count;i++){

waterBase.push({

x:waterPos.getX(i),
z:waterPos.getZ(i)

});

}

/////////////////////////////////////////////////////
// YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(

new THREE.BoxGeometry(18,2,50),

new THREE.MeshStandardMaterial({
color:0xffffff
})

);

hull.position.y = 1;

const deck = new THREE.Mesh(

new THREE.BoxGeometry(14,1,40),

new THREE.MeshStandardMaterial({
color:0xe6e6e6
})

);

deck.position.y = 3;

const cabin = new THREE.Mesh(

new THREE.BoxGeometry(10,3,18),

new THREE.MeshStandardMaterial({
color:0x222222,
emissive:0x111111
})

);

cabin.position.y = 5;

const yachtGlow =
new THREE.PointLight(0x00ccff,1.4,80);

yachtGlow.position.y = 6;

yacht.add(hull);
yacht.add(deck);
yacht.add(cabin);
yacht.add(yachtGlow);

yacht.position.set(40,0,-90);

scene.add(yacht);

/////////////////////////////////////////////////////
// VILLAS
/////////////////////////////////////////////////////

function villa(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(

new THREE.BoxGeometry(14,1,14),

new THREE.MeshStandardMaterial({
color:0x111111
})

);

const house = new THREE.Mesh(

new THREE.BoxGeometry(12,6,12),

new THREE.MeshStandardMaterial({
color:0x2a2a2a
})

);

house.position.y = 4;

const glow =
new THREE.PointLight(0x00aaff,1,40);

glow.position.y = 5;

g.add(base);
g.add(house);
g.add(glow);

g.position.set(x,0,z);

scene.add(g);

}

for(let i=-80;i<=80;i+=40){

villa(i,-60);
villa(i,80);

}

/////////////////////////////////////////////////////
// JUMBOTRON
/////////////////////////////////////////////////////

const jumbotron = new THREE.Mesh(

new THREE.BoxGeometry(30,15,1),

new THREE.MeshStandardMaterial({

color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2

})

);

jumbotron.position.set(0,10,-120);

scene.add(jumbotron);

/////////////////////////////////////////////////////
// NPCS
/////////////////////////////////////////////////////

const npcs = [];

function npc(x,z){

const n = new THREE.Mesh(

new THREE.BoxGeometry(1,2,1),

new THREE.MeshStandardMaterial({
color:0xffaa66
})

);

n.position.set(x,1,z);

n.userData = {

dir:Math.random()*Math.PI*2,
speed:0.03 + Math.random()*0.03

};

scene.add(n);

npcs.push(n);

}

for(let i=0;i<10;i++){

npc(-20+i*3,-40);

}

/////////////////////////////////////////////////////
// ROAD
/////////////////////////////////////////////////////

const road = new THREE.Mesh(

new THREE.BoxGeometry(12,0.5,400),

new THREE.MeshStandardMaterial({
color:0x0a0a0a
})

);

road.position.set(0,0.2,100);

scene.add(road);

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){

let tx,ty,tz;

if(mode==="walk"){

tx = player.position.x;
ty = player.position.y + 8;
tz = player.position.z + 14;

}

if(mode==="car"){

tx = car.position.x +
Math.sin(car.rotation.y)*-12;

ty = car.position.y + 6;

tz = car.position.z +
Math.cos(car.rotation.y)*-12;

}

camera.position.x +=
(tx-camera.position.x)*0.06;

camera.position.y +=
(ty-camera.position.y)*0.06;

camera.position.z +=
(tz-camera.position.z)*0.06;

camera.lookAt(
mode==="walk"
? player.position
: car.position
);

}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

const speed = 0.25;

if(mode==="walk"){

if(keys.w) player.position.z -= speed;
if(keys.s) player.position.z += speed;
if(keys.a) player.position.x -= speed;
if(keys.d) player.position.x += speed;

}

if(mode==="car"){

if(keys.w){

car.position.x -=
Math.sin(car.rotation.y)*speed;

car.position.z -=
Math.cos(car.rotation.y)*speed;

}

if(keys.s){

car.position.x +=
Math.sin(car.rotation.y)*speed;

car.position.z +=
Math.cos(car.rotation.y)*speed;

}

if(keys.a) car.rotation.y += 0.03;
if(keys.d) car.rotation.y -= 0.03;

}

}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){

requestAnimationFrame(animate);

const time =
performance.now()*0.001;

/////////////////////////////////////////////////////
// OCEAN MOTION
/////////////////////////////////////////////////////

for(let i=0;i<waterPos.count;i++){

const v = waterBase[i];

waterPos.setY(

i,

Math.sin(v.x*0.02 + time)*0.4 +

Math.cos(v.z*0.02 + time*1.1)*0.4

);

}

waterPos.needsUpdate = true;

/////////////////////////////////////////////////////
// JUMBOTRON REACTIVE GLOW
/////////////////////////////////////////////////////

jumbotron.material.emissiveIntensity =
1.5 + Math.sin(time*3)*0.8;

/////////////////////////////////////////////////////
// NPC UPDATE
/////////////////////////////////////////////////////

for(let n of npcs){

n.position.x +=
Math.cos(n.userData.dir) *
n.userData.speed;

n.position.z +=
Math.sin(n.userData.dir) *
n.userData.speed;

n.userData.dir +=
(Math.random()-0.5)*0.01;

}

move();

updateCamera();

renderer.render(scene,camera);

}

animate();

</script>
</body>
</html>
