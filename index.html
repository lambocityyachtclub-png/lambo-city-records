<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB WORLD — STABLE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
<h2>LAMBO CITY YACHT CLUB</h2>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">ZONE: READY</div>
<div id="prompt">PRESS E TO INTERACT</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht, dock, water;
let keys = {};
let started = false;

function start(){

document.getElementById("start").style.display = "none";

scene = new THREE.Scene();
scene.background = new THREE.Color(0x01020a);
scene.fog = new THREE.FogExp2(0x01020a, 0.03);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,6);

renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0x1a2a3a, 1));

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// DOCK
dock = new THREE.Mesh(
  new THREE.BoxGeometry(60,1,15),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-15);
scene.add(dock);

// WATER
water = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// YACHT ZONE
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(12,2,12),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,1,-45);
scene.add(yacht);

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="e"){
    interact();
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

animate();

started = true;

}

// FIXED INTERACTION (more forgiving)
function interact(){

const dist = player.position.distanceTo(yacht.position);

if(dist < 10){
  document.getElementById("ui").innerText = "YACHT CLUB ACTIVE — YOU'RE INSIDE THE ZONE";
  document.getElementById("prompt").innerText = "INTERACTION SUCCESS";
  document.getElementById("prompt").style.display = "block";
}

}

// LOOP
function animate(){

requestAnimationFrame(animate);

// MOVEMENT (always active once started)
if(started){
  if(keys["w"]) player.position.z -= 0.12;
  if(keys["s"]) player.position.z += 0.12;
  if(keys["a"]) player.position.x -= 0.12;
  if(keys["d"]) player.position.x += 0.12;
}

// CAMERA FOLLOW
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 7 - camera.position.z)*0.05;
camera.lookAt(player.position);

// WATER MOTION
water.position.z = Math.sin(Date.now()*0.001)*0.5;

// PROMPT RANGE (WIDER = FEELS LESS BROKEN)
const dist = player.position.distanceTo(yacht.position);

if(dist < 12){
  document.getElementById("prompt").style.display = "block";
  document.getElementById("prompt").innerText = "PRESS E TO ENTER YACHT ZONE";
} else {
  document.getElementById("prompt").style.display = "none";
}

// RENDER
renderer.render(scene,camera);

}

</script>

</body>
</html>
