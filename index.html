<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — GTA INTRO</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0;
  background:black; color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:1000;
}

#status {
  position:absolute; top:20px; right:20px;
  color:gold;
}

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="status">STATUS: VISITOR</div>
<div id="msg">...</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== WORLD =====
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));
let light = new THREE.PointLight(0x00aaff,2);
light.position.set(0,5,5);
scene.add(light);

// ===== PLAYER =====
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,20);
scene.add(player);

let aura = new THREE.PointLight(0xffffff,0,15);
player.add(aura);

// ===== ENVIRONMENT =====

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(900,900),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
let starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<3000;i++){
  arr.push((Math.random()-0.5)*900,Math.random()*300,(Math.random()-0.5)*900);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.7})));

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(240,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// CABINS
function cabin(x,z){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  c.position.set(x,2.5,z);
  scene.add(c);
}
for(let i=0;i<5;i++){
  cabin(-35,-20-(i*30));
  cabin(35,-20-(i*30));
}

// STAGE
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(22,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// VIP
let vip = new THREE.Mesh(
  new THREE.BoxGeometry(22,1,20),
  new THREE.MeshStandardMaterial({color:0x001f2f})
);
vip.position.set(-30,0,-120);
scene.add(vip);

// YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(50,6,22),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-350);
scene.add(yacht);

// ===== INPUT =====
let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ===== STATE =====
let started=false;
let intro=true;
let introTime=0;

const GAME = {
  stage:false,
  vip:false,
  yacht:false,
  status:"VISITOR"
};

// ===== START =====
function start(){
  document.getElementById("start").style.display="none";
  started=true;
}

// ===== HERO VOICE =====
function speak(text){
  document.getElementById("msg").innerText = text;
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);
if(!started) return;

// ===== GTA INTRO CUTSCENE =====
if(intro){

  introTime += 0.02;

  // cinematic camera path
  camera.position.x = Math.sin(introTime)*60;
  camera.position.y = 25;
  camera.position.z = -250 + Math.cos(introTime)*40;
  camera.lookAt(0,0,-150);

  // HERO dialogue timing
  if(introTime < 2) speak("You made it...");
  else if(introTime < 4) speak("This is a cool city.");
  else if(introTime < 6) speak("You'll understand when you earn it.");
  else if(introTime < 8) speak("For now... it's not yours.");

  // end intro
  if(introTime > 8){
    intro = false;
    speak("Walk.");
  }

  renderer.render(scene,camera);
  return;
}

// ===== PLAYER CONTROL =====
if(keys["w"]) player.position.z-=0.15;
if(keys["s"]) player.position.z+=0.15;
if(keys["a"]) player.position.x-=0.15;
if(keys["d"]) player.position.x+=0.15;

// ===== PROGRESSION =====

// STAGE
if(!GAME.stage && player.position.distanceTo(stage.position)<6){
  GAME.stage=true;
  GAME.status="PERFORMER";
  speak("Prove yourself.");
  document.getElementById("status").innerText="STATUS: PERFORMER";
}

// VIP
if(GAME.stage && !GAME.vip && player.position.distanceTo(vip.position)<8){
  GAME.vip=true;
  GAME.status="VIP";
  speak("Now you're in the room.");
  document.getElementById("status").innerText="STATUS: VIP MEMBER";
}

// YACHT
if(GAME.vip && player.position.distanceTo(yacht.position)<10){
  GAME.yacht=true;
  GAME.status="OWNER";
  speak("Now you understand.");
  document.getElementById("status").innerText="STATUS: OWNER";
}

// ===== AURA =====
if(GAME.status==="VISITOR") aura.intensity=0.2;
if(GAME.status==="PERFORMER") aura.intensity=0.6;
if(GAME.status==="VIP") aura.intensity=1.3;
if(GAME.status==="OWNER") aura.intensity=2;

// ===== CAMERA FOLLOW =====
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (4-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.05;
camera.lookAt(player.position);

// WATER
water.position.z = Math.sin(Date.now()*0.001)*1;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
