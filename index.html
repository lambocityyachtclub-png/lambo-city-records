<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #111, #000);
    color: white;
    font-family: Arial;
    overflow: hidden;
}

/* GLOBAL FADE */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 1;
    transition: 1.2s ease;
    z-index: 10;
}

/* CITY UI */
.center {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.title {
    font-size: 40px;
    letter-spacing: 6px;
}

button {
    margin: 10px;
    padding: 12px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<div id="fade"></div>

<div class="center">
    <div class="title">LAMBO CITY</div>

    <button onclick="go('portal.html')">EXIT WORLD</button>
    <button onclick="go('vip.html')">YACHT CLUB</button>
</div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById("fade").style.opacity = "0";
    }, 500);
};

function go(page) {
    document.getElementById("fade").style.opacity = "1";

    setTimeout(() => {
        window.location.href = page;
    }, 900);
}
</script>

</body>
</html>
