<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LIVE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY YACHT CLUB</h1>
<button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">CABIN → DOCK → YACHT</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// 🔗 YOUR REAL LINKS (EDIT THESE)
const STREAM_LINK = "https://lambocityrecords.com";
const MERCH_LINK = "https://lambocityrecords.com";
const MUSIC_URL = "https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3";

// AUDIO
let music = new Audio(MUSIC_URL);
music.loop = true;

// SCENE
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.008);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,8);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,2);
scene.add(player);

// ================= CABIN =================
let cabinFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabinFloor.rotation.x = -Math.PI/2;
scene.add(cabinFloor);

// WALLS
let walls=[];
function wall(x,y,z,w,h,d){
  let m=new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  m.position.set(x,y,z);
  scene.add(m);
  walls.push(m);
}
wall(0,5,10,20,10,0.5);
wall(-10,5,0,0.5,10,20);
wall(10,5,0,0.5,10,20);

// CEILING
let ceiling=new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111111})
);
ceiling.rotation.x=Math.PI/2;
ceiling.position.y=10;
scene.add(ceiling);

// WINDOW VIEW
let farYacht=new THREE.Mesh(
  new THREE.BoxGeometry(20,5,10),
  new THREE.MeshStandardMaterial({color:0x222244})
);
farYacht.position.set(0,3,-120);
scene.add(farYacht);

// ================= CONTROL OBJECTS =================

// SCREEN (STREAM)
let screen=new THREE.Mesh(
  new THREE.BoxGeometry(4,2,0.2),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
screen.position.set(0,3,6);
scene.add(screen);

// RADIO (MUSIC)
let radio=new THREE.Mesh(
  new THREE.BoxGeometry(2,1,1),
  new THREE.MeshStandardMaterial({color:0xffff00})
);
radio.position.set(-5,1,4);
scene.add(radio);

// MERCH (STORE)
let merch=new THREE.Mesh(
  new THREE.BoxGeometry(2,2,2),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
merch.position.set(5,1,4);
scene.add(merch);

// ================= DOCK =================

let dock=new THREE.Mesh(
  new THREE.PlaneGeometry(60,300),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.rotation.x=-Math.PI/2;
dock.position.z=-120;
scene.add(dock);

// WATER
let water=new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.MeshStandardMaterial({color:0x02121f})
);
water.rotation.x=-Math.PI/2;
water.position.y=-1;
scene.add(water);

// PROPERTIES
for(let i=0;i<5;i++){
  for(let side=-1;side<=1;side+=2){
    let p=new THREE.Mesh(
      new THREE.BoxGeometry(6,4,6),
      new THREE.MeshStandardMaterial({color:0x333333})
    );
    p.position.set(side*10,2,-40-(i*20));
    scene.add(p);
  }
}

// YACHT
let yacht=new THREE.Mesh(
  new THREE.BoxGeometry(40,10,20),
  new THREE.MeshStandardMaterial({color:0x333366})
);
yacht.position.set(0,5,-180);
scene.add(yacht);

// STAGE
let stage=new THREE.Mesh(
  new THREE.BoxGeometry(30,2,20),
  new THREE.MeshStandardMaterial({color:0x5500aa})
);
stage.position.set(0,1,-150);
scene.add(stage);

// INPUT
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;

  // 🔥 INTERACTIONS
  if(e.key.toLowerCase()==="e"){

    if(player.position.distanceTo(screen.position)<3){
      window.open(STREAM_LINK,"_blank");
    }

    if(player.position.distanceTo(radio.position)<3){
      music.currentTime=0;
      music.play();
    }

    if(player.position.distanceTo(merch.position)<3){
      window.open(MERCH_LINK,"_blank");
    }

  }

});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()]=false;
});

function enterWorld(){
  document.getElementById("start").style.display="none";
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z-=0.2;
if(keys["s"]) player.position.z+=0.2;
if(keys["a"]) player.position.x-=0.2;
if(keys["d"]) player.position.x+=0.2;

// CAMERA
camera.position.x+=(player.position.x-camera.position.x)*0.08;
camera.position.z+=(player.position.z+8-camera.position.z)*0.08;
camera.lookAt(player.position);

// AUTO EXIT CABIN
if(player.position.z < -8){
  cabinFloor.visible=false;
  walls.forEach(w=>w.visible=false);
  ceiling.visible=false;
}

// LIFE
water.position.z=Math.sin(Date.now()*0.001)*1;
farYacht.rotation.y+=0.0005;
yacht.rotation.y+=0.001;

// UI
if(player.position.z < -120){
  document.getElementById("ui").innerText="DOCK — SOCIAL WORLD";
}

if(player.position.z < -170){
  document.getElementById("ui").innerText="YACHT CLUB — VIP";
}

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
