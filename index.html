<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ALL DEVICES</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

/* UI */
#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}

#prompt {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}

/* TOUCH JOYSTICK */
#joystick {
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.05);
  border-radius:50%;
}

#stick {
  position:absolute;
  width:60px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  top:30px;
  left:30px;
}
</style>
</head>

<body>

<div id="ui">ZONE: CABIN</div>
<div id="prompt">PRESS E / TAP</div>

<div id="joystick"><div id="stick"></div></div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0x404040, 1.5));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// WALLS
function wall(x,y,z,ry){
  let w = new THREE.Mesh(
    new THREE.PlaneGeometry(20,4),
    new THREE.MeshStandardMaterial({color:0x222233, side:THREE.DoubleSide})
  );
  w.position.set(x,y,z);
  w.rotation.y = ry;
  scene.add(w);
}

wall(0,2,-10,0);
wall(0,2,10,Math.PI);
wall(-10,2,0,Math.PI/2);
wall(10,2,0,-Math.PI/2);

// DOOR
let door = new THREE.Mesh(
  new THREE.BoxGeometry(2,3,0.2),
  new THREE.MeshStandardMaterial({color:0x444444})
);
door.position.set(0,1.5,-9.9);
scene.add(door);

// DOCK WORLD
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(60,1,20),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-40);
dock.visible = false;
scene.add(dock);

let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(12,3,12),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,1,-60);
yacht.visible = false;
scene.add(yacht);

// KEYBOARD
let keys = {};
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});
document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// TOUCH JOYSTICK
let joy = document.getElementById("joystick");
let stick = document.getElementById("stick");

let touchActive = false;
let joyX = 0;
let joyY = 0;

joy.addEventListener("touchstart", ()=> touchActive = true);

joy.addEventListener("touchmove", e=>{
  let rect = joy.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - 60;
  let y = e.touches[0].clientY - rect.top - 60;

  joyX = x / 60;
  joyY = y / 60;

  stick.style.left = (x + 60) + "px";
  stick.style.top = (y + 60) + "px";
});

joy.addEventListener("touchend", ()=>{
  touchActive = false;
  joyX = 0;
  joyY = 0;
  stick.style.left = "30px";
  stick.style.top = "30px";
});

// TAP INTERACT
document.addEventListener("touchstart", ()=>{
  interact();
});

let inDock = false;

// INTERACT
function interact(){
let dist = player.position.distanceTo(door.position);

if(dist < 3 && !inDock){
  inDock = true;

  scene.children.forEach(obj=>{
    if(obj !== player && obj !== dock && obj !== yacht){
      obj.visible = false;
    }
  });

  dock.visible = true;
  yacht.visible = true;

  player.position.set(0,1,-30);

  document.getElementById("ui").innerText = "ZONE: DOCK";
}
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// KEYBOARD MOVE
if(keys["w"]) player.position.z -= 0.1;
if(keys["s"]) player.position.z += 0.1;
if(keys["a"]) player.position.x -= 0.1;
if(keys["d"]) player.position.x += 0.1;

// TOUCH MOVE
if(touchActive){
  player.position.x += joyX * 0.1;
  player.position.z += joyY * 0.1;
}

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
camera.lookAt(player.position);

// PROMPT
let dist = player.position.distanceTo(door.position);
document.getElementById("prompt").style.display = (!inDock && dist < 3) ? "block" : "none";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
