<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING WORLD v3</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#000; }

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.8;
    z-index: 10;
}

/* OBJECTIVE */
#objective {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: white;
    font-size: 13px;
    opacity: 0.9;
    z-index: 10;
}

/* CROSSHAIR */
#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: white;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    z-index: 10;
}

/* FADE */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: 0.5s;
    z-index: 20;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // LIVING ENGINE v3</div>
<div id="objective">MISSION: Enter the City</div>
<div id="crosshair"></div>
<div id="fade"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🌍 WORLD CORE
========================= */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 80);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1));

/* =========================
   🌆 GROUND
========================= */
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshBasicMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* =========================
   🏙 BUILDINGS (DEPTH CITY)
========================= */
function building(x,z,s){
    const b = new THREE.Mesh(
        new THREE.BoxGeometry(4,s,4),
        new THREE.MeshBasicMaterial({color:0x333333})
    );
    b.position.set(x,s/2,z);
    scene.add(b);
}

for(let i=0;i<60;i++){
    building(
        (Math.random()-0.5)*80,
        (Math.random()-0.5)*80,
        Math.random()*10+3
    );
}

/* =========================
   🚗 TRAFFIC SYSTEM
========================= */
const cars=[];
function car(z){
    const c = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,2),
        new THREE.MeshBasicMaterial({color:0xff4444})
    );
    c.position.set(-40,0.5,z);
    scene.add(c);
    cars.push(c);
}

for(let i=0;i<12;i++){
    car(-10 + i*2);
}

/* =========================
   🧍 NPC SYSTEM
========================= */
const npcs=[];
function npc(x,z){
    const n = new THREE.Mesh(
        new THREE.BoxGeometry(0.6,1.6,0.6),
        new THREE.MeshBasicMaterial({color:0x00ffaa})
    );
    n.position.set(x,0.8,z);
    scene.add(n);
    npcs.push(n);
}

for(let i=0;i<20;i++){
    npc((Math.random()-0.5)*50,(Math.random()-0.5)*50);
}

/* =========================
   🎮 PLAYER
========================= */
const player = {
    rotY:0,
    speed:0.12
};

camera.position.set(0,2,6);

/* =========================
   🎮 CONTROLS
========================= */
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
    if(document.pointerLockElement===document.body){
        player.rotY -= e.movementX*0.002;
    }
});

/* =========================
   🚶 MOVEMENT
========================= */
function move(){

    let forward = new THREE.Vector3(
        -Math.sin(player.rotY),0,-Math.cos(player.rotY)
    );

    let right = new THREE.Vector3(
        Math.cos(player.rotY),0,-Math.sin(player.rotY)
    );

    if(keys["w"]) camera.position.addScaledVector(forward,player.speed);
    if(keys["s"]) camera.position.addScaledVector(forward,-player.speed);
    if(keys["a"]) camera.position.addScaledVector(right,-player.speed);
    if(keys["d"]) camera.position.addScaledVector(right,player.speed);

    camera.rotation.y = player.rotY;
}

/* =========================
   🚗 CAR MOVEMENT LOOP
========================= */
function updateCars(){
    cars.forEach(c=>{
        c.position.x += 0.2;
        if(c.position.x > 40) c.position.x = -40;
    });
}

/* =========================
   🧍 NPC MOVEMENT LOOP
========================= */
function updateNPCs(){
    npcs.forEach(n=>{
        n.position.x += (Math.random()-0.5)*0.08;
        n.position.z += (Math.random()-0.5)*0.08;
    });
}

/* =========================
   🔊 AUDIO SYSTEM
========================= */
const cityAudio = new Audio("https://cdn.pixabay.com/audio/2022/10/16/audio_12b7f6c2b5.mp3");
cityAudio.loop = true;
cityAudio.volume = 0.5;
cityAudio.play();

/* =========================
   🎯 SIMPLE MISSION FEEL
========================= */
const objective = document.getElementById("objective");

function missionCheck(){
    if(camera.position.x > 10){
        objective.innerText = "MISSION: Explore the City";
    }
}

/* =========================
   🎮 LOOP
========================= */
function animate(){
    requestAnimationFrame(animate);

    move();
    updateCars();
    updateNPCs();
    missionCheck();

    renderer.render(scene,camera);
}
animate();

/* RESIZE */
window.addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
