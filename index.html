<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ENGINE v4 MUSIC</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
position:fixed;
inset:0;
display:block;
}

#ui{
position:fixed;
top:20px;
left:20px;
color:white;
z-index:10;
}

#energy{
position:fixed;
top:50px;
left:20px;
color:#ffcc00;
z-index:10;
}

#mode{
position:fixed;
top:80px;
left:20px;
color:#00aaff;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY ENGINE v4</div>
<div id="energy">Beat Energy: 0</div>
<div id="mode">Audio: Initializing...</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded",async()=>{

/* =========================
STATE CORE
========================= */
const GameState = {
time:0,
energy:0,
bass:0,
mode:"idle"
};

/* =========================
AUDIO SYSTEM (NEW CORE)
========================= */
let audioCtx;
let analyser;
let dataArray;
let microphone;

async function initAudio(){
try{
audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const stream = await navigator.mediaDevices.getUserMedia({audio:true});
microphone = audioCtx.createMediaStreamSource(stream);

analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;

microphone.connect(analyser);

dataArray = new Uint8Array(analyser.frequencyBinCount);

document.getElementById("mode").innerText = "Audio: LIVE INPUT";
GameState.mode = "live";

}catch(e){
document.getElementById("mode").innerText = "Audio: FAILED (using simulation)";
GameState.mode = "sim";
}
}
initAudio();

/* =========================
ENGINE CORE
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050714);
scene.fog = new THREE.FogExp2(0x050814,0.0012);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,10000);
camera.position.set(0,40,120);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0x88aacc,0.35));
const sun = new THREE.DirectionalLight(0xfff1d6,3.2);
sun.position.set(250,300,150);
scene.add(sun);

/* =========================
PLAYER
========================= */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

/* =========================
CAMERA
========================= */
const camVel = new THREE.Vector3();

function cam(){
const target = new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camVel.lerp(target.clone().sub(camera.position).multiplyScalar(0.06),0.85);
camera.position.add(camVel);
camera.lookAt(player.position);
}

/* =========================
OCEAN + STAGE
========================= */
const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(12000,12000),
new THREE.MeshStandardMaterial({color:0x062a3a})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.z = -400;
scene.add(ocean);

/* STAGE */
const stage = new THREE.Mesh(
new THREE.CylinderGeometry(60,60,6,64),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x003355,
emissiveIntensity:1
})
);
stage.position.set(0,3,-220);
scene.add(stage);

/* LIGHT RING */
const lights = [];
for(let i=0;i<12;i++){
const l = new THREE.PointLight(0x00aaff,1.5,200);
l.position.set(
Math.cos(i/12*Math.PI*2)*70,
25,
Math.sin(i/12*Math.PI*2)*70 - 220
);
scene.add(l);
lights.push(l);
}

/* CROWD */
const crowd = [];
for(let i=0;i<120;i++){
const npc = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x222222})
);

npc.position.set(
(Math.random()-0.5)*140,
1,
-150 + Math.random()*80
);

scene.add(npc);
crowd.push(npc);
}

/* =========================
AUDIO ANALYSIS (BEAT ENGINE)
========================= */
function getBass(){
if(GameState.mode === "live" && analyser){
analyser.getByteFrequencyData(dataArray);

let sum = 0;
for(let i=0;i<40;i++){
sum += dataArray[i];
}

return sum / 40 / 255;
}

/* fallback simulation */
return 0.3 + Math.sin(GameState.time*2)*0.3;
}

/* =========================
REACTIVE WORLD SYSTEM
========================= */
function audioReact(){

GameState.bass = getBass();
GameState.energy += GameState.bass * 2;
GameState.energy *= 0.96;

/* UI */
document.getElementById("energy").innerText =
"Beat Energy: " + Math.floor(GameState.energy * 100);

/* STAGE LIGHTS */
lights.forEach(l=>{
l.intensity = 1 + GameState.energy * 3;
l.color.setHSL(0.55 + GameState.energy*0.2, 1, 0.6);
});

/* STAGE GLOW */
stage.material.emissiveIntensity =
1 + GameState.energy * 2;

/* OCEAN PULSE */
ocean.position.y = Math.sin(GameState.time*2) * GameState.energy * 2;

/* CROWD REACTION */
crowd.forEach(c=>{
c.position.y = 1 + Math.sin(GameState.time*10 + c.position.x) * GameState.energy;
c.scale.y = 1 + GameState.energy * 2;
});
}

/* =========================
ATMOSPHERE
========================= */
function atmosphere(){
GameState.time += 0.01;

scene.fog.color = new THREE.Color(
0.02 + GameState.energy*0.1,
0.06,
0.12 + GameState.energy*0.2
);
}

/* =========================
LOOP
========================= */
function animate(){
requestAnimationFrame(animate);

audioReact();
atmosphere();
cam();

renderer.render(scene,camera);
}
animate();

/* =========================
INPUT
========================= */
addEventListener("keydown",e=>{
if(e.key===" "){
GameState.energy += 1; // manual beat trigger fallback
}
});

});
</script>

</body>
</html>
