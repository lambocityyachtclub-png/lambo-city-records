<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | GTA LIVING WORLD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* CAMERA IMPACT LAYER */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    transition: 0.6s ease;
    z-index: 999;
}

/* ARRIVAL TEXT */
#arrival {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    letter-spacing: 4px;
    opacity: 0;
    transition: 0.4s;
    z-index: 2000;
}

/* WORLD CONTAINER */
#world {
    position: absolute;
    width: 400%;
    height: 100%;
    display: flex;
    transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* GTA DISTRICT IDENTITY */
#portal {
    background: radial-gradient(circle, #050a1a, #000);
}

#city {
    background: radial-gradient(circle at top, #3a1f0a, #000);
}

#vip {
    background: radial-gradient(circle, #101010, #000);
}

#store {
    background: radial-gradient(circle, #2a0f0a, #000);
}

/* TITLE */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* BUTTONS (DOORS) */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

/* STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* GTA CHAT */
#chat {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 260px;
    height: 180px;
    font-size: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px;
    overflow: hidden;
    z-index: 1000;
}
</style>
</head>

<body>

<div id="camera"></div>
<div id="arrival"></div>
<div id="chat"></div>

<div id="world">

    <!-- PORTAL -->
    <div class="zone" id="portal">
        <div class="title">CITY GATE</div>
        <button onclick="walkTo(0)">ENTER CITY</button>
    </div>

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <button onclick="walkTo(2)">YACHT CLUB</button>
        <button onclick="walkTo(3)">STORE</button>
    </div>

    <!-- VIP -->
    <div class="zone" id="vip">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="walkTo(1)">BACK TO CITY</button>
    </div>

    <!-- STORE -->
    <div class="zone" id="store">
        <div class="title">LAMBO CITY RECORDS STORE</div>

        <button onclick="alert('HERO - Fly Away Soon Tee')">
            👕 HERO - Fly Away Soon Tee
        </button>

        <button onclick="alert('LAMBO CITY Classic Drop')">
            🧢 Classic Logo Drop
        </button>

        <button onclick="walkTo(1)">BACK TO CITY</button>
    </div>

</div>

<script>

const world = document.getElementById("world");
const camera = document.getElementById("camera");
const chat = document.getElementById("chat");
const arrival = document.getElementById("arrival");

let currentZone = 0;

/* INIT */
window.onload = () => {
    walkTo(0);
    startChat();
};

/* ARRIVAL SYSTEM */
function showArrival(name) {
    arrival.innerText = "ENTERING: " + name;
    arrival.style.opacity = "1";

    setTimeout(() => {
        arrival.style.opacity = "0";
    }, 900);
}

/* WALK SYSTEM (GTA IMPACT VERSION) */
function walkTo(zoneIndex) {

    const zoneNames = ["PORTAL", "CITY", "VIP", "STORE"];

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.6)";
    document.body.style.filter = "brightness(2) contrast(1.4)";

    setTimeout(() => {

        world.style.transform = `translateX(-${zoneIndex * 100}vw)`;
        currentZone = zoneIndex;

        showArrival(zoneNames[zoneIndex]);

        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
            document.body.style.filter = "brightness(1) contrast(1)";
        }, 350);

    }, 300);
}

/* 💬 GTA ONLINE CHAT SYSTEM */
function startChat() {

    const users = ["DJ HERO", "CITY_RUNNER", "VIP_ACE", "LAMBO_GUEST", "YACHT_KING"];

    const messages = [
        "joined session",
        "entered Lambo City",
        "is cruising downtown",
        "is at Yacht Club",
        "is buying merch",
        "left City Gate"
    ];

    setInterval(() => {

        const user = users[Math.floor(Math.random() * users.length)];
        const msg = messages[Math.floor(Math.random() * messages.length)];

        const zones = ["PORTAL", "CITY", "VIP", "STORE"];

        chat.innerHTML =
        "[" + zones[currentZone] + "] " + user + ": " + msg + "<br>" +
        chat.innerHTML;

        if (chat.innerHTML.length > 1500) {
            chat.innerHTML = chat.innerHTML.slice(0, 1500);
        }

    }, 2000);
}

</script>

</body>
</html>
