<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V22 — FIXED STABLE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V22 — FIXED</div>
<div id="zone">WORLD ACTIVE</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

window.addEventListener("load", () => {

/////////////////////////////////////////////////////
// CORE SAFE INIT
/////////////////////////////////////////////////////

const canvas = document.getElementById("c");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070d);
scene.fog = new THREE.FogExp2(0x04070d, 0.0025);

const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: canvas,
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

document.body.appendChild(renderer.domElement);

/////////////////////////////////////////////////////
// LIGHTING (SAFE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x1b2a3a, 1));

const sun = new THREE.DirectionalLight(0x88bbff, 1.2);
sun.position.set(120,200,100);
scene.add(sun);

/////////////////////////////////////////////////////
// PLAYER (FORCED VISIBLE)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// CAR
/////////////////////////////////////////////////////

const car = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(3.2,0.7,6.2),
new THREE.MeshStandardMaterial({color:0xffcc00})
);

car.add(body);
car.position.set(0,0,60);
scene.add(car);

/////////////////////////////////////////////////////
// OCEAN SAFE
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2000,2000,40,40);

const water = new THREE.Mesh(
waterGeo,
new THREE.MeshStandardMaterial({color:0x02131f})
);

water.rotation.x = -Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// INPUT SAFE
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

/////////////////////////////////////////////////////
// MOVE SAFE
/////////////////////////////////////////////////////

function move(){
if(keys.w) player.position.z -= 0.3;
if(keys.s) player.position.z += 0.3;
if(keys.a) player.position.x -= 0.3;
if(keys.d) player.position.x += 0.3;
}

/////////////////////////////////////////////////////
// CAMERA SAFE
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x) * 0.08;
camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.08;
camera.position.z += ((player.position.z + 18) - camera.position.z) * 0.08;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// LOOP SAFE
/////////////////////////////////////////////////////

camera.position.set(0,10,20);

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

}); // IMPORTANT WRAPPER CLOSE

</script>

</body>
</html>
