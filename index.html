<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

canvas { display:block; }

#intro {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  background:black;
  z-index:999;
  letter-spacing:4px;
}

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div id="intro">
  LAMBO CITY<br>
  <span style="font-size:12px; opacity:0.7;">ENTERING WORLD</span>
</div>

<div id="hud">
  ZONE: CABIN<br>
  STATE: LOADING
</div>

<div id="prompt">ENTER DOCK</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// =======================
// BASIC WORLD (STABLE)
// =======================
let scene, camera, renderer;
let player, yacht;
let keys = {};
let started = false;

// INIT
scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 100);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

renderer = new THREE.WebGLRenderer({ canvas:document.getElementById("c"), antialias:true });
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.PointLight(0x00aaff, 2);
light.position.set(0,5,5);
scene.add(light);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DOCK
const dock = new THREE.Mesh(
  new THREE.BoxGeometry(20,0.2,20),
  new THREE.MeshStandardMaterial({color:0x222222})
);
dock.position.z = -10;
scene.add(dock);

// YACHT
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({color:0xffd700})
);
yacht.position.set(0,0.5,-15);
scene.add(yacht);

// INPUT
document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});
document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// START GAME AFTER INTRO
setTimeout(()=>{
  document.getElementById("intro").style.display = "none";
  started = true;
},2500);

// LOOP
function animate(){
  requestAnimationFrame(animate);

  if(started){

    // MOVE
    if(keys["w"]) player.position.z -= 0.08;
    if(keys["s"]) player.position.z += 0.08;
    if(keys["a"]) player.position.x -= 0.08;
    if(keys["d"]) player.position.x += 0.08;

    // CAMERA FOLLOW
    camera.position.x += (player.position.x - camera.position.x)*0.08;
    camera.position.z += (player.position.z + 5 - camera.position.z)*0.08;
    camera.lookAt(player.position);

    // PROMPT
    let dist = player.position.distanceTo(yacht.position);

    if(dist < 3){
      document.getElementById("prompt").style.display = "block";
    } else {
      document.getElementById("prompt").style.display = "none";
    }
  }

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
