<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000814;
  font-family: Arial;
  color: white;
}

/* CANVAS */
canvas { display:block; }

/* UI */
#ui {
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* START SCREEN */
#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle at center, rgba(0,10,30,0.75), black);
  pointer-events:auto;
}

/* HUD */
#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:14px;
  opacity:0.75;
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.92);
  z-index:10;
  text-align:center;
  padding-top:120px;
}

/* BUTTON */
button {
  padding:12px 16px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

  <div id="home">
    <h1>LAMBO CITY</h1>
    <p style="opacity:0.6">Enter the world</p>
    <button onclick="enterWorld()">ENTER</button>
  </div>

  <div id="hud">
    <div id="status">OFFLINE</div>
    <div id="zone">ZONE: NONE</div>
    <div>WASD MOVE • YACHT = VIP</div>
  </div>

  <div id="vip">
    <h1>YACHT CLUB</h1>
    <button onclick="closeVIP()" style="position:absolute;top:20px;right:20px;">EXIT</button>
  </div>

</div>

<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, ocean, yacht, city;

let mode = "idle";
let keys = {};

// ZONES
const zones = {
  yacht: { x: 0, z: -18, r: 4 },
  city:  { x: 18, z: 10, r: 14 },
  dock:  { x: 0, z: 6, r: 6 }
};

init();

function init() {

  scene = new THREE.Scene();

  // 🌫 atmosphere (important for immersion)
  scene.fog = new THREE.Fog(0x000814, 10, 75);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c") });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000814);

  // 🌊 ocean
  ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshBasicMaterial({ color:0x002f5c })
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // 🧍 player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({ color:0xffffff })
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 yacht
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,6),
    new THREE.MeshBasicMaterial({ color:0xd4af37 })
  );
  yacht.position.set(0,0.5,-18);
  scene.add(yacht);

  // 🏙 city anchor
  city = new THREE.Mesh(
    new THREE.BoxGeometry(4,4,4),
    new THREE.MeshBasicMaterial({ color:0x444444 })
  );
  city.position.set(18,2,10);
  scene.add(city);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  ocean.rotation.z += 0.00025;

  if (mode === "play") {

    if (keys["w"]) player.position.z -= 0.15;
    if (keys["s"]) player.position.z += 0.15;
    if (keys["a"]) player.position.x -= 0.15;
    if (keys["d"]) player.position.x += 0.15;

    // smooth cinematic camera follow
    camera.position.x += (player.position.x - camera.position.x) * 0.07;
    camera.position.z += (player.position.z + 10 - camera.position.z) * 0.07;
    camera.lookAt(player.position);

    updateZones();
  }

  renderer.render(scene, camera);
}

function updateZones() {

  let dy = dist(zones.yacht);
  let dc = dist(zones.city);
  let dd = dist(zones.dock);

  if (dy < zones.yacht.r) {
    document.getElementById("zone").innerText = "ZONE: YACHT (VIP)";
    document.getElementById("vip").style.display = "block";
    mode = "vip";
  }
  else if (dc < zones.city.r) {
    document.getElementById("zone").innerText = "ZONE: CITY";
  }
  else {
    document.getElementById("zone").innerText = "ZONE: OCEAN";
  }
}

function dist(z){
  return Math.sqrt(
    (player.position.x - z.x)**2 +
    (player.position.z - z.z)**2
  );
}

function enterWorld(){
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE";
  mode = "play";
  document.getElementById("radio").play().catch(()=>{});
}

function closeVIP(){
  document.getElementById("vip").style.display = "none";
  mode = "play";
}

</script>

</body>
</html>
