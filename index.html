<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — V6 LUXURY STRUCTURE CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V6 — LUXURY STRUCTURE</div>
<div id="zone">BUILDING WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE WORLD
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(0x070b1a, 0.0035);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// 🌤️ LIGHTING (CINEMATIC LUXURY)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x3a4f6a, 1.0));

const sun = new THREE.DirectionalLight(0x99ccff, 1.4);
sun.position.set(120, 200, 80);
scene.add(sun);

const glow = new THREE.PointLight(0x4da3ff, 1.5, 3000);
glow.position.set(0, 100, 0);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER CAMERA SYSTEM
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-30);
scene.add(player);

camera.position.set(0,10,18);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
  const s = 0.3;
  if(keys["w"]) player.position.z -= s;
  if(keys["s"]) player.position.z += s;
  if(keys["a"]) player.position.x -= s;
  if(keys["d"]) player.position.x += s;
}

function cameraFollow(){
  camera.position.x += (player.position.x - camera.position.x)*0.06;
  camera.position.y += ((player.position.y+10) - camera.position.y)*0.06;
  camera.position.z += ((player.position.z+18) - camera.position.z)*0.06;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 CINEMATIC OCEAN FIELD (WORLD WRAP)
/////////////////////////////////////////////////////

const ocean = new THREE.PlaneGeometry(4000,4000,120,120);

const oceanMat = new THREE.MeshStandardMaterial({
  color: 0x071a2a,
  metalness: 0.2,
  roughness: 0.7,
  emissive: 0x001122,
  emissiveIntensity: 0.4
});

const water = new THREE.Mesh(ocean, oceanMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🏝️ LUXURY VILLA SYSTEM (UNIQUE IDENTITY)
/////////////////////////////////////////////////////

function createVilla(x,z,style){

  const g = new THREE.Group();

  const baseColor =
    style === 0 ? 0x111111 :
    style === 1 ? 0x151520 :
    style === 2 ? 0x101018 : 0x0f0f0f;

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(20,1,20),
    new THREE.MeshStandardMaterial({ color: baseColor })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(20,8,20),
    new THREE.MeshStandardMaterial({
      color: baseColor + 0x050505
    })
  );
  body.position.y = 4.5;
  g.add(body);

  const glass = new THREE.Mesh(
    new THREE.BoxGeometry(10,3,0.2),
    new THREE.MeshStandardMaterial({
      color:0x88ccff,
      transparent:true,
      opacity:0.25
    })
  );
  glass.position.set(0,4,10);
  g.add(glass);

  g.position.set(x,0,z);
  scene.add(g);
}

// ROWS OF UNIQUE VILLAS
for(let i=0;i<8;i++){
  createVilla(-40,-30-i*30,i%3);
  createVilla(40,-30-i*30,(i+1)%3);
}

/////////////////////////////////////////////////////
// 🎤 MAIN STAGE + JUMBOTRON (ROLLING LOUD CORE)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.BoxGeometry(60,2,40),
  new THREE.MeshStandardMaterial({ color:0x0a0a0a })
);
stage.position.set(0,1,-120);
scene.add(stage);

const screen = new THREE.Mesh(
  new THREE.BoxGeometry(40,20,2),
  new THREE.MeshStandardMaterial({
    color:0x111111,
    emissive:0x002244,
    emissiveIntensity:0.8
  })
);
screen.position.set(0,12,-140);
scene.add(screen);

const stageLight = new THREE.PointLight(0x00aaff,2,400);
stageLight.position.set(0,20,-110);
scene.add(stageLight);

/////////////////////////////////////////////////////
// 🚤 OCEAN YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(25,5,70),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);
yacht.position.set(60,2,-90);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);
hero.position.set(0,1,-40);
scene.add(hero);

/////////////////////////////////////////////////////
// INTERACTION UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText =
      "WELCOME TO THE LAMBO CITY EXPERIENCE";
    }
  }
});

/////////////////////////////////////////////////////
// 🌊 OCEAN WAVE ENGINE
/////////////////////////////////////////////////////

function updateOcean(time){
  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.012 + time) * 0.8 +
      Math.cos(v.z*0.012 + time*1.2) * 0.8;

    waterPos.setY(i,wave);
  }
  waterPos.needsUpdate = true;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  const time = Date.now()*0.001;

  move();
  cameraFollow();
  check();

  updateOcean(time);

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
