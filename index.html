<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V11 — SYSTEM CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui {
position:absolute;
top:20px; left:20px;
color:white;
font-family:Arial;
font-size:13px;
z-index:10;
}

#zone {
position:absolute;
top:20px; right:20px;
color:#00ffff;
font-family:Arial;
font-size:13px;
z-index:10;
}

#hint {
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 12px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
color:white;
font-family:Arial;
font-size:13px;
display:none;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT • LAMBO CITY V11</div>
<div id="zone">INITIALIZING SYSTEMS...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 4000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHT SYSTEM
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 0.9));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(100,150,80);
scene.add(sun);

const fill = new THREE.PointLight(0x4da3ff, 1.2, 2000);
fill.position.set(0,100,0);
scene.add(fill);

/////////////////////////////////////////////////////
// PLAYER SYSTEM
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,-20);
scene.add(player);

// INPUT SYSTEM
const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// MOVEMENT SYSTEM
/////////////////////////////////////////////////////

function updateMovement(){
  if(keys["w"]) player.position.z -= 0.35;
  if(keys["s"]) player.position.z += 0.35;
  if(keys["a"]) player.position.x -= 0.35;
  if(keys["d"]) player.position.x += 0.35;
}

/////////////////////////////////////////////////////
// CAMERA SYSTEM (CINEMATIC FOLLOW)
/////////////////////////////////////////////////////

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
  camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// ZONE SYSTEM (IMPORTANT V11 UPGRADE)
/////////////////////////////////////////////////////

let currentZone = "OCEAN";

function updateZone(){

  const p = player.position;

  if(p.z < -120) currentZone = "JUMBOTRON STAGE";
  else if(p.x > 20) currentZone = "YACHT DISTRICT";
  else if(p.x < -20) currentZone = "VILLA DISTRICT";
  else currentZone = "OCEAN FRONT";

  document.getElementById("zone").innerText = currentZone;
}

/////////////////////////////////////////////////////
// INTERACTION SYSTEM (E KEY CORE)
/////////////////////////////////////////////////////

function checkInteraction(){

  let hint = document.getElementById("hint");

  let msg = "";

  if(currentZone === "JUMBOTRON STAGE") msg = "PRESS E: PLAY STAGE VISUALS";
  if(currentZone === "YACHT DISTRICT") msg = "PRESS E: ENTER YACHT";
  if(currentZone === "VILLA DISTRICT") msg = "PRESS E: ENTER VILLA";
  if(currentZone === "OCEAN FRONT") msg = "PRESS E: SPAWN JET SKI (FUTURE)";

  hint.style.display = "block";
  hint.innerText = msg;

}

document.addEventListener("keydown",e=>{

  if(e.key.toLowerCase()==="e"){

    if(currentZone === "JUMBOTRON STAGE"){
      document.getElementById("zone").innerText = "STAGE: LIGHTS ACTIVE";
    }

    if(currentZone === "YACHT DISTRICT"){
      document.getElementById("zone").innerText = "YACHT: ENTERED";
    }

    if(currentZone === "VILLA DISTRICT"){
      document.getElementById("zone").innerText = "VILLA: LUXURY INTERIOR LOADING...";
    }

  }

});

/////////////////////////////////////////////////////
// OCEAN SYSTEM
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(4000,4000,100,100);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021428,
  metalness:0.4,
  roughness:0.6,
  emissive:0x001122,
  emissiveIntensity:0.4
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// WORLD OBJECTS
/////////////////////////////////////////////////////

// VILLAS
for(let i=0;i<6;i++){
  const villa = new THREE.Mesh(
    new THREE.BoxGeometry(16,6,16),
    new THREE.MeshStandardMaterial({color:0x101010})
  );
  villa.position.set(-25,-20-i*25);
  villa.position.y = 3;
  scene.add(villa);
}

// YACHT
const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(20,4,50),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(40,2,-90);
scene.add(yacht);

// STAGE (JUMBOTRON)
const stage = new THREE.Mesh(
  new THREE.BoxGeometry(40,2,20),
  new THREE.MeshStandardMaterial({color:0x111111, emissive:0x0022ff})
);
stage.position.set(0,1,-140);
scene.add(stage);

/////////////////////////////////////////////////////
// LOOP ENGINE
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

updateMovement();
updateCamera();
updateZone();
checkInteraction();

const time = Date.now()*0.001;

for(let i=0;i<waterPos.count;i++){
  const v = waterBase[i];

  const wave =
    Math.sin(v.x*0.02+time)*0.4 +
    Math.cos(v.z*0.02+time*1.3)*0.4;

  waterPos.setY(i,wave);
}

waterPos.needsUpdate = true;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
