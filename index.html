function checkStageEvents() {

  if (!stage) return;

  const dist = player.position.distanceTo(stage.position);

  if (dist < STAGE_RADIUS && !stageInside) {
    stageInside = true;
    Events.emit("ENTER_STAGE_ZONE");
  }

  if (dist >= STAGE_RADIUS && stageInside) {
    stageInside = false;
  }
}

let stageRewarded = false;

function rewardPlayer(reason){

  if(!FEATURES.rewards) return; // 🔒 hard stop

  console.log("Reward triggered:", reason);

  if(reason === "stage_visit" && stageRewarded) return;

  if(reason === "stage_visit") stageRewarded = true;

  Economy.earn(1);
}
  /////////////////////////////////////////////////////
// 🎯 EVENT SYSTEM (FOUNDATION LAYER)
/////////////////////////////////////////////////////

const Events = {

  emit: (type, data = {}) => {
    handleEvent(type, data);
  }

};

function handleEvent(type, data){

  switch(type){

    case "ENTER_STAGE_ZONE":
      console.log("Player entered stage zone");
      if(FEATURES.rewards){
  rewardPlayer("stage_visit");
}
      break;

    case "ENTER_CABIN":

  console.log("Player entered cabin");

  inside = true;

  activeCabin = data.cabin;

  document.getElementById("msg").style.display = "block";

  document.getElementById("zone").innerText =
    "INSIDE CABIN";

  rewardPlayer("cabin_entry");

  break;

    case "DOCK_TOUCH":
      console.log("Player at dock");
      rewardPlayer("dock_visit");
      break;
  }
}

    /////////////////////////////////////////////////////

      (volume * 0.6 - this.stageAudio.volume) * 0.03;

  }

function updateCamera(){

  let baseOffsetX = 0;
  let baseOffsetY = 7.5;
  let baseOffsetZ = 11;
  let lookTarget = player.position.clone();

  const distToStage = player.position.distanceTo(stage.position);
  const distToYacht = player.position.distanceTo(yacht.position);

  // 🌊 STAGE ZONE FOCUS (slight cinematic pull)
  if(distToStage < 60){
    baseOffsetY = 12;
    baseOffsetZ = 16;
    lookTarget = stage.position.clone();
  }

  // 🚤 YACHT ZONE FOCUS (luxury framing)
  if(distToYacht < 30){
    baseOffsetX = 4;
    baseOffsetY = 11;
    baseOffsetZ = 18;
    lookTarget = yacht.position.clone();
  }

  // 📷 SMOOTH FOLLOW
  const targetX = player.position.x + baseOffsetX;
  const targetY = player.position.y + baseOffsetY;
  const targetZ = player.position.z + baseOffsetZ;

  camera.position.x += (targetX - camera.position.x) * 0.12;
camera.position.y += (targetY - camera.position.y) * 0.12;
camera.position.z += (targetZ - camera.position.z) * 0.12;
  camera.lookAt(lookTarget);
}

let joyActive = false;
let joyX = 0;
let joyY = 0;

joystick.addEventListener("touchstart", e => {

  joyActive = true;

});

joystick.addEventListener("touchmove", e => {

  e.preventDefault();

  const touch = e.touches[0];

  const rect = joystick.getBoundingClientRect();

  const x = touch.clientX - rect.left - 60;
  const y = touch.clientY - rect.top - 60;

  const dist = Math.min(Math.sqrt(x*x + y*y), 40);

  const angle = Math.atan2(y, x);

  joyX = Math.cos(angle) * (dist / 40);
  joyY = Math.sin(angle) * (dist / 40);

  stick.style.transform =
    `translate(${joyX*35}px, ${joyY*35}px)`;

}, { passive:false });

joystick.addEventListener("touchend", () => {

  joyActive = false;

  joyX = 0;
  joyY = 0;

  stick.style.transform = `translate(0px,0px)`;

});
/////////////////////////////////////////////////////
// 🚶 MOVEMENT
/////////////////////////////////////////////////////

function move(){

  if(insideYacht) return;

  /////////////////////////////////////////////////////
  // 🎮 INPUT VECTOR
  /////////////////////////////////////////////////////

  let inputX = 0;
  let inputZ = 0;

  // KEYBOARD
  if(keys["w"]) inputZ -= 1;
  if(keys["s"]) inputZ += 1;
  if(keys["a"]) inputX -= 1;
  if(keys["d"]) inputX += 1;

  // MOBILE JOYSTICK
  if(joyActive){

    inputX += joyX;
    inputZ += joyY;

  }

  /////////////////////////////////////////////////////
  // NORMALIZE INPUT
  /////////////////////////////////////////////////////

  const inputLength =
    Math.hypot(inputX, inputZ);

  if(inputLength > 0){

    inputX /= inputLength;
    inputZ /= inputLength;

    /////////////////////////////////////////////////////
    // ACCELERATION
    /////////////////////////////////////////////////////

    velocity.x +=
      inputX * moveSettings.acceleration;

    velocity.z +=
      inputZ * moveSettings.acceleration;

  }

  /////////////////////////////////////////////////////
  // FRICTION
  /////////////////////////////////////////////////////

  velocity.x *= moveSettings.friction;
  velocity.z *= moveSettings.friction;

  /////////////////////////////////////////////////////
  // SPEED LIMIT
  /////////////////////////////////////////////////////

  const speed =
    Math.hypot(velocity.x, velocity.z);

  if(speed > moveSettings.maxSpeed){

    velocity.x =
      (velocity.x / speed) *
      moveSettings.maxSpeed;

    velocity.z =
      (velocity.z / speed) *
      moveSettings.maxSpeed;
  }

  /////////////////////////////////////////////////////
  // APPLY MOVEMENT
  /////////////////////////////////////////////////////

  player.position.x += velocity.x;
  player.position.z += velocity.z;

  /////////////////////////////////////////////////////
  // PLAYER ROTATION
  /////////////////////////////////////////////////////
// PLAYER ROTATION
if (speed > 0.05) {

  const targetRotation = Math.atan2(velocity.x, velocity.z);

  let delta = targetRotation - player.rotation.y;

  delta = Math.atan2(Math.sin(delta), Math.cos(delta));

  player.rotation.y += delta * moveSettings.rotationSpeed;

} else {
  // hold last direction (no drift)
}
  /////////////////////////////////////////////////////
  // WORLD LIMITS
  /////////////////////////////////////////////////////

  player.position.x = Math.max(
    -WORLD_LIMIT,
    Math.min(WORLD_LIMIT, player.position.x)
  );

  player.position.z = Math.max(
    -WORLD_LIMIT,
    Math.min(WORLD_LIMIT, player.position.z)
  );

}
