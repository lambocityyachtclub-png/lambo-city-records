<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — AAA UPGRADED ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; }

canvas{
position:fixed;
inset:0;
z-index:1;
}

#intro{
position:fixed;
inset:0;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

#intro img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.9;
pointer-events:none;
}

#enter{
position:relative;
z-index:1000;
padding:18px 40px;
font-size:20px;
letter-spacing:3px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
}

#ui{
position:fixed;
top:20px;
left:20px;
color:white;
z-index:10;
font-family:Arial;
}
</style>
</head>

<body>

<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER WORLD</button>
</div>

<div id="ui">LAMBO CITY — UE5 CAMERA UPGRADE</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

/* =========================
STATE
========================= */
let mode="intro";
let t=0;
let introTime=0;

/* =========================
SCENE
========================= */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814,0.0014);
scene.background = new THREE.Color(0x050714);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(
75,innerWidth/innerHeight,0.1,6000
);
camera.position.set(0,40,120);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.outputColorSpace = THREE.SRGBColorSpace;

/* =========================
LIGHTING
========================= */
const ambient = new THREE.AmbientLight(0x6fa6c8,0.3);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff1d6,3);
sun.position.set(250,300,150);
scene.add(sun);

/* =========================
WORLD
========================= */
const water = new THREE.Mesh(
new THREE.PlaneGeometry(8000,8000),
new THREE.MeshStandardMaterial({color:0x08293d,metalness:0.7,roughness:0.3})
);
water.rotation.x=-Math.PI/2;
water.position.z=-200;
scene.add(water);

const dock = new THREE.Mesh(
new THREE.BoxGeometry(30,1,200),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

/* CABINS */
for(let i=0;i<6;i++){
let c1=new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x333333})
);
c1.position.set(-45,4,-20-i*30);
scene.add(c1);

let c2=c1.clone();
c2.position.x=45;
scene.add(c2);
}

/* =========================
PLAYER
========================= */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

let vel=new THREE.Vector3();
const keys={};

/* CAMERA UPGRADE VARIABLES */
let camVel=new THREE.Vector3();
let shake=0;

window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* =========================
MOVE
========================= */
function move(){
let x=0,z=0;

if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;

let len=Math.hypot(x,z);
if(len>0){x/=len;z/=len;}

vel.x+=x*0.12;
vel.z+=z*0.12;
vel.multiplyScalar(0.86);

player.position.x+=vel.x;
player.position.z+=vel.z;
}

/* =========================
UE5 CAMERA UPGRADE (NEW)
========================= */
function cam(){

const target=new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

/* smooth lag (UE STYLE) */
camVel.x+=(target.x-camera.position.x)*0.045;
camVel.y+=(target.y-camera.position.y)*0.045;
camVel.z+=(target.z-camera.position.z)*0.045;

camVel.multiplyScalar(0.82);
camera.position.add(camVel);

/* SPEED BASED FOV */
let speed=Math.abs(vel.x)+Math.abs(vel.z);
camera.fov = 70 + speed*25;
camera.updateProjectionMatrix();

/* SCREEN SHAKE (SUBTLE AAA FEEL) */
shake = speed * 2;

camera.position.x += (Math.random()-0.5)*shake;
camera.position.y += (Math.random()-0.5)*shake;

camera.lookAt(player.position);
}

/* =========================
ATMOSPHERE
========================= */
function time(){
t+=0.0012;
let day=Math.sin(t);

ambient.intensity=0.2+(1-day)*0.4;
sun.intensity=2+day*1.4;

scene.fog.color=new THREE.Color(
0.02+day*0.05,
0.06+day*0.08,
0.12+day*0.15
);

water.material.color.setRGB(0.01+day*0.03,0.08,0.12+day*0.05);
}

/* OCEAN */
function ocean(){
water.position.x=Math.sin(t*1.2)*3;
water.position.z=-200+Math.cos(t*1.1)*3;
}

/* =========================
CINEMATIC INTRO
========================= */
function introCam(){
introTime+=0.016;

if(introTime<6){
camera.position.lerp(new THREE.Vector3(Math.sin(introTime*0.4)*180,50,150-introTime*30),0.05);
camera.lookAt(0,0,-120);
}
else if(introTime<12){
camera.position.lerp(new THREE.Vector3(0,40,80-(introTime-6)*35),0.05);
camera.lookAt(0,0,-40);
}
else if(introTime<18){
camera.position.lerp(new THREE.Vector3(0,45,-40-(introTime-12)*40),0.05);
camera.lookAt(0,0,-160);
}
else mode="play";
}

/* =========================
ENTER BUTTON (SAFE)
========================= */
document.getElementById("enter").addEventListener("click",()=>{
document.getElementById("intro").style.display="none";
mode="cinematic";
introTime=0;
});

/* =========================
RESIZE
========================= */
window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/* =========================
LOOP
========================= */
function animate(){
requestAnimationFrame(animate);

if(mode==="cinematic") introCam();
if(mode==="play"){move();time();ocean();cam();}

renderer.render(scene,camera);
}

animate();

});
</script>

</body>
</html>
