<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
<h2>LAMBO CITY YACHT CLUB</h2>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">ZONE: ENTRY</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht, dock;
let keys = {};
let zone = "ENTRY";

function start(){

document.getElementById("start").style.display = "none";

scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,6);

renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0x223344, 1));

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// DOCK
dock = new THREE.Mesh(
  new THREE.BoxGeometry(30,1,10),
  new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,-0.5,-10);
scene.add(dock);

// YACHT CLUB AREA
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(10,1,10),
  new THREE.MeshStandardMaterial({color:0x222233})
);
yacht.position.set(0,0.5,-30);
scene.add(yacht);

// MUSIC (ambient club vibe)
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3");
music.loop = true;
music.volume = 0.4;

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=> music.play());

animate();

function interact(){

let dist = player.position.distanceTo(yacht.position);

if(dist < 5){
  zone = "YACHT CLUB";
  document.getElementById("ui").innerText = "ZONE: YACHT CLUB ACTIVE";
  music.play();
}

}

function animate(){

requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z -= 0.1;
if(keys["s"]) player.position.z += 0.1;
if(keys["a"]) player.position.x -= 0.1;
if(keys["d"]) player.position.x += 0.1;

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 6 - camera.position.z)*0.05;
camera.lookAt(player.position);

// PROMPT
if(player.position.z < -20){
  document.getElementById("prompt").style.display = "block";
} else {
  document.getElementById("prompt").style.display = "none";
}

renderer.render(scene,camera);

}

}

</script>

</body>
</html>
