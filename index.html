  getBalance: () => coins,

  earn: (amount) => {

    stageInside = true;

let stageRewarded = false;

function rewardPlayer(reason){

  console.log("Reward triggered:", reason);

  // prevent spam reward from stage zone
  if(reason === "stage_visit" && stageRewarded) return;

  if(reason === "stage_visit") stageRewarded = true;

  Economy.earn(1);
}

// 🎯 EVENT SYSTEM (FOUNDATION LAYER)
/////////////////////////////////////////////////////

const Events = {

  emit: (type, data = {}) => {
    handleEvent(type, data);
  }

};

function handleEvent(type, data){

  switch(type){

    case "ENTER_STAGE_ZONE":
      console.log("Player entered stage zone");
      if(FEATURES.rewards){
  rewardPlayer("stage_visit");
}
      break;

    case "ENTER_CABIN":

  console.log("Player entered cabin");

  inside = true;

  activeCabin = data.cabin;

  document.getElementById("msg").style.display = "block";

  document.getElementById("zone").innerText =
    "INSIDE CABIN";

  rewardPlayer("cabin_entry");

  break;

    case "DOCK_TOUCH":
      console.log("Player at dock");
      rewardPlayer("dock_visit");
      break;
  }

  streamURL: "",

  current: null,

  play(index = 0) {
    this.stop();

    this.mode = "playlist";

    this.current = new Audio(this.playlist[index]);
    this.current.loop = true;
    this.current.volume = 0.4;
    this.current.play().catch(()=>{});
  },

  playStream(url) {
    this.stop();

    this.mode = "stream";

    this.streamURL = url;
    this.current = new Audio(url);
    this.current.loop = true;
    this.current.volume = 0.6;
    this.current.play().catch(()=>{});
  },

  stop() {
    if (this.current) {
      this.current.pause();
      this.current = null;

function updateStageEnergy(){

  const dist = player.position.distanceTo(stage.position);

  // ONLY UPDATE GAME STATE (NO UI HERE)
  GameState.stageActive = dist < 45;

  // LIGHTS ONLY (visual feedback)
  if(GameState.stageActive){

    let t = Date.now()*0.002;

    stageLight1.intensity = 2;
    stageLight2.intensity = 2;

    stageLight1.position.set(Math.sin(t)*10, 10, -135);
    stageLight2.position.set(Math.cos(t)*10, 10, -135);

    crowd.forEach((p,i)=>{
      p.lookAt(player.position);
      p.position.y = crowdBaseY[i] + Math.sin(Date.now()*0.005 + i)*0.25;
    });

  } else {

    stageLight1.intensity = 0;
    stageLight2.intensity = 0;

    crowd.forEach((p,i)=>{
      p.position.y = crowdBaseY[i];
    });
  }
}

const joystick = document.createElement("div");

const stick = document.createElement("div");

stick.style.width = "50px";
stick.style.height = "50px";
stick.style.background = "rgba(0,255,255,0.7)";
stick.style.borderRadius = "50%";
stick.style.position = "absolute";

joystick.appendChild(stick);

let joyActive = false;
let joyX = 0;
let joyY = 0;

joystick.addEventListener("touchstart", e => {

  joyActive = true;

});

joystick.addEventListener("touchmove", e => {

  e.preventDefault();

  const touch = e.touches[0];

  const rect = joystick.getBoundingClientRect();

  const x = touch.clientX - rect.left - 60;
  const y = touch.clientY - rect.top - 60;

  const dist = Math.min(Math.sqrt(x*x + y*y), 40);

  const angle = Math.atan2(y, x);

  joyX = Math.cos(angle) * (dist / 40);
  joyY = Math.sin(angle) * (dist / 40);

  stick.style.transform =
    `translate(${joyX*35}px, ${joyY*35}px)`;

}, { passive:false });

joystick.addEventListener("touchend", () => {

  joyActive = false;

  joyX = 0;
  joyY = 0;

  stick.style.transform = `translate(0px,0px)`;

});

function move(){

  if(insideYacht) return;
  // KEYBOARD
  if(keys["w"]) player.position.z -= 0.25;
  if(keys["s"]) player.position.z += 0.25;
  if(keys["a"]) player.position.x -= 0.25;
  if(keys["d"]) player.position.x += 0.25;

  // MOBILE JOYSTICK
  if(joyActive){

    player.position.x += joyX * 0.25;
    player.position.z += joyY * 0.25;

  }

  // WORLD LIMITS
  player.position.x = Math.max(
    -WORLD_LIMIT,
    Math.min(WORLD_LIMIT, player.position.x)
  );

  player.position.z = Math.max(
    -WORLD_LIMIT,
    Math.min(WORLD_LIMIT, player.position.z)
  );

}
