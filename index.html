<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ENGINE v6</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}
canvas{position:fixed;inset:0;display:block;z-index:1}

#ui,#reputation{
position:fixed;left:20px;z-index:10;color:white;font-size:14px;letter-spacing:2px
}
#ui{top:20px}
#reputation{top:50px}

#enter{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
padding:18px 40px;font-size:18px;
background:black;border:2px solid #00aaff;
color:white;cursor:pointer;z-index:9999;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY ENGINE v6</div>
<div id="reputation">Reputation: 0</div>
<button id="enter">ENTER WORLD</button>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded",()=>{

/* =========================
ENGINE CORE
========================= */
let mode="play";
let t=0;

/* =========================
SCENE
========================= */
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x050714,0.0012);

/* CAMERA */
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,10000);
camera.position.set(0,40,120);

/* RENDERER */
const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0x88aacc,0.4));
const sun=new THREE.DirectionalLight(0xffffff,2.5);
sun.position.set(200,300,100);
scene.add(sun);

/* =========================
PLAYER SYSTEM
========================= */
const player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

/* =========================
WORLD BASE
========================= */
const ocean=new THREE.Mesh(
new THREE.PlaneGeometry(9000,9000),
new THREE.MeshStandardMaterial({color:0x0a2a3a})
);
ocean.rotation.x=-Math.PI/2;
scene.add(ocean);

/* =========================
CAR SYSTEM (GTA CORE)
========================= */
const car=new THREE.Mesh(
new THREE.BoxGeometry(3,1.5,6),
new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.set(10,1,10);
scene.add(car);

let inCar=false;

/* =========================
YACHT SYSTEM
========================= */
const yacht=new THREE.Group();

const hull=new THREE.Mesh(
new THREE.BoxGeometry(60,10,160),
new THREE.MeshStandardMaterial({color:0xffffff})
);
hull.position.y=5;
yacht.add(hull);

yacht.position.set(0,0,-420);
scene.add(yacht);

let inYacht=false;

/* =========================
NPC SYSTEM
========================= */
const npcs=[];

function spawnNPC(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00ffcc})
);
n.position.set(x,1,z);
n.userData={
vx:(Math.random()-0.5)*0.1,
vz:(Math.random()-0.5)*0.1
};
scene.add(n);
npcs.push(n);
}

for(let i=0;i<30;i++){
spawnNPC((Math.random()-0.5)*100,(Math.random()-0.5)*100);
}

function updateNPCs(){
for(let n of npcs){
n.position.x+=n.userData.vx;
n.position.z+=n.userData.vz;

if(Math.random()<0.01){
n.userData.vx=(Math.random()-0.5)*0.1;
n.userData.vz=(Math.random()-0.5)*0.1;
}
}
}

/* =========================
DISTRICT LOADING
========================= */
const zones={
loaded:false,
load(){
if(this.loaded) return;
this.loaded=true;

const zone=new THREE.Mesh(
new THREE.BoxGeometry(300,1,300),
new THREE.MeshStandardMaterial({color:0x222233})
);
zone.position.set(-200,0,-200);
scene.add(zone);
}
};

/* =========================
NETWORK (placeholder)
========================= */
const network={
update(){}
};

/* =========================
CONTROLS
========================= */
const keys={};

addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()]=true;

if(e.key==="e") inCar=!inCar;
if(e.key==="q") inYacht=!inYacht;
});

addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()]=false;
});

/* =========================
MOVE
========================= */
function move(){

let target=inCar?car:player;
let speed=inCar?0.25:0.12;

let x=0,z=0;
if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;

let l=Math.hypot(x,z);
if(l){x/=l;z/=l;}

target.position.x+=x*speed;
target.position.z+=z*speed;
}

/* =========================
CAMERA
========================= */
let camVel=new THREE.Vector3();

function cam(){

let target=inCar?car:player;

const goal=new THREE.Vector3(
target.position.x,
target.position.y+30,
target.position.z+90
);

camVel.lerp(goal.clone().sub(camera.position).multiplyScalar(0.06),0.8);
camera.position.add(camVel);

camera.lookAt(target.position);
}

/* =========================
YACHT TRIGGER
========================= */
function yachtCheck(){
if(player.position.distanceTo(yacht.position)<80){
zones.load();
}
}

/* =========================
LOOP
========================= */
function animate(){
requestAnimationFrame(animate);

if(mode==="play"){
move();
cam();
updateNPCs();
yachtCheck();
network.update();
}

renderer.render(scene,camera);
}
animate();

/* =========================
ENTER
========================= */
document.getElementById("enter").onclick=()=>{
document.getElementById("enter").style.display="none";
mode="play";
};

});
</script>

</body>
</html>
