function updateCamera(){

const targetX = inside && activeCabin
? activeCabin.group.position.x
: player.position.x;

const targetY = inside && activeCabin
? 3
: 10;

const targetZ = inside && activeCabin
? activeCabin.group.position.z
: player.position.z + 14;

// smooth follow (LERP)
camera.position.x += (targetX - camera.position.x) * 0.08;
camera.position.y += (targetY - camera.position.y) * 0.08;
camera.position.z += (targetZ - camera.position.z) * 0.08;

// look target
const lookTarget = inside && activeCabin
? activeCabin.group.position
: player.position;

camera.lookAt(lookTarget);
}

    stageLight2.intensity = 2;

    stageLight2.position.set(Math.cos(t)*10, 10, -135);

    crowd.forEach((p,i)=>{
      p.lookAt(player.position);
      p.position.y = crowdBaseY[i] + Math.sin(Date.now()*0.005 + i)*0.25;
    });

  } else {

    stageLight1.intensity = 0;
    stageLight2.intensity = 0;

    crowd.forEach((p,i)=>{
      p.position.y = crowdBaseY[i];
    });
  }
}

joystick.style.alignItems = "center";
joystick.style.zIndex = "20";

document.body.appendChild(joystick);

const stick = document.createElement("div");

stick.style.width = "50px";
stick.style.height = "50px";
stick.style.background = "rgba(0,255,255,0.7)";
stick.style.borderRadius = "50%";
stick.style.position = "absolute";

joystick.appendChild(stick);

let joyActive = false;
let joyX = 0;
let joyY = 0;

joystick.addEventListener("touchstart", e => {

  joyActive = true;

});

joystick.addEventListener("touchmove", e => {

  e.preventDefault();

  const touch = e.touches[0];

  const rect = joystick.getBoundingClientRect();

  const x = touch.clientX - rect.left - 60;
  const y = touch.clientY - rect.top - 60;

  const dist = Math.min(Math.sqrt(x*x + y*y), 40);

  const angle = Math.atan2(y, x);

  joyX = Math.cos(angle) * (dist / 40);
  joyY = Math.sin(angle) * (dist / 40);

  stick.style.transform =
    `translate(${joyX*35}px, ${joyY*35}px)`;

}, { passive:false });

joystick.addEventListener("touchend", () => {

  joyActive = false;

  joyX = 0;
  joyY = 0;

  stick.style.transform = `translate(0px,0px)`;

});

function move(){

  if(inside) return;

  // KEYBOARD
  if(keys["w"]) player.position.z -= 0.25;
  if(keys["s"]) player.position.z += 0.25;
  if(keys["a"]) player.position.x -= 0.25;
  if(keys["d"]) player.position.x += 0.25;

  // MOBILE JOYSTICK
  if(joyActive){

    player.position.x += joyX * 0.25;
    player.position.z += joyY * 0.25;

  }

  // WORLD LIMITS
  player.position.x = Math.max(
    -WORLD_LIMIT,
    Math.min(WORLD_LIMIT, player.position.x)
  );

  player.position.z = Math.max(
    -WORLD_LIMIT,
    Math.min(WORLD_LIMIT, player.position.z)
  );

}
/////////////////////////////////////////////////////
// MAIN GAME LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  if(!started) return;

  move();

  updateCamera();

  updateStageEnergy();

  checkStageEvents();

  if(water.material.color){
  water.material.color.offsetHSL(0.00002,0,0);
}
  
/////////////////////////////////////////////////////
// 🌟 HERO ANIMATION SYSTEM
/////////////////////////////////////////////////////

hero.position.y =
  1 + Math.sin(Date.now() * 0.003) * 0.15;

marker.rotation.y += 0.03;

/////////////////////////////////////////////////////
// 👤 HERO PROXIMITY SYSTEM
/////////////////////////////////////////////////////

const heroDist = player.position.distanceTo(hero.position);

if(heroDist < 8){
 showInteraction("PRESS E TO TALK TO HERO");
} else {
 hideInteraction();
}

/////////////////////////////////////////////////////
// 🌌 CINEMATIC LIGHT MOTION
/////////////////////////////////////////////////////

beam1.position.x = Math.sin(Date.now()*0.001)*80;
beam2.position.x = Math.cos(Date.now()*0.001)*80;
  /////////////////////////////////////////////////////
// 📺 DJ SCREEN ANIMATION
/////////////////////////////////////////////////////

screenMat.emissiveIntensity =
  1.5 + Math.sin(Date.now()*0.005) * 1.2;

screen.rotation.y =
  Math.sin(Date.now()*0.001) * 0.03;
stars.rotation.y += 0.0003;
particles.rotation.y += 0.0005;
renderer.render(scene, camera);
}

animate();

</script>
