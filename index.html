<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | INTERIOR WORLD v21</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* =========================
   🎮 LOBBY
========================= */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #050510);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 4000;
    transition: opacity 1s ease;
}

#enterBtn {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
}

/* =========================
   🎥 CAMERA (DEPTH FEEL)
========================= */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    filter: blur(0px);
    transition: 0.6s ease;
    z-index: 999;
}

/* =========================
   🌆 WORLD CONTAINER
========================= */
#world {
    position: absolute;
    width: 300%;
    height: 100%;
    display: flex;
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

/* OUTSIDE ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* INTERIOR SYSTEM (NEW LAYER) */
.interior {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: radial-gradient(circle, #111, #000);
    z-index: 2000;
}

/* DIFFERENT INTERIORS */
#yachtInterior {
    background: radial-gradient(circle, #0a0f1a, #000);
}

#storeInterior {
    background: radial-gradient(circle, #1a0a0a, #000);
}

/* =========================
   🎯 TITLE
========================= */
.title {
    font-size: 42px;
    letter-spacing: 7px;
    margin-bottom: 20px;
}

/* =========================
   🚪 DOORS (IMPORTANT FEEL CHANGE)
========================= */
.door {
    padding: 12px 20px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    margin: 10px;
}

/* =========================
   🎥 STREAM
========================= */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
}

/* =========================
   💬 CHAT FEED
========================= */
#chat {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 260px;
    height: 180px;
    font-size: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px;
    overflow: hidden;
    z-index: 1000;
}

/* =========================
   🎬 LOCATION TEXT
========================= */
#location {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    letter-spacing: 5px;
    opacity: 0;
    z-index: 3000;
    transition: 0.4s ease;
}
</style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
    <div>CONNECTING TO LAMBO CITY...</div>
    <button id="enterBtn" onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="camera"></div>
<div id="location"></div>
<div id="chat"></div>

<!-- 🌆 WORLD -->
<div id="world">

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <button class="door" onclick="enterInterior('yacht')">
            ENTER YACHT CLUB
        </button>

        <button class="door" onclick="enterInterior('store')">
            ENTER STORE
        </button>
    </div>

</div>

<!-- 🚤 YACHT INTERIOR -->
<div class="interior" id="yachtInterior">
    <div class="title">YACHT CLUB INTERIOR</div>

    <iframe src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"></iframe>

    <button class="door" onclick="exitInterior()">EXIT TO CITY</button>
</div>

<!-- 🛍 STORE INTERIOR -->
<div class="interior" id="storeInterior">
    <div class="title">LAMBO CITY STORE</div>

    <button class="door">HERO DROP</button>
    <button class="door">CLASSIC LINE</button>

    <button class="door" onclick="exitInterior()">EXIT TO CITY</button>
</div>

<script>

const camera = document.getElementById("camera");
const lobby = document.getElementById("lobby");
const city = document.getElementById("city");
const chat = document.getElementById("chat");
const locationText = document.getElementById("location");

let currentInterior = null;

/* =========================
   🎮 ENTER WORLD
========================= */
function enterWorld() {
    lobby.style.opacity = "0";
    setTimeout(() => lobby.style.display = "none", 1000);
}

/* =========================
   🚪 ENTER BUILDING (KEY SYSTEM)
========================= */
function enterInterior(type) {

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.6)";
    document.body.style.filter = "brightness(2) contrast(1.5)";

    setTimeout(() => {

        city.style.display = "none";

        if (type === "yacht") {
            document.getElementById("yachtInterior").style.display = "flex";
            showLocation("YACHT CLUB INTERIOR");
            currentInterior = "yacht";
        }

        if (type === "store") {
            document.getElementById("storeInterior").style.display = "flex";
            showLocation("STORE INTERIOR");
            currentInterior = "store";
        }

        setTimeout(() => {
            camera.style.opacity = "0";
            document.body.style.filter = "brightness(1) contrast(1)";
        }, 400);

    }, 300);
}

/* =========================
   🚪 EXIT BUILDING
========================= */
function exitInterior() {

    camera.style.opacity = "1";
    document.body.style.filter = "brightness(2) contrast(1.5)";

    setTimeout(() => {

        document.querySelectorAll(".interior").forEach(i => i.style.display = "none");
        city.style.display = "flex";

        showLocation("BACK TO CITY");

        setTimeout(() => {
            camera.style.opacity = "0";
            document.body.style.filter = "brightness(1)";
        }, 400);

    }, 300);
}

/* =========================
   🎬 LOCATION FEEL
========================= */
function showLocation(text) {
    locationText.innerText = text;
    locationText.style.opacity = "1";

    setTimeout(() => {
        locationText.style.opacity = "0";
    }, 900);
}

</script>

</body>
</html>
