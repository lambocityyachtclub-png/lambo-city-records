<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V32 — GAME LOOP SYSTEM</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V32 — GAME LOOP SYSTEM</div>
<div id="zone">STATE: BOOTING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// GAME ENGINE CORE LOOP
/////////////////////////////////////////////////////

const GAME = {
state: "EXPLORE",
speed: 0.32,
lockInput: false
};

function setState(s){
GAME.state = s;
document.getElementById("zone").innerText = "STATE: " + s;
}

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2e);
scene.fog = new THREE.Fog(0x0a1220, 80, 800);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 12000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.9));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,400,150);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT SYSTEM
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;

// interaction system
if(e.key.toLowerCase()==="e"){
handleInteract();
}
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

function cabin(x,z){

const c = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);

c.position.set(x,4,z);
scene.add(c);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(20,4,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(60,2,-120);
scene.add(yacht);

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x061a2b})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

/////////////////////////////////////////////////////
// CAMERA SYSTEM
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

function updateCamera(){

let target = player.position;

camera.position.x += (target.x - camera.position.x)*0.06;
camera.position.y += ((target.y + 12) - camera.position.y)*0.06;
camera.position.z += ((target.z + 25) - camera.position.z)*0.06;

camera.lookAt(target);
}

/////////////////////////////////////////////////////
// MOVEMENT SYSTEM
/////////////////////////////////////////////////////

function move(){

if(GAME.lockInput) return;

if(keys.w) player.position.z -= GAME.speed;
if(keys.s) player.position.z += GAME.speed;
if(keys.a) player.position.x -= GAME.speed;
if(keys.d) player.position.x += GAME.speed;
}

/////////////////////////////////////////////////////
// CUTSCENE SYSTEM
/////////////////////////////////////////////////////

let cutsceneT = 0;

function playCutscene(){

GAME.lockInput = true;
setState("CUTSCENE");

cutsceneT = 0;

function run(){
cutsceneT += 0.01;

camera.position.x = Math.sin(cutsceneT)*80;
camera.position.y = 40 - cutsceneT*10;
camera.position.z = 100 - cutsceneT*60;

camera.lookAt(0,0,0);

if(cutsceneT < 1.5){
requestAnimationFrame(run);
} else {
GAME.lockInput = false;
setState("EXPLORE");
}
}

run();
}

/////////////////////////////////////////////////////
// INTERACTION SYSTEM
/////////////////////////////////////////////////////

function handleInteract(){

// yacht interaction
const d = player.position.distanceTo(yacht.position);

if(d < 10){
playCutscene();
return;
}

// stage interaction
if(player.position.z < -120){
playCutscene();
return;
}

}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function update(){
move();
updateCamera();
}

function render(){
renderer.render(scene,camera);
}

function loop(){
requestAnimationFrame(loop);
update();
render();
}

setState("EXPLORE");
loop();

</script>

</body>
</html>
