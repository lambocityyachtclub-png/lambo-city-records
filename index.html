<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LUXURY WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
position:absolute;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LOADING LUXURY WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

let started = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x070814, 0.012);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"), antialias:true});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (LUXURY LOOK)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const mainLight = new THREE.PointLight(0x66ccff, 1.5, 250);
mainLight.position.set(0,40,40);
scene.add(mainLight);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,-30);
scene.add(player);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// 🌊 OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(1500,1500,50,50);
const waterMat = new THREE.MeshStandardMaterial({
color:0x020b1a,
metalness:0.7,
roughness:0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
waterBase.push({
x:waterPos.getX(i),
z:waterPos.getZ(i)
});
}

/////////////////////////////////////////////////////
// 🏡 LUXURY VILLA (FIXED — MULTI LEVEL)
/////////////////////////////////////////////////////

function createVilla(x, z) {

const villa = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(18, 1, 18),
new THREE.MeshStandardMaterial({ color: 0x0f0f0f })
);
base.position.y = 0.5;
villa.add(base);

const floor1 = new THREE.Mesh(
new THREE.BoxGeometry(18, 5, 18),
new THREE.MeshStandardMaterial({ color: 0x151515 })
);
floor1.position.y = 3;
villa.add(floor1);

const floor2 = new THREE.Mesh(
new THREE.BoxGeometry(16, 5, 16),
new THREE.MeshStandardMaterial({ color: 0x101010 })
);
floor2.position.y = 8;
villa.add(floor2);

// OPEN FRONT (IMPORTANT FOR WALK-IN FEEL)
const entrance = new THREE.Mesh(
new THREE.BoxGeometry(6, 4, 0.5),
new THREE.MeshBasicMaterial({ visible: false })
);
entrance.position.set(0, 2, 9);
villa.add(entrance);

// BALCONY WRAP
const balcony = new THREE.Mesh(
new THREE.BoxGeometry(24, 0.5, 6),
new THREE.MeshStandardMaterial({ color: 0x222222 })
);
balcony.position.set(0, 5, 10);
villa.add(balcony);

// GLASS RAIL
const rail = new THREE.Mesh(
new THREE.BoxGeometry(24, 1.2, 0.2),
new THREE.MeshStandardMaterial({
color: 0x88ccff,
transparent: true,
opacity: 0.3
})
);
rail.position.set(0, 6, 13);
villa.add(rail);

// INTERIOR LIGHT (KEY LUXURY FEEL)
const light = new THREE.PointLight(0x66ccff, 1.5, 40);
light.position.set(0, 6, 0);
villa.add(light);

// MINIMAL INTERIOR FURNITURE (VISIBLE FROM OUTSIDE)
const couch = new THREE.Mesh(
new THREE.BoxGeometry(6, 1, 2),
new THREE.MeshStandardMaterial({ color: 0x222222 })
);
couch.position.set(-3, 1, 0);
villa.add(couch);

const table = new THREE.Mesh(
new THREE.BoxGeometry(2, 1, 2),
new THREE.MeshStandardMaterial({ color: 0x111111 })
);
table.position.set(3, 1, 0);
villa.add(table);

// POSITION
villa.position.set(x, 0, z);
scene.add(villa);

villas.push(villa);
}

/////////////////////////////////////////////////////
// 🚤 YACHT (SIMPLE CLEAN)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(16,4,45),
new THREE.MeshStandardMaterial({color:0xf2f2f2})
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({
color:0x00ffff,
emissive:0x00ffff
})
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
hint.style.display="block";
hint.innerText=t;
}

function hide(){
hint.style.display="none";
}

/////////////////////////////////////////////////////
// INTERACTIONS
/////////////////////////////////////////////////////

function check(){
const d = player.position.distanceTo(hero.position);
if(d<3) show("PRESS E TO TALK");
else hide();
}

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
if(player.position.distanceTo(hero.position)<3){
document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY";
}
}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();
check();

const t = Date.now()*0.001;

for(let i=0;i<waterPos.count;i++){
const v = waterBase[i];
waterPos.setY(i,
Math.sin(v.x*0.02+t)*0.4 +
Math.cos(v.z*0.02+t)*0.4
);
}

waterPos.needsUpdate = true;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
