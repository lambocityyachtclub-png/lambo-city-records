<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City Lounge</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* BACKGROUND (Penthouse + Yacht vibe) */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1950&q=80')
    no-repeat center center/cover;
  filter: brightness(0.55) contrast(1.1);
  z-index: -3;
}

/* NEON OVERLAY */
.overlay {
  min-height: 100vh;
  background: radial-gradient(circle at top, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
  padding: 20px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 64px;
  font-weight: bold;
  color: gold;
  letter-spacing: 3px;
}

/* SUBTITLE */
.subtitle {
  text-align: center;
  max-width: 800px;
  margin: 10px auto 20px;
  color: #ddd;
}

/* LAYOUT */
.lounge {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  max-width: 1200px;
  margin: auto;
}

/* TV AREA (TWITCH AS LIVING ROOM TV) */
.tv {
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* SIDE PANEL */
.panel {
  background: rgba(0,0,0,0.5);
  border: 1px solid gold;
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

/* WINDOW VIEW (YACHT OUTSIDE FEEL) */
.window {
  margin-top: 20px;
  height: 120px;
  background:
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1950&q=80')
    no-repeat center center/cover;
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

.window::after {
  content: "MIAMI YACHT VIEW";
  position: absolute;
  bottom: 5px;
  right: 10px;
  font-size: 12px;
  color: gold;
  opacity: 0.8;
}

/* AVATAR (simple animated presence) */
.avatar {
  width: 60px;
  height: 60px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  bottom: 80px;
  left: 40px;
  animation: float 3s infinite ease-in-out;
  box-shadow: 0 0 20px gold;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* DOOR (VIP PORTAL) */
.door {
  margin-top: 15px;
  text-align: center;
  padding: 15px;
  background: rgba(255,215,0,0.2);
  border: 1px solid gold;
  cursor: pointer;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay">

<div class="title">LAMBO CITY</div>

<div class="subtitle">
Miami Penthouse Lounge • Music • Streams • Yacht Energy • Exclusive Access
</div>

<div class="lounge">

<!-- TV / TWITCH -->
<div class="tv">
<iframe
src="https://player.twitch.tv/?channel=LamboCityRecords&parent=lambocityrecords.com"
width="100%"
height="420"
allowfullscreen>
</iframe>
</div>

<!-- SIDE PANEL -->
<div class="panel">

<h3>LOUNGE CONTROL</h3>

<button onclick="location.href='map.html'">ENTER CITY MAP</button>

<button onclick="location.href='vip.html'">ENTER YACHT CLUB</button>

<div class="door" onclick="location.href='vip.html'">
🚪 PRIVATE CLUB DOOR
</div>

<div class="window"></div>

</div>

</div>

<!-- AVATAR -->
<div class="avatar"></div>

</div>

</body>
</html>
