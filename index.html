<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | GTA ONLINE FEEL v23</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* =========================
   🎮 LOADING SESSION
========================= */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #050510);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 5000;
    transition: opacity 1s ease;
}

#enterBtn {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🎥 CAMERA (SHAKE + DEPTH)
========================= */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.2);
    filter: blur(0px);
    transition: 0.4s ease;
    z-index: 999;
}

/* =========================
   🌆 WORLD FEEL
========================= */
#world {
    width: 100%;
    height: 100%;
}

/* CITY */
#city {
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: radial-gradient(circle at top, #3a1f0a, #000);
}

/* INTERIORS */
.interior {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* ENVIRONMENTS */
#yacht {
    background: radial-gradient(circle, #0a0f1a, #000);
}

#store {
    background: radial-gradient(circle, #1a0a0a, #000);
}

/* =========================
   🎯 UI TEXT
========================= */
.title {
    font-size: 44px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* =========================
   🔘 INTERACTION
========================= */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🔊 AUDIO (HIDDEN)
========================= */
audio {
    display: none;
}
</style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
    <div>STARTING LAMBO CITY ONLINE SESSION...</div>
    <button id="enterBtn" onclick="enterWorld()">ENTER SESSION</button>
</div>

<div id="camera"></div>

<!-- 🌆 CITY -->
<div id="city">
    <div class="title">LAMBO CITY</div>

    <button onclick="enter('yacht')">ENTER YACHT CLUB</button>
    <button onclick="enter('store')">ENTER STORE</button>
</div>

<!-- 🚤 YACHT -->
<div id="yacht" class="interior">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        width="80%" height="450"
        allowfullscreen>
    </iframe>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- 🛍 STORE -->
<div id="store" class="interior">
    <div class="title">STORE</div>

    <button>HERO DROP</button>
    <button>CLASSIC LINE</button>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- 🔊 AMBIENCE AUDIO LAYERS -->
<audio id="cityAudio" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_2b6b5c6c5b.mp3" type="audio/mp3">
</audio>

<audio id="interiorAudio" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8c7f1c3.mp3" type="audio/mp3">
</audio>

<script>

const lobby = document.getElementById("lobby");
const camera = document.getElementById("camera");

const city = document.getElementById("city");
const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

const cityAudio = document.getElementById("cityAudio");
const interiorAudio = document.getElementById("interiorAudio");

/* =========================
   🎮 ENTER SESSION (GTA STYLE START)
========================= */
function enterWorld() {

    lobby.style.opacity = "0";

    setTimeout(() => {
        lobby.style.display = "none";

        city.style.display = "flex";

        cityAudio.volume = 0.3;
        cityAudio.play();

        showCameraBurst();

    }, 1000);
}

/* =========================
   🎬 CAMERA IMPACT (FEEL CHANGE)
========================= */
function showCameraBurst() {

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.4)";
    document.body.style.filter = "contrast(1.4) brightness(1.2)";

    setTimeout(() => {
        camera.style.opacity = "0";
        camera.style.transform = "scale(1.2)";
        document.body.style.filter = "none";
    }, 500);
}

/* =========================
   🚪 ENTER INTERIOR
========================= */
function enter(type) {

    showCameraBurst();

    setTimeout(() => {

        city.style.display = "none";

        cityAudio.pause();
        interiorAudio.volume = 0.4;
        interiorAudio.play();

        if (type === "yacht") yacht.style.display = "flex";
        if (type === "store") store.style.display = "flex";

    }, 300);
}

/* =========================
   🚪 EXIT INTERIOR
========================= */
function exitInterior() {

    showCameraBurst();

    setTimeout(() => {

        yacht.style.display = "none";
        store.style.display = "none";

        interiorAudio.pause();

        city.style.display = "flex";
        cityAudio.play();

    }, 300);
}

</script>

</body>
</html>
