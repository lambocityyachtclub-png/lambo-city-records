<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ENGINE v5+</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}
canvas{position:fixed;inset:0;display:block;z-index:1}

#ui,#reputation{
position:fixed;left:20px;z-index:10;color:white;font-size:14px;letter-spacing:2px
}
#ui{top:20px}
#reputation{top:50px}

#enter{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
padding:18px 40px;font-size:18px;
background:black;border:2px solid #00aaff;
color:white;cursor:pointer;z-index:9999;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY ENGINE v5+</div>
<div id="reputation">Reputation: 0</div>
<button id="enter">ENTER WORLD</button>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded",()=>{

/* =========================
CORE STATE
========================= */
let mode="intro";
let t=0;

/* =========================
SCENE
========================= */
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x050714,0.0012);

/* CAMERA */
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,10000);
camera.position.set(0,40,120);

/* RENDERER */
const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0x88aacc,0.4));
const sun=new THREE.DirectionalLight(0xffffff,2.5);
sun.position.set(200,300,100);
scene.add(sun);

/* =========================
WORLD BASE
========================= */
const ocean=new THREE.Mesh(
new THREE.PlaneGeometry(9000,9000),
new THREE.MeshStandardMaterial({color:0x0a2a3a,metalness:0.7,roughness:0.25})
);
ocean.rotation.x=-Math.PI/2;
scene.add(ocean);

const yacht=new THREE.Group();
const hull=new THREE.Mesh(
new THREE.BoxGeometry(60,10,160),
new THREE.MeshStandardMaterial({color:0xffffff,metalness:0.9})
);
hull.position.y=5;
yacht.add(hull);
yacht.position.set(0,0,-420);
scene.add(yacht);

/* STAGE */
const stage=new THREE.Mesh(
new THREE.CylinderGeometry(60,60,5,64),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x003355,
emissiveIntensity:2
})
);
stage.position.set(0,2,-220);
scene.add(stage);

const stageLight=new THREE.PointLight(0x00aaff,3,200);
stageLight.position.set(0,40,-220);
scene.add(stageLight);

/* =========================
CITY EXPANSION LAYER (RESTORED)
========================= */
const districts=[];

function addDistrict(name,rep,pos,fn){
districts.push({name,rep,pos,fn,done:false});
}

addDistrict("Ocean Blvd",10,new THREE.Vector3(-200,0,-200),()=>{
const r=new THREE.Mesh(
new THREE.BoxGeometry(300,1,40),
new THREE.MeshStandardMaterial({color:0x222233})
);
r.position.set(-200,0,-200);
scene.add(r);
});

addDistrict("Basketball Court",5,new THREE.Vector3(150,0,150),()=>{
const c=new THREE.Mesh(
new THREE.BoxGeometry(80,1,50),
new THREE.MeshStandardMaterial({color:0x0033aa})
);
c.position.set(150,0,150);
scene.add(c);
});

addDistrict("Popstar Hills",40,new THREE.Vector3(300,0,-300),()=>{
for(let i=0;i<6;i++){
const m=new THREE.Mesh(
new THREE.BoxGeometry(40,25,40),
new THREE.MeshStandardMaterial({color:0x111111})
);
m.position.set(300+i*60,12,-300-i*30);
scene.add(m);
}
});

/* =========================
ROAD NETWORK (EXPANDED)
========================= */
function road(a,b){
const curve=new THREE.CatmullRomCurve3([a,b]);
const mesh=new THREE.Mesh(
new THREE.TubeGeometry(curve,80,2,10,false),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
scene.add(mesh);
}

road(new THREE.Vector3(0,0,0),new THREE.Vector3(200,0,-80));
road(new THREE.Vector3(0,0,0),new THREE.Vector3(-200,0,-200));
road(new THREE.Vector3(0,0,0),new THREE.Vector3(150,0,150));
road(new THREE.Vector3(200,0,-80),new THREE.Vector3(300,0,-300));

/* =========================
CITY SIGN
========================= */
const sign=new THREE.Mesh(
new THREE.BoxGeometry(160,30,10),
new THREE.MeshStandardMaterial({color:0x111111,emissive:0x00aaff,emissiveIntensity:2})
);
sign.position.set(0,70,-600);
scene.add(sign);

/* =========================
PLAYER
========================= */
const player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

/* =========================
MOVEMENT
========================= */
const keys={};
let vel=new THREE.Vector3();

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
let x=0,z=0;
if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;
let l=Math.hypot(x,z);
if(l){x/=l;z/=l;}
vel.x+=x*0.12;
vel.z+=z*0.12;
vel.multiplyScalar(0.86);
player.position.add(vel);
}

/* =========================
CAMERA (CINEMATIC V5 FIXED)
========================= */
let camVel=new THREE.Vector3();

function cam(){
const target=new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camVel.lerp(target.clone().sub(camera.position).multiplyScalar(0.06),0.8);
camera.position.add(camVel);

t+=0.002;
camera.position.y+=Math.sin(t)*0.25;
camera.position.x+=Math.cos(t*0.7)*0.15;

camera.lookAt(player.position);
}

/* =========================
MUSIC SYSTEM (SAFE INIT)
========================= */
let audio,analyser,dataArray;

function initMusic(){
audio=new Audio("https://cdn.pixabay.com/download/audio/2022/10/25/audio_3b5f2c6c3c.mp3");
audio.loop=true;
audio.crossOrigin="anonymous";
audio.play();

const ctx=new AudioContext();
const src=ctx.createMediaElementSource(audio);
analyser=ctx.createAnalyser();
src.connect(analyser);
analyser.connect(ctx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function musicReact(){
if(!analyser)return;
analyser.getByteFrequencyData(dataArray);
let avg=0;
for(let i=0;i<dataArray.length;i++)avg+=dataArray[i];
avg/=dataArray.length;

stage.scale.y=1+avg/400;
stage.material.emissiveIntensity=1+avg/120;
}

/* =========================
PROGRESSION + DISTRICTS
========================= */
const Progression={
rep:0,
add(){
this.rep++;
document.getElementById("reputation").innerText="Reputation: "+this.rep;

for(let d of districts){
if(!d.done && this.rep>=d.rep){
d.done=true;
d.fn();
console.log("Unlocked:",d.name);
}
}
}
};

setInterval(()=>{if(mode==="play")Progression.add();},2500);

/* =========================
LOOP
========================= */
function animate(){
requestAnimationFrame(animate);
if(mode==="play"){
move();
cam();
musicReact();
}
renderer.render(scene,camera);
}
animate();

/* =========================
START
========================= */
document.getElementById("enter").onclick=()=>{
document.getElementById("enter").style.display="none";
mode="play";
initMusic();
};

});
</script>

</body>
</html>
