<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FINAL BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
#start h1 { font-size:28px; margin-bottom:20px; }
#start button {
  padding:12px 24px;
  border:none;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}

#prompt {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">EXPLORE — INTERACT — DISCOVER</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const STREAM_LINK = "https://lambocityrecords.com";
const MERCH_LINK = "https://lambocityrecords.com";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = new THREE.FogExp2(0x05060a, 0.02);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0x404040, 1.5));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DOOR
let door = new THREE.Mesh(
  new THREE.BoxGeometry(2,3,0.2),
  new THREE.MeshStandardMaterial({color:0x444444})
);
door.position.set(0,1.5,-9.9);
scene.add(door);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,40),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-40);
dock.visible = false;
scene.add(dock);

// YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(20,4,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,2,-60);
yacht.visible = false;
scene.add(yacht);

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
water.visible = false;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
const starArr = [];
for(let i=0;i<2000;i++){
  starArr.push((Math.random()-0.5)*300, Math.random()*150, -60+(Math.random()-0.5)*300);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.6}));
stars.visible = false;
scene.add(stars);

// MUSIC
let track = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3");
track.loop = true;

// OBJECTS
function createObj(color,x,y,z){
  let m = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color})
  );
  m.position.set(x,y,z);
  m.visible = false;
  scene.add(m);
  return m;
}

let radio = createObj(0xffff00,6,1,-60);
let screen = createObj(0x00aaff,0,2,-55);
let merch = createObj(0xff0000,-6,1.5,-60);

// CROWD (REAL LIFE)
let crowd=[];
for(let i=0;i<25;i++){
  let p = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1,0.5),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*15,0.5,-60+(Math.random()-0.5)*15);

  p.userData = {
    dir: Math.random()*Math.PI*2,
    speed: 0.01 + Math.random()*0.02
  };

  p.visible=false;
  scene.add(p);
  crowd.push(p);
}

// LIGHTS
let lights=[];
for(let i=0;i<8;i++){
  let l=new THREE.PointLight(0x00aaff,2,40);
  l.position.set((i-4)*4,3,-60);
  l.visible=false;
  scene.add(l);
  lights.push(l);
}

// INPUT
let keys={}, inDock=false;

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==="e") interact();
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ENTER
function enterWorld(){
  document.getElementById("start").style.display="none";
  track.play();
}

// INTERACT
function interact(){

if(!inDock && player.position.distanceTo(door.position)<3){
  inDock=true;

  scene.children.forEach(obj=>{
    if(obj!==player && obj!==dock && obj!==yacht && obj!==stars &&
       obj!==radio && obj!==screen && obj!==merch && obj!==water &&
       !crowd.includes(obj) && !lights.includes(obj)){
      obj.visible=false;
    }
  });

  dock.visible=true;
  yacht.visible=true;
  stars.visible=true;
  radio.visible=true;
  screen.visible=true;
  merch.visible=true;
  water.visible=true;

  crowd.forEach(p=>p.visible=true);
  lights.forEach(l=>l.visible=true);

  player.position.set(0,1,-30);
  document.getElementById("ui").innerText="YACHT CLUB — LIVE";
  track.play();
  return;
}

if(player.position.distanceTo(radio.position)<3){
  document.getElementById("ui").innerText="PLAYING MUSIC";
  track.currentTime=0;
  track.play();
}

if(player.position.distanceTo(screen.position)<4){
  document.getElementById("ui").innerText="OPENING STREAM";
  window.open(STREAM_LINK,"_blank");
}

if(player.position.distanceTo(merch.position)<3){
  document.getElementById("ui").innerText="OPENING STORE";
  window.open(MERCH_LINK,"_blank");
}

}

// LOOP
function animate(){
requestAnimationFrame(animate);

if(keys["w"]) player.position.z-=0.1;
if(keys["s"]) player.position.z+=0.1;
if(keys["a"]) player.position.x-=0.1;
if(keys["d"]) player.position.x+=0.1;

camera.position.x+=(player.position.x-camera.position.x)*0.05;
camera.position.z+=(player.position.z+5-camera.position.z)*0.05;
camera.lookAt(player.position);

// LIFE SYSTEMS
water.position.z = Math.sin(Date.now()*0.001)*0.5;
stars.rotation.y+=0.0007;

crowd.forEach(p=>{
  p.position.x += Math.cos(p.userData.dir)*p.userData.speed;
  p.position.z += Math.sin(p.userData.dir)*p.userData.speed;

  if(Math.random()<0.01){
    p.userData.dir += (Math.random()-0.5);
  }
});

lights.forEach((l,i)=>{
  l.intensity = 2 + Math.sin(Date.now()*0.002+i)*2;
});

// GLOW
[radio,screen,merch].forEach(obj=>{
  let d=player.position.distanceTo(obj.position);
  obj.scale.setScalar(d<4?1.3:1);
});

// PLAYER LIFE
player.position.y=0.5+Math.sin(Date.now()*0.01)*0.05;

// PROMPT
let near=(
  player.position.distanceTo(door.position)<3||
  player.position.distanceTo(radio.position)<3||
  player.position.distanceTo(screen.position)<4||
  player.position.distanceTo(merch.position)<3
);

document.getElementById("prompt").style.display=near?"block":"none";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
