<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — STABLE BOOT ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
background:black;
}

#enter{
padding:18px 40px;
font-size:20px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
letter-spacing:3px;
}

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="intro">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — BOOT ENGINE</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

let started = false;
let mode = "idle";
let t = 0;
let introTime = 0;

/////////////////////////////////////////////////////
// SAFE ENGINE CORE (INIT LATER)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814, 0.0014);
scene.background = new THREE.Color(0x050714);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 6000);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth, innerHeight);

renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;

/////////////////////////////////////////////////////
// WORLD (SAFE TO LOAD ANY TIME)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const ambient = new THREE.AmbientLight(0x6fa6c8, 0.25);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff1d6, 3.0);
sun.position.set(250,300,150);
scene.add(sun);

const water = new THREE.Mesh(
new THREE.PlaneGeometry(8000,8000),
new THREE.MeshStandardMaterial({color:0x08293d})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// POST FX (ONLY ENABLE AFTER START)
/////////////////////////////////////////////////////

let composer, bloomPass;

function initPostFX(){

composer = new THREE.EffectComposer(renderer);

const renderPass = new THREE.RenderPass(scene, camera);
composer.addPass(renderPass);

bloomPass = new THREE.UnrealBloomPass(
new THREE.Vector2(innerWidth, innerHeight),
1.2, 0.6, 0.15
);
composer.addPass(bloomPass);

}

/////////////////////////////////////////////////////
// CONTROLS
/////////////////////////////////////////////////////

const keys = {};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let vel = new THREE.Vector3();
const speed = 0.14;
const friction = 0.86;

function move(){
let x=0,z=0;
if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.sqrt(x*x+z*z);
if(len>0){x/=len;z/=len;}

vel.x += x*speed;
vel.z += z*speed;

vel.x *= friction;
vel.z *= friction;

player.position.x += vel.x;
player.position.z += vel.z;
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

let camVel = new THREE.Vector3();

function cam(){
const target = new THREE.Vector3(
player.position.x,
player.position.y + 30,
player.position.z + 95
);

camVel.x += (target.x - camera.position.x) * 0.06;
camVel.y += (target.y - camera.position.y) * 0.06;
camVel.z += (target.z - camera.position.z) * 0.06;

camVel.multiplyScalar(0.78);
camera.position.add(camVel);
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// ENTER FIX (CRITICAL)
/////////////////////////////////////////////////////

document.getElementById("enter").addEventListener("click", () => {

started = true;
mode = "cinematic";
introTime = 0;

document.getElementById("intro").style.display = "none";

/* IMPORTANT: delay post FX init one frame */
setTimeout(()=>{
initPostFX();
}, 50);

});

/////////////////////////////////////////////////////
// CINEMATIC (SAFE)
/////////////////////////////////////////////////////

function introCam(){
introTime += 0.016;

if(introTime < 6){
camera.position.lerp(new THREE.Vector3(
Math.sin(introTime*0.4)*180,
50,
150 - introTime*30
),0.05);
camera.lookAt(0,0,-120);
}
else if(introTime < 12){
camera.position.lerp(new THREE.Vector3(0,40,80 - (introTime-6)*35),0.05);
camera.lookAt(0,0,-40);
}
else {
mode = "play";
}
}

/////////////////////////////////////////////////////
// LOOP (SAFE SWITCH)
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

/* NEVER RENDER BEFORE START */
if(!started){
renderer.render(scene,camera);
return;
}

if(mode==="cinematic"){
introCam();
if(composer) composer.render();
else renderer.render(scene,camera);
return;
}

if(mode==="play"){
move();
cam();
}

if(composer) composer.render();
else renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
