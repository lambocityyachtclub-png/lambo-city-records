<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V16 MASTER — FINAL WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V16 MASTER</div>
<div id="zone">COMPLETE LUXURY WORLD</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(0x050814,0.0035);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x223344,1));

const sun=new THREE.DirectionalLight(0x99ccff,1.2);
sun.position.set(100,200,80);
scene.add(sun);

const glow=new THREE.PointLight(0x00aaff,1.2,600);
glow.position.set(0,20,0);
scene.add(glow);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// PLAYER + HERO
/////////////////////////////////////////////////////

const player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,-20);
scene.add(player);

const hero=new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// CAR (LIMITED TO STRIP ZONE)
/////////////////////////////////////////////////////

const car=new THREE.Mesh(
new THREE.BoxGeometry(2,1,4),
new THREE.MeshStandardMaterial({color:0xff0000,emissive:0x330000})
);
car.position.set(0,0.5,40);
scene.add(car);

let mode="walk";

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
if(mode==="walk" && player.position.distanceTo(car.position)<4){
mode="car";
player.visible=false;
}else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.copy(car.position).add(new THREE.Vector3(2,0,0));
}
}
});

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){
if(mode==="walk"){
camera.position.x+=(player.position.x-camera.position.x)*0.08;
camera.position.y+=((player.position.y+8)-camera.position.y)*0.08;
camera.position.z+=((player.position.z+14)-camera.position.z)*0.08;
camera.lookAt(player.position);
}
if(mode==="car"){
const ox=Math.sin(car.rotation.y)*-8;
const oz=Math.cos(car.rotation.y)*-8;
camera.position.x+=(car.position.x+ox-camera.position.x)*0.08;
camera.position.y+=((car.position.y+5)-camera.position.y)*0.08;
camera.position.z+=(car.position.z+oz-camera.position.z)*0.08;
camera.lookAt(car.position);
}
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

if(mode==="walk"){
if(keys.w)player.position.z-=0.25;
if(keys.s)player.position.z+=0.25;
if(keys.a)player.position.x-=0.25;
if(keys.d)player.position.x+=0.25;
}

if(mode==="car"){
if(keys.w)car.position.z-=0.35;
if(keys.s)car.position.z+=0.35;
if(keys.a)car.rotation.y+=0.04;
if(keys.d)car.rotation.y-=0.04;
}
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (FRONT AREA)
/////////////////////////////////////////////////////

const water=new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000,100,100),
new THREE.MeshStandardMaterial({
color:0x021a33,
metalness:0.4,
roughness:0.3,
emissive:0x001122
})
);
water.rotation.x=-Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// 🎬 CENTRAL JUMBOTRON STAGE (CORE IDENTITY)
/////////////////////////////////////////////////////

const stage=new THREE.Mesh(
new THREE.BoxGeometry(40,2,20),
new THREE.MeshStandardMaterial({color:0x111111,emissive:0x0033ff})
);
stage.position.set(0,1,0);
scene.add(stage);

const jumbotron=new THREE.Mesh(
new THREE.BoxGeometry(30,15,1),
new THREE.MeshStandardMaterial({color:0x000000,emissive:0x0044ff})
);
jumbotron.position.set(0,10,-10);
scene.add(jumbotron);

/////////////////////////////////////////////////////
// 🏀 BASKETBALL COURT (LEFT ZONE)
/////////////////////////////////////////////////////

const court=new THREE.Mesh(
new THREE.PlaneGeometry(60,30),
new THREE.MeshStandardMaterial({color:0x111111})
);
court.rotation.x=-Math.PI/2;
court.position.set(-80,0,20);
scene.add(court);

/////////////////////////////////////////////////////
// ⛳ GOLF ZONE (RIGHT SIDE)
/////////////////////////////////////////////////////

const golf=new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x0c4a1f})
);
golf.rotation.x=-Math.PI/2;
golf.position.set(90,0,20);
scene.add(golf);

/////////////////////////////////////////////////////
// 🏎 CAR STRIP (BACK ZONE ONLY)
/////////////////////////////////////////////////////

const strip=new THREE.Mesh(
new THREE.BoxGeometry(10,0.5,200),
new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
strip.position.set(0,0.2,120);
scene.add(strip);

/////////////////////////////////////////////////////
// 🌴 VILLAS (PERIMETER CLEAN)
/////////////////////////////////////////////////////

function villa(x,z){
const g=new THREE.Group();

const base=new THREE.Mesh(
new THREE.BoxGeometry(14,1,14),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);

const house=new THREE.Mesh(
new THREE.BoxGeometry(12,6,12),
new THREE.MeshStandardMaterial({color:0x2a2a2a})
);

house.position.y=4;

g.add(base);
g.add(house);
g.position.set(x,0,z);
scene.add(g);
}

for(let i=-100;i<=100;i+=40){
villa(i,-60);
villa(i,80);
}

/////////////////////////////////////////////////////
// 🧍 NPCS
/////////////////////////////////////////////////////

const npcs=[];

function npc(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffcc66})
);

n.position.set(x,1,z);
n.userData={dir:Math.random()*Math.PI*2,speed:0.04};
scene.add(n);
npcs.push(n);
}

for(let i=0;i<12;i++){
npc((Math.random()-0.5)*120,(Math.random()-0.5)*120);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

// NPC
for(let n of npcs){
n.position.x+=Math.cos(n.userData.dir)*n.userData.speed;
n.position.z+=Math.sin(n.userData.dir)*n.userData.speed;
n.userData.dir+=(Math.random()-0.5)*0.02;
}

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
