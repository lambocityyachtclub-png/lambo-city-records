<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | FIRST PERSON WORLD</title>

<style>
body { margin: 0; overflow: hidden; font-family: Arial; background: black; }

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.7;
    z-index: 10;
}

/* INSTRUCTION */
#hint {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: white;
    font-size: 11px;
    opacity: 0.6;
}

/* CROSSHAIR */
#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: white;
    transform: translate(-50%, -50%);
    z-index: 10;
    border-radius: 50%;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // FPS MODE ACTIVE</div>
<div id="hint">CLICK TO LOCK MOUSE • WASD TO MOVE • E TO INTERACT</div>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🌍 BASIC WORLD
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

/* FLOOR */
const floorGeo = new THREE.PlaneGeometry(200, 200);
const floorMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

/* =========================
   🏙 ROOMS / INTERIORS
========================= */
function room(color, x, z) {
    const geo = new THREE.BoxGeometry(10, 6, 10);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 3, z);
    scene.add(mesh);
    return mesh;
}

const cityDoor = room(0x3a1f0a, 0, -20);
const yachtDoor = room(0x0a1a3a, 20, 0);
const storeDoor = room(0x3a0a0a, -20, 0);

/* =========================
   🎮 PLAYER SYSTEM
========================= */
const player = {
    x: 0,
    y: 2,
    z: 5,
    speed: 0.15,
    rotX: 0,
    rotY: 0
};

/* CAMERA START */
camera.position.set(player.x, player.y, player.z);

/* =========================
   🎮 CONTROLS
========================= */
let keys = {};

document.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

/* MOUSE LOOK */
let isLocked = false;

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("mousemove", (e) => {
    if (document.pointerLockElement === document.body) {
        player.rotY -= e.movementX * 0.002;
        player.rotX -= e.movementY * 0.002;
    }
});

/* =========================
   🚪 INTERACTION SYSTEM
========================= */
function checkDoor() {

    let distCity = camera.position.distanceTo(cityDoor.position);
    let distYacht = camera.position.distanceTo(yachtDoor.position);
    let distStore = camera.position.distanceTo(storeDoor.position);

    if (distCity < 3 && keys["e"]) {
        camera.position.set(0, 2, 10);
    }

    if (distYacht < 3 && keys["e"]) {
        camera.position.set(20, 2, 10);
    }

    if (distStore < 3 && keys["e"]) {
        camera.position.set(-20, 2, 10);
    }
}

/* =========================
   🎮 GAME LOOP
========================= */
function animate() {
    requestAnimationFrame(animate);

    /* MOVEMENT */
    let forward = new THREE.Vector3(
        -Math.sin(player.rotY),
        0,
        -Math.cos(player.rotY)
    );

    let right = new THREE.Vector3(
        Math.cos(player.rotY),
        0,
        -Math.sin(player.rotY)
    );

    if (keys["w"]) camera.position.addScaledVector(forward, player.speed);
    if (keys["s"]) camera.position.addScaledVector(forward, -player.speed);
    if (keys["a"]) camera.position.addScaledVector(right, -player.speed);
    if (keys["d"]) camera.position.addScaledVector(right, player.speed);

    /* CAMERA ROTATION */
    camera.rotation.set(player.rotX, player.rotY, 0);

    checkDoor();

    renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
