<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — DOCK WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex; align-items:center; justify-content:center;
flex-direction:column;
background:black; color:white;
}

#status { position:absolute; top:20px; right:20px; color:gold; }
#msg {
position:absolute; bottom:40px; left:50%;
transform:translateX(-50%);
color:white; padding:10px;
border:1px solid gold;
background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY — THE DOCKS</h1>
<button onclick="start()">ENTER</button>
</div>

<div id="status">VISITOR</div>
<div id="msg">Welcome to the docks.</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== SCENE =====
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

let light = new THREE.PointLight(0x00aaff,2);
light.position.set(0,10,5);
scene.add(light);

// ===== PLAYER =====
let player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,10);
scene.add(player);

// ===== MAIN DOCK FLOOR =====
let dock = new THREE.Mesh(
new THREE.BoxGeometry(120,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-100);
scene.add(dock);

// ===== SIDE CABINS ON DOCK =====
for(let i=0;i<5;i++){

let leftCabin = new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshStandardMaterial({color:0x222222})
);
leftCabin.position.set(-20,2.5,-20-(i*25));
scene.add(leftCabin);

let rightCabin = leftCabin.clone();
rightCabin.position.x = 20;
scene.add(rightCabin);

}

// ===== WALKWAY LINES (visual guidance) =====
for(let i=0;i<20;i++){
let plank = new THREE.Mesh(
new THREE.BoxGeometry(100,0.2,1),
new THREE.MeshStandardMaterial({color:0x333333})
);
plank.position.set(0,0.6,-i*15);
scene.add(plank);
}

// ===== STAGE (ON DOCK LEFT) =====
let stage = new THREE.Mesh(
new THREE.BoxGeometry(20,2,12),
new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-25,1,-90);
scene.add(stage);

// ===== VIP AREA (ON DOCK) =====
let vip = new THREE.Mesh(
new THREE.BoxGeometry(20,1,15),
new THREE.MeshStandardMaterial({color:0x002244})
);
vip.position.set(-25,0,-120);
scene.add(vip);

// ===== LONG PIER EXTENSION =====
let pier = new THREE.Mesh(
new THREE.BoxGeometry(30,1,220),
new THREE.MeshStandardMaterial({color:0x222222})
);
pier.position.set(0,0,-260);
scene.add(pier);

// ===== YACHT END POINT =====
let yacht = new THREE.Mesh(
new THREE.BoxGeometry(60,8,25),
new THREE.MeshStandardMaterial({color:0x4444ff})
);
yacht.position.set(0,4,-420);
scene.add(yacht);

// ===== WATER =====
let water = new THREE.Mesh(
new THREE.PlaneGeometry(1000,1000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// ===== INPUT =====
let keys={}, started=false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
document.getElementById("start").style.display="none";
started=true;
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);
if(!started) return;

// MOVEMENT
if(keys["w"]) player.position.z-=0.4;
if(keys["s"]) player.position.z+=0.4;
if(keys["a"]) player.position.x-=0.4;
if(keys["d"]) player.position.x+=0.4;

// CAMERA FOLLOW
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (6-camera.position.y)*0.05;
camera.position.z += (player.position.z+12-camera.position.z)*0.05;
camera.lookAt(player.position);

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
