<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#home {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  pointer-events:auto;
}

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
  opacity:0.9;
}

#zonePopup {
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:24px;
  opacity:0;
  transition:opacity 0.4s;
}

button {
  padding:12px 16px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="home">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="hud">
  <div id="status">OFFLINE</div>
  <div id="zone">ZONE: DOCK</div>
  <div id="radio">RADIO: OFF</div>
</div>

<div id="zonePopup"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player;
let mode = "idle";
let keys = {};

let currentZone = "dock";

const zones = {
  dock: { x:0, z:5, r:10 },
  city: { x:0, z:-40, r:30 },
  yacht: { x:0, z:-20, r:5 }
};

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 10, 120);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // 🌌 stars
  const stars = new THREE.Points(
    new THREE.BufferGeometry().setAttribute(
      'position',
      new THREE.Float32BufferAttribute(
        Array.from({length:3000},()=> (Math.random()-0.5)*200),3)
    ),
    new THREE.PointsMaterial({color:0xffffff,size:0.6})
  );
  scene.add(stars);

  // 🌊 ocean
  const ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshPhongMaterial({color:0x001f3f, shininess:80})
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // 💡 lighting
  scene.add(new THREE.AmbientLight(0x222244));
  const light = new THREE.PointLight(0x00aaff,2,100);
  light.position.set(0,10,0);
  scene.add(light);

  // 🧍 player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 yacht
  const yacht = new THREE.Mesh(
    new THREE.BoxGeometry(3,1,8),
    new THREE.MeshStandardMaterial({color:0xffd700, emissive:0x553300})
  );
  yacht.position.set(0,0.5,-20);
  scene.add(yacht);

  // 🏙 city
  for(let i=0;i<50;i++){
    let h = Math.random()*12+5;
    let b = new THREE.Mesh(
      new THREE.BoxGeometry(2,h,2),
      new THREE.MeshStandardMaterial({
        color:0x111122,
        emissive:0x0000ff,
        emissiveIntensity:Math.random()*0.6
      })
    );
    b.position.set((Math.random()-0.5)*60,h/2,-50-Math.random()*50);
    scene.add(b);
  }

  document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(mode==="play"){

    if(keys["w"]) player.position.z -= 0.2;
    if(keys["s"]) player.position.z += 0.2;
    if(keys["a"]) player.position.x -= 0.2;
    if(keys["d"]) player.position.x += 0.2;

    camera.position.x += (player.position.x - camera.position.x)*0.05;
    camera.position.z += (player.position.z + 12 - camera.position.z)*0.05;
    camera.lookAt(player.position);

    checkZones();
  }

  renderer.render(scene,camera);
}

function checkZones(){
  let newZone = "dock";

  if(dist(zones.yacht) < zones.yacht.r) newZone = "yacht";
  else if(dist(zones.city) < zones.city.r) newZone = "city";

  if(newZone !== currentZone){
    currentZone = newZone;
    updateZone();
  }
}

function updateZone(){

  const zoneText = {
    dock: "DOCK ZONE",
    city: "CITY DISTRICT",
    yacht: "YACHT CLUB (VIP)"
  };

  document.getElementById("zone").innerText = "ZONE: " + zoneText[currentZone];

  const popup = document.getElementById("zonePopup");
  popup.innerText = "ENTERING " + zoneText[currentZone];
  popup.style.opacity = 1;

  setTimeout(()=> popup.style.opacity = 0, 2000);

  // 🎧 radio reaction
  if(currentZone==="yacht"){
    document.getElementById("radio").innerText = "RADIO: VIP MODE";
  } else if(currentZone==="city"){
    document.getElementById("radio").innerText = "RADIO: CITY LIVE";
  } else {
    document.getElementById("radio").innerText = "RADIO: AMBIENT";
  }
}

function dist(z){
  return Math.sqrt(
    (player.position.x - z.x)**2 +
    (player.position.z - z.z)**2
  );
}

function start(){
  document.getElementById("home").style.display="none";
  document.getElementById("status").innerText="LAMBO CITY ONLINE";
  mode="play";
}

</script>

</body>
</html>
