<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — AAA BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex; align-items:center; justify-content:center;
flex-direction:column;
background:black; color:white;
z-index:1000;
}

#status { position:absolute; top:20px; right:20px; color:#00ffff; }
#msg {
position:absolute; bottom:40px; left:50%;
transform:translateX(-50%);
color:white; padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY — AAA</h1>
<button onclick="start()">ENTER</button>
</div>

<div id="status">DOCKS</div>
<div id="msg">Loading world...</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/objects/Water.js"></script>

<script>

// ===== SCENE =====
let scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000,0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
let renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;

// LIGHTING
scene.add(new THREE.AmbientLight(0xaaaaaa,0.6));
let light = new THREE.PointLight(0x00ffff,2,300);
light.position.set(0,20,0);
scene.add(light);

// ===== PLAYER (REAL MODEL) =====
let player = new THREE.Group();
scene.add(player);
player.position.set(0,0,10);

let playerMesh;
new THREE.GLTFLoader().load(
"https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
g=>{
playerMesh=g.scene;
playerMesh.scale.set(0.4,0.4,0.4);
player.add(playerMesh);
document.getElementById("msg").innerText="You’re in LAMBO CITY.";
});

// ===== MUSIC =====
let music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7d3c.mp3");
music.loop=true;

// ===== WATER =====
const water = new THREE.Water(
new THREE.PlaneGeometry(3000,3000),
{
textureWidth:512,
textureHeight:512,
waterNormals:new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/waternormals.jpg",
t=>{t.wrapS=t.wrapT=THREE.RepeatWrapping;}
),
waterColor:0x001e2f,
distortionScale:4.5
}
);
water.rotation.x = -Math.PI/2;
scene.add(water);

// ===== DOCK =====
let dockMat = new THREE.MeshStandardMaterial({color:0x111111, roughness:0.8});
let dock = new THREE.Mesh(
new THREE.BoxGeometry(120,1,300),
dockMat
);
dock.position.set(0,0,-100);
scene.add(dock);

// ===== CABINS =====
for(let i=0;i<5;i++){
["-20","20"].forEach(x=>{
let c=new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshStandardMaterial({color:0x222222})
);
c.position.set(parseInt(x),2.5,-20-(i*25));
scene.add(c);
});
}

// ===== STAGE =====
let stage = new THREE.Mesh(
new THREE.BoxGeometry(20,2,12),
new THREE.MeshStandardMaterial({color:0x6600aa, emissive:0x330066})
);
stage.position.set(-25,1,-90);
scene.add(stage);

// ===== PIER =====
let pier = new THREE.Mesh(
new THREE.BoxGeometry(30,1,220),
dockMat
);
pier.position.set(0,0,-260);
scene.add(pier);

// ===== REAL YACHT MODEL =====
let yacht;
new THREE.GLTFLoader().load(
"https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf",
g=>{
yacht = g.scene;
yacht.scale.set(10,10,10);
yacht.position.set(0,5,-420);
scene.add(yacht);
});

// ===== CROWD =====
let crowd=[];
for(let i=0;i<20;i++){
let p=new THREE.Mesh(
new THREE.BoxGeometry(0.6,1.2,0.6),
new THREE.MeshStandardMaterial({color:0xffffff})
);
p.position.set(-25+(Math.random()-0.5)*15,0.6,-90+(Math.random()-0.5)*15);
scene.add(p);
crowd.push(p);
}

// ===== INPUT =====
let keys={}, dancing=false, started=false;

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="e") dancing=!dancing;
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
document.getElementById("start").style.display="none";
started=true;
music.play();
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);
if(!started) return;

// MOVE
if(!dancing){
if(keys["w"]) player.position.z-=0.4;
if(keys["s"]) player.position.z+=0.4;
if(keys["a"]) player.position.x-=0.4;
if(keys["d"]) player.position.x+=0.4;
}

// DANCE
if(dancing && playerMesh){
let t=Date.now()*0.01;
playerMesh.rotation.y=Math.sin(t);
player.position.y=Math.abs(Math.sin(t))*0.5;
}

// CROWD REACTION
let dist=player.position.distanceTo(stage.position);
if(dist<25){
crowd.forEach((p,i)=>{
p.lookAt(player.position);
p.position.y=0.6+Math.sin(Date.now()*0.01+i)*(dancing?0.6:0.2);
});
}

// CAMERA
camera.position.x+=(player.position.x-camera.position.x)*0.05;
camera.position.y+=(7-camera.position.y)*0.05;
camera.position.z+=(player.position.z+18-camera.position.z)*0.05;
camera.lookAt(player.position);

// WATER
water.material.uniforms['time'].value+=1/60;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
