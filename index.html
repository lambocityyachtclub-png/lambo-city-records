<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY SAFE BOOT</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;left:20px;
color:white;
font-family:Arial;
z-index:10;
}

#error{
position:absolute;
bottom:20px;
left:20px;
color:red;
font-family:Arial;
z-index:20;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY — SAFE BOOT</div>
<div id="error"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

window.addEventListener("load", () => {

const errorBox = document.getElementById("error");

/////////////////////////////////////////////////////
// WEBGL CHECK (CRITICAL FIX)
/////////////////////////////////////////////////////

try {

if (!window.WebGLRenderingContext) {
errorBox.innerText = "WebGL not supported on this device.";
return;
}

/////////////////////////////////////////////////////
// CORE SAFE INIT
/////////////////////////////////////////////////////

const canvas = document.getElementById("c");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070d);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

const renderer = new THREE.WebGLRenderer({
canvas: canvas,
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTS
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x334455,1));

const sun = new THREE.DirectionalLight(0x88bbff,1.2);
sun.position.set(100,200,100);
scene.add(sun);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);

player.position.set(0,1,20);
scene.add(player);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// MOVE
/////////////////////////////////////////////////////

function move(){
const s=0.25;
if(keys.w)player.position.z-=s;
if(keys.s)player.position.z+=s;
if(keys.a)player.position.x-=s;
if(keys.d)player.position.x+=s;
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// SIMPLE FLOOR (TEST IF RENDER WORKS)
/////////////////////////////////////////////////////

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x111111})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

} catch (err) {

document.getElementById("error").innerText =
"ERROR: " + err.message;

console.log(err);

}

});

</script>

</body>
</html>
