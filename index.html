<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  pointer-events:auto;
}

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  transition:opacity 0.8s;
  pointer-events:none;
}

#vip {
  position:absolute;
  inset:0;
  display:none;
  background:black;
  text-align:center;
  padding-top:90px;
  pointer-events:auto;
}

button {
  padding:12px 16px;
  margin-top:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}

#boardUI {
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  border:1px solid gold;
  padding:12px 18px;
  display:none;
  pointer-events:auto;
  text-align:center;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="home">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="hud">
  <div id="status">OFFLINE</div>
  <div id="zone">ZONE: DOCK</div>
  <div id="radio">RADIO: AMBIENT</div>
</div>

<div id="fade"></div>

<div id="boardUI">
  <p>🛥 YACHT DOCK</p>
  <button onclick="boardYacht()">BOARD YACHT</button>
</div>

<div id="vip">
  <h1 style="color:gold;">LAMBO CITY YACHT CLUB</h1>
  <p id="vipStatus" style="opacity:0.7;">CONNECTING...</p>

  <div style="margin-top:30px;">
    <button onclick="toggleMusic()">TOGGLE MUSIC</button>
    <button onclick="simulateLive()">GO LIVE</button>
  </div>

  <div style="margin-top:40px; font-size:14px; opacity:0.8;">
    <p>🎧 NOW PLAYING: <span id="track">OFFLINE</span></p>
    <p>📡 STATUS: <span id="liveStatus">STANDBY</span></p>
  </div>

  <button onclick="exitVIP()" style="margin-top:40px;">RETURN</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let mode = "idle";
let keys = {};
let nearYacht = false;

const tracks = ["LAMBO CITY RADIO","NIGHT DRIVE","AFTER HOURS","YACHT VIBES"];
let musicOn = false;

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 15, 140);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,14);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // stars
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0;i<2000;i++){
    pos.push((Math.random()-0.5)*200, Math.random()*80, (Math.random()-0.5)*200);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff,size:0.6})));

  // ocean
  const ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(600,600),
    new THREE.MeshPhongMaterial({color:0x001a33})
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  scene.add(new THREE.AmbientLight(0x222244));
  const light = new THREE.PointLight(0x00aaff,2,120);
  light.position.set(0,15,0);
  scene.add(light);

  // player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // yacht
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(4,1.5,10),
    new THREE.MeshStandardMaterial({color:0xffd700, emissive:0x553300})
  );
  yacht.position.set(0,1,-30);
  scene.add(yacht);

  const yLight = new THREE.PointLight(0xffaa00,3,60);
  yLight.position.set(0,5,-30);
  scene.add(yLight);

  // street
  for(let i=0;i<20;i++){
    let t = new THREE.Mesh(
      new THREE.BoxGeometry(4,0.1,6),
      new THREE.MeshStandardMaterial({color:0x111111})
    );
    t.position.set(0,0.05,-i*6);
    scene.add(t);
  }

  // city
  for(let i=-5;i<=5;i++){
    for(let j=0;j<6;j++){
      let h = Math.random()*10+8;
      let b = new THREE.Mesh(
        new THREE.BoxGeometry(3,h,3),
        new THREE.MeshStandardMaterial({
          color:0x0a0a1a,
          emissive:0x0000ff,
          emissiveIntensity:0.3
        })
      );
      b.position.set(i*6,h/2,-40-j*10);
      scene.add(b);
    }
  }

  document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(mode==="play"){

    if(keys["w"]) player.position.z -= 0.25;
    if(keys["s"]) player.position.z += 0.25;
    if(keys["a"]) player.position.x -= 0.25;
    if(keys["d"]) player.position.x += 0.25;

    camera.position.x += (player.position.x - camera.position.x)*0.06;
    camera.position.z += (player.position.z + 14 - camera.position.z)*0.06;
    camera.lookAt(player.position);

    checkYacht();
  }

  renderer.render(scene,camera);
}

function checkYacht(){
  const dist = Math.hypot(
    player.position.x - yacht.position.x,
    player.position.z - yacht.position.z
  );

  if(dist < 5){
    nearYacht = true;
    document.getElementById("boardUI").style.display="block";
  } else {
    nearYacht = false;
    document.getElementById("boardUI").style.display="none";
  }
}

function start(){
  document.getElementById("home").style.display="none";
  document.getElementById("status").innerText="ONLINE";
  mode="play";
}

function boardYacht(){
  document.getElementById("fade").style.opacity = 1;

  setTimeout(()=>{
    document.getElementById("vip").style.display="block";
    document.getElementById("radio").innerText="VIP MODE";
  },800);
}

function exitVIP(){
  document.getElementById("fade").style.opacity = 1;

  setTimeout(()=>{
    document.getElementById("vip").style.display="none";
    document.getElementById("fade").style.opacity = 0;
    document.getElementById("radio").innerText="AMBIENT";
    mode="play";
  },800);
}

function toggleMusic(){
  musicOn = !musicOn;
  document.getElementById("track").innerText =
    musicOn ? tracks[Math.floor(Math.random()*tracks.length)] : "OFF";
}

function simulateLive(){
  document.getElementById("liveStatus").innerText = "LIVE";
  setTimeout(()=>document.getElementById("liveStatus").innerText="STANDBY",4000);
}

</script>

</body>
</html>
