<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | FINAL STABLE WORLD</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* 🌌 SKY */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    animation: sky 10s infinite alternate;
    z-index: 0;
}

@keyframes sky {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
    100% { filter: brightness(0.9); }
}

/* 🌫 FOG */
#fog {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85));
    z-index: 1;
    pointer-events: none;
}

/* 🎮 WORLD LAYER */
#world {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 2;
}

/* 🚗 CAR (FORCED VISIBILITY) */
.car {
    position: fixed;
    width: 80px;
    height: 30px;
    background: red;
    top: 65%;
    left: -100px;
    z-index: 10;
    border-radius: 5px;
}

/* 🚶 NPC */
.npc {
    position: fixed;
    width: 14px;
    height: 28px;
    background: white;
    top: 70%;
    z-index: 10;
    opacity: 0.9;
}

/* 🧭 HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
    z-index: 20;
}

/* 🌍 ZONES */
.zone {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 5;
}

#city { background: radial-gradient(circle, #2a1a0a, #000); }
#yacht { background: radial-gradient(circle, #0a0f1a, #000); }
#store { background: radial-gradient(circle, #1a0a0a, #000); }

/* 🎮 UI */
.title {
    font-size: 40px;
    letter-spacing: 6px;
    margin-bottom: 10px;
}

button {
    margin: 8px;
    padding: 10px 16px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* 📺 STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="fog"></div>
<div id="hud">LAMBO CITY // LIVE SIMULATION ACTIVE</div>

<div id="world"></div>

<!-- CITY -->
<div id="city" class="zone">
    <div class="title">LAMBO CITY</div>
    <button onclick="enter('yacht')">YACHT CLUB</button>
    <button onclick="enter('store')">STORE</button>
</div>

<!-- YACHT -->
<div id="yacht" class="zone">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="exit()">BACK</button>
</div>

<!-- STORE -->
<div id="store" class="zone">
    <div class="title">STORE</div>
    <button>HERO DROP</button>
    <button onclick="exit()">BACK</button>
</div>

<script>

const city = document.getElementById("city");
const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

/* START */
window.onload = () => {
    city.style.display = "flex";
    startWorld();
};

/* NAVIGATION */
function enter(type) {
    city.style.display = "none";

    if (type === "yacht") yacht.style.display = "flex";
    if (type === "store") store.style.display = "flex";
}

function exit() {
    yacht.style.display = "none";
    store.style.display = "none";
    city.style.display = "flex";
}

/* 🚗 GUARANTEED VISIBLE CAR SYSTEM */
function spawnCar() {

    const car = document.createElement("div");
    car.className = "car";

    document.body.appendChild(car);

    let x = -120;
    const speed = 4 + Math.random() * 3;

    function move() {
        x += speed;
        car.style.left = x + "px";

        if (x < window.innerWidth + 120) {
            requestAnimationFrame(move);
        } else {
            car.remove();
        }
    }

    move();
}

/* 🚶 GUARANTEED NPC SYSTEM */
function spawnNPC() {

    const npc = document.createElement("div");
    npc.className = "npc";

    npc.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(npc);

    setTimeout(() => {
        npc.remove();
    }, 4000);
}

/* 🌍 WORLD LOOP (CONFIRMED RUNNING) */
function startWorld() {

    setInterval(() => {
        spawnCar();
    }, 800);

    setInterval(() => {
        spawnNPC();
    }, 600);
}

</script>

</body>
</html>
