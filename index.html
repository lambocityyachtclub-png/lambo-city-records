<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY - ZONES</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

canvas { display:block; }

#ui {
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* HUD */
#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:14px;
  opacity:0.85;
}

/* ENTRY */
#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: rgba(0,0,0,0.6);
  pointer-events:auto;
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.95);
  z-index:10;
  text-align:center;
  padding-top:120px;
}

button {
  padding:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

  <div id="home">
    <h1>LAMBO CITY ZONES</h1>
    <button onclick="enterWorld()">ENTER WORLD</button>
  </div>

  <div id="hud">
    <div id="status">SYSTEM OFFLINE</div>
    <div id="zone">ZONE: NONE</div>
    <div>WASD to move</div>
  </div>

  <div id="vip">
    <button onclick="closeVIP()" style="position:absolute;top:20px;right:20px;">EXIT VIP</button>
    <h1>YACHT CLUB INTERIOR</h1>
  </div>

</div>

<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht, ocean;

let keys = {};
let mode = "idle";

// ZONES
const zones = {
  dock:   { x: 0, z: 5,  radius: 6 },
  ocean:  { x: 0, z: 0,  radius: 20 },
  yacht:  { x: 0, z: -15, radius: 4 }
};

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), alpha:true });
  renderer.setSize(innerWidth, innerHeight);

  // 🌊 ocean plane
  const geo = new THREE.PlaneGeometry(200,200);
  const mat = new THREE.MeshBasicMaterial({ color:0x001a33, wireframe:true });
  ocean = new THREE.Mesh(geo, mat);
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // 🧍 player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({ color:0xffffff })
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 yacht (VIP target)
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,6),
    new THREE.MeshBasicMaterial({ color:0xd4af37 })
  );
  yacht.position.set(0,0.5,-15);
  scene.add(yacht);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  ocean.rotation.z += 0.0004;

  if (mode === "play") {

    // movement
    if (keys["w"]) player.position.z -= 0.15;
    if (keys["s"]) player.position.z += 0.15;
    if (keys["a"]) player.position.x -= 0.15;
    if (keys["d"]) player.position.x += 0.15;

    // camera follow
    camera.position.x += (player.position.x - camera.position.x) * 0.08;
    camera.position.z += (player.position.z + 10 - camera.position.z) * 0.08;
    camera.lookAt(player.position);

    updateZone();
  }

  renderer.render(scene, camera);
}

// 🌍 ZONE SYSTEM
function updateZone() {

  let dDock = dist(player, zones.dock);
  let dOcean = dist(player, zones.ocean);
  let dYacht = dist(player, zones.yacht);

  if (dYacht < zones.yacht.radius) {
    document.getElementById("zone").innerText = "ZONE: YACHT (VIP ENTRY)";
    openVIP();
    mode = "vip";
  }
  else if (dOcean < zones.ocean.radius) {
    document.getElementById("zone").innerText = "ZONE: OCEAN";
  }
  else if (dDock < zones.dock.radius) {
    document.getElementById("zone").innerText = "ZONE: DOCK";
  }
}

// distance helper
function dist(a,b){
  return Math.sqrt(
    (a.position.x-b.x)**2 +
    (a.position.z-b.z)**2
  );
}

// START
function enterWorld() {
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE";
  mode = "play";
  document.getElementById("radio").play().catch(()=>{});
}

// VIP
function openVIP(){
  document.getElementById("vip").style.display = "block";
}
function closeVIP(){
  document.getElementById("vip").style.display = "none";
  mode = "play";
}

</script>

</body>
</html>
