<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — STABLE WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

/* UI */
#start {
  position:absolute; inset:0;
  background:black; color:white;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:10;
}

#ui {
  position:absolute; top:20px; left:20px;
  color:white; font-size:13px;
}

#zone {
  position:absolute; top:20px; right:20px;
  color:gold;
}

#hint {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:#00ffff;
  border:1px solid #00ffff;
  padding:8px 12px;
  display:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏡 Villa → 🚶 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">INITIALIZING...</div>
<div id="hint">INTERACTION READY</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// 🌍 CORE WORLD
/////////////////////////////////////////////////////

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
let renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
let light = new THREE.PointLight(0x00aaff, 2);
light.position.set(0,10,10);
scene.add(light);

/////////////////////////////////////////////////////
// 🧍 PLAYER
/////////////////////////////////////////////////////

let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.8,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);
player.position.set(0,1,20);

/////////////////////////////////////////////////////
// 🌊 WATER
/////////////////////////////////////////////////////

let water = new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = 0;
scene.add(water);

/////////////////////////////////////////////////////
// 🌟 STARS
/////////////////////////////////////////////////////

let starGeo = new THREE.BufferGeometry();
let arr = [];

for(let i=0;i<3000;i++){
  arr.push((Math.random()-0.5)*1500, Math.random()*600, (Math.random()-0.5)*1500);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff, size:1})
);

scene.add(stars);

/////////////////////////////////////////////////////
// 🏡 HERO VILLA
/////////////////////////////////////////////////////

let villa = new THREE.Mesh(
  new THREE.BoxGeometry(10,6,10),
  new THREE.MeshStandardMaterial({color:0x111111})
);
scene.add(villa);
villa.position.set(0,3,10);

/////////////////////////////////////////////////////
// 🚶 DOCK
/////////////////////////////////////////////////////

let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,300),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,0,-100);
scene.add(dock);

/////////////////////////////////////////////////////
// 🎤 STAGE
/////////////////////////////////////////////////////

let stage = new THREE.Mesh(
  new THREE.BoxGeometry(20,2,12),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-15,1,-80);
scene.add(stage);

/////////////////////////////////////////////////////
// 🚤 YACHT (DISTANT)
/////////////////////////////////////////////////////

let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(40,6,20),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
yacht.position.set(0,3,-250);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🎮 STATE
/////////////////////////////////////////////////////

let keys = {};
let started = false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
  document.getElementById("start").style.display="none";
  started = true;
  document.getElementById("zone").innerText = "WELCOME TO LAMBO CITY";
}

/////////////////////////////////////////////////////
// 🎬 LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!started) return;

// MOVE
if(keys["w"]) player.position.z -= 0.2;
if(keys["s"]) player.position.z += 0.2;
if(keys["a"]) player.position.x -= 0.2;
if(keys["d"]) player.position.x += 0.2;

// ZONE DETECTION
if(player.position.distanceTo(stage.position) < 8){
  document.getElementById("zone").innerText = "🎤 STAGE ACTIVE";
  document.getElementById("hint").style.display = "block";
}

if(player.position.distanceTo(yacht.position) < 15){
  document.getElementById("zone").innerText = "🚤 YACHT IN VIEW";
}

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += (6 - camera.position.y)*0.05;
camera.position.z += (player.position.z + 10 - camera.position.z)*0.06;
camera.lookAt(player.position);

// ATMOSPHERE
stars.rotation.y += 0.0003;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
