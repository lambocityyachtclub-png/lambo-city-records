<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#home {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, rgba(0,0,0,0.85), black);
  pointer-events:auto;
}

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
  opacity:0.85;
}

button {
  padding:12px 16px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="home">
    <h1>LAMBO CITY</h1>
    <button onclick="start()">ENTER</button>
  </div>

  <div id="hud">
    <div id="status">OFFLINE</div>
    <div id="zone">ZONE: DOCK</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player;
let buildings = [];

let mode = "idle";
let keys = {};

init();

function init(){

  scene = new THREE.Scene();

  // 🌌 Fog (depth)
  scene.fog = new THREE.Fog(0x000000, 10, 120);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // 🌌 STAR SKY
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1000;
  const positions = [];

  for(let i=0;i<starCount;i++){
    positions.push((Math.random()-0.5)*200);
    positions.push(Math.random()*80);
    positions.push((Math.random()-0.5)*200);
  }

  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  const starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.7 });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // 🌊 OCEAN (better color)
  const ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshPhongMaterial({
      color:0x001f3f,
      shininess:80,
      transparent:true,
      opacity:0.95
    })
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // 💡 LIGHTING
  const light = new THREE.PointLight(0x00aaff, 2, 100);
  light.position.set(0,10,0);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0x222244);
  scene.add(ambient);

  // 🧍 PLAYER
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color:0xffffff })
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 YACHT (more visible)
  const yacht = new THREE.Mesh(
    new THREE.BoxGeometry(3,1,8),
    new THREE.MeshStandardMaterial({ color:0xffd700, emissive:0x553300 })
  );
  yacht.position.set(0,0.5,-20);
  scene.add(yacht);

  // 🏙 CITY SKYLINE
  for(let i=0;i<40;i++){
    let h = Math.random()*10 + 5;

    let b = new THREE.Mesh(
      new THREE.BoxGeometry(2,h,2),
      new THREE.MeshStandardMaterial({
        color:0x111122,
        emissive:0x0000ff,
        emissiveIntensity:Math.random()*0.5
      })
    );

    b.position.set(
      (Math.random()-0.5)*60,
      h/2,
      -30 - Math.random()*50
    );

    scene.add(b);
    buildings.push(b);
  }

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(mode === "play"){

    if(keys["w"]) player.position.z -= 0.2;
    if(keys["s"]) player.position.z += 0.2;
    if(keys["a"]) player.position.x -= 0.2;
    if(keys["d"]) player.position.x += 0.2;

    // 🎥 smooth camera follow
    camera.position.x += (player.position.x - camera.position.x)*0.05;
    camera.position.z += (player.position.z + 12 - camera.position.z)*0.05;

    camera.lookAt(player.position);
  }

  renderer.render(scene,camera);
}

function start(){
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE";
  mode = "play";
}

</script>

</body>
</html>
