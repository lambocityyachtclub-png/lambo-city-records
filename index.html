<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V24 — AAA UPGRADE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V24 — AAA CINEMATIC</div>
<div id="zone">LOADING WORLD...</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

window.addEventListener("load", () => {

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(0x050814, 0.0022);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 6000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (AAA PASS)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x223344, 0.9));

const sun = new THREE.DirectionalLight(0x99c6ff, 1.4);
sun.position.set(150,250,120);
scene.add(sun);

const neonGlow = new THREE.PointLight(0x00ccff, 2, 900);
neonGlow.position.set(0,30,0);
scene.add(neonGlow);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// MODE
/////////////////////////////////////////////////////

let mode="walk";

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// CAR (AAA DRIVING PHYSICS)
/////////////////////////////////////////////////////

const car = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(3.2,0.7,6.2),
new THREE.MeshStandardMaterial({
color:0xffcc00,
metalness:1,
roughness:0.25
})
);

car.add(body);
car.position.set(0,0,60);
scene.add(car);

// driving physics
let speed = 0;
let steer = 0;

/////////////////////////////////////////////////////
// YACHT (LIGHT BOOST)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(20,2,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
hull.position.y=1;

const cabinY = new THREE.Mesh(
new THREE.BoxGeometry(10,4,20),
new THREE.MeshStandardMaterial({color:0x222222})
);
cabinY.position.y=5;

const yachtLight = new THREE.PointLight(0x00ccff,2,150);
yachtLight.position.set(0,6,0);

yacht.add(hull);
yacht.add(cabinY);
yacht.add(yachtLight);

yacht.position.set(50,0,-100);
scene.add(yacht);

/////////////////////////////////////////////////////
// OCEAN (SMOOTHER AAA VERSION)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,80,80);

const water = new THREE.Mesh(
waterGeo,
new THREE.MeshStandardMaterial({
color:0x02131f,
emissive:0x001122,
emissiveIntensity:0.45
})
);

water.rotation.x = -Math.PI/2;
scene.add(water);

const pos = water.geometry.attributes.position;
const base = [];

for(let i=0;i<pos.count;i++){
base.push({x:pos.getX(i), z:pos.getZ(i)});
}

/////////////////////////////////////////////////////
// CABINS (UNCHANGED SAFE)
/////////////////////////////////////////////////////

function cabin(x,z){
const g=new THREE.Group();

const baseMesh=new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house=new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y=5;

const glow=new THREE.PointLight(0x00ccff,1.2,60);
glow.position.y=6;

g.add(baseMesh);
g.add(house);
g.add(glow);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

/////////////////////////////////////////////////////
// JUMBOTRON (LIGHT PULSE)
/////////////////////////////////////////////////////

const screen=new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// NPCS (OPTIMIZED LOOP)
/////////////////////////////////////////////////////

const npcs=[];

function npc(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffaa66})
);

n.position.set(x,1,z);
n.userData={dir:Math.random()*Math.PI*2,speed:0.03};

scene.add(n);
npcs.push(n);
}

for(let i=0;i<10;i++){
npc(-20+i*3,-40);
}

/////////////////////////////////////////////////////
// DRIVING SYSTEM (AAA)
/////////////////////////////////////////////////////

function updateCar(){
const accel = 0.02;
const maxSpeed = 0.6;
const friction = 0.98;

if(mode==="car"){
if(keys.w) speed += accel;
if(keys.s) speed -= accel;
if(keys.a) steer += 0.03;
if(keys.d) steer -= 0.03;

speed *= friction;
speed = Math.max(Math.min(speed, maxSpeed), -maxSpeed);

car.rotation.y += steer * speed;
car.position.x -= Math.sin(car.rotation.y) * speed;
car.position.z -= Math.cos(car.rotation.y) * speed;

steer *= 0.85;
}
}

/////////////////////////////////////////////////////
// MOVE PLAYER
/////////////////////////////////////////////////////

function move(){
const s=0.3;

if(mode==="walk"){
if(keys.w)player.position.z-=s;
if(keys.s)player.position.z+=s;
if(keys.a)player.position.x-=s;
if(keys.d)player.position.x+=s;
}
}

/////////////////////////////////////////////////////
// CAMERA (SMOOTH AAA FOLLOW)
/////////////////////////////////////////////////////

function updateCamera(){

let tx,ty,tz;

if(mode==="walk"){
tx=player.position.x;
ty=player.position.y+8;
tz=player.position.z+18;
}else{
tx=car.position.x+Math.sin(car.rotation.y)*-14;
ty=car.position.y+6;
tz=car.position.z+14;
}

camera.position.x+=(tx-camera.position.x)*0.07;
camera.position.y+=(ty-camera.position.y)*0.07;
camera.position.z+=(tz-camera.position.z)*0.07;

camera.lookAt(mode==="walk"?player.position:car.position);
}

/////////////////////////////////////////////////////
// ENTER / EXIT CAR
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
const d=player.position.distanceTo(car.position);

if(mode==="walk" && d<5){
mode="car";
player.visible=false;
}

else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,10,20);

function animate(){
requestAnimationFrame(animate);

const t=performance.now()*0.001;

// ocean waves (smooth)
for(let i=0;i<pos.count;i+=2){
const v=base[i];
pos.setY(i,
Math.sin(v.x*0.008+t)*0.5+
Math.cos(v.z*0.008+t*1.2)*0.5
);
}
pos.needsUpdate=true;

// systems
move();
updateCar();
updateCamera();

// NPC motion
for(let n of npcs){
n.position.x+=Math.cos(n.userData.dir)*n.userData.speed;
n.position.z+=Math.sin(n.userData.dir)*n.userData.speed;
n.userData.dir+=(Math.random()-0.5)*0.01;
}

// jumbotron pulse
screen.material.emissiveIntensity = 1.5 + Math.sin(t*2)*0.5;

renderer.render(scene,camera);
}

animate();

}); 

</script>

</body>
</html>
