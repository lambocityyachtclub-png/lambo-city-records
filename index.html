<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V21 FIXED</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V21 — STABLE UPGRADE</div>
<div id="zone">WORLD ACTIVE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE (UNCHANGED — YOUR STABLE BASE)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070d);
scene.fog = new THREE.FogExp2(0x04070d, 0.0028);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (UNCHANGED + SAFE PULSE ADD)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x334455,0.9));

const sun = new THREE.DirectionalLight(0x88bbff,1.2);
sun.position.set(120,200,100);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff,2,600);
glow.position.set(0,40,0);
scene.add(glow);

/////////////////////////////////////////////////////
// INPUT (UNCHANGED)
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mode="walk";

/////////////////////////////////////////////////////
// PLAYER (UNCHANGED)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// 🚗 LAMBORGHINI (ENTER/EXIT FIX ADDED)
/////////////////////////////////////////////////////

const car = new THREE.Group();

const carBody = new THREE.Mesh(
new THREE.BoxGeometry(3,0.8,6),
new THREE.MeshStandardMaterial({
color:0xffcc00,
metalness:0.8,
roughness:0.25
})
);
carBody.position.y=0.5;

const carCabin = new THREE.Mesh(
new THREE.BoxGeometry(2.3,0.8,2.4),
new THREE.MeshStandardMaterial({
color:0x111111,
metalness:0.9,
roughness:0.2
})
);
carCabin.position.set(0,1.2,-0.5);

car.add(carBody);
car.add(carCabin);
car.position.set(0,0,60);
scene.add(car);

/////////////////////////////////////////////////////
// 🚤 YACHT (NEW SAFE ANIMATION ADD)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(20,2,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
hull.position.y=1;

const cabinY = new THREE.Mesh(
new THREE.BoxGeometry(10,4,20),
new THREE.MeshStandardMaterial({color:0x222222})
);
cabinY.position.y=5;

yacht.add(hull);
yacht.add(cabinY);
yacht.position.set(50,0,-100);
scene.add(yacht);

/////////////////////////////////////////////////////
// HERO (UNCHANGED)
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// 🌊 OCEAN (SMOOTHER ONLY — SAME STRUCTURE)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(4000,4000,120,120);

const waterMat = new THREE.MeshStandardMaterial({
color:0x02131f,
metalness:0.6,
roughness:0.5,
emissive:0x001122,
emissiveIntensity:0.4
});

const water = new THREE.Mesh(waterGeo,waterMat);
water.rotation.x=-Math.PI/2;
scene.add(water);

const pos=water.geometry.attributes.position;
const base=[];

for(let i=0;i<pos.count;i++){
base.push({x:pos.getX(i),z:pos.getZ(i)});
}

/////////////////////////////////////////////////////
// CABINS (UNCHANGED)
/////////////////////////////////////////////////////

function cabin(x,z){
const g=new THREE.Group();

const base=new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house=new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y=5;

const glow=new THREE.PointLight(0x00ccff,1.5,60);
glow.position.y=6;

g.add(base);
g.add(house);
g.add(glow);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

/////////////////////////////////////////////////////
// JUMBOTRON (UNCHANGED)
/////////////////////////////////////////////////////

const screen=new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// NPCS (UNCHANGED)
/////////////////////////////////////////////////////

const npcs=[];

function npc(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffaa66})
);

n.position.set(x,1,z);
n.userData={dir:Math.random()*Math.PI*2,speed:0.03};

scene.add(n);
npcs.push(n);
}

for(let i=0;i<10;i++){
npc(-20+i*3,-40);
}

/////////////////////////////////////////////////////
// MOVEMENT (UNCHANGED)
/////////////////////////////////////////////////////

function move(){
const s=0.3;

if(keys.w)player.position.z-=s;
if(keys.s)player.position.z+=s;
if(keys.a)player.position.x-=s;
if(keys.d)player.position.x+=s;
}

/////////////////////////////////////////////////////
// CAMERA (SMOOTH IMPROVED ONLY)
/////////////////////////////////////////////////////

camera.position.set(0,10,20);

function updateCamera(){
camera.position.x+=(player.position.x-camera.position.x)*0.06;
camera.position.y+=((player.position.y+8)-camera.position.y)*0.06;
camera.position.z+=((player.position.z+18)-camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🚗 ENTER / EXIT CAR (ADDED SAFE SYSTEM)
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){

const d=player.position.distanceTo(car.position);

if(mode==="walk" && d<5){
mode="car";
player.visible=false;
}

else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// LOOP (ONLY ADDITIONS, NOTHING BROKEN)
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

const t=performance.now()*0.001;

/////////////////////////////////////////////////////
// 🌊 OCEAN IMPROVED (same system, smoother curve)
/////////////////////////////////////////////////////

for(let i=0;i<pos.count;i++){
const v=base[i];

pos.setY(i,
Math.sin(v.x*0.01+t)*0.7 +
Math.cos(v.z*0.01+t*1.2)*0.7
);
}
pos.needsUpdate=true;

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

move();

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

updateCamera();

/////////////////////////////////////////////////////
// NPCS
/////////////////////////////////////////////////////

for(let n of npcs){
n.position.x+=Math.cos(n.userData.dir)*n.userData.speed;
n.position.z+=Math.sin(n.userData.dir)*n.userData.speed;
n.userData.dir+=(Math.random()-0.5)*0.01;
}

/////////////////////////////////////////////////////
// 🚤 YACHT FLOAT (NEW ADD)
/////////////////////////////////////////////////////

yacht.position.y = Math.sin(t*0.6)*0.6;

/////////////////////////////////////////////////////
// 🌆 LIGHT PULSE (VERY LIGHT ADD)
/////////////////////////////////////////////////////

glow.intensity = 2 + Math.sin(t*1.5)*0.3;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
