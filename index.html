<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LIVE PLATFORM</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
}

#login {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}
</style>
</head>

<body>

<div id="login">
<h2>LAMBO CITY</h2>
<button onclick="login()">ENTER WORLD</button>
</div>

<div id="hud">ZONE: LOADING...</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔑 YOUR CONFIG (YOU ALREADY HAVE THIS)
const firebaseConfig = {
  apiKey: "AIzaSyB-HyCPaB0gR9-VMGovh-VByajOkrEyGTs",
  authDomain: "lambocityrecords-2fee2.firebaseapp.com",
  projectId: "lambocityrecords-2fee2",
  storageBucket: "lambocityrecords-2fee2.firebaseapp.com",
  messagingSenderId: "78498268542",
  appId: "1:78498268542:web:9b60b8f87488af40c29f2f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId;

// ================= LOGIN =================
window.login = async function(){
  const user = await signInAnonymously(auth);
  userId = user.user.uid;

  document.getElementById("login").style.display = "none";
  startWorld();
}

// ================= WORLD =================
function startWorld(){

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

let keys = {};
let player, yacht, hasPass=false, inVIP=false;

// LIGHT
scene.add(new THREE.AmbientLight(0x1a1a2a,1.2));

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// YACHT
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,5),
  new THREE.MeshStandardMaterial({color:0xffd700})
);
yacht.position.set(0,0.5,-15);
scene.add(yacht);

// FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// INPUT
document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="e"){
    interact();
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// ================= INTERACTION =================
async function interact(){

  let dist = player.position.distanceTo(yacht.position);

  // GET PASS (SAVE TO FIREBASE)
  if(!hasPass){
    hasPass = true;

    await setDoc(doc(db,"users",userId),{
      pass:true,
      created:Date.now()
    });

    hud.innerText = "PASS SAVED — GO TO YACHT";
  }

  // CHECK PASS + BOARD
  if(hasPass && dist < 3){

    const ref = doc(db,"users",userId);
    const snap = await getDoc(ref);

    if(snap.exists() && snap.data().pass){
      await setDoc(ref,{ boarded:true },{ merge:true });

      inVIP = true;
      hud.innerText = "WELCOME TO VIP";
      document.getElementById("prompt").style.display = "none";
    }
  }
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z -= 0.08;
  if(keys["s"]) player.position.z += 0.08;
  if(keys["a"]) player.position.x -= 0.08;
  if(keys["d"]) player.position.x += 0.08;

  camera.position.x += (player.position.x - camera.position.x)*0.05;
  camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
  camera.lookAt(player.position);

  let dist = player.position.distanceTo(yacht.position);

  if(dist < 3 && hasPass && !inVIP){
    document.getElementById("prompt").style.display = "block";
  } else {
    document.getElementById("prompt").style.display = "none";
  }

  renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
