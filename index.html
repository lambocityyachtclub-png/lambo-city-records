<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#home {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  pointer-events:auto;
}

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.8s;
}

#vip {
  position:absolute;
  inset:0;
  display:none;
  background:black;
  text-align:center;
  padding-top:120px;
  pointer-events:auto;
}

button {
  padding:12px 16px;
  margin-top:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="home">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="hud">
  <div id="status">OFFLINE</div>
  <div id="zone">ZONE: DOCK</div>
  <div id="radio">RADIO: AMBIENT</div>
</div>

<div id="fade"></div>

<div id="vip">
  <h1>YACHT CLUB</h1>
  <p>VIP ACCESS GRANTED</p>
  <button onclick="exitVIP()">RETURN TO CITY</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let mode = "idle";
let keys = {};

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 15, 140);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,14);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // stars
  const starGeo = new THREE.BufferGeometry();
  const starPos = [];
  for(let i=0;i<2000;i++){
    starPos.push((Math.random()-0.5)*200, Math.random()*80, (Math.random()-0.5)*200);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.6})));

  // ocean
  const ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(600,600),
    new THREE.MeshPhongMaterial({color:0x001a33, shininess:100})
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // lights
  scene.add(new THREE.AmbientLight(0x222244));
  const mainLight = new THREE.PointLight(0x00aaff,2,120);
  mainLight.position.set(0,15,0);
  scene.add(mainLight);

  // player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // yacht
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(4,1.5,10),
    new THREE.MeshStandardMaterial({color:0xffd700, emissive:0x553300})
  );
  yacht.position.set(0,1,-30);
  scene.add(yacht);

  const yachtLight = new THREE.PointLight(0xffaa00,3,60);
  yachtLight.position.set(0,5,-30);
  scene.add(yachtLight);

  // street
  for(let i=0;i<20;i++){
    let tile = new THREE.Mesh(
      new THREE.BoxGeometry(4,0.1,6),
      new THREE.MeshStandardMaterial({color:0x111111})
    );
    tile.position.set(0,0.05,-i*6);
    scene.add(tile);
  }

  // city
  for(let i=-5;i<=5;i++){
    for(let j=0;j<6;j++){
      let h = Math.random()*10+8;
      let b = new THREE.Mesh(
        new THREE.BoxGeometry(3,h,3),
        new THREE.MeshStandardMaterial({
          color:0x0a0a1a,
          emissive:0x0000ff,
          emissiveIntensity:0.2 + Math.random()*0.5
        })
      );
      b.position.set(i*6, h/2, -40 - j*10);
      scene.add(b);
    }
  }

  document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(mode==="play"){

    if(keys["w"]) player.position.z -= 0.25;
    if(keys["s"]) player.position.z += 0.25;
    if(keys["a"]) player.position.x -= 0.25;
    if(keys["d"]) player.position.x += 0.25;

    camera.position.x += (player.position.x - camera.position.x)*0.06;
    camera.position.z += (player.position.z + 14 - camera.position.z)*0.06;
    camera.lookAt(player.position);

    checkYacht();
  }

  renderer.render(scene,camera);
}

function checkYacht(){
  const dist = Math.sqrt(
    (player.position.x - yacht.position.x)**2 +
    (player.position.z - yacht.position.z)**2
  );

  if(dist < 5){
    enterVIP();
  }
}

function start(){
  document.getElementById("home").style.display="none";
  document.getElementById("status").innerText="LAMBO CITY ONLINE";
  mode="play";
}

function enterVIP(){

  mode="transition";

  const fade = document.getElementById("fade");
  fade.style.opacity = 1;

  setTimeout(()=>{
    document.getElementById("vip").style.display="block";
    document.getElementById("radio").innerText="RADIO: VIP MODE";
  },800);
}

function exitVIP(){

  const fade = document.getElementById("fade");
  fade.style.opacity = 1;

  setTimeout(()=>{
    document.getElementById("vip").style.display="none";
    fade.style.opacity = 0;
    document.getElementById("radio").innerText="RADIO: AMBIENT";
    mode="play";
  },800);
}

</script>

</body>
</html>
