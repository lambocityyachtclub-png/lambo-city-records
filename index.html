<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V10 — PLAYABLE WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui {
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
font-size:13px;
z-index:10;
}

#zone {
position:absolute;
top:20px;
right:20px;
color:#00ffff;
font-family:Arial;
font-size:13px;
z-index:10;
}

#hint {
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
color:white;
display:none;
font-family:Arial;
font-size:13px;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • LAMBO CITY V10</div>
<div id="zone">LOADING LUXURY WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// SCENE CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC LUXURY)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 0.9));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(80, 120, 50);
scene.add(sun);

const glow = new THREE.PointLight(0x4da3ff, 1.2, 1500);
glow.position.set(0, 80, 0);
scene.add(glow);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,-20);
scene.add(player);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
  if(keys["w"]) player.position.z -= 0.3;
  if(keys["s"]) player.position.z += 0.3;
  if(keys["a"]) player.position.x -= 0.3;
  if(keys["d"]) player.position.x += 0.3;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
  camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,80,80);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021428,
  metalness:0.4,
  roughness:0.6,
  emissive:0x001122,
  emissiveIntensity:0.4
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🏡 VILLAS (LUXURY DISTRICT)
/////////////////////////////////////////////////////

function createVilla(x,z, tint=0x151515){

const villa = new THREE.Group();

const base = new THREE.Mesh(
  new THREE.BoxGeometry(16,1,16),
  new THREE.MeshStandardMaterial({color:tint})
);
base.position.y=0.5;
villa.add(base);

const main = new THREE.Mesh(
  new THREE.BoxGeometry(16,6,16),
  new THREE.MeshStandardMaterial({color:0x101010})
);
main.position.y=3;
villa.add(main);

const roof = new THREE.Mesh(
  new THREE.BoxGeometry(17,1,17),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
roof.position.y=7;
villa.add(roof);

// balcony glow
const light = new THREE.PointLight(0x66ccff,1,40);
light.position.set(0,4,0);
villa.add(light);

villa.position.set(x,0,z);
scene.add(villa);

return villa;
}

// rows of villas
for(let i=0;i<6;i++){
  createVilla(-25,-30-i*25,0x141414);
  createVilla(25,-30-i*25,0x101820);
}

/////////////////////////////////////////////////////
// 🚤 YACHT + DOCK
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(18,4,50),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(40,2,-90);
scene.add(yacht);

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(220,220,1,64),
  new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0.1,-90);
scene.add(dock);

/////////////////////////////////////////////////////
// 🎤 JUMBOTRON STAGE (RESTORED V7 STYLE)
/////////////////////////////////////////////////////

const stage = new THREE.Group();

// base stage
const stageBase = new THREE.Mesh(
  new THREE.BoxGeometry(40,2,20),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
stageBase.position.y=1;
stage.add(stageBase);

// screen
const screen = new THREE.Mesh(
  new THREE.BoxGeometry(30,15,2),
  new THREE.MeshStandardMaterial({
    color:0x111111,
    emissive:0x0033ff,
    emissiveIntensity:0.6
  })
);
screen.position.set(0,10,-8);
stage.add(screen);

// lights
for(let i=0;i<6;i++){
  const l = new THREE.PointLight(0x00aaff,1,80);
  l.position.set(-15+i*6,6,5);
  stage.add(l);
}

stage.position.set(0,0,-140);
scene.add(stage);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
hero.position.set(10,1,-25);
scene.add(hero);

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

const time = Date.now()*0.001;

for(let i=0;i<waterPos.count;i++){
const v = waterBase[i];

const wave =
Math.sin(v.x*0.02+time)*0.4 +
Math.cos(v.z*0.02+time*1.3)*0.4;

waterPos.setY(i,wave);
}

waterPos.needsUpdate=true;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
