<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1502877338535-766e1452684a') no-repeat center center/cover;
  color: white;
}

.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.title {
  text-align: center;
  font-size: 48px;
  font-weight: bold;
  margin-bottom: 20px;
  text-shadow: 0 0 20px gold;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.stream {
  border: 2px solid gold;
}

.panel {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border: 1px solid gold;
}

.enter-btn {
  display: block;
  text-align: center;
  margin: 30px auto;
  padding: 15px 30px;
  background: gold;
  color: black;
  font-weight: bold;
  text-decoration: none;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 0 15px gold;
}

.feed {
  margin-top: 20px;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border: 1px solid gold;
  height: 120px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="title">LAMBO CITY</div>

<div class="grid">

<div class="stream">
<iframe
  src="https://player.twitch.tv/?channel=LAMBOCITYRecords&parent=localhost"
  height="400"
  width="100%"
  allowfullscreen>
</iframe>
</div>

<div class="panel">
<h3>ACTIVITY</h3>
<p>DJ HERO joined</p>
<p>Next Drop Soon</p>
<p>Boarding Pass Available</p>

<hr>

<h3>DROPS</h3>
<p>Coming Soon</p>
<p>Yacht Event Preview</p>
</div>

</div>

<a href="#" class="enter-btn">ENTER LAMBO CITY</a>

<div class="feed">
<p>SYSTEM: Welcome to Lambo City</p>
<p>USER: Ready to board</p>
<p>SYSTEM: Drop incoming</p>
</div>

</div>
</div>

</body>
</html>
