<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION LAYER v3</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:10;
}

#ui {
position:absolute;
top:20px;
left:20px;
color:white;
font-size:13px;
}

#zone {
position:absolute;
top:20px;
right:20px;
color:#00ffff;
font-family:Arial;
}

#msg {
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
color:white;
padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏡 Villa → 🌊 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">INITIALIZING...</div>
<div id="msg">IMMERSION LAYER v3 ACTIVE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// 1. CORE ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.008);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

// LIGHTING (IMPROVED IMMERSION)
scene.add(new THREE.AmbientLight(0x8899ff, 0.8));

const mainLight = new THREE.PointLight(0x00ffff, 2);
mainLight.position.set(0, 15, 10);
scene.add(mainLight);

/////////////////////////////////////////////////////
// 2. PLAYER SYSTEM
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

scene.add(player);
player.position.set(0,1,20);

const keys = {};
let started = false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
document.getElementById("start").style.display="none";
started = true;
setZone("WELCOME TO LAMBO CITY");
music.play();
}

/////////////////////////////////////////////////////
// 3. AUDIO (FIXED SAFE INIT)
/////////////////////////////////////////////////////

const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7d3c.mp3");
music.loop = true;
music.volume = 0.5;

/////////////////////////////////////////////////////
// 4. WORLD ASSETS
/////////////////////////////////////////////////////

// WATER
const water = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
const starArr = [];

for(let i=0;i<4000;i++){
starArr.push(
(Math.random()-0.5)*2000,
Math.random()*800,
(Math.random()-0.5)*2000
);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
);

scene.add(stars);

// DOCK
const dock = new THREE.Mesh(
new THREE.BoxGeometry(100,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-120);
scene.add(dock);

// STAGE
const stage = new THREE.Mesh(
new THREE.BoxGeometry(20,2,12),
new THREE.MeshStandardMaterial({color:0x6600aa, emissive:0x220033})
);
stage.position.set(-15,1,-90);
scene.add(stage);

// YACHT
const yacht = new THREE.Mesh(
new THREE.BoxGeometry(50,6,22),
new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x002222})
);
yacht.position.set(0,3,-300);
scene.add(yacht);

// CABINS (IMMERSIVE LAYOUT)
for(let i=0;i<6;i++){
const c1 = new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshStandardMaterial({color:0x222222})
);
c1.position.set(-25,2.5,-25-(i*25));
scene.add(c1);

const c2 = c1.clone();
c2.position.x = 25;
scene.add(c2);
}

/////////////////////////////////////////////////////
// 5. SYSTEMS
/////////////////////////////////////////////////////

let introTime = 0;
let introDone = false;

function setZone(t){
document.getElementById("zone").innerText = t;
}

function updateZones(){

const dStage = player.position.distanceTo(stage.position);
const dYacht = player.position.distanceTo(yacht.position);

if(dStage < 8) setZone("🎤 STAGE ACTIVE — LIVE ENERGY");
if(dYacht < 15) setZone("🚤 YACHT PARTY VISIBLE");
}

/////////////////////////////////////////////////////
// 6. LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!started) return;

/////////////////////////////////////////////////////
// INTRO SEQUENCE (CINEMATIC)
/////////////////////////////////////////////////////

if(!introDone){
introTime++;

camera.position.x += (0 - camera.position.x)*0.02;
camera.position.y += (8 - camera.position.y)*0.02;
camera.position.z += (60 - camera.position.z)*0.02;

camera.lookAt(0,0,-120);

if(introTime < 120){
setZone("🌊 ARRIVING AT LAMBO CITY DOCKS");
}
else if(introTime < 240){
setZone("🏡 PRIVATE VILLA DISTRICT LOADING");
}
else if(introTime < 360){
setZone("🎤 HERO INTRODUCING EXPERIENCE");
}
else{
introDone = true;
setZone("ENTERED WORLD");
}

renderer.render(scene,camera);
return;
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;

/////////////////////////////////////////////////////
// CAMERA FOLLOW
/////////////////////////////////////////////////////

camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += (6 - camera.position.y)*0.05;
camera.position.z += (player.position.z + 12 - camera.position.z)*0.06;

camera.lookAt(player.position);

/////////////////////////////////////////////////////
// WORLD ANIMATION
/////////////////////////////////////////////////////

stars.rotation.y += 0.00025;

updateZones();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
