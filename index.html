<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | GTA IMMERSION ENGINE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: white;
    cursor: grab;
}

/* 🌌 SKY */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    transition: 2s;
    z-index: 0;
}

/* 🎮 WORLD */
#world {
    position: fixed;
    width: 300%;
    height: 100%;
    display: flex;
    transition: transform 0.9s ease;
    z-index: 2;
}

/* 🌍 ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#city { background: radial-gradient(circle, #2a1a0a, #000); }
#yacht { background: radial-gradient(circle, #0a0f1a, #000); }
#store { background: radial-gradient(circle, #1a0a0a, #000); }

/* 🚪 DOORS */
.door {
    padding: 12px 18px;
    border: 1px solid white;
    margin-top: 10px;
    cursor: pointer;
}

/* 🎮 UI */
.title {
    font-size: 40px;
    letter-spacing: 6px;
}

/* 🚗 CAR */
.car {
    position: fixed;
    width: 70px;
    height: 30px;
    background: red;
    top: 65%;
    left: -120px;
    z-index: 5;
}

/* 🚶 NPC */
.npc {
    position: fixed;
    width: 14px;
    height: 28px;
    background: white;
    top: 70%;
    z-index: 5;
}

/* 📺 STREAM */
iframe {
    width: 80%;
    height: 450px;
}

/* 🧭 HOLD UI */
#holdBar {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 6px;
    border: 1px solid white;
    opacity: 0;
}

#holdFill {
    width: 0%;
    height: 100%;
    background: white;
}

/* 🧠 CURSOR LOOK */
body.dragging {
    cursor: grabbing;
}
</style>
</head>

<body>

<div id="sky"></div>

<div id="world">

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <div class="door" 
            onmousedown="startHold('yacht')" 
            onmouseup="cancelHold()">
            YACHT CLUB (HOLD)
        </div>

        <div class="door"
            onmousedown="startHold('store')" 
            onmouseup="cancelHold()">
            STORE (HOLD)
        </div>
    </div>

    <!-- YACHT -->
    <div class="zone" id="yacht">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="moveTo(0)">EXIT</button>
    </div>

    <!-- STORE -->
    <div class="zone" id="store">
        <div class="title">STORE</div>
        <button onclick="moveTo(0)">BACK</button>
    </div>

</div>

<!-- HOLD BAR -->
<div id="holdBar"><div id="holdFill"></div></div>

<script>

const world = document.getElementById("world");
const sky = document.getElementById("sky");
const holdBar = document.getElementById("holdBar");
const holdFill = document.getElementById("holdFill");

let position = 0;

/* 🎮 CAMERA MOVE */
function moveTo(zone) {
    position = zone;
    world.style.transform = `translateX(-${zone * 100}vw)`;
}

/* 🚪 HOLD TO ENTER SYSTEM */
let holdInterval;
let holdProgress = 0;
let targetZone = null;

function startHold(zone) {

    targetZone = zone;
    holdProgress = 0;

    holdBar.style.opacity = 1;

    holdInterval = setInterval(() => {
        holdProgress += 2;
        holdFill.style.width = holdProgress + "%";

        if (holdProgress >= 100) {
            clearInterval(holdInterval);
            holdBar.style.opacity = 0;
            holdFill.style.width = "0%";

            if (zone === "yacht") moveTo(1);
            if (zone === "store") moveTo(2);
        }

    }, 20);
}

function cancelHold() {
    clearInterval(holdInterval);
    holdBar.style.opacity = 0;
    holdFill.style.width = "0%";
}

/* 🧍 CROWD SYSTEM */
function spawnNPC() {
    const npc = document.createElement("div");
    npc.className = "npc";
    npc.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(npc);
    setTimeout(() => npc.remove(), 4000);
}

/* 🚗 TRAFFIC */
function spawnCar() {
    const car = document.createElement("div");
    car.className = "car";
    document.body.appendChild(car);

    let x = -120;
    let speed = 3 + Math.random() * 3;

    function move() {
        x += speed;
        car.style.left = x + "px";

        if (x < window.innerWidth + 120) {
            requestAnimationFrame(move);
        } else {
            car.remove();
        }
    }

    move();
}

/* 🌍 WORLD LOOP */
setInterval(() => {

    spawnCar();

    // crowd density scaling (city feels alive)
    let density = position === 0 ? 2 : 1;

    for (let i = 0; i < density; i++) {
        spawnNPC();
    }

}, 900);

/* 🌌 SIMPLE DAY/NIGHT */
setInterval(() => {
    let t = Date.now() * 0.00005;
    let b = Math.sin(t) * 0.5 + 0.5;
    sky.style.filter = `brightness(${0.6 + b})`;
}, 50);

</script>

</body>
</html>
