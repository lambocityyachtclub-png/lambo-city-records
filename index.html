<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V9 — LUXURY IMMERSION CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY V9 LOADING...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (LUXURY LOOK)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 1.0));

const sun = new THREE.DirectionalLight(0x66ccff, 1.2);
sun.position.set(50,100,50);
scene.add(sun);

const fill = new THREE.PointLight(0x4da3ff, 1.2, 1200);
fill.position.set(0,80,0);
scene.add(fill);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,-20);
scene.add(player);

camera.position.set(0,8,12);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
  if(keys["w"]) player.position.z -= 0.3;
  if(keys["s"]) player.position.z += 0.3;
  if(keys["a"]) player.position.x -= 0.3;
  if(keys["d"]) player.position.x += 0.3;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.y += ((player.position.y+8)-camera.position.y)*0.08;
  camera.position.z += ((player.position.z+14)-camera.position.z)*0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2000,2000,80,80);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021428,
  metalness:0.4,
  roughness:0.6,
  emissive:0x001122,
  emissiveIntensity:0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🏡 VILLAS
/////////////////////////////////////////////////////

function createVilla(x,z){
  const v = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  base.position.y=0.5;
  v.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(16,6,16),
    new THREE.MeshStandardMaterial({color:0x1a1a1a})
  );
  body.position.y=3;
  v.add(body);

  const glow = new THREE.PointLight(0x66ccff,1.2,40);
  glow.position.set(0,5,0);
  v.add(glow);

  v.position.set(x,0,z);
  scene.add(v);
}

// rows of villas
for(let i=0;i<5;i++){
  createVilla(-25,-20-i*25);
  createVilla(25,-20-i*25);
}

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(16,4,45),
  new THREE.MeshStandardMaterial({color:0xf2f2f2})
);
yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff})
);
hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// 🌉 STAGE + JUMBOTRON (RESTORED V7 FEATURE)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.BoxGeometry(30,2,12),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
stage.position.set(0,1,-120);
scene.add(stage);

// Jumbotron screen
const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(18,10),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.5
  })
);
screen.position.set(0,10,-125);
scene.add(screen);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY";
    }
  }
});

function check(){
  if(player.position.distanceTo(hero.position)<3) show("PRESS E TO TALK");
  else hide();
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  const time = Date.now()*0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];
    const wave =
      Math.sin(v.x*0.02+time)*0.4 +
      Math.cos(v.z*0.02+time*1.3)*0.4;

    waterPos.setY(i,wave);
  }

  waterPos.needsUpdate=true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
