<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V33 — PROGRESSION FRAMEWORK</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V33 — PROGRESSION FRAMEWORK</div>
<div id="zone">STATE: INIT</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// GAME CORE STATE
/////////////////////////////////////////////////////

const GAME = {
state: "EXPLORE",
lockInput: false
};

/////////////////////////////////////////////////////
// PROGRESSION SYSTEM (NEW)
/////////////////////////////////////////////////////

const PROGRESS = {
points: 0,
events: []
};

function emitReward(type){

// JUST LOGGING — NO REAL REWARD SYSTEM YET
PROGRESS.events.push(type);

console.log("EVENT:", type);

}

function addPoints(amount){
PROGRESS.points += amount;
console.log("POINTS:", PROGRESS.points);
}

/////////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2e);
scene.fog = new THREE.Fog(0x0a1220, 80, 800);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 12000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.9));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,400,150);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;

// INTERACTION
if(e.key.toLowerCase()==="e"){
handleInteract();
}
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(20,4,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(60,2,-120);
scene.add(yacht);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y + 12) - camera.position.y)*0.06;
camera.position.z += ((player.position.z + 25) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
if(GAME.lockInput) return;

const s = 0.32;

if(keys.w) player.position.z -= s;
if(keys.s) player.position.z += s;
if(keys.a) player.position.x -= s;
if(keys.d) player.position.x += s;

// ZONE EVENTS (reward hooks)
if(player.position.z < -120){
emitReward("REACHED_STAGE_ZONE");
addPoints(1);
}
}

/////////////////////////////////////////////////////
// INTERACTION SYSTEM
/////////////////////////////////////////////////////

function handleInteract(){

const d = player.position.distanceTo(yacht.position);

if(d < 10){
emitReward("YACHT_INTERACT");
addPoints(5);
return;
}

if(player.position.z < -120){
emitReward("STAGE_INTERACT");
addPoints(2);
return;
}

}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function update(){
move();
updateCamera();
}

function render(){
renderer.render(scene,camera);
}

function loop(){
requestAnimationFrame(loop);
update();
render();
}

loop();

</script>

</body>
</html>
