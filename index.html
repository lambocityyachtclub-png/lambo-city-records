<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB — IMMERSION LAYER</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:1;
  transition:2s ease;
  pointer-events:none;
  z-index:999;
}
</style>
</head>

<body>

<div id="start">
<h2>LAMBO CITY YACHT CLUB</h2>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">ZONE: ARRIVAL</div>
<div id="prompt">PRESS E</div>
<div id="fade"></div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht, dock;
let keys = {};
let started = false;

let music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3");
music.loop = true;
music.volume = 0;

function start(){

document.getElementById("start").style.display = "none";

// SCENE
scene = new THREE.Scene();
scene.background = new THREE.Color(0x01020a);
scene.fog = new THREE.FogExp2(0x01020a, 0.03);

// CAMERA (cinematic start position)
camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,6,12);

// RENDER
renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS (breathing club energy)
scene.add(new THREE.AmbientLight(0x1a2a3a, 1));

const pulseLight = new THREE.PointLight(0x00aaff, 2);
pulseLight.position.set(0,4,-10);
scene.add(pulseLight);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// DOCK
dock = new THREE.Mesh(
  new THREE.BoxGeometry(60,1,15),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-15);
scene.add(dock);

// YACHT CLUB
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(12,2,12),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,1,-45);
scene.add(yacht);

// CROWD ENERGY (moving particles)
const geo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<1200;i++){
  arr.push(
    (Math.random()-0.5)*80,
    Math.random()*10,
    (Math.random()-0.5)*80
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const crowd = new THREE.Points(
  geo,
  new THREE.PointsMaterial({color:0xffffff, size:0.25})
);

scene.add(crowd);

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=> {
  music.play();
  music.volume = 0.4;
});

animate();

// ================= ENTRY SEQUENCE =================
setTimeout(()=>{

document.getElementById("fade").style.opacity = 0;

// camera drops into world (cinematic entry)
let drop = setInterval(()=>{

  camera.position.y -= 0.15;
  camera.position.z -= 0.1;

  if(camera.position.y <= 2.5){
    clearInterval(drop);
    started = true;
    document.getElementById("ui").innerText = "ZONE: DOCK ENTRY";
  }

},16);

},1000);

// ================= INTERACTION =================
function interact(){

let dist = player.position.distanceTo(yacht.position);

if(dist < 6){
  document.getElementById("ui").innerText = "YACHT CLUB ACTIVE";
  music.play();
}

}

// ================= LOOP =================
function animate(){

requestAnimationFrame(animate);

// MOVEMENT
if(started){
  if(keys["w"]) player.position.z -= 0.12;
  if(keys["s"]) player.position.z += 0.12;
  if(keys["a"]) player.position.x -= 0.12;
  if(keys["d"]) player.position.x += 0.12;
}

// CAMERA FOLLOW (cinematic smoothing)
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 8 - camera.position.z)*0.05;
camera.lookAt(player.position);

// LIGHT PULSE (alive feeling)
scene.children.forEach(obj=>{
  if(obj.isPointLight){
    obj.intensity = 1.5 + Math.sin(Date.now()*0.002)*0.5;
  }
});

// CROWD MOTION (subtle life)
scene.children.forEach(obj=>{
  if(obj.isPoints){
    obj.rotation.y += 0.0005;
  }
});

// MUSIC RAMP (feels like entering space)
if(started && music.volume < 0.4){
  music.volume += 0.002;
}

// PROMPT
if(player.position.z < -35){
  document.getElementById("prompt").style.display = "block";
} else {
  document.getElementById("prompt").style.display = "none";
}

// RENDER
renderer.render(scene,camera);

}

</script>

</body>
</html>
