<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V17 — CLEAN BASE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V17</div>
<div id="zone">CLEAN CORE SYSTEM</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(0x050814,0.0035);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth,innerHeight);

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// GAME STATE (IMPORTANT)
/////////////////////////////////////////////////////

const game = {
mode: "walk",
score: 0,
zones: {
basket: false,
golf: false,
race: false
},
raceStart: null,
bestLap: null
};

/////////////////////////////////////////////////////
// PLAYER / HERO / CAR
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,-20);
scene.add(player);

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

const car = new THREE.Mesh(
new THREE.BoxGeometry(2,1,4),
new THREE.MeshStandardMaterial({color:0xff0000,emissive:0x330000})
);
car.position.set(0,0.5,40);
scene.add(car);

/////////////////////////////////////////////////////
// CAMERA (CLEAN FOLLOW)
/////////////////////////////////////////////////////

function updateCamera(){

let tx,ty,tz;

if(game.mode==="walk"){
tx = player.position.x;
ty = player.position.y + 7;
tz = player.position.z + 12;
}

if(game.mode==="car"){
tx = car.position.x + Math.sin(car.rotation.y)*-10;
ty = car.position.y + 5;
tz = car.position.z + Math.cos(car.rotation.y)*-10;
}

camera.position.x += (tx-camera.position.x)*0.06;
camera.position.y += (ty-camera.position.y)*0.06;
camera.position.z += (tz-camera.position.z)*0.06;

camera.lookAt(game.mode==="walk" ? player.position : car.position);
}

/////////////////////////////////////////////////////
// MOVEMENT (CLEAN)
/////////////////////////////////////////////////////

function move(){

const speed = 0.22;

if(game.mode==="walk"){

player.position.x += (keys.d?speed:0)-(keys.a?speed:0);
player.position.z += (keys.s?speed:0)-(keys.w?speed:0);

}

if(game.mode==="car"){

if(keys.w) car.position.z -= speed;
if(keys.s) car.position.z += speed;
if(keys.a) car.rotation.y += 0.02;
if(keys.d) car.rotation.y -= 0.02;

}
}

/////////////////////////////////////////////////////
// MODE SWITCH (E KEY)
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{

if(e.key.toLowerCase()==="e"){

const dist = player.position.distanceTo(car.position);

if(game.mode==="walk" && dist<4){
game.mode="car";
player.visible=false;
}

else if(game.mode==="car"){
game.mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// ZONE SYSTEM (CLEAN STRUCTURE)
/////////////////////////////////////////////////////

function updateZones(){

const basketDist = player.position.distanceTo(new THREE.Vector3(-80,0,20));
const golfDist = player.position.distanceTo(new THREE.Vector3(90,0,20));

game.zones.basket = basketDist < 25;
game.zones.golf = golfDist < 35;

document.getElementById("zone").innerText =
game.zones.basket ? "BASKETBALL ZONE" :
game.zones.golf ? "GOLF ZONE" :
"FREE ROAM";
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){

move();
updateZones();
updateCamera();

renderer.render(scene,camera);
requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
