<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — CLEAN IMMERSION BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui {
position:absolute; top:20px; left:20px;
color:white; font-family:Arial; font-size:13px;
}

#zone {
position:absolute; top:20px; right:20px;
color:#00ffff; font-family:Arial;
}

#hint {
position:absolute; bottom:60px; left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
color:white;
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LOADING WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// BASIC SETUP (CLEAN)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x060812, 0.012);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC BASE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const keyLight = new THREE.PointLight(0x66ccff, 1.5, 200);
keyLight.position.set(0,30,20);
scene.add(keyLight);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-20);
scene.add(player);

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function movePlayer(){
  if(keys["w"]) player.position.z -= 0.25;
  if(keys["s"]) player.position.z += 0.25;
  if(keys["a"]) player.position.x -= 0.25;
  if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// CAMERA (SMOOTH FOLLOW)
/////////////////////////////////////////////////////

function updateCamera(){
  const target = new THREE.Vector3(
    player.position.x,
    player.position.y + 8,
    player.position.z + 14
  );

  camera.position.lerp(target, 0.08);
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const oceanGeo = new THREE.PlaneGeometry(2000,2000,50,50);
const oceanMat = new THREE.MeshStandardMaterial({
  color:0x02111f,
  metalness:0.6,
  roughness:0.3
});

const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI/2;
scene.add(ocean);

const oceanBase = oceanGeo.attributes.position.array.slice();

/////////////////////////////////////////////////////
// CABINS
/////////////////////////////////////////////////////

const cabins = [];

function createCabin(x,z){

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({ color:0x111111 })
  );

  cabin.position.set(x,2,z);
  scene.add(cabin);

  cabins.push(cabin);
}

for(let i=0;i<4;i++){
  createCabin(-10, -10 - i*12);
  createCabin(10, -10 - i*12);
}

let insideCabin = false;
let activeCabin = null;

/////////////////////////////////////////////////////
// YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
  new THREE.BoxGeometry(14,3,40),
  new THREE.MeshStandardMaterial({ color:0xf5f5f5 })
);
hull.position.y = 2;
yacht.add(hull);

yacht.position.set(25,0,-30);
scene.add(yacht);

let insideYacht = false;

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1.2,2.2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.5
  })
);

hero.position.set(8,1,-15);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");
const zone = document.getElementById("zone");

function showHint(t){
  hint.style.display = "block";
  hint.innerText = t;
}

function hideHint(){
  hint.style.display = "none";
}

/////////////////////////////////////////////////////
// INTERACTION
/////////////////////////////////////////////////////

document.addEventListener("keydown", (e)=>{

  if(e.key.toLowerCase() !== "e") return;

  // HERO
  if(player.position.distanceTo(hero.position) < 3){
    zone.innerText = "TALKING TO HERO";
    return;
  }

  // YACHT
  if(player.position.distanceTo(yacht.position) < 8){
    insideYacht = !insideYacht;

    if(insideYacht){
      player.position.set(25,1,-30);
      zone.innerText = "INSIDE YACHT";
    } else {
      player.position.set(25,1,-45);
      zone.innerText = "DOCK";
    }
    return;
  }

  // CABIN
  for(let c of cabins){
    if(player.position.distanceTo(c.position) < 3){
      insideCabin = !insideCabin;
      activeCabin = c;

      if(insideCabin){
        player.position.copy(c.position);
        zone.innerText = "INSIDE CABIN";
      } else {
        zone.innerText = "MARINA";
      }
      return;
    }
  }

});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  movePlayer();
  updateCamera();

  // ocean wave
  const time = Date.now()*0.001;
  const pos = ocean.geometry.attributes.position;

  for(let i=0;i<pos.count;i++){
    const x = oceanBase[i*3];
    const z = oceanBase[i*3+2];

    pos.setY(i,
      Math.sin(x*0.02 + time)*0.3 +
      Math.cos(z*0.02 + time)*0.3
    );
  }

  pos.needsUpdate = true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
