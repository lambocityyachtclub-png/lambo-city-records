<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V20 — FIXED STABLE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
#hint{bottom:80px;left:50%;transform:translateX(-50%);display:none;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V20 — FIXED</div>
<div id="zone">WORLD ACTIVE</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070d);
scene.fog = new THREE.FogExp2(0x04070d, 0.0022);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (BOOSTED VISIBILITY FIX)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 1.2));

const sun = new THREE.DirectionalLight(0x88bbff, 1.3);
sun.position.set(120,200,100);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff, 2, 800);
glow.position.set(0,40,0);
scene.add(glow);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,20);
scene.add(player);

/////////////////////////////////////////////////////
// CAMERA FIX (CRITICAL)
/////////////////////////////////////////////////////

camera.position.set(0,30,80);

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y+12) - camera.position.y)*0.06;
camera.position.z += ((player.position.z+35) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// OCEAN (VISIBILITY FIXED)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2000,2000,80,80);
const waterMat = new THREE.MeshStandardMaterial({
color:0x0a2233,
metalness:0.4,
roughness:0.6
});

const water = new THREE.Mesh(waterGeo,waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// LAMBORGHINI
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
new THREE.BoxGeometry(3,0.8,6),
new THREE.MeshStandardMaterial({color:0xffcc00})
);
car.position.set(0,0,40);
scene.add(car);

/////////////////////////////////////////////////////
// YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(20,4,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// CABINS (VISIBLE FIX)
/////////////////////////////////////////////////////

function cabin(x,z){
const g = new THREE.Mesh(
new THREE.BoxGeometry(10,6,10),
new THREE.MeshStandardMaterial({color:0x333333})
);
g.position.set(x,3,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-30,-20-i*25);
cabin(30,-20-i*25);
}

/////////////////////////////////////////////////////
// INPUT MOVEMENT
/////////////////////////////////////////////////////

function move(){
const s = 0.4;

if(keys.w) player.position.z -= s;
if(keys.s) player.position.z += s;
if(keys.a) player.position.x -= s;
if(keys.d) player.position.x += s;
}

/////////////////////////////////////////////////////
// DEBUG HELPER (IMPORTANT)
/////////////////////////////////////////////////////

scene.add(new THREE.AxesHelper(50));

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
