<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVE WORLD v22</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* =========================
   🎮 LOBBY
========================= */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #050510);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 5000;
    transition: opacity 1s ease;
}

#enterBtn {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🎥 TRANSITION CAMERA
========================= */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    transition: 0.5s ease;
    z-index: 999;
}

/* =========================
   🌆 WORLD
========================= */
#world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
}

/* HUB */
#city {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: radial-gradient(circle at top, #3a1f0a, #000);
}

/* =========================
   🏙 INTERIORS
========================= */
.interior {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 2000;
}

#yacht {
    background: radial-gradient(circle, #0a0f1a, #000);
}

#store {
    background: radial-gradient(circle, #1a0a0a, #000);
}

/* =========================
   🎯 TITLE
========================= */
.title {
    font-size: 42px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* =========================
   🔘 BUTTONS
========================= */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🎥 STREAM
========================= */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* =========================
   💬 CHAT
========================= */
#chat {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 240px;
    height: 160px;
    font-size: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px;
    overflow: hidden;
}
</style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
    <div>CONNECTING TO LAMBO CITY...</div>
    <button id="enterBtn" onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="camera"></div>
<div id="chat"></div>

<!-- 🌆 CITY HUB -->
<div id="city">
    <div class="title">LAMBO CITY</div>

    <button onclick="enter('yacht')">YACHT CLUB</button>
    <button onclick="enter('store')">STORE</button>
</div>

<!-- 🚤 YACHT CLUB -->
<div id="yacht" class="interior">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- 🛍 STORE -->
<div id="store" class="interior">
    <div class="title">STORE</div>

    <button>HERO DROP</button>
    <button>CLASSIC LINE</button>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<script>

const lobby = document.getElementById("lobby");
const camera = document.getElementById("camera");
const city = document.getElementById("city");

const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

let current = "city";

/* =========================
   🎮 ENTER WORLD
========================= */
function enterWorld() {
    lobby.style.opacity = "0";

    setTimeout(() => {
        lobby.style.display = "none";
        city.style.display = "flex";
    }, 1000);
}

/* =========================
   🚪 ENTER INTERIOR
========================= */
function enter(type) {

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.5)";
    document.body.style.filter = "brightness(2)";

    setTimeout(() => {

        city.style.display = "none";

        if (type === "yacht") yacht.style.display = "flex";
        if (type === "store") store.style.display = "flex";

        setTimeout(() => {
            camera.style.opacity = "0";
            document.body.style.filter = "brightness(1)";
        }, 400);

    }, 300);
}

/* =========================
   🚪 EXIT INTERIOR
========================= */
function exitInterior() {

    camera.style.opacity = "1";
    document.body.style.filter = "brightness(2)";

    setTimeout(() => {

        yacht.style.display = "none";
        store.style.display = "none";
        city.style.display = "flex";

        setTimeout(() => {
            camera.style.opacity = "0";
            document.body.style.filter = "brightness(1)";
        }, 400);

    }, 300);
}

</script>

</body>
</html>
