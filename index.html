<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FIXED ENTRY</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

/* INTRO LAYER */
#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
background:black;
}

/* IMPORTANT FIX: image must NOT block clicks */
#intro img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.85;
pointer-events:none;
}

/* BUTTON MUST BE ABOVE EVERYTHING */
#enter{
position:relative;
z-index:10;
padding:18px 40px;
font-size:20px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
letter-spacing:3px;
}

/* UI */
#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — FIXED ENTRY BUILD</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let mode="intro";
let t=0;
let introTime=0;

/* CORE */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814, 0.0014);
scene.background = new THREE.Color(0x050714);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 6000);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* LIGHTS */
const ambient = new THREE.AmbientLight(0x6fa6c8,0.25);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff1d6,3);
sun.position.set(250,300,150);
scene.add(sun);

/* PLAYER */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let vel=new THREE.Vector3();
const speed=0.14;
const friction=0.86;

function move(){
let x=0,z=0;
if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.sqrt(x*x+z*z);
if(len>0){x/=len;z/=len;}

vel.x+=x*speed;
vel.z+=z*speed;

vel.x*=friction;
vel.z*=friction;

player.position.x+=vel.x;
player.position.z+=vel.z;
}

/* CAMERA */
let camVel=new THREE.Vector3();

function cam(){
const target=new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camVel.x+=(target.x-camera.position.x)*0.06;
camVel.y+=(target.y-camera.position.y)*0.06;
camVel.z+=(target.z-camera.position.z)*0.06;

camVel.multiplyScalar(0.78);
camera.position.add(camVel);

camera.lookAt(player.position);
}

/* WORLD */
const water=new THREE.Mesh(
new THREE.PlaneGeometry(8000,8000),
new THREE.MeshStandardMaterial({color:0x08293d,metalness:0.7,roughness:0.25})
);
water.rotation.x=-Math.PI/2;
scene.add(water);

/* INTRO CAMERA */
function introCam(){
introTime+=0.016;

if(introTime<6){
camera.position.lerp(new THREE.Vector3(
Math.sin(introTime*0.4)*180,
50,
150-introTime*30
),0.05);
camera.lookAt(0,0,-120);
}
else if(introTime<12){
camera.position.lerp(new THREE.Vector3(
0,40,80-(introTime-6)*35
),0.05);
camera.lookAt(0,0,-40);
}
else mode="play";
}

/* 🔥 FIXED ENTER (MULTI-LAYER SAFETY) */
function startWorld(){
document.getElementById("intro").style.display="none";
mode="cinematic";
introTime=0;
console.log("ENTER PRESSED → WORLD STARTED");
}

/* NORMAL CLICK */
document.getElementById("enter").addEventListener("click", startWorld);

/* MOBILE SAFETY (TAP ANYWHERE) */
document.getElementById("intro").addEventListener("pointerdown", startWorld);

/* LOOP */
function animate(){
requestAnimationFrame(animate);

if(mode==="cinematic"){
introCam();
renderer.render(scene,camera);
return;
}

if(mode==="play"){
move();
cam();
}

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
