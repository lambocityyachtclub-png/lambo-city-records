<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — V7 CINEMATIC WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V7 — CINEMATIC CORE</div>
<div id="zone">INITIALIZING WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070b1a, 0.0028);
scene.background = new THREE.Color(0x040812);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 6000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// 🌅 CINEMATIC LIGHTING SYSTEM (DAY/NIGHT BASE)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x3a4f6a, 0.9);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0x99ccff, 1.3);
sun.position.set(150, 200, 80);
scene.add(sun);

const stageGlow = new THREE.PointLight(0x00aaff, 1.5, 3000);
stageGlow.position.set(0, 80, -120);
scene.add(stageGlow);

/////////////////////////////////////////////////////
// PLAYER (SMOOTH / FLOAT FEEL)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-30);
scene.add(player);

camera.position.set(0,12,22);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let velocity = { x:0, z:0 };

function move(){
  const accel = 0.015;
  const friction = 0.92;

  if(keys["w"]) velocity.z -= accel;
  if(keys["s"]) velocity.z += accel;
  if(keys["a"]) velocity.x -= accel;
  if(keys["d"]) velocity.x += accel;

  velocity.x *= friction;
  velocity.z *= friction;

  player.position.x += velocity.x;
  player.position.z += velocity.z;
}

function cameraFollow(){
  camera.position.x += (player.position.x - camera.position.x)*0.05;
  camera.position.y += ((player.position.y+12) - camera.position.y)*0.05;
  camera.position.z += ((player.position.z+22) - camera.position.z)*0.05;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (HORIZON CINEMATIC FIELD)
/////////////////////////////////////////////////////

const oceanGeo = new THREE.PlaneGeometry(5000,5000,140,140);

const oceanMat = new THREE.MeshStandardMaterial({
  color: 0x061a2a,
  metalness: 0.15,
  roughness: 0.75,
  emissive: 0x001122,
  emissiveIntensity: 0.35
});

const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI/2;
scene.add(ocean);

const waterPos = ocean.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🏝️ VILLAS (LUXURY VARIATION SYSTEM)
/////////////////////////////////////////////////////

function createVilla(x,z,i){

  const g = new THREE.Group();

  const tone = 0x101010 + (i%4)*0x050505;

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(22,1,22),
    new THREE.MeshStandardMaterial({ color:tone })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(22,9,22),
    new THREE.MeshStandardMaterial({
      color:tone + 0x050505
    })
  );
  body.position.y = 5;
  g.add(body);

  const glow = new THREE.PointLight(0x4da3ff, 0.6, 80);
  glow.position.set(0,6,0);
  g.add(glow);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<10;i++){
  createVilla(-45,-40-i*35,i);
  createVilla(45,-40-i*35,i+1);
}

/////////////////////////////////////////////////////
// 🎤 STAGE + JUMBOTRON (FOCUS CORE)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.BoxGeometry(80,3,50),
  new THREE.MeshStandardMaterial({ color:0x0a0a0a })
);

stage.position.set(0,1,-180);
scene.add(stage);

const screen = new THREE.Mesh(
  new THREE.BoxGeometry(60,28,2),
  new THREE.MeshStandardMaterial({
    color:0x111111,
    emissive:0x0033aa,
    emissiveIntensity:1.2
  })
);

screen.position.set(0,18,-210);
scene.add(screen);

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(30,6,90),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);

yacht.position.set(70,2,-120);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(0,1,-50);
scene.add(hero);

/////////////////////////////////////////////////////
// INTERACTION
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText =
      "WELCOME TO THE LAMBO CITY CINEMATIC EXPERIENCE";
    }
  }
});

/////////////////////////////////////////////////////
// 🌊 OCEAN ENGINE
/////////////////////////////////////////////////////

function updateOcean(time){
  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.01 + time) * 0.9 +
      Math.cos(v.z*0.01 + time*1.1) * 0.9;

    waterPos.setY(i,wave);
  }
  waterPos.needsUpdate = true;
}

/////////////////////////////////////////////////////
// 🎬 INTRO CAMERA MOMENT (NEW V7 FEATURE)
/////////////////////////////////////////////////////

let intro = 0;

function introCamera(){
  if(intro < 200){
    camera.position.z -= 0.15;
    camera.position.y = 25;
    intro++;
  }
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  const time = Date.now()*0.001;

  move();
  cameraFollow();
  check();

  updateOcean(time);
  introCamera();

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
