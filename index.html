<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V26 — AAA VISUAL UPGRADE</title>

<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V26 — AAA VISUAL</div>
<div id="zone">ZONE: INITIALIZING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

// 🌅 SKY GRADIENT FIX (THIS SOLVES YOUR GREEN SKY ISSUE)
const skyGeo = new THREE.SphereGeometry(5000, 32, 32);
const skyMat = new THREE.ShaderMaterial({
side: THREE.BackSide,
uniforms: {
top: { value: new THREE.Color(0x7fb6ff) },
bottom: { value: new THREE.Color(0x0a1220) }
},
vertexShader: `
varying vec3 vPos;
void main(){
vPos = position;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`,
fragmentShader: `
uniform vec3 top;
uniform vec3 bottom;
varying vec3 vPos;
void main(){
float h = normalize(vPos).y * 0.5 + 0.5;
gl_FragColor = vec4(mix(bottom, top, h), 1.0);
}
`
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// 🌫️ controlled fog (NOT color wash)
scene.fog = new THREE.Fog(0x0a1220, 80, 600);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 10000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (AAA SUN SYSTEM)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.8));

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(200,400,100);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88aaff, 0.6);
fill.position.set(-200,100,-100);
scene.add(fill);

/////////////////////////////////////////////////////
// YOUR WORLD (PRESERVED)
/////////////////////////////////////////////////////

function cabin(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y = 5;

g.add(base);
g.add(house);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({
color:0x061a2b,
metalness:0.3,
roughness:0.8
})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// CAMERA FIX (CRITICAL AAA ANGLE)
/////////////////////////////////////////////////////

camera.position.set(0,22,35);
camera.lookAt(0,0,0);

/////////////////////////////////////////////////////
// MOVE
/////////////////////////////////////////////////////

function move(){
if(keys.w) player.position.z -= 0.35;
if(keys.s) player.position.z += 0.35;
if(keys.a) player.position.x -= 0.35;
if(keys.d) player.position.x += 0.35;
}

/////////////////////////////////////////////////////
// CAMERA FOLLOW (AAA SMOOTH)
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y + 12) - camera.position.y)*0.06;
camera.position.z += ((player.position.z + 25) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// ZONE SYSTEM
/////////////////////////////////////////////////////

function updateZone(){
let z = "DOCK CENTER";
if(player.position.z < -100) z = "STAGE AREA";
if(player.position.x > 40) z = "RIGHT CABINS";
if(player.position.x < -40) z = "LEFT CABINS";
document.getElementById("zone").innerText = "ZONE: " + z;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();
updateZone();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
