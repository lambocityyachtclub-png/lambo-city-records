<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | WORLD SYSTEM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* LOBBY */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #000, #050510);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 5000;
    transition: opacity 1s ease;
}

#enterBtn {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* CAMERA EFFECT */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    transition: 0.5s ease;
    z-index: 999;
}

/* CITY */
#city {
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: radial-gradient(circle at top, #3a1f0a, #000);
}

/* INTERIORS */
.interior {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 2000;
}

#yacht {
    background: radial-gradient(circle, #0a0f1a, #000);
}

#store {
    background: radial-gradient(circle, #1a0a0a, #000);
}

/* UI */
.title {
    font-size: 42px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
}

/* AUDIO */
audio { display: none; }
</style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby">
    <div>CONNECTING TO LAMBO CITY...</div>
    <button id="enterBtn" onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="camera"></div>

<!-- CITY -->
<div id="city">
    <div class="title">LAMBO CITY</div>

    <button onclick="enter('yacht')">YACHT CLUB</button>
    <button onclick="enter('store')">STORE</button>
</div>

<!-- YACHT -->
<div id="yacht" class="interior">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        width="80%" height="450"
        allowfullscreen>
    </iframe>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- STORE -->
<div id="store" class="interior">
    <div class="title">STORE</div>

    <button>HERO DROP</button>
    <button>CLASSIC LINE</button>

    <button onclick="exitInterior()">BACK TO CITY</button>
</div>

<!-- AUDIO (SAFE TEST SO YOU HEAR IT) -->
<audio id="cityAudio" loop>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<audio id="interiorAudio" loop>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3">
</audio>

<script>

const lobby = document.getElementById("lobby");
const camera = document.getElementById("camera");

const city = document.getElementById("city");
const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

const cityAudio = document.getElementById("cityAudio");
const interiorAudio = document.getElementById("interiorAudio");

/* CAMERA EFFECT */
function flash() {
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.5)";
    document.body.style.filter = "brightness(2)";

    setTimeout(() => {
        camera.style.opacity = "0";
        document.body.style.filter = "none";
    }, 400);
}

/* ENTER WORLD */
function enterWorld() {

    lobby.style.opacity = "0";

    setTimeout(() => {
        lobby.style.display = "none";
        city.style.display = "flex";

        flash();

        cityAudio.currentTime = 0;
        cityAudio.volume = 0.4;

        cityAudio.play().then(() => {
            console.log("CITY AUDIO PLAYING");
        }).catch(err => {
            console.log("AUDIO BLOCKED:", err);
        });

    }, 1000);
}

/* ENTER INTERIOR */
function enter(type) {

    flash();

    setTimeout(() => {

        city.style.display = "none";

        cityAudio.pause();

        interiorAudio.currentTime = 0;
        interiorAudio.volume = 0.4;

        interiorAudio.play().catch(err => console.log(err));

        if (type === "yacht") yacht.style.display = "flex";
        if (type === "store") store.style.display = "flex";

        console.log("ENTERED:", type);

    }, 300);
}

/* EXIT INTERIOR */
function exitInterior() {

    flash();

    setTimeout(() => {

        yacht.style.display = "none";
        store.style.display = "none";

        interiorAudio.pause();

        city.style.display = "flex";

        cityAudio.play();

        console.log("BACK TO CITY");

    }, 300);
}

</script>

</body>
</html>
