<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — STABLE FINAL BASE</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;left:20px;
color:white;
font-family:Arial;
font-size:14px;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY — STABLE BASE WORLD</div>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE ENGINE (SAFE START)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

// IMPORTANT: no heavy fog (THIS WAS BREAKING VISIBILITY)
scene.fog = new THREE.Fog(0x0a1220, 80, 600);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (VISIBLE + CONTRAST FIX)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 1.2));

const sun = new THREE.DirectionalLight(0xaaccff, 1.5);
sun.position.set(200,300,200);
scene.add(sun);

/////////////////////////////////////////////////////
// GROUND (ANCHOR YOU CAN SEE)
/////////////////////////////////////////////////////

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1000,1000),
new THREE.MeshStandardMaterial({color:0x1f3b1f})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/////////////////////////////////////////////////////
// CAR (ALWAYS VISIBLE)
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({
color:0xffcc00,
emissive:0x332200,
emissiveIntensity:0.5
})
);

car.position.set(0,1,0);
scene.add(car);

/////////////////////////////////////////////////////
// OCEAN (BACKGROUND ONLY)
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({color:0x061a2b})
);

ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

/////////////////////////////////////////////////////
// CAMERA START (CRITICAL FIX)
/////////////////////////////////////////////////////

camera.position.set(0,15,25);
camera.lookAt(0,0,0);

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
if(keys.w) car.position.z -= 0.4;
if(keys.s) car.position.z += 0.4;
if(keys.a) car.position.x -= 0.4;
if(keys.d) car.position.x += 0.4;
}

/////////////////////////////////////////////////////
// CAMERA FOLLOW (SMOOTH)
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (car.position.x - camera.position.x)*0.08;
camera.position.y += ((car.position.y + 12) - camera.position.y)*0.08;
camera.position.z += ((car.position.z + 20) - camera.position.z)*0.08;

camera.lookAt(car.position);
}

/////////////////////////////////////////////////////
// LOOP (SAFE)
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
