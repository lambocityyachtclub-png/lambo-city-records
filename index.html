<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ENGINE v1</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}
canvas{
position:fixed;
inset:0;
display:block;
}

#ui{
position:fixed;
top:20px;
left:20px;
color:white;
z-index:10;
letter-spacing:2px;
font-size:14px;
}

#rep{
position:fixed;
top:50px;
left:20px;
color:white;
z-index:10;
}

#enter{
position:fixed;
inset:0;
margin:auto;
width:200px;
height:60px;
z-index:9999;
background:rgba(0,0,0,0.7);
border:2px solid #00aaff;
color:white;
cursor:pointer;
letter-spacing:3px;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY ENGINE v1</div>
<div id="rep">Reputation: 0</div>
<button id="enter">ENTER WORLD</button>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded",()=>{

/* =========================
GAME STATE (CORE HUB)
========================= */
const GameState = {
mode:"intro",
time:0,
reputation:0
};

/* =========================
ENGINE CORE
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050714);
scene.fog = new THREE.FogExp2(0x050814,0.0012);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,10000);
camera.position.set(0,40,120);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

/* LIGHTING */
scene.add(new THREE.AmbientLight(0x88aacc,0.35));
const sun = new THREE.DirectionalLight(0xfff1d6,3.2);
sun.position.set(250,300,150);
scene.add(sun);

/* =========================
PLAYER SYSTEM
========================= */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys = {};
let vel = new THREE.Vector3();

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function updatePlayer(){
let x=0,z=0;
if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;

let len=Math.hypot(x,z);
if(len){x/=len;z/=len;}

vel.x += x*0.12;
vel.z += z*0.12;
vel.multiplyScalar(0.86);

player.position.add(vel);
}

/* =========================
CAMERA SYSTEM (SMOOTH FOLLOW)
========================= */
const camVel = new THREE.Vector3();

function updateCamera(){
const target = new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camVel.lerp(target.clone().sub(camera.position).multiplyScalar(0.06),0.85);
camera.position.add(camVel);
camera.lookAt(player.position);
}

/* =========================
WORLD CORE
========================= */
const world = {
roads:[],
districts:[],
buildings:[]
};

function addGround(){
const water = new THREE.Mesh(
new THREE.PlaneGeometry(9000,9000),
new THREE.MeshStandardMaterial({color:0x08293d})
);
water.rotation.x = -Math.PI/2;
water.position.z = -250;
scene.add(water);
}
addGround();

/* =========================
ROAD SYSTEM (ENGINEIZED)
========================= */
function addRoad(points){
const curve = new THREE.CatmullRomCurve3(points);

const road = new THREE.Mesh(
new THREE.TubeGeometry(curve,80,2,10,false),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);

scene.add(road);
world.roads.push(road);
}

/* MAIN CITY SPINE */
addRoad([
new THREE.Vector3(0,0,0),
new THREE.Vector3(200,0,-80),
new THREE.Vector3(300,0,-300),
new THREE.Vector3(0,0,300),
new THREE.Vector3(-200,0,-200)
]);

/* =========================
DISTRICT SYSTEM (PLUG-IN ARCHITECTURE)
========================= */
const DistrictManager = {

register(d){
world.districts.push(d);
},

update(rep){
world.districts.forEach(d=>{
if(!d.unlocked && rep>=d.unlockRep){
d.unlocked = true;
d.onUnlock();
console.log("UNLOCK:",d.name);
}
});
}
};

/* =========================
PROGRESSION SYSTEM
========================= */
const Progression = {
add(amount){
GameState.reputation += amount;

document.getElementById("rep").innerText =
"Reputation: " + GameState.reputation;

DistrictManager.update(GameState.reputation);

if(GameState.reputation >= 25 && !world.heroBuilt){
world.heroBuilt = true;
spawnHeroMansion();
}
}
};

/* =========================
HERO MANSION (CORE EVENT BUILD)
========================= */
function spawnHeroMansion(){
const base = new THREE.Mesh(
new THREE.BoxGeometry(30,18,30),
new THREE.MeshStandardMaterial({color:0x111111})
);

base.position.set(200,9,-80);
scene.add(base);

const light = new THREE.PointLight(0x00aaff,2,300);
light.position.set(200,25,-80);
scene.add(light);
}

/* =========================
DISTRICTS (MODULAR PLUGINS)
========================= */

DistrictManager.register({
name:"Ocean Blvd",
unlockRep:10,
unlocked:false,
onUnlock(){
const road = new THREE.Mesh(
new THREE.BoxGeometry(300,1,40),
new THREE.MeshStandardMaterial({color:0x222233})
);
road.position.set(-200,0,-200);
scene.add(road);
}
});

DistrictManager.register({
name:"Speedway",
unlockRep:25,
unlocked:false,
onUnlock(){
const curve = new THREE.CatmullRomCurve3([
new THREE.Vector3(0,0,300),
new THREE.Vector3(120,0,350),
new THREE.Vector3(240,0,300),
new THREE.Vector3(120,0,250)
]);

const track = new THREE.Mesh(
new THREE.TubeGeometry(curve,120,6,12,true),
new THREE.MeshStandardMaterial({color:0x111111})
);

scene.add(track);
}
});

DistrictManager.register({
name:"Popstar Hills",
unlockRep:40,
unlocked:false,
onUnlock(){
for(let i=0;i<6;i++){
const house = new THREE.Mesh(
new THREE.BoxGeometry(40,25,40),
new THREE.MeshStandardMaterial({color:0x111111})
);
house.position.set(300+i*60,12,-300-i*30);
scene.add(house);
}
}
});

DistrictManager.register({
name:"Basketball Court",
unlockRep:5,
unlocked:false,
onUnlock(){
const court = new THREE.Mesh(
new THREE.BoxGeometry(80,1,50),
new THREE.MeshStandardMaterial({color:0x0033aa})
);
court.position.set(150,0,150);
scene.add(court);
}
});

/* =========================
LOOP
========================= */
function animate(){
requestAnimationFrame(animate);

if(GameState.mode === "play"){
updatePlayer();
updateCamera();
}

GameState.time += 0.01;

renderer.render(scene,camera);
}
animate();

/* =========================
ENTER WORLD
========================= */
document.getElementById("enter").onclick=()=>{
GameState.mode="play";
document.getElementById("enter").style.display="none";
};

/* =========================
REPUTATION LOOP (TEST)
========================= */
setInterval(()=>{
if(GameState.mode==="play"){
Progression.add(1);
}
},3000);

});
</script>

</body>
</html>
