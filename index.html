<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY — RECOVERY BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud">
  LAMBO CITY<br>
  ZONE: LOADING<br>
  STATE: ACTIVE
</div>

<div id="prompt">
  ENTER DOCK
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===============================
// CORE SETUP (CLEAN SAFE VERSION)
// ===============================
let scene, camera, renderer;
let player, yacht;
let keys = {};

// ===============================
// INIT
// ===============================
init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 10, 100);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer({ canvas:document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // LIGHT
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  const light = new THREE.PointLight(0x00aaff, 2);
  light.position.set(0,5,5);
  scene.add(light);

  // PLAYER
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.y = 0.5;
  scene.add(player);

  // CABIN FLOOR
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // DOCK
  const dock = new THREE.Mesh(
    new THREE.BoxGeometry(20,0.2,20),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  dock.position.z = -10;
  scene.add(dock);

  // YACHT
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshStandardMaterial({color:0xffd700})
  );
  yacht.position.set(0,0.5,-15);
  scene.add(yacht);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

// ===============================
// MOVEMENT
// ===============================
function updatePlayer(){

  let speed = 0.08;

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;
}

// ===============================
// CAMERA
// ===============================
function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x) * 0.08;
  camera.position.z += (player.position.z + 5 - camera.position.z) * 0.08;
  camera.lookAt(player.position);
}

// ===============================
// INTERACTION
// ===============================
function updatePrompt(){

  let dist = player.position.distanceTo(yacht.position);

  if(dist < 3){
    document.getElementById("prompt").style.display = "block";
  } else {
    document.getElementById("prompt").style.display = "none";
  }
}

// ===============================
// LOOP (CRITICAL FIX)
// ===============================
function animate(){

  requestAnimationFrame(animate);

  updatePlayer();
  updateCamera();
  updatePrompt();

  renderer.render(scene, camera);
}

</script>

</body>
</html>
