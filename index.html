<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — PLAYABLE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, #000, #050a1a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#zone {
  position:absolute;
  top:20px;
  right:20px;
  color:gold;
}

#hint {
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.4);
  display:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏠 Cabins → 🌉 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">INITIALIZING</div>
<div id="hint">MOVE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// WORLD CORE
/////////////////////////////////////////////////////

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x02040a);
scene.fog = new THREE.FogExp2(0x02040a, 0.015);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0x8899aa, 1));

let light = new THREE.PointLight(0x66ccff, 1.5);
light.position.set(0,5,5);
scene.add(light);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

let player = new THREE.Group();

let body = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,1.2,0.5),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y = 0.6;

let head = new THREE.Mesh(
  new THREE.SphereGeometry(0.35,16,16),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
head.position.y = 1.4;

player.add(body);
player.add(head);

player.position.set(-20,0,10);
scene.add(player);

/////////////////////////////////////////////////////
// WORLD STRUCTURE
/////////////////////////////////////////////////////

// dock
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(220,1,320),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-140);
scene.add(dock);

// cabins (10 properties)
for(let i=0;i<10;i++){
  let cabin = new THREE.Mesh(
    new THREE.BoxGeometry(8,5,8),
    new THREE.MeshStandardMaterial({color:0x151515})
  );

  let side = i < 5 ? -1 : 1;
  let index = i % 5;

  cabin.position.set(side*20,2.5,-20-index*25);
  scene.add(cabin);
}

// stage
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(22,2,14),
  new THREE.MeshStandardMaterial({color:0x5522aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// yacht
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(50,6,22),
  new THREE.MeshStandardMaterial({color:0x111133})
);
yacht.position.set(0,3,-200);
scene.add(yacht);

/////////////////////////////////////////////////////
// WATER (MOVING FEEL)
/////////////////////////////////////////////////////

let water = new THREE.Mesh(
  new THREE.PlaneGeometry(800,800),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

/////////////////////////////////////////////////////
// STARS
/////////////////////////////////////////////////////

let starGeo = new THREE.BufferGeometry();
let arr = [];

for(let i=0;i<2500;i++){
  arr.push(
    (Math.random()-0.5)*900,
    Math.random()*300,
    (Math.random()-0.5)*900
  );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

scene.add(new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:0.7})
));

/////////////////////////////////////////////////////
// STATE
/////////////////////////////////////////////////////

let keys = {};
let inWorld = false;
let hasPass = false;
let dance = false;
let danceTime = 0;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
  document.getElementById("start").style.display="none";
  inWorld=true;
  document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY";
}

/////////////////////////////////////////////////////
// LOGIC
/////////////////////////////////////////////////////

function update(){

  // movement
  if(keys["w"]) player.position.z -= 0.15;
  if(keys["s"]) player.position.z += 0.15;
  if(keys["a"]) player.position.x -= 0.15;
  if(keys["d"]) player.position.x += 0.15;

  // toggle dance
  if(keys["e"]){
    dance = !dance;
    keys["e"] = false;
  }

  if(dance){
    danceTime += 0.1;
    player.position.y = Math.sin(danceTime)*0.2;
    player.rotation.y += 0.05;
  } else {
    player.position.y = 0;
  }

  // stage unlock
  if(player.position.distanceTo(stage.position)<6 && !hasPass){
    hasPass = true;
    stage.material.color.set(0x00ffcc);
    document.getElementById("zone").innerText="🎟 STAGE UNLOCKED";
  }

  // yacht access
  if(player.position.distanceTo(yacht.position)<10 && hasPass){
    document.getElementById("zone").innerText="🚤 YACHT ACCESS OPEN";
  }

  // camera follow
  camera.position.x += (player.position.x-camera.position.x)*0.05;
  camera.position.y += (3-camera.position.y)*0.05;
  camera.position.z += (player.position.z+10-camera.position.z)*0.05;

  camera.lookAt(player.position);

  // water motion
  water.position.z = Math.sin(Date.now()*0.001)*1.5;

  renderer.render(scene,camera);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);
  if(!inWorld) return;
  update();
}

animate();

</script>

</body>
</html>
