<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ENGINE v3 STAGE</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
position:fixed;
inset:0;
display:block;
}

#ui{
position:fixed;
top:20px;
left:20px;
color:white;
z-index:10;
}

#zone{
position:fixed;
top:50px;
left:20px;
color:#00aaff;
z-index:10;
}

#energy{
position:fixed;
top:80px;
left:20px;
color:#ffcc00;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY ENGINE v3</div>
<div id="zone">Zone: Dock</div>
<div id="energy">Stage Energy: 0</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded",()=>{

/* =========================
CORE STATE
========================= */
const GameState = {
rep:0,
time:0,
zone:"Dock",
stageActive:false,
energy:0
};

/* =========================
ENGINE CORE
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050714);
scene.fog = new THREE.FogExp2(0x050814,0.0012);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,10000);
camera.position.set(0,40,120);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0x88aacc,0.35));
const sun = new THREE.DirectionalLight(0xfff1d6,3.2);
sun.position.set(250,300,150);
scene.add(sun);

/* =========================
PLAYER
========================= */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys = {};
let vel = new THREE.Vector3();

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
let x=0,z=0;
if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;

let len=Math.hypot(x,z);
if(len){x/=len;z/=len;}

vel.x += x*0.12;
vel.z += z*0.12;
vel.multiplyScalar(0.86);

player.position.add(vel);
}

/* =========================
CAMERA
========================= */
const camVel = new THREE.Vector3();

function cam(){
const target = new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camVel.lerp(target.clone().sub(camera.position).multiplyScalar(0.06),0.85);
camera.position.add(camVel);
camera.lookAt(player.position);
}

/* =========================
OCEAN BASE (from v2 simplified)
========================= */
const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(12000,12000),
new THREE.MeshStandardMaterial({color:0x062a3a})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.z = -400;
scene.add(ocean);

/* =========================
MAIN STAGE (NEW CORE FEATURE)
========================= */
const stage = new THREE.Group();

/* stage base */
const platform = new THREE.Mesh(
new THREE.CylinderGeometry(60,60,6,64),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x003355,
emissiveIntensity:1.5
})
);

platform.position.y = 3;
stage.add(platform);

/* jumbotron */
const screen = new THREE.Mesh(
new THREE.BoxGeometry(80,35,3),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x00aaff,
emissiveIntensity:1.5
})
);

screen.position.set(0,40,-60);
stage.add(screen);

/* stage lights ring */
for(let i=0;i<12;i++){
const light = new THREE.PointLight(0x00aaff,2,200);
light.position.set(
Math.cos(i/12*Math.PI*2)*70,
25,
Math.sin(i/12*Math.PI*2)*70
);
stage.add(light);
}

/* stage position */
stage.position.set(0,0,-220);
scene.add(stage);

/* =========================
CROWD SYSTEM (NEW)
========================= */
const crowd = [];

function spawnCrowd(){
for(let i=0;i<120;i++){
const npc = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x222222})
);

npc.position.set(
(stage.position.x + (Math.random()-0.5)*120),
1,
(stage.position.z + 80 + Math.random()*60)
);

scene.add(npc);
crowd.push(npc);
}
}
spawnCrowd();

/* crowd animation */
function updateCrowd(){
crowd.forEach(n=>{
n.position.y = 1 + Math.sin(GameState.time*3 + n.position.x)*0.2;
});
}

/* =========================
STAGE ENERGY SYSTEM (NEW)
========================= */
function updateStageEnergy(){

const dist = player.position.distanceTo(stage.position);

if(dist < 200){
GameState.stageActive = true;
GameState.energy += 0.5;
} else {
GameState.stageActive = false;
GameState.energy *= 0.98;
}

document.getElementById("energy").innerText =
"Stage Energy: " + Math.floor(GameState.energy);

/* visual pulse */
platform.material.emissiveIntensity =
1 + GameState.energy*0.02;

screen.material.emissiveIntensity =
1.5 + GameState.energy*0.03;
}

/* =========================
ZONE SYSTEM
========================= */
function updateZone(){
const d = player.position.distanceTo(stage.position);

if(d < 200){
GameState.zone = "Stage Zone";
} else if(player.position.z < -200){
GameState.zone = "Ocean";
} else {
GameState.zone = "Dock";
}

document.getElementById("zone").innerText =
"Zone: " + GameState.zone;
}

/* =========================
ATMOSPHERE (LIGHT PULSE)
========================= */
function atmosphere(){
GameState.time += 0.01;

const wave = Math.sin(GameState.time);

/* ocean motion */
ocean.position.x = wave * 2;

/* stage float */
stage.position.y = Math.sin(GameState.time*2)*1.2;

/* lighting mood shift */
scene.fog.color = new THREE.Color(
0.02 + wave*0.02,
0.06,
0.12 + wave*0.03
);
}

/* =========================
MAIN LOOP
========================= */
function animate(){
requestAnimationFrame(animate);

move();
cam();
updateZone();
updateStageEnergy();
updateCrowd();
atmosphere();

renderer.render(scene,camera);
}
animate();

});
</script>

</body>
</html>
