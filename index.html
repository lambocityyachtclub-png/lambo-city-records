<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — STABLE WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  line-height:1.4em;
}

#zone {
  position:absolute;
  top:20px;
  right:20px;
  color:gold;
  font-size:13px;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">
🏠 Cabin = Control Hub<br>
🌉 Dock = Real Estate<br>
🎤 Stage = Festival Zone<br>
🚤 Yacht = VIP Layer
</div>

<div id="zone">ZONE: LOADING</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c")});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.4));
let mainLight = new THREE.PointLight(0x00aaff,2);
mainLight.position.set(0,5,5);
scene.add(mainLight);

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,5);
scene.add(player);

// ================= CABIN =================
let cabin = new THREE.Mesh(
  new THREE.BoxGeometry(18,10,18),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.set(0,5,0);
scene.add(cabin);

// WINDOW VIEW (YACHT FAR)
let yachtView = new THREE.Mesh(
  new THREE.BoxGeometry(12,4,10),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yachtView.position.set(0,3,-120);
scene.add(yachtView);

// ================= DOCK =================
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,120),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-90);
scene.add(dock);

// ================= REAL ESTATE =================
for(let i=0;i<5;i++){
  let left = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  left.position.set(-12,2,-40-(i*15));
  scene.add(left);

  let right = left.clone();
  right.position.x = 12;
  scene.add(right);
}

// ================= STAGE (LEFT SIDE) =================
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(18,2,12),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-20,1,-130);
scene.add(stage);

// ================= YACHT (3 LAYERS) =================
let yachtBase = new THREE.Mesh(
  new THREE.BoxGeometry(35,4,18),
  new THREE.MeshStandardMaterial({color:0x222255})
);
yachtBase.position.set(0,2,-170);
scene.add(yachtBase);

let yachtTop = new THREE.Mesh(
  new THREE.BoxGeometry(25,4,12),
  new THREE.MeshStandardMaterial({color:0x111144})
);
yachtTop.position.set(0,6,-170);
scene.add(yachtTop);

// WATER STAGE (OUTSIDE VIP)
let waterStage = new THREE.Mesh(
  new THREE.BoxGeometry(20,1,12),
  new THREE.MeshStandardMaterial({color:0x5500aa})
);
waterStage.position.set(10,0.5,-160);
scene.add(waterStage);

// ================= INPUT =================
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

function start(){
document.getElementById("start").style.display="none";
}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z -= 0.2;
if(keys["s"]) player.position.z += 0.2;
if(keys["a"]) player.position.x -= 0.2;
if(keys["d"]) player.position.x += 0.2;

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.z += (player.position.z + 8 - camera.position.z)*0.08;
camera.lookAt(player.position);

// ZONES
let z = player.position.z;

if(z > -10) document.getElementById("zone").innerText="CABIN (CONTROL)";
else if(z > -60) document.getElementById("zone").innerText="DOCK (REAL ESTATE)";
else if(z > -120) document.getElementById("zone").innerText="STAGE (FESTIVAL)";
else document.getElementById("zone").innerText="YACHT (VIP)";

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
