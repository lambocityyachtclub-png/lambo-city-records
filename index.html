<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#home {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  pointer-events:auto;
}

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
  opacity:0.9;
}

button {
  padding:12px 16px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="home">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="hud">
  <div id="status">OFFLINE</div>
  <div id="zone">ZONE: DOCK</div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player;
let mode = "idle";
let keys = {};

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 15, 140);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,6,14);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // 🌌 STARS
  const starGeo = new THREE.BufferGeometry();
  const starPos = [];
  for(let i=0;i<2000;i++){
    starPos.push((Math.random()-0.5)*200, Math.random()*80, (Math.random()-0.5)*200);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.6}));
  scene.add(stars);

  // 🌊 OCEAN
  const ocean = new THREE.Mesh(
    new THREE.PlaneGeometry(600,600),
    new THREE.MeshPhongMaterial({color:0x001a33, shininess:100})
  );
  ocean.rotation.x = -Math.PI/2;
  scene.add(ocean);

  // 💡 LIGHTS
  scene.add(new THREE.AmbientLight(0x222244));
  const mainLight = new THREE.PointLight(0x00aaff,2,120);
  mainLight.position.set(0,15,0);
  scene.add(mainLight);

  // 🧍 PLAYER
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 YACHT (highlighted)
  const yacht = new THREE.Mesh(
    new THREE.BoxGeometry(4,1.5,10),
    new THREE.MeshStandardMaterial({color:0xffd700, emissive:0x553300})
  );
  yacht.position.set(0,1,-30);
  scene.add(yacht);

  // 🛥 spotlight on yacht
  const yachtLight = new THREE.PointLight(0xffaa00, 3, 60);
  yachtLight.position.set(0,5,-30);
  scene.add(yachtLight);

  // 🛣 STREET (path to city)
  for(let i=0;i<20;i++){
    let tile = new THREE.Mesh(
      new THREE.BoxGeometry(4,0.1,6),
      new THREE.MeshStandardMaterial({color:0x111111})
    );
    tile.position.set(0,0.05,-i*6);
    scene.add(tile);
  }

  // 🌇 CITY (organized skyline)
  for(let i=-5;i<=5;i++){
    for(let j=0;j<6;j++){

      let height = Math.random()*10 + 8;

      let building = new THREE.Mesh(
        new THREE.BoxGeometry(3,height,3),
        new THREE.MeshStandardMaterial({
          color:0x0a0a1a,
          emissive:0x0000ff,
          emissiveIntensity:0.2 + Math.random()*0.5
        })
      );

      building.position.set(i*6, height/2, -40 - j*10);
      scene.add(building);
    }
  }

  document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(mode==="play"){

    if(keys["w"]) player.position.z -= 0.25;
    if(keys["s"]) player.position.z += 0.25;
    if(keys["a"]) player.position.x -= 0.25;
    if(keys["d"]) player.position.x += 0.25;

    // 🎥 cinematic follow
    camera.position.x += (player.position.x - camera.position.x)*0.06;
    camera.position.z += (player.position.z + 14 - camera.position.z)*0.06;
    camera.position.y += (6 + Math.sin(Date.now()*0.002)*0.2 - camera.position.y)*0.05;

    camera.lookAt(player.position);
  }

  renderer.render(scene,camera);
}

function start(){
  document.getElementById("home").style.display="none";
  document.getElementById("status").innerText="LAMBO CITY ONLINE";
  mode="play";
}

</script>

</body>
</html>
