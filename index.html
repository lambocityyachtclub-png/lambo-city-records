<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION LAYER v7 (STABLE)</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:10;
}

#ui {
position:absolute; top:20px; left:20px;
color:white; font-size:13px;
}

#zone {
position:absolute; top:20px; right:20px;
color:#00ffff;
}

#msg {
position:absolute; bottom:30px; left:50%;
transform:translateX(-50%);
color:white;
padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
display:none;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD MOVE • E ENTER / EXIT CABIN</div>
<div id="zone">INITIALIZING...</div>
<div id="msg">INTERIOR MODE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// 🌍 CORE WORLD
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

const light = new THREE.PointLight(0x00ffff,2);
light.position.set(0,10,10);
scene.add(light);

/////////////////////////////////////////////////////
// 🧍 PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);
player.position.set(0,1,20);

const keys = {};
let started = false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
document.getElementById("start").style.display="none";
started = true;
document.getElementById("zone").innerText="WELCOME TO LAMBO CITY";

music.play(); // 🔊 THIS IS STEP 2
}
/////////////////////////////////////////////////////
// 🔊 AUDIO SYSTEM (SAFE)
/////////////////////////////////////////////////////

const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7d3c.mp3");
music.loop = true;
music.volume = 0.4;
/////////////////////////////////////////////////////
// 🌊 WORLD FLOOR
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// 🌟 STARS
/////////////////////////////////////////////////////

const starGeo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<3000;i++){
arr.push(
(Math.random()-0.5)*1500,
Math.random()*600,
(Math.random()-0.5)*1500
);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

/////////////////////////////////////////////////////
// 🚤 DOCK
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(80,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-100);
scene.add(dock);

  /////////////////////////////////////////////////////
// 🎤 STAGE (REQUIRED FOR CROWD SYSTEM)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
new THREE.BoxGeometry(20,2,12),
new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-15,1,-80);
scene.add(stage);

/////////////////////////////////////////////////////
// 🏡 CABINS
/////////////////////////////////////////////////////

const cabins = [];

function createCabin(x,z){

const base = new THREE.Group();

// FLOOR
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(8,8),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
floor.rotation.x = -Math.PI/2;
base.add(floor);

// WALLS
const wallMat = new THREE.MeshStandardMaterial({color:0x111111});

const back = new THREE.Mesh(new THREE.BoxGeometry(8,5,0.3), wallMat);
back.position.set(0,2.5,-4);
base.add(back);

const left = new THREE.Mesh(new THREE.BoxGeometry(0.3,5,8), wallMat);
left.position.set(-4,2.5,0);
base.add(left);

const right = left.clone();
right.position.x = 4;
base.add(right);

  // GLASS FRONT
const glass = new THREE.Mesh(
new THREE.BoxGeometry(8,5,0.1),
new THREE.MeshStandardMaterial({
  color:0x99ccff,
  transparent:true,
  opacity:0.25
})
);
glass.position.set(0,2.5,4);
base.add(glass);

  // BALCONY FLOOR
const balcony = new THREE.Mesh(
new THREE.BoxGeometry(8,0.2,3),
new THREE.MeshStandardMaterial({color:0x222222})
);
balcony.position.set(0,0.1,5.5);
base.add(balcony);

  // BALCONY RAIL
const rail = new THREE.Mesh(
new THREE.BoxGeometry(8,1,0.1),
new THREE.MeshStandardMaterial({
  color:0x99ccff,
  transparent:true,
  opacity:0.3
})
);
rail.position.set(0,0.8,7);
base.add(rail);

  // OCEAN REFLECTION LIGHT
const oceanGlow = new THREE.PointLight(0x00aaff,0.5,15);
oceanGlow.position.set(0,1,6);
base.add(oceanGlow);

// LIGHT
const light = new THREE.PointLight(0xffcc88,1.2,20);
light.position.set(0,4,0);
base.add(light);

// FURNITURE
const couch = new THREE.Mesh(
new THREE.BoxGeometry(3,1,1),
new THREE.MeshStandardMaterial({color:0x333333})
);
couch.position.set(-1,0.5,0);
base.add(couch);

const bed = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.6,1.5),
new THREE.MeshStandardMaterial({color:0x444444})
);
bed.position.set(1.5,0.3,-2);
base.add(bed);

// TRIGGER
const trigger = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshBasicMaterial({visible:false})
);
trigger.position.set(0,1,0);
base.add(trigger);

base.position.set(x,0,z);

scene.add(base);
cabins.push({group:base, trigger:trigger});
}

// SPAWN CABINS
for(let i=0;i<5;i++){
createCabin(-20,-20-(i*25));
createCabin(20,-20-(i*25));
}

/////////////////////////////////////////////////////
// 👥 CROWD SYSTEM (SAFE)
/////////////////////////////////////////////////////

const crowd = [];
const crowdBaseY = [];

for(let i=0;i<30;i++){

  const npc = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );

  npc.position.set(
    -15 + (Math.random()-0.5)*15,
    0.6,
    -80 + (Math.random()-0.5)*10
  );

  scene.add(npc);
  crowd.push(npc);
  crowdBaseY.push(npc.position.y);
}

  /////////////////////////////////////////////////////
// 🎤 STAGE LIGHTING
/////////////////////////////////////////////////////

const stageLight1 = new THREE.PointLight(0xff00ff,0,50);
const stageLight2 = new THREE.PointLight(0x00ffff,0,50);

scene.add(stageLight1);
scene.add(stageLight2);
  
/////////////////////////////////////////////////////
// 🎮 CABIN SYSTEM
/////////////////////////////////////////////////////

let inside = false;
let activeCabin = null;

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
toggleCabin();
}
});

function toggleCabin(){

if(inside){
inside = false;
activeCabin = null;
document.getElementById("msg").style.display="none";
document.getElementById("zone").innerText="OUTSIDE WORLD";
return;
}

for(let c of cabins){
if(player.position.distanceTo(c.group.position)<5){
inside = true;
activeCabin = c;
document.getElementById("msg").style.display="block";
document.getElementById("zone").innerText="INSIDE CABIN";
break;
}
}
}

/////////////////////////////////////////////////////
// 🎥 CAMERA
/////////////////////////////////////////////////////

function updateCamera(){

if(inside && activeCabin){
camera.position.set(
activeCabin.group.position.x,
3,
activeCabin.group.position.z
);
camera.lookAt(activeCabin.group.position);
return;
}

camera.position.x = player.position.x;
camera.position.y = 6;
camera.position.z = player.position.z + 8;
camera.lookAt(player.position);
}

  /////////////////////////////////////////////////////
// 🎧 STAGE ENERGY SYSTEM
/////////////////////////////////////////////////////

/////////////////////////////////////////////////////
// 🎧 STAGE ENERGY SYSTEM (FIXED)
/////////////////////////////////////////////////////

function updateStageEnergy(){

const dist = player.position.distanceTo(stage.position);

if(dist < 25){

  let t = Date.now()*0.002;

  stageLight1.intensity = 2;
  stageLight2.intensity = 2;

  stageLight1.position.set(-15 + Math.sin(t)*10, 10, -80);
  stageLight2.position.set(-15 + Math.cos(t)*10, 10, -80);

  crowd.forEach((p,i)=>{
    p.lookAt(player.position);
    p.position.y = crowdBaseY[i] + Math.sin(Date.now()*0.005 + i)*0.25;
  });

}else{

  stageLight1.intensity = 0;
  stageLight2.intensity = 0;

}

}
  
/////////////////////////////////////////////////////
// 🚶 MOVEMENT
/////////////////////////////////////////////////////

function move(){

if(inside) return;

if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// 🔁 LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!started) return;

move();
updateCamera();

stars.rotation.y += 0.0003;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
