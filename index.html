<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
canvas { display:block; }

#ui { position:absolute; inset:0; pointer-events:none; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  font-size:13px;
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  transition:opacity 0.8s;
}

#vip {
  position:absolute;
  inset:0;
  display:none;
  background:black;
  text-align:center;
  padding-top:90px;
  pointer-events:auto;
}

#prompt {
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  border:1px solid gold;
  padding:12px 18px;
  display:none;
  pointer-events:auto;
}

button {
  padding:12px 16px;
  margin-top:10px;
  background:black;
  border:1px solid gold;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="hud">
  <div id="status">CABIN LOBBY</div>
  <div id="zone">ZONE: LOBBY</div>
  <div id="radio">RADIO: AMBIENT</div>
</div>

<div id="fade"></div>

<div id="prompt">
  <p>🚪 EXIT CABIN → DOCK AREA</p>
  <button onclick="enterDock()">GO OUTSIDE</button>
</div>

<div id="vip">
  <h1 style="color:gold;">YACHT CLUB VIP</h1>
  <p>ACCESS GRANTED</p>
  <button onclick="exitVIP()">RETURN</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let mode = "lobby";
let keys = {};
let nearDoor = false;
let nearYacht = false;

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 10, 120);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,3,6);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // LIGHT
  scene.add(new THREE.AmbientLight(0x333355));

  const light = new THREE.PointLight(0x00aaff,2,100);
  light.position.set(0,10,0);
  scene.add(light);

  // PLAYER (inside cabin)
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,0);
  scene.add(player);

  // CABIN (lobby walls feel)
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({color:0x111122, side:THREE.BackSide})
  );
  cabin.position.set(0,2.5,0);
  scene.add(cabin);

  // DOOR EXIT (towards dock)
  const door = new THREE.Mesh(
    new THREE.BoxGeometry(2,3,0.2),
    new THREE.MeshStandardMaterial({color:0x444444})
  );
  door.position.set(0,1.5,-5);
  scene.add(door);

  // DOCK PLATFORM OUTSIDE
  const dock = new THREE.Mesh(
    new THREE.BoxGeometry(20,0.2,20),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  dock.position.set(0,0,-20);
  scene.add(dock);

  // YACHT (far end)
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(4,1.5,10),
    new THREE.MeshStandardMaterial({color:0xffd700, emissive:0x553300})
  );
  yacht.position.set(0,1,-35);
  scene.add(yacht);

  const yachtLight = new THREE.PointLight(0xffaa00,3,60);
  yachtLight.position.set(0,5,-35);
  scene.add(yachtLight);

  // STAR FIELD
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0;i<1500;i++){
    pos.push((Math.random()-0.5)*200, Math.random()*80, (Math.random()-0.5)*200);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:0.6})));

  document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z -= 0.15;
  if(keys["s"]) player.position.z += 0.15;
  if(keys["a"]) player.position.x -= 0.15;
  if(keys["d"]) player.position.x += 0.15;

  camera.position.x += (player.position.x - camera.position.x)*0.08;
  camera.position.z += (player.position.z + 6 - camera.position.z)*0.08;
  camera.lookAt(player.position);

  checkDoor();
  checkYacht();

  renderer.render(scene,camera);
}

function checkDoor(){
  const dist = Math.hypot(player.position.x, player.position.z + 5);

  if(dist < 2.5){
    nearDoor = true;
    document.getElementById("prompt").style.display="block";
  } else {
    nearDoor = false;
    document.getElementById("prompt").style.display="none";
  }
}

function enterDock(){
  document.getElementById("fade").style.opacity = 1;

  setTimeout(()=>{
    document.getElementById("status").innerText="DOCK AREA";
    document.getElementById("radio").innerText="OUTDOOR AMBIENT";
    document.getElementById("fade").style.opacity = 0;
  },800);
}

function checkYacht(){
  const dist = Math.hypot(
    player.position.x - yacht.position.x,
    player.position.z - yacht.position.z
  );

  if(dist < 5){
    document.getElementById("vip").style.display="block";
  }
}

function exitVIP(){
  document.getElementById("vip").style.display="none";
}

</script>

</body>
</html>
