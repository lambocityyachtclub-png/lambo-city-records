<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — PHASE 1 LUXURY WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui {
position:absolute; top:20px; left:20px;
color:white; font-family:Arial; font-size:13px;
z-index:10;
}

#zone {
position:absolute; top:20px; right:20px;
color:#00ffff; font-family:Arial;
z-index:10;
}

#start {
position:absolute; inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:20;
}
</style>

</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD TO MOVE</div>
<div id="zone">LOADING WORLD...</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// STATE
/////////////////////////////////////////////////////

let started = false;

const FEATURES = {
  stage: false // 🔒 LOCKED (your request)
};

/////////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x070818, 0.01);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  3000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const mainLight = new THREE.PointLight(0x00ffff, 1.5, 300);
mainLight.position.set(0, 30, 40);
scene.add(mainLight);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-40);
scene.add(player);

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move() {
  if (keys["w"]) player.position.z -= 0.25;
  if (keys["s"]) player.position.z += 0.25;
  if (keys["a"]) player.position.x -= 0.25;
  if (keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera() {
  camera.position.x += (player.position.x - camera.position.x) * 0.07;
  camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.07;
  camera.position.z += ((player.position.z + 16) - camera.position.z) * 0.07;

  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000),
  new THREE.MeshStandardMaterial({
    color:0x001426,
    metalness:0.4,
    roughness:0.3
  })
);

ocean.rotation.x = -Math.PI/2;
scene.add(ocean);

/////////////////////////////////////////////////////
// YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
  new THREE.BoxGeometry(16,4,60),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);
hull.position.y = 2;
yacht.add(hull);

const deck = new THREE.Mesh(
  new THREE.BoxGeometry(14,2,30),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
deck.position.y = 5;
yacht.add(deck);

yacht.position.set(40,0,-90);
scene.add(yacht);

/////////////////////////////////////////////////////
// CABINS (VILLAS)
/////////////////////////////////////////////////////

function createCabin(x,z){

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({ color:0x1a1a1a })
  );

  cabin.position.set(x,2.5,z);
  scene.add(cabin);

}

for(let i=0;i<5;i++){
  createCabin(-18, -20 - i*15);
  createCabin(18, -20 - i*15);
}

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1.2,2.2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.5
  })
);

hero.position.set(10,1,-15);
scene.add(hero);

/////////////////////////////////////////////////////
// STAGE (VISUAL ONLY — LOCKED)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.CylinderGeometry(18,18,1,32),
  new THREE.MeshStandardMaterial({
    color:0x111111,
    emissive:0x220044,
    emissiveIntensity:0.3
  })
);

stage.position.set(0,0,-60);
scene.add(stage);

/////////////////////////////////////////////////////
// CROWD (ATMOSPHERE ONLY)
/////////////////////////////////////////////////////

const crowd = [];

for(let i=0;i<12;i++){

  const npc = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,1.6,8),
    new THREE.MeshStandardMaterial({ color:0x00ffff })
  );

  npc.position.set(
    (Math.random()-0.5)*25,
    1,
    -55 + (Math.random()-0.5)*15
  );

  scene.add(npc);
  crowd.push(npc);
}

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

function start(){
  document.getElementById("start").style.display = "none";
  started = true;
  document.getElementById("zone").innerText = "LUXURY WORLD ACTIVE";
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

  requestAnimationFrame(animate);

  if(!started){
    renderer.render(scene,camera);
    return;
  }

  move();
  updateCamera();

  // simple hero proximity UI
  const d = player.position.distanceTo(hero.position);

  if(d < 3){
    document.getElementById("ui").innerText = "PRESS E TO TALK";
  } else {
    document.getElementById("ui").innerText = "WASD TO MOVE";
  }

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
