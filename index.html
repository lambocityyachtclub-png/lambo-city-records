<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY FIXED BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY — FIXED BUILD</div>
<div id="zone">LOADING...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// SAFE CORE INIT
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04070d);

const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTS
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x334455,1));

const sun = new THREE.DirectionalLight(0x88bbff,1.2);
sun.position.set(100,200,100);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mode="walk";

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222})
);
player.position.set(0,1,20);
scene.add(player);

/////////////////////////////////////////////////////
// CAR (SAFE INIT FIRST)
/////////////////////////////////////////////////////

const car = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(3,0.8,6),
new THREE.MeshStandardMaterial({color:0xffcc00,metalness:0.7})
);
body.position.y=0.5;

const cabin = new THREE.Mesh(
new THREE.BoxGeometry(2.4,0.8,2.5),
new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.set(0,1.2,-0.5);

car.add(body);
car.add(cabin);

car.position.set(0,0,60);
scene.add(car);

/////////////////////////////////////////////////////
// HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,80,80);
const water = new THREE.Mesh(
waterGeo,
new THREE.MeshStandardMaterial({color:0x02131f})
);
water.rotation.x=-Math.PI/2;
scene.add(water);

const pos = water.geometry.attributes.position;
const base=[];

for(let i=0;i<pos.count;i++){
base.push({x:pos.getX(i),z:pos.getZ(i)});
}

/////////////////////////////////////////////////////
// CABIN SIMPLE (SAFE)
/////////////////////////////////////////////////////

function cabin(x,z){
const g=new THREE.Group();

const base=new THREE.Mesh(
new THREE.BoxGeometry(10,1,10),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house=new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y=3;

g.add(base);
g.add(house);
g.position.set(x,0,z);

scene.add(g);
}

for(let i=0;i<4;i++){
cabin(-20,-20-i*20);
cabin(20,-20-i*20);
}

/////////////////////////////////////////////////////
// NPCS
/////////////////////////////////////////////////////

const npcs=[];

function npc(x,z){
const n=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffaa66})
);

n.position.set(x,1,z);
n.userData={dir:Math.random()*Math.PI*2,speed:0.02};

scene.add(n);
npcs.push(n);
}

for(let i=0;i<6;i++){
npc(-10+i*3,-30);
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y+8) - camera.position.y)*0.06;
camera.position.z += ((player.position.z+14) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVE
/////////////////////////////////////////////////////

function move(){
const s=0.25;
if(keys.w)player.position.z-=s;
if(keys.s)player.position.z+=s;
if(keys.a)player.position.x-=s;
if(keys.d)player.position.x+=s;
}

/////////////////////////////////////////////////////
// ENTER CAR
/////////////////////////////////////////////////////

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
if(player.position.distanceTo(car.position)<4 && mode==="walk"){
mode="car";
player.visible=false;
}
else if(mode==="car"){
mode="walk";
player.visible=true;
player.position.set(car.position.x+2,1,car.position.z);
}
}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

const t=performance.now()*0.001;

for(let i=0;i<pos.count;i++){
const v=base[i];
pos.setY(i,
Math.sin(v.x*0.01+t)*0.5+
Math.cos(v.z*0.01+t*1.2)*0.5
);
}
pos.needsUpdate=true;

move();
updateCamera();

for(let n of npcs){
n.position.x+=Math.cos(n.userData.dir)*n.userData.speed;
n.position.z+=Math.sin(n.userData.dir)*n.userData.speed;
n.userData.dir+=(Math.random()-0.5)*0.01;
}

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
