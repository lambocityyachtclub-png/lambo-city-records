<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V34 — MISSION SYSTEM ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone,#mission{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
#mission{bottom:20px;left:20px;color:#00ff99;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V34 — MISSIONS</div>
<div id="zone">ZONE: INIT</div>
<div id="mission">MISSION: NONE</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE STATE
/////////////////////////////////////////////////////

const GAME = {
lockInput: false
};

/////////////////////////////////////////////////////
// MISSION SYSTEM (NEW CORE)
/////////////////////////////////////////////////////

const MISSIONS = [
{
id: 1,
name: "Reach the Stage",
active: true,
complete: false,
check: function(player){
return player.position.z < -140;
}
},
{
id: 2,
name: "Visit Yacht",
active: false,
complete: false,
check: function(player, yacht){
return player.position.distanceTo(yacht.position) < 10;
}
}
];

let currentMission = 0;

function updateMission(player,yacht){

let m = MISSIONS[currentMission];

if(!m) return;

// show mission
document.getElementById("mission").innerText =
"MISSION: " + m.name;

// check completion
if(m.check(player,yacht)){

m.complete = true;

document.getElementById("mission").innerText =
"MISSION COMPLETE: " + m.name;

// next mission unlock
currentMission++;

if(MISSIONS[currentMission]){
MISSIONS[currentMission].active = true;

// cinematic transition
playMissionCutscene();
}
}
}

/////////////////////////////////////////////////////
// CUTSCENE SYSTEM
/////////////////////////////////////////////////////

let cutscene = false;

function playMissionCutscene(){

cutscene = true;
GAME.lockInput = true;

let t = 0;

function run(){

t += 0.01;

camera.position.x = Math.sin(t)*60;
camera.position.y = 35 - t*10;
camera.position.z = 80 - t*50;

camera.lookAt(0,0,0);

if(t < 1.5){
requestAnimationFrame(run);
}else{
cutscene = false;
GAME.lockInput = false;
}
}

run();
}

/////////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2e);
scene.fog = new THREE.Fog(0x0a1220, 80, 800);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 12000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.9));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,400,150);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(20,4,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(60,2,-120);
scene.add(yacht);

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

function updateCamera(){
if(cutscene) return;

camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y + 12) - camera.position.y)*0.06;
camera.position.z += ((player.position.z + 25) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

if(GAME.lockInput) return;

const s = 0.32;

if(keys.w) player.position.z -= s;
if(keys.s) player.position.z += s;
if(keys.a) player.position.x -= s;
if(keys.d) player.position.x += s;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function loop(){

requestAnimationFrame(loop);

move();
updateCamera();
updateMission(player,yacht);

renderer.render(scene,camera);
}

loop();

</script>

</body>
</html>
