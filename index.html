<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/yourimage.jpg') no-repeat center center/cover;
  filter: brightness(0.35);
  z-index: -2;
}

/* MAIN */
.screen {
  min-height: 100vh;
  padding: 20px;
  background: rgba(0,0,0,0.7);
}

/* TITLE */
.title {
  text-align: center;
  font-size: 60px;
  color: gold;
  letter-spacing: 3px;
  font-weight: bold;
}

/* MAP */
.map {
  max-width: 900px;
  margin: 30px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.zone {
  border: 1px solid rgba(255,215,0,0.5);
  padding: 25px;
  text-align: center;
  cursor: pointer;
  background: rgba(0,0,0,0.6);
  transition: 0.2s;
  user-select: none;
}

.zone:hover {
  transform: scale(1.05);
  box-shadow: 0 0 18px rgba(255,215,0,0.3);
}

/* PANEL */
.panel {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  border: 1px solid gold;
  background: rgba(0,0,0,0.6);
  min-height: 90px;
  transition: 0.3s;
}

/* ENTER */
.enter {
  display: block;
  width: 300px;
  margin: 30px auto;
  padding: 15px;
  background: gold;
  color: black;
  font-weight: bold;
  text-align: center;
  text-decoration: none;
  border-radius: 10px;
}

/* STATUS */
.status {
  text-align: center;
  color: lightgreen;
  font-size: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="screen">

<div class="title">LAMBO CITY OS</div>

<div class="status" id="status">SYSTEM: INITIALIZING IMMERSION ENGINE...</div>

<div class="map">

<div class="zone" onclick="enterZone('studio')">🎵 Studio District</div>
<div class="zone" onclick="enterZone('yacht')">🛥 Yacht Club</div>
<div class="zone" onclick="enterZone('drops')">🔥 Drop Zone</div>
<div class="zone" onclick="enterZone('vip')">🔐 VIP Vault</div>

</div>

<div class="panel" id="panel">
System ready. Select a district to begin navigation.
</div>

<a class="enter" href="/vip.html">ENTER YACHT CLUB PORTAL</a>

</div>

<script>

const panel = document.getElementById("panel");
const status = document.getElementById("status");

/* SOUND ENGINE (simple web audio - no files needed) */
function beep(freq = 440, time = 0.08) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + time);
  osc.stop(ctx.currentTime + time);
}

/* ZONE ENGINE */
function enterZone(zone) {

  beep(220 + Math.random() * 300);

  status.innerText = "SYSTEM: LOADING " + zone.toUpperCase() + " DISTRICT...";

  if (zone === "studio") {
    panel.innerHTML = "🎵 Studio District: Recording sessions active. HERO is working inside Lambo City Studios.";
  }

  if (zone === "yacht") {
    panel.innerHTML = "🛥 Yacht Club: Luxury access zone. Private events and elite gatherings underway.";
  }

  if (zone === "drops") {
    panel.innerHTML = "🔥 Drop Zone: Music releases and NFT drops are being prepared for launch.";
  }

  if (zone === "vip") {
    panel.innerHTML = "🔐 VIP Vault: Restricted access. Boarding pass required inside Yacht Club portal.";
  }

  setTimeout(() => {
    status.innerText = "SYSTEM: READY";
  }, 800);
}

/* BOOT FEEL */
setTimeout(() => {
  status.innerText = "SYSTEM: LAMBO CITY IMMERSION ENGINE ONLINE";
  beep(520);
}, 1200);

</script>

</body>
</html>
