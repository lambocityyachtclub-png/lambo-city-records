<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | IMMERSION CORE FINAL</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: white;
    cursor: none;
}

/* 🌌 WORLD LIGHTING LAYER */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    transition: filter 0.3s;
    z-index: 0;
}

/* 🎥 CAMERA SHAKE LAYER */
#cameraFX {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
}

/* 🎮 WORLD */
#world {
    position: fixed;
    width: 300%;
    height: 100%;
    display: flex;
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    transform-origin: center;
    z-index: 2;
}

/* 🌍 ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#city { background: radial-gradient(circle, #2a1a0a, #000); }
#yacht { background: radial-gradient(circle, #0a0f1a, #000); }
#store { background: radial-gradient(circle, #1a0a0a, #000); }

/* 🚪 DOORS */
.door {
    padding: 12px 18px;
    border: 1px solid white;
    margin-top: 10px;
    cursor: pointer;
    opacity: 0.9;
}

/* 🎮 TITLE */
.title {
    font-size: 42px;
    letter-spacing: 6px;
}

/* 📺 STREAM */
iframe {
    width: 80%;
    height: 450px;
}

/* 🧍 NPC */
.npc {
    position: fixed;
    width: 14px;
    height: 28px;
    background: white;
    top: 70%;
    z-index: 5;
    opacity: 0.8;
}

/* 🚗 CAR */
.car {
    position: fixed;
    width: 80px;
    height: 30px;
    background: red;
    top: 65%;
    left: -120px;
    z-index: 5;
}

/* 🎯 HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
    z-index: 10;
}

/* 🎧 AUDIO ZONES (SIMULATED) */
.zoneAudio {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 10px;
    opacity: 0.4;
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="cameraFX"></div>
<div id="hud">LAMBO CITY // IMMERSION ENGINE ACTIVE</div>
<div class="zoneAudio" id="audioLabel">CITY AMBIENCE</div>

<div id="world">

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <div class="door" onmousedown="holdEnter(1)">ENTER YACHT CLUB</div>
        <div class="door" onmousedown="holdEnter(2)">ENTER STORE</div>
    </div>

    <!-- YACHT -->
    <div class="zone" id="yacht">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <div class="door" onclick="move(0)">EXIT</div>
    </div>

    <!-- STORE -->
    <div class="zone" id="store">
        <div class="title">STORE</div>
        <div class="door" onclick="move(0)">BACK</div>
    </div>

</div>

<script>

const world = document.getElementById("world");
const sky = document.getElementById("sky");
const audioLabel = document.getElementById("audioLabel");

let pos = 0;
let holdTimer;

/* 🎮 CAMERA INERTIA + ROTATION FEEL */
function move(zone) {

    let start = pos;
    let end = zone;
    let t = 0;

    function animate() {
        t += 0.02;

        let smooth = start + (end - start) * t;

        world.style.transform = `
            translateX(-${smooth * 100}vw)
            scale(1.02)
        `;

        sky.style.filter = `brightness(${0.7 + Math.abs(Math.sin(t * 3)) * 0.3})`;

        if (t < 1) requestAnimationFrame(animate);
        else pos = zone;
    }

    animate();

    updateAudio(zone);
}

/* 🚪 HOLD TO ENTER (GTA STYLE INTERACTION) */
function holdEnter(zone) {

    let progress = 0;

    holdTimer = setInterval(() => {

        progress++;

        if (progress > 40) {
            clearInterval(holdTimer);
            move(zone);
        }

    }, 20);

    document.onmouseup = () => clearInterval(holdTimer);
}

/* 🎧 AUDIO ZONE SYSTEM (SIMULATED) */
function updateAudio(zone) {

    if (zone === 0) {
        audioLabel.innerText = "CITY AMBIENCE";
    }

    if (zone === 1) {
        audioLabel.innerText = "OCEAN + YACHT AMBIENCE";
    }

    if (zone === 2) {
        audioLabel.innerText = "INDOOR STORE AMBIENCE";
    }
}

/* 🚗 WORLD LIFE */
function spawnCar() {
    const c = document.createElement("div");
    c.className = "car";
    document.body.appendChild(c);

    let x = -120;
    let speed = 3 + Math.random() * 3;

    function run() {
        x += speed;
        c.style.left = x + "px";

        if (x < window.innerWidth + 120) requestAnimationFrame(run);
        else c.remove();
    }

    run();
}

/* 🧍 NPC LIFE */
function spawnNPC() {
    const n = document.createElement("div");
    n.className = "npc";
    n.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 4000);
}

/* 🌍 DENSITY SYSTEM */
setInterval(() => {

    spawnCar();

    let density = pos === 0 ? 3 : 1;

    for (let i = 0; i < density; i++) {
        spawnNPC();
    }

}, 800);

</script>

</body>
</html>
