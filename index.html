<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LUXURY WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
position:absolute;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LOADING LUXURY WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE (FIXED SAFE START)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02040a);
scene.fog = new THREE.FogExp2(0x070b1a, 0.006);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  2000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (IMPORTANT FIX)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 1.0));

const mainLight = new THREE.DirectionalLight(0x66ccff, 1.2);
mainLight.position.set(50, 100, 50);
scene.add(mainLight);

const fillLight = new THREE.PointLight(0x4da3ff, 1.2, 1000);
fillLight.position.set(0, 80, 0);
scene.add(fillLight);
/////////////////////////////////////////////////////
// EXTRA VISIBILITY FIX (IMPORTANT)
/////////////////////////////////////////////////////

const ambientBoost = new THREE.AmbientLight(0x335577, 0.8);
scene.add(ambientBoost);

scene.background = new THREE.Color(0x050a14);
/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1, 2, 1),
  new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0x111111
  })
);

player.position.set(0, 1, -20);
scene.add(player);
camera.position.set(0, 8, 10);

const keys = {};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function move() {
  if (keys["w"]) player.position.z -= 0.3;
  if (keys["s"]) player.position.z += 0.3;
  if (keys["a"]) player.position.x -= 0.3;
  if (keys["d"]) player.position.x += 0.3;
}

function updateCamera() {
  camera.position.x += (player.position.x - camera.position.x) * 0.08;
  camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.08;
  camera.position.z += ((player.position.z + 14) - camera.position.z) * 0.08;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (STABLE FIX)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2000, 2000, 80, 80);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x021428,
  metalness: 0.4,
  roughness: 0.6,
  emissive: 0x001122,
  emissiveIntensity: 0.3
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for (let i = 0; i < waterPos.count; i++) {
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}
  /////////////////////////////////////////////////////
// LOOP (PUT THIS HERE - END OF FILE)
/////////////////////////////////////////////////////

function animate() {
  requestAnimationFrame(animate);

  move();
  updateCamera();

  const time = Date.now() * 0.001;

  for (let i = 0; i < waterPos.count; i++) {
    const v = waterBase[i];

    const wave =
      Math.sin(v.x * 0.02 + time) * 0.4 +
      Math.cos(v.z * 0.02 + time * 1.3) * 0.4;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  renderer.render(scene, camera);
}

animate();
