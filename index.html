<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LIVE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}

#prompt {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="ui">ZONE: CABIN</div>
<div id="prompt">INTERACT</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// 🔗 ALREADY SET (NO TOUCH NEEDED)
const STREAM_LINK = "https://lambocityrecords.com";
const MERCH_LINK = "https://lambocityrecords.com";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0x404040, 1.5));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// WALLS
function wall(x,y,z,ry){
  let w = new THREE.Mesh(
    new THREE.PlaneGeometry(20,4),
    new THREE.MeshStandardMaterial({color:0x222233, side:THREE.DoubleSide})
  );
  w.position.set(x,y,z);
  w.rotation.y = ry;
  scene.add(w);
}

wall(0,2,-10,0);
wall(0,2,10,Math.PI);
wall(-10,2,0,Math.PI/2);
wall(10,2,0,-Math.PI/2);

// DOOR
let door = new THREE.Mesh(
  new THREE.BoxGeometry(2,3,0.2),
  new THREE.MeshStandardMaterial({color:0x444444})
);
door.position.set(0,1.5,-9.9);
scene.add(door);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,40),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-40);
dock.visible = false;
scene.add(dock);

// YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(20,4,20),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,2,-60);
yacht.visible = false;
scene.add(yacht);

// ⭐ STARS
const starGeo = new THREE.BufferGeometry();
const starArr = [];

for(let i=0;i<1500;i++){
  starArr.push(
    (Math.random()-0.5)*200,
    Math.random()*100,
    -60 + (Math.random()-0.5)*200
  );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));

const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff, size:0.6})
);

stars.visible = false;
scene.add(stars);

// 🎧 MUSIC
let track = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3");
track.loop = true;
track.volume = 0.5;

// 🎛 RADIO
let radio = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,1),
  new THREE.MeshStandardMaterial({color:0xffff00})
);
radio.position.set(6,1,-60);
radio.visible = false;
scene.add(radio);

// 📺 SCREEN
let screen = new THREE.Mesh(
  new THREE.BoxGeometry(6,3,0.2),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
screen.position.set(0,3,-55);
screen.visible = false;
scene.add(screen);

// 🛍 MERCH
let merch = new THREE.Mesh(
  new THREE.BoxGeometry(3,3,3),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
merch.position.set(-6,1.5,-60);
merch.visible = false;
scene.add(merch);

// CROWD
let crowd = [];
for(let i=0;i<25;i++){
  let p = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1,0.5),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*10,0.5,-60+(Math.random()-0.5)*10);
  p.visible = false;
  scene.add(p);
  crowd.push(p);
}

// LIGHTS
let lights = [];
for(let i=0;i<6;i++){
  let l = new THREE.PointLight(0x00aaff, 2, 30);
  l.position.set((i-3)*3,3,-60);
  l.visible = false;
  scene.add(l);
  lights.push(l);
}

// INPUT
let keys = {};
let inDock = false;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});
document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=> track.play());

// INTERACT
function interact(){

if(!inDock && player.position.distanceTo(door.position) < 3){

  inDock = true;

  scene.children.forEach(obj=>{
    if(obj !== player && obj !== dock && obj !== yacht &&
       obj !== radio && obj !== screen && obj !== merch &&
       obj !== stars && !crowd.includes(obj) && !lights.includes(obj)){
      obj.visible = false;
    }
  });

  dock.visible = true;
  yacht.visible = true;
  stars.visible = true;
  radio.visible = true;
  screen.visible = true;
  merch.visible = true;

  crowd.forEach(p=> p.visible = true);
  lights.forEach(l=> l.visible = true);

  player.position.set(0,1,-30);

  document.getElementById("ui").innerText = "ZONE: YACHT CLUB";

  track.play();
  return;
}

// RADIO
if(player.position.distanceTo(radio.position) < 3){
  track.currentTime = 0;
  track.play();
}

// SCREEN → YOUR SITE
if(player.position.distanceTo(screen.position) < 4){
  window.open(STREAM_LINK, "_blank");
}

// MERCH → YOUR SITE
if(player.position.distanceTo(merch.position) < 3){
  window.open(MERCH_LINK, "_blank");
}

}

// LOOP
function animate(){
requestAnimationFrame(animate);

if(keys["w"]) player.position.z -= 0.1;
if(keys["s"]) player.position.z += 0.1;
if(keys["a"]) player.position.x -= 0.1;
if(keys["d"]) player.position.x += 0.1;

camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
camera.lookAt(player.position);

crowd.forEach(p=>{
  p.position.y = 0.5 + Math.sin(Date.now()*0.005)*0.2;
});

lights.forEach((l,i)=>{
  l.intensity = 2 + Math.sin(Date.now()*0.003 + i)*1.5;
});

stars.rotation.y += 0.0005;

let near = (
  player.position.distanceTo(door.position) < 3 ||
  player.position.distanceTo(radio.position) < 3 ||
  player.position.distanceTo(merch.position) < 3 ||
  player.position.distanceTo(screen.position) < 4
);

document.getElementById("prompt").style.display = near ? "block" : "none";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
