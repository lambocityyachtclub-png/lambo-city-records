<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | FINAL WORLD ENGINE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: white;
}

/* 🌌 SKY / WEATHER */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    animation: sky 10s infinite alternate;
    z-index: 0;
}

@keyframes sky {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.2) hue-rotate(10deg); }
    100% { filter: brightness(0.9); }
}

/* 🌫 FOG */
#fog {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.85));
    z-index: 2;
}

/* 🚗 CAR */
.car {
    position: absolute;
    width: 60px;
    height: 30px;
    background: red;
    top: 60%;
    border-radius: 4px;
    z-index: 3;
}

/* 🚶 NPC */
.npc {
    position: absolute;
    width: 15px;
    height: 30px;
    background: white;
    opacity: 0.7;
    z-index: 3;
}

/* 🧭 HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
    z-index: 10;
}

/* 🌍 ZONES */
.zone {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 5;
}

#city {
    background: radial-gradient(circle, #2a1a0a, #000);
}

#yacht {
    background: radial-gradient(circle, #0a0f1a, #000);
}

#store {
    background: radial-gradient(circle, #1a0a0a, #000);
}

/* 🎮 UI */
.title {
    font-size: 40px;
    letter-spacing: 6px;
    margin-bottom: 10px;
}

button {
    margin: 8px;
    padding: 10px 16px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* 📺 TWITCH */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* 🔊 AUDIO */
audio { display: none; }

</style>
</head>

<body>

<div id="sky"></div>
<div id="fog"></div>
<div id="hud">LAMBO CITY // LIVE WORLD ENGINE</div>

<!-- CITY -->
<div id="city" class="zone">
    <div class="title">LAMBO CITY</div>
    <button onclick="enter('yacht')">YACHT CLUB</button>
    <button onclick="enter('store')">STORE</button>
</div>

<!-- YACHT -->
<div id="yacht" class="zone">
    <div class="title">YACHT CLUB</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="exit()">BACK TO CITY</button>
</div>

<!-- STORE -->
<div id="store" class="zone">
    <div class="title">STORE</div>
    <button>HERO DROP</button>
    <button onclick="exit()">BACK TO CITY</button>
</div>

<!-- AUDIO -->
<audio id="cityAudio" loop>
    <source src="https://www.soundjay.com/nature/sounds/wind-1.mp3">
</audio>

<audio id="oceanAudio" loop>
    <source src="https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3">
</audio>

<script>

const city = document.getElementById("city");
const yacht = document.getElementById("yacht");
const store = document.getElementById("store");

const cityAudio = document.getElementById("cityAudio");
const oceanAudio = document.getElementById("oceanAudio");

/* START */
window.onload = () => {
    city.style.display = "flex";

    cityAudio.volume = 0.3;
    cityAudio.play().catch(()=>{});

    startWorld();
};

/* 🚪 ENTER */
function enter(type) {

    city.style.display = "none";

    if (type === "yacht") {
        yacht.style.display = "flex";
        oceanAudio.volume = 0.4;
        oceanAudio.play().catch(()=>{});
    }

    if (type === "store") {
        store.style.display = "flex";
    }
}

/* 🚪 EXIT */
function exit() {
    yacht.style.display = "none";
    store.style.display = "none";

    oceanAudio.pause();

    city.style.display = "flex";
}

/* 🚗 CARS */
function spawnCar() {
    const car = document.createElement("div");
    car.className = "car";
    car.style.left = "-80px";
    car.style.top = (55 + Math.random()*10) + "%";
    document.body.appendChild(car);

    let x = -80;

    function move() {
        x += 3;
        car.style.left = x + "px";

        if (x < window.innerWidth + 100) {
            requestAnimationFrame(move);
        } else {
            car.remove();
        }
    }

    move();
}

/* 🚶 NPC */
function spawnNPC() {
    const npc = document.createElement("div");
    npc.className = "npc";
    npc.style.left = Math.random()*window.innerWidth + "px";
    npc.style.top = (60 + Math.random()*15) + "%";
    document.body.appendChild(npc);

    setTimeout(()=> npc.remove(), 5000);
}

/* 🌍 WORLD LOOP */
function startWorld() {
    setInterval(spawnCar, 1200);
    setInterval(spawnNPC, 900);
}

</script>

</body>
</html>
