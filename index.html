<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V35 — STABLE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;left:20px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V35 — WORLD FOUNDATION</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>


/////////////////////////////////////////////////////
// CORE ENGINE (REQUIRED - DO NOT REMOVE)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(
0x06131f, // deep blue atmosphere
0.0035    // fog density
);

const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

/////////////////////////////////////////////////////
// GLOBAL WORLD STATE (CORE MEMORY)
/////////////////////////////////////////////////////

let worldTime = 0;

let mood = {
  timeOfDay: 0,
  intensity: 1
};
  
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

  
/////////////////////////////////////////////////////
// LIGHTING LAYERS (AAA STYLE)
/////////////////////////////////////////////////////

// base ambient (fills shadows so world is visible)
const ambient = new THREE.AmbientLight(0x7fa6b8, 1.2);
scene.add(ambient);

// directional “sun / moon hybrid” (cinematic tone)
const sun = new THREE.DirectionalLight(0xa6d0ff, 1.4);
sun.position.set(120, 220, 80);
scene.add(sun);

// ocean bounce light (reflective water feel)
const oceanLight = new THREE.PointLight(0x1ec8ff, 1.8, 1200);
oceanLight.position.set(0, 30, -50);
scene.add(oceanLight);

// stage glow (focus anchor)
const stageGlow = new THREE.PointLight(0x00aaff, 2.2, 900);
stageGlow.position.set(0, 20, -150);
scene.add(stageGlow);
  
/////////////////////////////////////////////////////
// CAMERA FIX (IMPORTANT)
/////////////////////////////////////////////////////

camera.position.set(0, 35, 90);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// INTERACTION SYSTEM (BLOCK 5)
/////////////////////////////////////////////////////

let nearObject = null;
let canInteract = false;

const hint = document.createElement("div");
hint.style.position = "absolute";
hint.style.bottom = "80px";
hint.style.left = "50%";
hint.style.transform = "translateX(-50%)";
hint.style.padding = "10px 15px";
hint.style.color = "white";
hint.style.fontFamily = "Arial";
hint.style.background = "rgba(0,0,0,0.6)";
hint.style.border = "1px solid #00aaff";
hint.style.display = "none";
document.body.appendChild(hint);

const interactables = [
  { name: "dock", x: 0, z: -40, radius: 12, message: "Dock: Explore Yacht Area" },
  { name: "stage", x: 0, z: -150, radius: 14, message: "Stage: Press E to activate show mode" },
  { name: "jumbotron", x: 0, z: -185, radius: 14, message: "Jumbotron: Visual system ready" },
  { name: "race", x: 0, z: -250, radius: 16, message: "Race Track: Free roam zone" }
];

  function checkInteraction(){

nearObject = null;
canInteract = false;

for(let obj of interactables){

const dx = player.position.x - obj.x;
const dz = player.position.z - obj.z;

const dist = Math.sqrt(dx*dx + dz*dz);

if(dist < obj.radius){
nearObject = obj;
canInteract = true;
break;
}
}

if(canInteract){
hint.style.display = "block";
hint.innerHTML = `${nearObject.message} <br> Press <b>E</b>`;
}else{
hint.style.display = "none";
}
}

/////////////////////////////////////////////////////
// INTERACTION ACTION SYSTEM (BLOCK 6)
/////////////////////////////////////////////////////

  document.addEventListener("keydown", (e) => {

if(e.key.toLowerCase() !== "e") return;
if(!canInteract || !nearObject) return;

if(nearObject.name === "dock"){
camera.position.set(0, 25, 120);
}

if(nearObject.name === "stage"){
stage.material.emissiveIntensity = 2.5;
setTimeout(()=> stage.material.emissiveIntensity = 1.0, 2000);
}

if(nearObject.name === "jumbotron"){
screen.material.emissive.set(0x00ffcc);
setTimeout(()=> screen.material.emissive.set(0x0044ff), 1500);
}

if(nearObject.name === "race"){
velocity.x *= 2;
velocity.z *= 2;
}

});

/////////////////////////////////////////////////////
// INTERACTION MEMORY SYSTEM (BLOCK 7)
/////////////////////////////////////////////////////

 let worldState = {
  dockVisited: false,
  stageActivated: false,
  jumbotronUsed: false,
  raceBoosted: false
};

let lastObject = null;

function updateWorldState(){

if(!nearObject) {
  lastObject = null;
  return;
}

// only trigger when entering a new object
if(nearObject !== lastObject){

  if(nearObject.name === "dock") worldState.dockVisited = true;
  if(nearObject.name === "stage") worldState.stageActivated = true;
  if(nearObject.name === "jumbotron") worldState.jumbotronUsed = true;
  if(nearObject.name === "race") worldState.raceBoosted = true;

  lastObject = nearObject;
}
}

/////////////////////////////////////////////////////
// WORLD EVOLUTION SYSTEM (BLOCK 8)
/////////////////////////////////////////////////////

function updateWorldEvolution(){

// 🌊 DOCK EVOLUTION
if(worldState.dockVisited){
dock.material.color.set(0x6aa6ff);
dock.material.emissive.set(0x001122);
}

// 🎤 STAGE EVOLUTION
if(worldState.stageActivated){
stage.material.emissiveIntensity = 2.0;
stage.material.color.set(0x222222);

// subtle “energy pulse”
stage.rotation.y += 0.001;
}

// 📺 JUMBOTRON EVOLUTION
if(worldState.jumbotronUsed){
screen.material.emissive.set(0x00ffcc);
screen.scale.set(1.05, 1.05, 1.05);
}

// 🏁 RACE EVOLUTION
if(worldState.raceBoosted){
raceTrack.material.color.set(0x444444);

// optional: boost player speed feel
velocity.x *= 1.001;
velocity.z *= 1.001;
}

}
  
/////////////////////////////////////////////////////
// OCEAN (BEHIND WORLD)
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({
color:0x0a2233,
metalness:0.4,
roughness:0.6
})
);
water.rotation.x = -Math.PI/2;
water.position.z = -200;
scene.add(water);

/////////////////////////////////////////////////////
// MAIN DOCK (CENTER PIECE)
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(25,1,180),
new THREE.MeshStandardMaterial({
color:0x4a321d,
emissive:0x000000,
emissiveIntensity:1
})
);

dock.position.set(0,0.5,-40);
scene.add(dock);

/////////////////////////////////////////////////////
// ROUND STAGE (FOCAL POINT)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x003355
})
);
stage.position.set(0,1,-150);
scene.add(stage);

/////////////////////////////////////////////////////
// JUMBOTRON
/////////////////////////////////////////////////////

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// CABINS (LEFT / RIGHT STRUCTURE)
/////////////////////////////////////////////////////

function cabin(x,z){
const g = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x333333})
);
g.position.set(x,4,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*30);
cabin(45,-20-i*30);
}

/////////////////////////////////////////////////////
// FUTURE ZONES (PLACEHOLDERS)
// (NO COMPLEXITY YET — JUST STRUCTURE)
/////////////////////////////////////////////////////

const basketballZone = new THREE.Mesh(
new THREE.PlaneGeometry(60,40),
new THREE.MeshStandardMaterial({color:0x112233})
);
basketballZone.rotation.x = -Math.PI/2;
basketballZone.position.set(-80,0,-120);
scene.add(basketballZone);

const golfZone = new THREE.Mesh(
new THREE.PlaneGeometry(80,60),
new THREE.MeshStandardMaterial({color:0x113322})
);
golfZone.rotation.x = -Math.PI/2;
golfZone.position.set(80,0,-160);
scene.add(golfZone);

const raceTrack = new THREE.Mesh(
new THREE.TorusGeometry(60,5,16,100),
new THREE.MeshStandardMaterial({color:0x222222})
);
raceTrack.rotation.x = Math.PI/2;
raceTrack.position.set(0,2,-250);
scene.add(raceTrack);

/////////////////////////////////////////////////////
// WORLD FLOW SYSTEM (BLOCK 4)
/////////////////////////////////////////////////////

const anchors = [
  { name: "dock", x: 0, z: -40, strength: 0.6 },
  { name: "stage", x: 0, z: -150, strength: 1.2 },
  { name: "jumbotron", x: 0, z: -185, strength: 1.0 },
  { name: "race", x: 0, z: -250, strength: 0.8 }
];

/////////////////////////////////////////////////////
// AAA MOVEMENT SYSTEM V1 (FULL CONTROL MODE)
/////////////////////////////////////////////////////

const velocity = new THREE.Vector3(0,0,0);

// tuning (feel control here)
const acceleration = 0.02;
const friction = 0.90;
const maxSpeed = 0.6;

function move(){

let inputX = 0;
let inputZ = 0;

// INPUT
if(keys.w) inputZ -= 1;
if(keys.s) inputZ += 1;
if(keys.a) inputX -= 1;
if(keys.d) inputX += 1;

// normalize input (prevents faster diagonal movement)
const len = Math.sqrt(inputX*inputX + inputZ*inputZ);
if(len > 0){
inputX /= len;
inputZ /= len;
}

// APPLY MOVEMENT (NO WORLD PULL)
velocity.x += inputX * acceleration;
velocity.z += inputZ * acceleration;

// FRICTION (smooth stop)
velocity.x *= friction;
velocity.z *= friction;

// SPEED LIMIT
velocity.x = Math.max(-maxSpeed, Math.min(maxSpeed, velocity.x));
velocity.z = Math.max(-maxSpeed, Math.min(maxSpeed, velocity.z));

// APPLY TO PLAYER
player.position.x += velocity.x;
player.position.z += velocity.z;

}

/////////////////////////////////////////////////////
// AAA CAMERA SYSTEM V1 (REPLACE OLD CAMERA BLOCK)
/////////////////////////////////////////////////////

const cameraOffset = new THREE.Vector3(0, 12, 35);
const cameraLerp = 0.08;

function updateCamera(){

// desired cinematic position behind player
const desiredPosition = new THREE.Vector3(
player.position.x + cameraOffset.x,
player.position.y + cameraOffset.y,
player.position.z + cameraOffset.z
);

// smooth follow (AAA feel)
camera.position.lerp(desiredPosition, cameraLerp);

// cinematic look slightly above player center
const lookTarget = new THREE.Vector3(
player.position.x,
player.position.y + 2,
player.position.z
);

camera.lookAt(lookTarget);
}
  
/////////////////////////////////////////////////////
// OCEAN MOTION SYSTEM (BLOCK 9)
/////////////////////////////////////////////////////
  
function updateOceanMotion(){

worldTime += 0.01;

water.position.x = Math.sin(worldTime * 0.3) * 2;
water.position.z = -200 + Math.cos(worldTime * 0.2) * 2;

}

/////////////////////////////////////////////////////
// BLOCK 12 — ATMOSPHERE + WORLD MOOD SYSTEM
/////////////////////////////////////////////////////

function updateMoodSystem(){

// natural slow cycle
mood.timeOfDay += 0.0005;
if(mood.timeOfDay > 1) mood.timeOfDay = 0;

const dayStrength = Math.sin(mood.timeOfDay * Math.PI);

// 🌅 AMBIENT
ambient.intensity = 0.6 + dayStrength * 0.8;

// 🌞 SUN
sun.intensity = 0.8 + dayStrength * 1.2;

// 🌊 OCEAN COLOR SHIFT
water.material.color.setRGB(
0.02 + dayStrength * 0.05,
0.08 + dayStrength * 0.1,
0.15 + dayStrength * 0.2
);

// 🎧 STAGE GLOW (ONLY HERE)
stageGlow.intensity =
1.5 + Math.sin(worldTime * 1.5) * 0.6 * mood.intensity;

// 📺 SCREEN GLOW (ONLY HERE)
screen.material.emissiveIntensity =
1.8 + Math.sin(worldTime * 6.0) * 0.3 * mood.intensity;

}

/////////////////////////////////////////////////////
// BLOCK 13 — CINEMATIC WORLD PULSE SYSTEM
/////////////////////////////////////////////////////

function updateWorldPulse(){

// cinematic pulse value
const pulse = Math.sin(worldTime * 2.0);

// STAGE BREATHING
stage.scale.y = 1 + pulse * 0.02;

// JUMBOTRON FLOAT
screen.position.y =
18 + Math.sin(worldTime * 1.5) * 0.5;

// DOCK ENERGY
dock.material.emissiveIntensity =
0.4 + Math.sin(worldTime * 3.0) * 0.1;

// OCEAN LIGHT BREATHING
oceanLight.intensity =
1.5 + Math.sin(worldTime * 1.2) * 0.4;

// STAGE GLOW MOVEMENT
stageGlow.position.y =
20 + Math.sin(worldTime * 2.0) * 2;

}
  
/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

/////////////////////////////////////////////////////
// LOOP (MASTER WORLD UPDATE SYSTEM)
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

// PLAYER
move();

// CAMERA
updateCamera();

// INTERACTION
checkInteraction();
updateWorldState();

// WORLD EVOLUTION
updateWorldEvolution();

// ENVIRONMENT
updateOceanMotion();
updateMoodSystem();
updateWorldPulse();
// RENDER
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
