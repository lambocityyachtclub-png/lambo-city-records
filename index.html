<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V16 MASTER FINAL</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone,#hint{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}

#hint{
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V16 MASTER</div>
<div id="zone">COMPLETE LUXURY WORLD</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(0x050814,0.0035);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 3000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

window.addEventListener("resize", () => {
camera.aspect = innerWidth / innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x223344, 1));

const sun = new THREE.DirectionalLight(0x99ccff, 1.2);
sun.position.set(100, 200, 80);
scene.add(sun);

const glow = new THREE.PointLight(0x00aaff, 1.2, 600);
glow.position.set(0, 20, 0);
scene.add(glow);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/////////////////////////////////////////////////////
// STATE
/////////////////////////////////////////////////////

let mode = "walk";

/////////////////////////////////////////////////////
// 🎮 GAMEPLAY STATE (V16 GAMEPLAY 1)
/////////////////////////////////////////////////////

const game = {
  score: 0,
  inBasketZone: false,
  inGolfZone: false,
  raceStart: null,
  bestLap: null
};

/////////////////////////////////////////////////////
// 🏀 BASKETBALL GAMEPLAY
/////////////////////////////////////////////////////

function checkBasket(){

const d = player.position.distanceTo(court.position);

if(d < 25){
game.inBasketZone = true;
document.getElementById("zone").innerText =
"LAMBO CITY • BASKETBALL ZONE";
} else {
game.inBasketZone = false;
}
}

// score when near hero in court zone
document.addEventListener("keydown", e => {

if(e.key.toLowerCase() === "e" && game.inBasketZone){

const dist = player.position.distanceTo(hero.position);

if(dist < 3){
game.score += 1;
document.getElementById("hint").style.display = "block";
document.getElementById("hint").innerText =
"SCORE! TOTAL: " + game.score;

setTimeout(()=>{
document.getElementById("hint").style.display = "none";
}, 1000);
}
}
});

/////////////////////////////////////////////////////
// ⛳ GOLF GAMEPLAY
/////////////////////////////////////////////////////

function checkGolf(){

const d = player.position.distanceTo(golf.position);

if(d < 35){
game.inGolfZone = true;
document.getElementById("zone").innerText =
"LAMBO CITY • GOLF RANGE";
} else {
game.inGolfZone = false;
}
}

// simple golf interaction
document.addEventListener("keydown", e => {

if(e.key.toLowerCase() === "e" && game.inGolfZone){

document.getElementById("hint").style.display = "block";
document.getElementById("hint").innerText =
"SWING READY (MECHANIC NEXT UPGRADE)";

setTimeout(()=>{
document.getElementById("hint").style.display = "none";
}, 1200);
}
});

/////////////////////////////////////////////////////
// 🏎 RACING SYSTEM (STRIP ZONE TIMER)
/////////////////////////////////////////////////////

function checkRace(){

if(player.position.z > 80){

if(game.raceStart === null){
game.raceStart = performance.now();
document.getElementById("zone").innerText =
"RACE STARTED";
}
}
}

function finishRace(){

if(player.position.z < 10 && game.raceStart){

const time = (performance.now() - game.raceStart)/1000;

if(!game.bestLap || time < game.bestLap){
game.bestLap = time;
}

document.getElementById("hint").style.display = "block";
document.getElementById("hint").innerText =
"LAP: " + time.toFixed(2) + "s | BEST: " + game.bestLap.toFixed(2) + "s";

game.raceStart = null;

// prevent spam re-trigger
player.position.z = 12;

setTimeout(()=>{
document.getElementById("hint").style.display = "none";
}, 2000);
}
}

  
  
/////////////////////////////////////////////////////
// PLAYER + HERO
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({
color:0xffffff,
emissive:0x222222,
emissiveIntensity:0.8
})
);
player.position.set(0,1,-20);
scene.add(player);

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2.2,1.2),
new THREE.MeshStandardMaterial({
color:0x00ffff,
emissive:0x00ffff
})
);
hero.position.set(0,1,0);
scene.add(hero);

/////////////////////////////////////////////////////
// CAR
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
new THREE.BoxGeometry(2,1,4),
new THREE.MeshStandardMaterial({
color:0xff0000,
emissive:0x330000
})
);
car.position.set(0,0.5,40);
scene.add(car);

document.addEventListener("keydown", e => {

if(e.key.toLowerCase() === "e"){

const dist = player.position.distanceTo(car.position);

if(mode === "walk" && dist < 4){
mode = "car";
player.visible = false;
return;
}

if(mode === "car"){
mode = "walk";
player.visible = true;

player.position.set(
car.position.x + 2,
car.position.y,
car.position.z
);
}
}
});

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000,3000,160,160);

const waterMat = new THREE.MeshStandardMaterial({
color:0x021a33,
metalness:0.35,
roughness:0.25,
emissive:0x001a33,
emissiveIntensity:0.35
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
waterBase.push({
x:waterPos.getX(i),
z:waterPos.getZ(i)
});
}

/////////////////////////////////////////////////////
// STAGE + JUMBOTRON
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
new THREE.BoxGeometry(40,2,20),
new THREE.MeshStandardMaterial({color:0x111111,emissive:0x0033ff})
);
stage.position.set(0,1,0);
scene.add(stage);

const jumbotron = new THREE.Mesh(
new THREE.BoxGeometry(30,15,1),
new THREE.MeshStandardMaterial({color:0x000000,emissive:0x0044ff})
);
jumbotron.position.set(0,10,-10);
scene.add(jumbotron);

/////////////////////////////////////////////////////
// ZONES
/////////////////////////////////////////////////////

const court = new THREE.Mesh(
new THREE.PlaneGeometry(60,30),
new THREE.MeshStandardMaterial({color:0x111111})
);
court.rotation.x = -Math.PI/2;
court.position.set(-80,0,20);
scene.add(court);

const golf = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x0c4a1f})
);
golf.rotation.x = -Math.PI/2;
golf.position.set(90,0,20);
scene.add(golf);

const strip = new THREE.Mesh(
new THREE.BoxGeometry(10,0.5,200),
new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
strip.position.set(0,0.2,120);
scene.add(strip);

/////////////////////////////////////////////////////
// VILLAS
/////////////////////////////////////////////////////

function villa(x,z){
const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(14,1,14),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);

const house = new THREE.Mesh(
new THREE.BoxGeometry(12,6,12),
new THREE.MeshStandardMaterial({color:0x2a2a2a})
);

house.position.y = 4;

g.add(base);
g.add(house);
g.position.set(x,0,z);
scene.add(g);
}

for(let i=-100;i<=100;i+=40){
villa(i,-60);
villa(i,80);
}

/////////////////////////////////////////////////////
// NPCS
/////////////////////////////////////////////////////

const npcs = [];

function npc(x,z){
const n = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffcc66})
);

n.position.set(x,1,z);
n.userData = {
dir: Math.random()*Math.PI*2,
speed: 0.04
};

scene.add(n);
npcs.push(n);
}

for(let i=0;i<12;i++){
npc((Math.random()-0.5)*120,(Math.random()-0.5)*120);
}

/////////////////////////////////////////////////////
// CONTROLS
/////////////////////////////////////////////////////

function move(){

const speed = 0.22;

if(mode === "walk"){

player.position.x += (keys.d ? speed : 0) - (keys.a ? speed : 0);
player.position.z += (keys.s ? speed : 0) - (keys.w ? speed : 0);

}

if(mode === "car"){

const carSpeed = 0.22;
const turn = 0.02;

car.position.x -= Math.sin(car.rotation.y) * carSpeed;
car.position.z -= Math.cos(car.rotation.y) * carSpeed;

if(keys.a) car.rotation.y += turn;
if(keys.d) car.rotation.y -= turn;
}
}

/////////////////////////////////////////////////////
// CAMERA (UPGRADED FEEL)
/////////////////////////////////////////////////////

function updateCamera(){

let tx, ty, tz;

if(mode === "walk"){
tx = player.position.x;
ty = player.position.y + 7.2;
tz = player.position.z + 12;
}

if(mode === "car"){
tx = car.position.x + Math.sin(car.rotation.y) * -10;
ty = car.position.y + 5.5;
tz = car.position.z + Math.cos(car.rotation.y) * -10;
}

camera.position.x += (tx - camera.position.x) * 0.06;
camera.position.y += (ty - camera.position.y) * 0.06;
camera.position.z += (tz - camera.position.z) * 0.06;

const target = (mode === "walk") ? player.position : car.position;
camera.lookAt(target);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){

const time = performance.now() * 0.001;

// ocean motion
for(let i=0;i<waterPos.count;i++){
const v = waterBase[i];

waterPos.setY(i,
Math.sin(v.x * 0.012 + time) * 0.6 +
Math.cos(v.z * 0.012 + time * 1.1) * 0.6
);
}
waterPos.needsUpdate = true;

// gameplay
move();
updateCamera();
checkBasket();
checkGolf();
checkRace();
finishRace();
// NPC
for(let n of npcs){
n.position.x += Math.cos(n.userData.dir) * n.userData.speed;
n.position.z += Math.sin(n.userData.dir) * n.userData.speed;
n.userData.dir += (Math.random() - 0.5) * 0.01;
}

renderer.render(scene,camera);
requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
