<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — REAL OCEAN</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0;
  background:black; color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:1000;
}

#status {
  position:absolute; top:20px; right:20px;
  color:gold;
}

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="status">STATUS: VISITOR</div>
<div id="msg">Loading experience...</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/objects/Water.js"></script>

<script>

// ===== WORLD =====
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.3));

let light = new THREE.PointLight(0x00aaff,2);
light.position.set(0,10,5);
scene.add(light);

// ===== PLAYER =====
let player = new THREE.Group();
scene.add(player);
player.position.set(0,0,20);

// REAL CHARACTER
let loader = new THREE.GLTFLoader();
loader.load(
  "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
  gltf=>{
    let char = gltf.scene;
    char.scale.set(0.4,0.4,0.4);
    player.add(char);
    document.getElementById("msg").innerText="You are inside LAMBO CITY.";
  }
);

// HERO AURA
let aura = new THREE.PointLight(0xffffff,0,20);
player.add(aura);

// ===== REAL WATER =====
const waterGeometry = new THREE.PlaneGeometry(2000,2000);

const water = new THREE.Water(
  waterGeometry,
  {
    textureWidth: 512,
    textureHeight: 512,
    waterNormals: new THREE.TextureLoader().load(
      "https://threejs.org/examples/textures/waternormals.jpg",
      function ( texture ) {
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      }
    ),
    sunDirection: new THREE.Vector3(),
    sunColor: 0xffffff,
    waterColor: 0x001e2f,
    distortionScale: 3.7,
    fog: true
  }
);

water.rotation.x = -Math.PI/2;
scene.add(water);

// ===== STARS =====
let starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<4000;i++){
  arr.push((Math.random()-0.5)*1200,Math.random()*400,(Math.random()-0.5)*1200);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.8})));

// ===== DOCK =====
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(240,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// CABINS
function cabin(x,z){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  c.position.set(x,2.5,z);
  scene.add(c);
}
for(let i=0;i<5;i++){
  cabin(-35,-20-(i*30));
  cabin(35,-20-(i*30));
}

// STAGE
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(22,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// VIP
let vip = new THREE.Mesh(
  new THREE.BoxGeometry(22,1,20),
  new THREE.MeshStandardMaterial({color:0x001f2f})
);
vip.position.set(-30,0,-120);
scene.add(vip);

// YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(50,6,22),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-350);
scene.add(yacht);

// ===== INPUT =====
let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let started=false;

// ===== GAME =====
const GAME={
  status:"VISITOR",
  stage:false,
  vip:false,
  yacht:false
};

// ===== START =====
function start(){
  document.getElementById("start").style.display="none";
  started=true;
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);
if(!started) return;

// MOVE
if(keys["w"]) player.position.z-=0.2;
if(keys["s"]) player.position.z+=0.2;
if(keys["a"]) player.position.x-=0.2;
if(keys["d"]) player.position.x+=0.2;

// PROGRESSION
if(!GAME.stage && player.position.distanceTo(stage.position)<6){
  GAME.stage=true;
  GAME.status="PERFORMER";
  document.getElementById("status").innerText="STATUS: PERFORMER";
  document.getElementById("msg").innerText="You stepped into something bigger.";
}

if(GAME.stage && !GAME.vip && player.position.distanceTo(vip.position)<8){
  GAME.vip=true;
  GAME.status="VIP";
  document.getElementById("status").innerText="STATUS: VIP MEMBER";
  document.getElementById("msg").innerText="Now you're being seen.";
}

if(GAME.vip && player.position.distanceTo(yacht.position)<12){
  GAME.yacht=true;
  GAME.status="OWNER";
  document.getElementById("status").innerText="STATUS: OWNER";
  document.getElementById("msg").innerText="You made it.";
}

// AURA
if(GAME.status==="VISITOR") aura.intensity=0.2;
if(GAME.status==="PERFORMER") aura.intensity=0.6;
if(GAME.status==="VIP") aura.intensity=1.3;
if(GAME.status==="OWNER") aura.intensity=2;

// CAMERA
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (5-camera.position.y)*0.05;
camera.position.z += (player.position.z+14-camera.position.z)*0.05;
camera.lookAt(player.position);

// 🌊 WATER ANIMATION (REAL)
water.material.uniforms['time'].value += 1.0 / 60.0;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
