<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | INTERIOR SYSTEM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* ===== CAMERA BLACKOUT LAYER ===== */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.2);
    transition: opacity 0.35s ease, transform 0.8s ease;
    z-index: 999;
}

/* ===== HUD ===== */
#hud {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 3px;
    z-index: 50;
}

/* ===== WORLD STATES ===== */
.world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* OUTSIDE */
#portal {
    background: radial-gradient(circle, #111, #000);
}

/* CITY */
#city {
    background: radial-gradient(circle at top, #111, #000);
}

/* INTERIOR (VIP) */
#vip {
    background: linear-gradient(180deg, #000, #050505);
}

/* ===== TITLE ===== */
.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* ===== BUTTONS ===== */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.2s;
}

button:hover {
    background: white;
    color: black;
}

/* ===== VIP STREAM ===== */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* ===== GTA STATE TRANSITION CLASS ===== */
.fadeOut {
    opacity: 0;
    transform: scale(1.05);
}

.fadeIn {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>

<body>

<div id="camera"></div>
<div id="hud">LAMBO CITY // INTERIOR STREAM ACTIVE</div>

<!-- PORTAL -->
<div id="portal" class="world">
    <div class="title">CITY GATE</div>
    <button onclick="enterCity()">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="world">
    <div class="title">LAMBO CITY</div>
    <button onclick="enterVIP()">YACHT CLUB</button>
    <button onclick="exitWorld()">EXIT WORLD</button>
</div>

<!-- VIP INTERIOR -->
<div id="vip" class="world">
    <div class="title">YACHT CLUB INTERIOR</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="backToCity()">BACK TO CITY</button>
</div>

<script>

const camera = document.getElementById("camera");

/* START WORLD (CINEMATIC ENTRY) */
window.onload = () => {
    setTimeout(() => {
        show("portal");
    }, 600);
};

/* ===== WORLD SWITCH CORE ===== */
function show(id) {
    document.querySelectorAll(".world").forEach(w => {
        w.style.display = "none";
    });

    document.getElementById(id).style.display = "flex";
}

/* ===== GTA STYLE INTERIOR TRANSITION ===== */
function transition(targetFn) {

    // STEP 1: blackout (GTA fade-out)
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.15)";

    setTimeout(() => {

        // STEP 2: switch world (hidden moment)
        targetFn();

        // STEP 3: small delay BEFORE reveal (key GTA feel)
        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
        }, 250);

    }, 400);
}

/* ===== NAVIGATION ===== */
function enterCity() {
    transition(() => show("city"));
}

function enterVIP() {
    transition(() => show("vip"));
}

function backToCity() {
    transition(() => show("city"));
}

function exitWorld() {
    transition(() => show("portal"));
}

</script>

</body>
</html>
