<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FINAL WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0; background:black; color:white;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; z-index:1000;
}

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white; padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}

#vipNotice {
  position:absolute; bottom:90px; left:50%;
  transform:translateX(-50%);
  color:#00ffff;
  border:1px solid #00ffff;
  padding:8px 12px;
  display:none;
}

#locked {
  position:absolute; bottom:140px; left:50%;
  transform:translateX(-50%);
  color:red;
  border:1px solid red;
  padding:8px 12px;
  display:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="msg">I brought you here.</div>
<div id="vipNotice">VIP ACCESS UNLOCKED</div>
<div id="locked">YACHT ACCESS REQUIRED</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= BASIC =================
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

// ================= PLAYER =================
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);

// ================= STATE =================
let keys={},inWorld=false;
let hasVIP=false;

// ================= VOICE =================
function speak(text){
  document.getElementById("msg").innerText=text;
}

// ================= START =================
function start(){
  document.getElementById("start").style.display="none";
  inWorld=true;
  player.position.set(-35,0.5,20);
}

// ================= WORLD =================

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(800,800),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<4000;i++){
  arr.push((Math.random()-0.5)*800,Math.random()*300,(Math.random()-0.5)*800);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));
let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(220,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// CABINS
function cabin(x,z){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  c.position.set(x,2.5,z);
  scene.add(c);
}

for(let i=0;i<5;i++){ cabin(-35,-20-(i*30)); }
for(let i=0;i<5;i++){ cabin(35,-20-(i*30)); }

// STAGE (PUBLIC)
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(20,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// VIP NETWORK AREA (BEHIND STAGE)
let vipZone = new THREE.Mesh(
  new THREE.BoxGeometry(20,1,20),
  new THREE.MeshStandardMaterial({color:0x001f2f})
);
vipZone.position.set(-30,0,-120);
scene.add(vipZone);

// YACHT (FINAL)
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(45,6,20),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-350);
scene.add(yacht);

// CROWD
let crowd=[];
for(let i=0;i<30;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*40,0.6,-80+(Math.random()-0.5)*60);
  scene.add(p);
  crowd.push(p);
}

// ================= INPUT =================
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);
if(!inWorld) return;

// MOVE
if(keys["w"]) player.position.z-=0.15;
if(keys["s"]) player.position.z+=0.15;
if(keys["a"]) player.position.x-=0.15;
if(keys["d"]) player.position.x+=0.15;

// ================= STORY FLOW =================

// LEAVE CABIN
if(player.position.z < 15){
  speak("This is a cool city… you’ll see.");
}

// STAGE MOMENT
if(player.position.distanceTo(stage.position)<6 && !hasVIP){
  speak("Hey… you want some VIP tickets?");
  hasVIP=true;
  document.getElementById("vipNotice").style.display="block";
}

// VIP NETWORK ZONE
if(player.position.distanceTo(vipZone.position)<8 && hasVIP){
  speak("This is where connections are made.");
}

// YACHT LOCK
if(player.position.z < -300){
  player.position.z=-300;
  document.getElementById("locked").style.display="block";
} else {
  document.getElementById("locked").style.display="none";
}

// ================= LIFE =================
stars.rotation.y+=0.0005;
water.position.z=Math.sin(Date.now()*0.001)*1;

crowd.forEach(p=>{
  p.position.x+=Math.sin(Date.now()*0.001)*0.01;
});

// CAMERA
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (4-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.05;
camera.lookAt(player.position);

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
