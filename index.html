<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB WORLD — EXPANDED</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
<h2>LAMBO CITY YACHT CLUB</h2>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">ZONE: ENTRY</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht, dock;
let keys = {};
let zone = "ENTRY";

function start(){

document.getElementById("start").style.display = "none";

// SCENE
scene = new THREE.Scene();
scene.background = new THREE.Color(0x01020a);
scene.fog = new THREE.FogExp2(0x01020a, 0.03);

// CAMERA
camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,6);

// RENDERER
renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS (night yacht vibe)
scene.add(new THREE.AmbientLight(0x1a2a3a, 1));

const neon1 = new THREE.PointLight(0x00aaff, 2);
neon1.position.set(3,4,-5);
scene.add(neon1);

const neon2 = new THREE.PointLight(0xff00ff, 1.5);
neon2.position.set(-3,3,-20);
scene.add(neon2);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// ================= DOCK (extended feel) =================
dock = new THREE.Mesh(
  new THREE.BoxGeometry(60,1,15),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
dock.position.set(0,-0.5,-15);
scene.add(dock);

// WATER LAYER (visual illusion)
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// ================= YACHT CLUB ZONE =================
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(12,2,12),
  new THREE.MeshStandardMaterial({color:0x111122})
);
yacht.position.set(0,1,-45);
scene.add(yacht);

// LIGHT POSTS (club energy)
for(let i=0;i<8;i++){
  const l = new THREE.PointLight(0x00ffff, 1.5);
  l.position.set((i-4)*3, 3, -45);
  scene.add(l);
}

// FLOATING “LIFE” PARTICLES
const geo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<1200;i++){
  arr.push(
    (Math.random()-0.5)*100,
    Math.random()*20,
    (Math.random()-0.5)*100
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

scene.add(new THREE.Points(
  geo,
  new THREE.PointsMaterial({color:0xffffff, size:0.3})
));

// MUSIC (ambient identity layer)
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c5c4.mp3");
music.loop = true;
music.volume = 0.35;

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=> music.play());

animate();

// ================= INTERACTION =================
function interact(){

let dist = player.position.distanceTo(yacht.position);

if(dist < 6){
  zone = "YACHT CLUB ACTIVE";
  document.getElementById("ui").innerText = "ZONE: LIVE YACHT CLUB";
  music.play();
}

}

// ================= LOOP =================
function animate(){

requestAnimationFrame(animate);

// MOVEMENT
if(keys["w"]) player.position.z -= 0.12;
if(keys["s"]) player.position.z += 0.12;
if(keys["a"]) player.position.x -= 0.12;
if(keys["d"]) player.position.x += 0.12;

// CAMERA FOLLOW (smoother, more cinematic)
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.z += (player.position.z + 7 - camera.position.z)*0.06;
camera.lookAt(player.position);

// OCEAN MOTION FEEL
water.position.z = Math.sin(Date.now()*0.001)*0.5;

// PROMPT
if(player.position.z < -35){
  document.getElementById("prompt").style.display = "block";
} else {
  document.getElementById("prompt").style.display = "none";
}

// RENDER
renderer.render(scene,camera);

}

}

</script>

</body>
</html>
