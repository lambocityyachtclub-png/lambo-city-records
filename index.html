<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | COMPLETE WORLD ENGINE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    color: white;
    background: black;
}

/* 🌌 SKY / DAY NIGHT SYSTEM */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a2e, #000);
    transition: 3s;
    z-index: 0;
}

/* 🌫 ATMOSPHERE */
#fog {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85));
    z-index: 1;
}

/* 🎮 WORLD */
#world {
    position: fixed;
    width: 300%;
    height: 100%;
    display: flex;
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 2;
}

/* 🌍 ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#city { background: radial-gradient(circle, #2a1a0a, #000); }
#yacht { background: radial-gradient(circle, #0a0f1a, #000); }
#store { background: radial-gradient(circle, #1a0a0a, #000); }

/* 🏷 UI */
.title {
    font-size: 40px;
    letter-spacing: 6px;
}

button {
    margin: 6px;
    padding: 10px 16px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* 🚪 DOORS */
.door {
    padding: 12px 18px;
    border: 1px solid white;
    margin-top: 10px;
    cursor: pointer;
}

/* 📺 STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
}

/* 🚗 CAR */
.car {
    position: fixed;
    width: 80px;
    height: 30px;
    background: red;
    top: 65%;
    left: -120px;
    z-index: 5;
}

/* 🚶 NPC */
.npc {
    position: fixed;
    width: 14px;
    height: 28px;
    background: white;
    top: 70%;
    z-index: 5;
}

/* 🧭 HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 11px;
    opacity: 0.6;
    z-index: 10;
}

/* 🎧 AUDIO (hidden but active) */
audio {
    display: none;
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="fog"></div>
<div id="hud">LAMBO CITY // WORLD ACTIVE</div>

<!-- 🎧 AMBIENT AUDIO (OPTIONAL BUT READY) -->
<audio id="audio" loop autoplay>
    <source src="" type="audio/mpeg">
</audio>

<div id="world">

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <div class="door" onclick="enter('yacht')">YACHT CLUB</div>
        <div class="door" onclick="enter('store')">STORE</div>
    </div>

    <!-- YACHT -->
    <div class="zone" id="yacht">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="exit()">BACK</button>
    </div>

    <!-- STORE -->
    <div class="zone" id="store">
        <div class="title">STORE</div>
        <button>HERO DROP</button>
        <button onclick="exit()">BACK</button>
    </div>

</div>

<script>

const world = document.getElementById("world");
const sky = document.getElementById("sky");

let position = 0;

/* 🎮 SMOOTH GTA-STYLE MOVEMENT (INERTIA) */
function moveTo(zone) {

    let start = position;
    let end = zone;
    let t = 0;

    function animate() {
        t += 0.02;
        let smooth = start + (end - start) * t;

        world.style.transform = `translateX(-${smooth * 100}vw)`;

        if (t < 1) {
            requestAnimationFrame(animate);
        } else {
            position = zone;
        }
    }

    animate();
}

/* 🚪 INTERIORS */
function enter(type) {
    if (type === "yacht") moveTo(1);
    if (type === "store") moveTo(2);
}

function exit() {
    moveTo(0);
}

/* 🚗 CARS */
function spawnCar() {
    const car = document.createElement("div");
    car.className = "car";
    document.body.appendChild(car);

    let x = -120;
    let speed = 3 + Math.random() * 3;

    function move() {
        x += speed;
        car.style.left = x + "px";

        if (x < window.innerWidth + 120) {
            requestAnimationFrame(move);
        } else {
            car.remove();
        }
    }

    move();
}

/* 🚶 NPC */
function spawnNPC() {
    const npc = document.createElement("div");
    npc.className = "npc";
    npc.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(npc);

    setTimeout(() => npc.remove(), 4000);
}

/* 🌍 DAY / NIGHT CYCLE */
function dayNight() {
    let t = 0;

    setInterval(() => {
        t += 0.01;

        let brightness = Math.sin(t) * 0.5 + 0.5;

        sky.style.filter = `brightness(${0.5 + brightness})`;

    }, 100);
}

/* 🌍 WORLD LOOP */
setInterval(spawnCar, 900);
setInterval(spawnNPC, 700);
dayNight();

</script>

</body>
</html>
