<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — YACHT PARTY</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}

#login {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}
</style>
</head>

<body>

<div id="login">
<h2>LAMBO CITY</h2>
<button onclick="login()">ENTER EXPERIENCE</button>
</div>

<div id="hud">ZONE: INIT</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-HyCPaB0gR9-VMGovh-VByajOkrEyGTs",
  authDomain: "lambocityrecords-2fee2.firebaseapp.com",
  projectId: "lambocityrecords-2fee2",
  storageBucket: "lambocityrecords-2fee2.firebasestorage.app",
  messagingSenderId: "78498268542",
  appId: "1:78498268542:web:9b60b8f87488af40c29f2f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId;

// ================= LOGIN =================
window.login = async function(){
  const user = await signInAnonymously(auth);
  userId = user.user.uid;

  document.getElementById("login").style.display = "none";
  startWorld();
}

// ================= WORLD =================
function startWorld(){

const hud = document.getElementById("hud");
const promptEl = document.getElementById("prompt");

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);
scene.fog = new THREE.FogExp2(0x02030a, 0.02);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,5);

let renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);

let keys = {};
let player, yacht;
let hasPass=false;
let inVIP=false;

// ================= LIGHTS (YACHT PARTY FEEL) =================
scene.add(new THREE.AmbientLight(0x1a1a2a, 0.8));

const yachtLight = new THREE.PointLight(0x00aaff, 3);
yachtLight.position.set(0,6,-15);
scene.add(yachtLight);

const goldLight = new THREE.PointLight(0xffd700, 1.5);
goldLight.position.set(2,3,-10);
scene.add(goldLight);

// ================= PLAYER =================
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// ================= YACHT =================
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,5),
  new THREE.MeshStandardMaterial({color:0xffd700})
);
yacht.position.set(0,0.5,-15);
scene.add(yacht);

// floating yacht
function floatYacht(){
  yacht.position.y = 0.5 + Math.sin(Date.now()*0.002)*0.15;
  yacht.rotation.y += 0.002;
}

// ================= FLOOR =================
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ================= STARS =================
const starGeo = new THREE.BufferGeometry();
const starArray = [];

for(let i=0;i<2000;i++){
  starArray.push(
    (Math.random()-0.5)*400,
    Math.random()*200,
    (Math.random()-0.5)*400
  );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArray,3));

const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff, size:0.7})
);

scene.add(stars);

// ================= INPUT =================
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// ================= FIREBASE =================
const userRef = (uid) => doc(db, "users", uid);
const COOLDOWN = 60 * 1000;

async function getUser(uid){
  const snap = await getDoc(userRef(uid));
  return snap.exists() ? snap.data() : null;
}

async function canGetPass(uid){
  const data = await getUser(uid);
  if(!data || !data.lastPass) return true;
  return (Date.now() - data.lastPass) > COOLDOWN;
}

async function grantPass(uid){
  await setDoc(userRef(uid), {
    pass: true,
    lastPass: Date.now()
  }, { merge:true });
}

async function giveDrop(uid){
  const data = await getUser(uid);
  const drops = data?.drops || [];

  drops.push({
    id: Date.now(),
    type: "VIP_DROP",
    time: Date.now()
  });

  await setDoc(userRef(uid), { drops }, { merge:true });
}

// ================= INTERACT =================
async function interact(){

  let dist = player.position.distanceTo(yacht.position);

  if(!hasPass){

    const allowed = await canGetPass(userId);

    if(allowed){
      hasPass = true;
      await grantPass(userId);
      hud.innerText = "PASS GRANTED — GO TO YACHT";
    } else {
      hud.innerText = "COOLDOWN ACTIVE — COME BACK LATER";
    }

    return;
  }

  if(hasPass && dist < 3 && !inVIP){

    inVIP = true;

    await setDoc(userRef(userId), {
      boarded: true
    }, { merge:true });

    await giveDrop(userId);

    hud.innerText = "VIP ACCESS + DROP RECEIVED";
    promptEl.style.display = "none";
  }
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z -= 0.08;
  if(keys["s"]) player.position.z += 0.08;
  if(keys["a"]) player.position.x -= 0.08;
  if(keys["d"]) player.position.x += 0.08;

  // smooth cinematic camera
  camera.position.x += (player.position.x - camera.position.x)*0.03;
  camera.position.y += (2.5 - camera.position.y)*0.03;
  camera.position.z += (player.position.z + 6 - camera.position.z)*0.03;
  camera.lookAt(player.position);

  floatYacht();

  let dist = player.position.distanceTo(yacht.position);

  if(dist < 3 && hasPass && !inVIP){
    promptEl.style.display = "block";
  } else {
    promptEl.style.display = "none";
  }

  renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
