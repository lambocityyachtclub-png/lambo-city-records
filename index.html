<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — TRANSITION ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
}

#hint {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.5);
  display:none;
}

#zone {
  position:absolute;
  top:20px;
  right:20px;
  color:gold;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏠 Cabin → 🌉 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">ZONE: LOADING</div>
<div id="hint">WALK FORWARD</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
let light = new THREE.PointLight(0x00aaff, 2);
light.position.set(0,5,5);
scene.add(light);

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,10);
scene.add(player);

// ================= DOCK =================
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(200,1,300),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// ================= CABIN (LEFT EDGE PROPERTY) =================
let cabin = new THREE.Mesh(
  new THREE.BoxGeometry(10,6,10),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.set(-30,3,20);
scene.add(cabin);

// WINDOW FRAME (IMPORTANT VISUAL)
let windowView = new THREE.Mesh(
  new THREE.BoxGeometry(6,2,1),
  new THREE.MeshStandardMaterial({color:0x223344})
);
windowView.position.set(-30,4,15);
scene.add(windowView);

// ================= STAGE (LEFT MID DOCK) =================
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(18,2,12),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-25,1,-80);
scene.add(stage);

// ================= YACHT (END FOCUS) =================
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(40,6,18),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-180);
scene.add(yacht);

// WATER (VISUAL DEPTH)
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// ================= INPUT =================
let keys = {};
let inWorld = false;
let transition = 0;

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

function start(){
  document.getElementById("start").style.display="none";
  inWorld = true;
}

// ================= TRANSITION ENGINE =================
function updateTransition(){

let dist = player.position.distanceTo(cabin.position);

// start expansion when leaving cabin zone
if(dist < 8){
  transition = Math.max(transition - 0.02, 0);
  document.getElementById("zone").innerText = "CABIN (CONTROL HUB)";
} else {
  transition = Math.min(transition + 0.02, 1);
}

}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

if(!inWorld) return;

// movement
if(keys["w"]) player.position.z -= 0.15;
if(keys["s"]) player.position.z += 0.15;
if(keys["a"]) player.position.x -= 0.15;
if(keys["d"]) player.position.x += 0.15;

// transition engine
updateTransition();

// CAMERA HYBRID SYSTEM
camera.position.x += (player.position.x - camera.position.x) * (0.05 + transition*0.05);
camera.position.z += (player.position.z + 6 - camera.position.z) * (0.05 + transition*0.05);
camera.lookAt(player.position);

// VISUAL EXPANSION EFFECT (KEY PART)
scene.fog.density = 0.015 - transition*0.008;

// hint
document.getElementById("hint").style.display =
player.position.distanceTo(cabin.position) < 8 ? "block" : "none";

// yacht always visible
yacht.rotation.y += 0.001;

// stage energy
stage.position.y = 1 + Math.sin(Date.now()*0.002)*0.2;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
