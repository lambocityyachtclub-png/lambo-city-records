<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V31 — WORLD SYSTEM UPGRADE</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V31 — WORLD SYSTEM</div>
<div id="zone">ZONE: INITIALIZING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE ENGINE STATE
/////////////////////////////////////////////////////

const GAME = {
speed: 0.32,
bounds: 120
};

/////////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2e);
scene.fog = new THREE.Fog(0x0a1220, 80, 800);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 12000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.9));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,400,150);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// SIMPLE COLLISION SYSTEM
/////////////////////////////////////////////////////

function clampWorld(obj){

// world boundary box
obj.position.x = Math.max(-GAME.bounds, Math.min(GAME.bounds, obj.position.x));
obj.position.z = Math.max(-GAME.bounds, Math.min(GAME.bounds, obj.position.z));

}

function boxCollision(a,b,range=6){

return (
Math.abs(a.position.x - b.position.x) < range &&
Math.abs(a.position.z - b.position.z) < range
);

}

/////////////////////////////////////////////////////
// WORLD STRUCTURE
/////////////////////////////////////////////////////

const cabins = [];

function cabin(x,z){

const g = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);

g.position.set(x,4,z);
scene.add(g);
cabins.push(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

/////////////////////////////////////////////////////
// YACHT (INTERACTIVE OBJECT)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(20,4,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
yacht.position.set(60,2,-120);
scene.add(yacht);

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x061a2b})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y + 12) - camera.position.y)*0.06;
camera.position.z += ((player.position.z + 25) - camera.position.z)*0.06;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT + COLLISION
/////////////////////////////////////////////////////

function move(){

let nextX = player.position.x;
let nextZ = player.position.z;

if(keys.w) nextZ -= GAME.speed;
if(keys.s) nextZ += GAME.speed;
if(keys.a) nextX -= GAME.speed;
if(keys.d) nextX += GAME.speed;

// collision check with cabins
let temp = {position:{x:nextX,z:nextZ}};

for(let c of cabins){
if(
Math.abs(nextX - c.position.x) < 10 &&
Math.abs(nextZ - c.position.z) < 10
){
return; // block movement
}
}

// apply movement if no collision
player.position.x = nextX;
player.position.z = nextZ;

// clamp world bounds
clampWorld(player);
}

/////////////////////////////////////////////////////
// INTERACTION SYSTEM
/////////////////////////////////////////////////////

document.addEventListener("keydown",(e)=>{

if(e.key.toLowerCase()==="e"){

// yacht interaction
if(boxCollision(player,yacht,10)){
document.getElementById("zone").innerText = "ZONE: YACHT INTERACTION";
return;
}

// stage interaction
if(player.position.z < -120){
document.getElementById("zone").innerText = "ZONE: STAGE INTERACTION";
return;
}

}

});

/////////////////////////////////////////////////////
// ZONE SYSTEM
/////////////////////////////////////////////////////

function updateZone(){
let z="DOCK AREA";

if(player.position.z < -120) z="STAGE AREA";
if(player.position.x > 40) z="RIGHT CABINS";
if(player.position.x < -40) z="LEFT CABINS";

document.getElementById("zone").innerText = "ZONE: " + z;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

move();
updateCamera();
updateZone();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
