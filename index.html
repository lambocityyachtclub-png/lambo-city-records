<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMBO CITY</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* MAIN /
#main {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

#enterBtn {
  padding:15px 30px;
  background:gold;
  border:none;
  cursor:pointer;
  font-size:16px;
}

/ WORLD /
#world {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  overflow:hidden;
}

/ VIDEO BG /
#bgVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/ OVERLAY /
#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/ ACTIVITY /
#activity {
  position:absolute;
  top:20px;
  left:20px;
  font-size:14px;
}

/ BUTTONS /
#exitBtn {
  position:absolute;
  top:20px;
  right:20px;
}

#audioBtn {
  position:absolute;
  bottom:20px;
  left:20px;
}

#vipBtn {
  position:absolute;
  bottom:20px;
  right:20px;
  background:gold;
  border:none;
  padding:10px;
}

/ TWITCH /
#twitch {
  position:absolute;
  top:20%;
  left:25%;
  width:50%;
  height:50%;
  border:2px solid gold;
}

/ VIP */
#vip {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
}

#vip h2 {
  text-align:center;
  margin-top:100px;
}
</style>
</head>

<body>

<div id="main">
  <h1>LAMBO CITY</h1>
  <button id="enterBtn" onclick="openWorld()">ENTER LAMBO CITY</button>
</div>

<div id="world">

  <video id="bgVideo" autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-ocean-waves-1600.mp4" type="video/mp4">
  </video>

  <div id="overlay"></div>

  <button id="exitBtn" onclick="closeWorld()">EXIT</button>

  <div id="activity">Initializing city...</div>

  <iframe id="twitch"
    src="https://player.twitch.tv/?channel=twitch&parent=lambocityrecords.com"
    frameborder="0"
    allowfullscreen="true">
  </iframe>

  <audio id="radio" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <button id="audioBtn" onclick="toggleAudio()">TOGGLE RADIO</button>

  <button id="vipBtn" onclick="openVIP()">ENTER YACHT CLUB</button>

  <div id="vip">
    <button id="exitBtn" onclick="closeVIP()">EXIT VIP</button>
    <h2>YACHT CLUB ACCESS GRANTED</h2>
  </div>

</div>

<script>
function openWorld(){
  document.getElementById("world").style.display="block";
  startActivity();
}

function closeWorld(){
  document.getElementById("world").style.display="none";
}

function toggleAudio(){
  const audio=document.getElementById("radio");
  if(audio.paused){audio.play();}else{audio.pause();}
}

function openVIP(){
  document.getElementById("vip").style.display="block";
}

function closeVIP(){
  document.getElementById("vip").style.display="none";
}

function startActivity(){
  const messages=[
    "DJ HERO live now",
    "Yacht access granted",
    "Members entering lounge",
    "Live stream active",
    "Radio synced",
    "Dock traffic increasing"
  ];
  let i=0;
  setInterval(()=>{
    document.getElementById("activity").innerText=messages[i%messages.length];
    i++;
  },2000);
}
</script>

</body>
</html>
