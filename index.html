<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — STABLE CORE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
position:absolute;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY — STABLE CORE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE WORLD SETUP
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  3000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (STABLE + BRIGHT)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 1.0));

const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(100, 150, 50);
scene.add(sun);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0x111111
  })
);

player.position.set(0,1,-10);
scene.add(player);

// START CAMERA POSITION (IMPORTANT)
camera.position.set(0, 8, 10);
camera.lookAt(player.position);

/////////////////////////////////////////////////////
// CONTROLS
/////////////////////////////////////////////////////

const keys = {};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function move(){
  if(keys["w"]) player.position.z -= 0.25;
  if(keys["s"]) player.position.z += 0.25;
  if(keys["a"]) player.position.x -= 0.25;
  if(keys["d"]) player.position.x += 0.25;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x) * 0.08;
  camera.position.y += ((player.position.y + 8) - camera.position.y) * 0.08;
  camera.position.z += ((player.position.z + 14) - camera.position.z) * 0.08;

  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (STABLE)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(3000, 3000, 60, 60);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x021428,
  metalness: 0.3,
  roughness: 0.7,
  emissive: 0x001122,
  emissiveIntensity: 0.2
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🌉 MAIN DOCK
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(200,200,2,64),
  new THREE.MeshStandardMaterial({ color: 0x111111 })
);

dock.position.set(0,0.5,-40);
scene.add(dock);

/////////////////////////////////////////////////////
// 🏡 VILLAS (CLEAN LOOP)
/////////////////////////////////////////////////////

function createVilla(x,z){

const villa = new THREE.Group();

const base = new THREE.Mesh(
  new THREE.BoxGeometry(14,1,14),
  new THREE.MeshStandardMaterial({ color:0x0f0f0f })
);

base.position.y = 0.5;
villa.add(base);

const body = new THREE.Mesh(
  new THREE.BoxGeometry(12,6,12),
  new THREE.MeshStandardMaterial({ color:0x151515 })
);

body.position.y = 4;
villa.add(body);

const roof = new THREE.Mesh(
  new THREE.BoxGeometry(14,1,14),
  new THREE.MeshStandardMaterial({ color:0x0a0a0a })
);

roof.position.y = 8;
villa.add(roof);

const light = new THREE.PointLight(0x66ccff, 1, 25);
light.position.set(0,4,0);
villa.add(light);

villa.position.set(x,0,z);
scene.add(villa);
}

for(let i=0;i<5;i++){
  createVilla(-20, -20 - i*20);
  createVilla(20, -20 - i*20);
}

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(14,3,35),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);

yacht.position.set(30,2,-50);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(8,1,-10);
scene.add(hero);

/////////////////////////////////////////////////////
// INTERACTION UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText =
        "HERO: Welcome to LAMBO CITY";
    }
  }
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  const time = Date.now() * 0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x * 0.02 + time) * 0.4 +
      Math.cos(v.z * 0.02 + time * 1.3) * 0.4;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
