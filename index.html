<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* LOADING SCREEN */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

.loader-text {
  color: gold;
  font-size: 28px;
  letter-spacing: 2px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.3; }
  50% { opacity: 1; }
  100% { opacity: 0.3; }
}

/* MAIN BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/yourimage.jpg') no-repeat center center/cover;
  filter: brightness(0.4);
  z-index: -2;
}

/* OVERLAY */
.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.75);
  padding: 20px;
  display: none;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 55px;
  color: gold;
  font-weight: bold;
}

/* MAP */
.map {
  max-width: 900px;
  margin: 30px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.zone {
  border: 1px solid rgba(255,215,0,0.5);
  padding: 30px;
  text-align: center;
  cursor: pointer;
  background: rgba(0,0,0,0.6);
  transition: 0.3s;
}

.zone:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

/* PANEL */
.panel {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  border: 1px solid gold;
  background: rgba(0,0,0,0.6);
}

/* ENTER BUTTON */
.enter {
  display: block;
  width: 300px;
  margin: 30px auto;
  padding: 15px;
  background: gold;
  color: black;
  font-weight: bold;
  text-align: center;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <div class="loader-text">LAMBO CITY OS BOOTING...</div>
  <div class="loader-text" style="font-size:14px;margin-top:10px;">
    syncing yacht club • loading studio grid • initializing drops
  </div>
</div>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- MAIN -->
<div class="overlay" id="main">

<div class="title">LAMBO CITY OS</div>

<div class="map">

<div class="zone" onclick="openZone('studio')">🎵 Studio District</div>
<div class="zone" onclick="openZone('yacht')">🛥 Yacht Club</div>
<div class="zone" onclick="openZone('drops')">🔥 Drop Zone</div>
<div class="zone" onclick="openZone('vip')">🔐 VIP Vault</div>

</div>

<div class="panel" id="panel">
Welcome to Lambo City OS. Select a district to enter the system.
</div>

<a class="enter" href="/vip.html">ENTER YACHT CLUB PORTAL</a>

</div>

<script>

/* BOOT SEQUENCE */
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2500);

/* ZONES */
function openZone(zone) {
  const panel = document.getElementById("panel");

  if (zone === "studio") {
    panel.innerHTML = "🎵 Studio District: HERO is recording new Lambo City records.";
  }

  if (zone === "yacht") {
    panel.innerHTML = "🛥 Yacht Club: Exclusive events, invite-only experiences, luxury access.";
  }

  if (zone === "drops") {
    panel.innerHTML = "🔥 Drop Zone: Music drops, NFT releases, and upcoming launches.";
  }

  if (zone === "vip") {
    panel.innerHTML = "🔐 VIP Vault: Locked. Access requires Yacht Club boarding pass.";
  }
}

</script>

</body>
</html>
