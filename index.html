<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City Map</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/yourimage.jpg') no-repeat center center/cover;
  filter: brightness(0.4);
  z-index: -2;
}

/* OVERLAY */
.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.75);
  padding: 20px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 55px;
  color: gold;
  font-weight: bold;
  letter-spacing: 3px;
}

.subtitle {
  text-align: center;
  color: #ccc;
  margin-bottom: 20px;
}

/* MAP GRID */
.map {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* DISTRICTS */
.zone {
  border: 1px solid rgba(255,215,0,0.5);
  padding: 30px;
  text-align: center;
  cursor: pointer;
  background: rgba(0,0,0,0.5);
  transition: 0.3s;
  border-radius: 10px;
}

.zone:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

/* PANEL */
.panel {
  max-width: 900px;
  margin: 30px auto;
  border: 1px solid gold;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
}

/* ENTER BUTTON */
.enter {
  display: block;
  width: 300px;
  margin: 30px auto;
  text-align: center;
  padding: 15px;
  background: gold;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay">

<div class="title">LAMBO CITY MAP</div>
<div class="subtitle">Click a district to enter different parts of the city</div>

<div class="map">

<div class="zone" onclick="openZone('studio')">🎵 Studio District</div>
<div class="zone" onclick="openZone('yacht')">🛥 Yacht Club</div>
<div class="zone" onclick="openZone('drops')">🔥 Drop Zone</div>
<div class="zone" onclick="openZone('vip')">🔐 VIP Vault</div>

</div>

<div class="panel" id="panel">
Welcome to the Lambo City Map. Select a district to explore.
</div>

<a class="enter" href="/vip.html">ENTER YACHT CLUB PORTAL</a>

</div>

<script>

function openZone(zone) {
  const panel = document.getElementById("panel");

  if (zone === "studio") {
    panel.innerHTML = "🎵 Studio District: HERO is recording new records in Lambo City Studios.";
  }

  if (zone === "yacht") {
    panel.innerHTML = "🛥 Yacht Club: Private luxury events and invite-only gatherings.";
  }

  if (zone === "drops") {
    panel.innerHTML = "🔥 Drop Zone: Upcoming releases, NFTs, and exclusive content loading soon.";
  }

  if (zone === "vip") {
    panel.innerHTML = "🔐 VIP Vault: Access restricted. Boarding pass required in Yacht Club portal.";
  }
}

</script>

</body>
</html>
