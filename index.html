<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAMBO CITY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* CINEMATIC BACKGROUND */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1508057198894-247b23fe5ade') center/cover no-repeat;
      filter: brightness(0.35);
      z-index: 0;
    }

    /* TITLE */
    .title {
      position: absolute;
      top: 8%;
      width: 100%;
      text-align: center;
      font-size: 3rem;
      letter-spacing: 6px;
      z-index: 2;
    }

    /* PANEL */
    #panel {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      font-size: 1.2rem;
      z-index: 2;
    }

    /* MENU */
    .menu {
      position: absolute;
      bottom: 12%;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 2;
    }

    .btn {
      padding: 14px 22px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      font-size: 14px;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
<div class="background"></div>
<div class="title">LAMBO CITY</div>
<div id="panel">
  SYSTEM: Welcome to Lambo City<br>
  USER: Ready to board
</div>
<div class="menu">
  <button class="btn" onclick="enterCity()">ENTER CITY</button>
  <button class="btn" onclick="openYacht()">YACHT CLUB</button>
  <button class="btn" onclick="openRadio()">RADIO</button>
</div>
<script>
function enterCity() {
  document.getElementById("panel").innerHTML = `
    SYSTEM: Entering Lambo City...<br>
    STATUS: World loading<br>
    CITIZENS: Active
  `;
}

function openYacht() {
  document.getElementById("panel").innerHTML = `
    YACHT CLUB<br><br>
    STATUS: LOCKED 🔒<br>
    REQUIREMENTS: Access Protocol Needed
  `;
}

function openRadio() {
  document.getElementById("panel").innerHTML = `
    LAMBO CITY RADIO<br><br>
    STATUS: Streaming Live Atmosphere<br>
    CHANNEL: Lambo City Records
  `;
}
</script>
</body>
</html>
