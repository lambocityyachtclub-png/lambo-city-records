<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LAMBO CITY — CLEAN WORLD BASE v1</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui {
position:absolute;
top:20px;
left:20px;
color:white;
font-size:13px;
z-index:10;
}

#zone {
position:absolute;
top:20px;
right:20px;
color:#00ffff;
z-index:10;
}

#start {
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:20;
}

#interaction {
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
color:white;
display:none;
}
</style>

</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD MOVE</div>
<div id="zone">LOADING...</div>
<div id="interaction"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE STATE (SINGLE SOURCE)
/////////////////////////////////////////////////////

let started = false;

const WORLD = {
  stageEnabled: false // 🔒 STAGE DISABLED (your request)
};

/////////////////////////////////////////////////////
// SCENE / CAMERA / RENDERER (ONLY ONCE)
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x080816, 0.01);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  2000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.PointLight(0x00ffff, 1.5, 100);
light.position.set(0,20,20);
scene.add(light);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);

player.position.set(0,1,-20);
scene.add(player);

const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/////////////////////////////////////////////////////
// INTERACTION SYSTEM (FIXED SINGLE VERSION)
/////////////////////////////////////////////////////

const interactionUI = document.getElementById("interaction");

function showInteraction(text){
  interactionUI.innerText = text;
  interactionUI.style.display = "block";
}

function hideInteraction(){
  interactionUI.style.display = "none";
}

/////////////////////////////////////////////////////
// HERO NPC
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.5
  })
);

hero.position.set(10,1,-10);
scene.add(hero);

/////////////////////////////////////////////////////
// OCEAN
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({ color:0x001122 })
);

water.rotation.x = -Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// YACHT (BASE + INTERIOR)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

// base
const yachtBody = new THREE.Mesh(
  new THREE.BoxGeometry(10,3,30),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

yachtBody.position.y = 2;
yacht.add(yachtBody);

// interior (simple)
const yachtInterior = new THREE.Mesh(
  new THREE.BoxGeometry(8,2,20),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);

yachtInterior.position.set(0,3,0);
yacht.add(yachtInterior);

yacht.position.set(25,0,-20);
scene.add(yacht);

let insideYacht = false;

/////////////////////////////////////////////////////
// CABINS (MINIMAL CLEAN VERSION)
/////////////////////////////////////////////////////

const cabins = [];

function createCabin(x,z){

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(4,3,4),
    new THREE.MeshStandardMaterial({ color:0x222222 })
  );

  cabin.position.set(x,1,z);
  scene.add(cabin);

  cabins.push(cabin);
}

for(let i=0;i<4;i++){
  createCabin(-10, -10 - i*8);
  createCabin(10, -10 - i*8);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

  if(keys["w"]) player.position.z -= 0.2;
  if(keys["s"]) player.position.z += 0.2;
  if(keys["a"]) player.position.x -= 0.2;
  if(keys["d"]) player.position.x += 0.2;

}

/////////////////////////////////////////////////////
// CAMERA FOLLOW
/////////////////////////////////////////////////////

function updateCamera(){

  camera.position.x += (player.position.x - camera.position.x) * 0.1;
  camera.position.y = 8;
  camera.position.z += (player.position.z + 12 - camera.position.z) * 0.1;

  camera.lookAt(player.position);

}

/////////////////////////////////////////////////////
// HERO INTERACTION
/////////////////////////////////////////////////////

function checkHero(){

  const dist = player.position.distanceTo(hero.position);

  if(dist < 3){
    showInteraction("PRESS E TO TALK TO HERO");
  } else {
    hideInteraction();
  }
}

/////////////////////////////////////////////////////
// START GAME
/////////////////////////////////////////////////////

function start(){
  document.getElementById("start").style.display = "none";
  started = true;
  document.getElementById("zone").innerText = "LAMBO CITY ACTIVE";
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

  requestAnimationFrame(animate);

  if(!started){
    renderer.render(scene,camera);
    return;
  }

  move();
  updateCamera();
  checkHero();

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
