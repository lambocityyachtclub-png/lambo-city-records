<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING WORLD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* ===== CAMERA PHYSICS LAYER ===== */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.2);
    transition: opacity 0.6s ease;
    z-index: 999;
}

/* ===== WORLD WRAPPER (FOR PARALLAX) ===== */
#worldWrapper {
    position: absolute;
    width: 100%;
    height: 100%;
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===== HUD ===== */
#hud {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 3px;
    z-index: 50;
}

/* ===== WORLD STATES ===== */
.world {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* BACKGROUND LAYERS (PARALLAX FEEL) */
.layer {
    position: absolute;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    background: radial-gradient(circle, #111, #000);
    transform: translateZ(0);
}

/* CITY VARIANTS */
#portal .layer { background: radial-gradient(circle, #111, #000); }
#city .layer { background: radial-gradient(circle at top, #1a1a1a, #000); }
#vip .layer { background: linear-gradient(180deg, #000, #050505); }

/* ===== CONTENT ===== */
.content {
    position: relative;
    z-index: 2;
    text-align: center;
}

.title {
    font-size: 38px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* ===== BUTTONS ===== */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.2s;
}

button:hover {
    background: white;
    color: black;
}

/* ===== VIP STREAM ===== */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* ===== MOTION STATE ===== */
.motion {
    transform: scale(1.03);
}
</style>
</head>

<body>

<div id="camera"></div>
<div id="hud">LAMBO CITY // LIVING SIMULATION ACTIVE</div>

<div id="worldWrapper">

<!-- PORTAL -->
<div id="portal" class="world">
    <div class="layer"></div>
    <div class="content">
        <div class="title">CITY GATE</div>
        <button onclick="travel('city')">ENTER CITY</button>
    </div>
</div>

<!-- CITY -->
<div id="city" class="world">
    <div class="layer"></div>
    <div class="content">
        <div class="title">LAMBO CITY</div>
        <button onclick="travel('vip')">YACHT CLUB</button>
        <button onclick="travel('portal')">EXIT WORLD</button>
    </div>
</div>

<!-- VIP -->
<div id="vip" class="world">
    <div class="layer"></div>
    <div class="content">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="travel('city')">BACK TO CITY</button>
    </div>
</div>

</div>

<script>

const camera = document.getElementById("camera");
const wrapper = document.getElementById("worldWrapper");

let current = "portal";

/* INIT WORLD */
window.onload = () => {
    setTimeout(() => {
        show("portal");
        camera.style.opacity = "0";
    }, 600);
};

/* SHOW WORLD */
function show(id) {
    document.querySelectorAll(".world").forEach(w => w.style.display = "none");
    document.getElementById(id).style.display = "flex";
    current = id;
}

/* ===== PHYSICS ENGINE (SIMULATED) ===== */
function applyMotion(intensity) {
    wrapper.style.transform = `scale(${1 + intensity})`;

    setTimeout(() => {
        wrapper.style.transform = "scale(1)";
    }, 600);
}

/* ===== LIVING TRANSITION SYSTEM ===== */
function travel(destination) {

    // CAMERA “WEIGHT” (feels like movement resistance)
    camera.style.opacity = "1";
    camera.style.transform = "scale(1.25)";

    applyMotion(0.02); // subtle world inertia

    setTimeout(() => {

        // swap world mid-motion (key illusion point)
        show(destination);

        // “settle physics”
        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
            applyMotion(0.01);
        }, 300);

    }, 500);
}

/* ===== AMBIENT WORLD MOTION (SUBTLE LIVING FEEL) */
setInterval(() => {
    if (Math.random() > 0.7) {
        wrapper.style.transform = "scale(1.01)";
        setTimeout(() => wrapper.style.transform = "scale(1)", 800);
    }
}, 4000);

</script>

</body>
</html>
