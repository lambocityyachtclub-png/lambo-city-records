<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('YOUR_IMAGE_LINK') no-repeat center center/cover;
  color: white;
}

.overlay {
  background: rgba(0,0,0,0.75);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.title {
  text-align: center;
  font-size: 48px;
  font-weight: bold;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.stream {
  border: 2px solid gold;
}

.panel {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border: 1px solid gold;
}

.panel button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.enter-btn {
  display: block;
  text-align: center;
  margin: 30px auto;
  padding: 15px 30px;
  background: gold;
  color: black;
  font-weight: bold;
  text-decoration: none;
  width: 300px;
  border-radius: 10px;
}

.feed {
  margin-top: 20px;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border: 1px solid gold;
  height: 120px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<div class="title">LAMBO CITY</div>

<div class="grid">

<!-- STREAM -->
<div class="stream">
<iframe
  src="https://player.twitch.tv/?channel=YOUR_TWITCH_CHANNEL&parent=YOUR_DOMAIN"
  height="400"
  width="100%"
  allowfullscreen>
</iframe>
</div>

<!-- PANEL -->
<div class="panel">
<h3>ACTIVITY</h3>

<button onclick="alert('DJ HERO joined')">DJ HERO joined</button>
<button onclick="alert('Drop loading...')">Next Drop Soon</button>
<button onclick="window.location.href='/vip'">Boarding Pass Available</button>

<hr>

<h3>DROPS</h3>
<button onclick="alert('Preview coming soon')">Yacht Event Preview</button>
</div>

</div>

<!-- ENTER -->
<a href="/vip" class="enter-btn">ENTER LAMBO CITY</a>

<!-- FEED -->
<div class="feed" id="feed">
<p>SYSTEM: Welcome to Lambo City</p>
</div>

</div>
</div>

<script>
const feed = document.getElementById("feed");

setInterval(() => {
  const msg = document.createElement("p");
  const items = [
    "SYSTEM: DJ HERO entered Lambo City",
    "SYSTEM: Boarding Pass updating...",
    "SYSTEM: VIP access preparing...",
    "USER: Waiting for drop"
  ];
  msg.textContent = items[Math.floor(Math.random() * items.length)];
  feed.appendChild(msg);
  feed.scrollTop = feed.scrollHeight;
}, 4000);
</script>

</body>
</html>
