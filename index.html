<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY - GAME LOOP</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

/* CANVAS */
canvas {
  display: block;
}

/* UI */
#ui {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* HUD */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.85;
}

/* BUTTONS */
button {
  padding: 10px;
  background: black;
  border: 1px solid gold;
  color: white;
  cursor: pointer;
  pointer-events: auto;
  margin-right: 6px;
}

/* ENTRY */
#home {
  position: absolute;
  inset: 0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: rgba(0,0,0,0.6);
  pointer-events:auto;
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.95);
  z-index: 20;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">

  <div id="home">
    <h1>LAMBO CITY</h1>
    <button onclick="enterWorld()">ENTER WORLD</button>
  </div>

  <div id="hud">
    <div id="status">SYSTEM OFFLINE</div>
    <div>Move: WASD | Reach Yacht → VIP</div>
  </div>

  <div id="vip">
    <button onclick="closeVIP()" style="position:absolute;top:20px;right:20px;">EXIT VIP</button>
    <h1>YACHT CLUB INTERIOR</h1>
  </div>

</div>

<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, ocean, yacht;

let keys = {};
let mode = "idle";

// positions
let speed = 0.15;
let targetYacht = { x: 0, y: 0, z: -15 };

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 6, 12);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);

  // 🌊 OCEAN
  const oceanGeo = new THREE.PlaneGeometry(200, 200);
  const oceanMat = new THREE.MeshBasicMaterial({ color: 0x001a33, wireframe: true });
  ocean = new THREE.Mesh(oceanGeo, oceanMat);
  ocean.rotation.x = -Math.PI / 2;
  scene.add(ocean);

  // 🧍 PLAYER (cube)
  const playerGeo = new THREE.BoxGeometry(1,1,1);
  const playerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  player = new THREE.Mesh(playerGeo, playerMat);
  player.position.set(0,0.5,5);
  scene.add(player);

  // 🛥 YACHT (dock target)
  const yachtGeo = new THREE.BoxGeometry(2,1,6);
  const yachtMat = new THREE.MeshBasicMaterial({ color: 0xd4af37 });
  yacht = new THREE.Mesh(yachtGeo, yachtMat);
  yacht.position.set(0,0.5,-15);
  scene.add(yacht);

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  animate();
}

// GAME LOOP
function animate() {
  requestAnimationFrame(animate);

  // 🌊 wave motion
  ocean.rotation.z += 0.0005;

  // 🧍 movement
  if (mode === "play") {

    if (keys["w"]) player.position.z -= speed;
    if (keys["s"]) player.position.z += speed;
    if (keys["a"]) player.position.x -= speed;
    if (keys["d"]) player.position.x += speed;

    // 🎯 camera follow
    camera.position.x += (player.position.x - camera.position.x) * 0.08;
    camera.position.z += (player.position.z + 10 - camera.position.z) * 0.08;
    camera.lookAt(player.position);

    // 🛥 yacht trigger
    let dist = player.position.distanceTo(yacht.position);

    if (dist < 2.5) {
      openVIP();
      mode = "vip";
    }
  }

  renderer.render(scene, camera);
}

// START WORLD
function enterWorld() {
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "LAMBO CITY ONLINE";
  mode = "play";

  document.getElementById("radio").play().catch(()=>{});
}

// VIP
function openVIP() {
  document.getElementById("vip").style.display = "block";
}

function closeVIP() {
  document.getElementById("vip").style.display = "none";
  mode = "play";
}

</script>

</body>
</html>
