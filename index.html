<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FULL CINEMATIC WORLD</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}
canvas{
position:fixed;
inset:0;
display:block;
z-index:1;
}
/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}
#intro img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.9;
pointer-events:none;
}
#enter{
position:relative;
z-index:10000;
padding:18px 42px;
font-size:20px;
letter-spacing:4px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.65);
color:white;
cursor:pointer;
transition:0.3s;
}
#enter:hover{
transform:scale(1.05);
background:rgba(0,120,255,0.25);
}
/* UI */
#ui{
position:fixed;
top:20px;
left:20px;
z-index:20;
color:white;
font-size:14px;
letter-spacing:2px;
}
/* CINEMATIC VIGNETTE */
#vignette{
position:fixed;
inset:0;
pointer-events:none;
z-index:5;
background:
radial-gradient(circle at center,
rgba(0,0,0,0) 45%,
rgba(0,0,0,0.82) 100%);
}
</style>
</head>
<body>
<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">ENTER WORLD</button>
</div>
<div id="ui">
LAMBO CITY — FULL CINEMATIC BUILD
</div>
<div id="vignette"></div>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
window.addEventListener("DOMContentLoaded",()=>{
/* =========================
STATE
========================= */
let mode="intro";
let introTime=0;
let t=0;
/* =========================
SCENE
========================= */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x050714);
scene.fog=new THREE.FogExp2(
0x050814,
0.0012
);
/* =========================
CAMERA
========================= */
const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
);
camera.position.set(0,40,120);
/* =========================
RENDERER
========================= */
const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(
window.innerWidth,
window.innerHeight
);
renderer.setPixelRatio(
Math.min(window.devicePixelRatio,2)
);
renderer.toneMapping=
THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.25;
renderer.outputColorSpace=
THREE.SRGBColorSpace;
/* =========================
LIGHTING
========================= */
const ambient=
new THREE.AmbientLight(
0x88aacc,
0.35
);
scene.add(ambient);
const sun=
new THREE.DirectionalLight(
0xfff1d6,
3.2
);
sun.position.set(250,300,150);
scene.add(sun);
const oceanGlow=
new THREE.PointLight(
0x00aaff,
2.8,
1400
);
oceanGlow.position.set(0,30,-200);
scene.add(oceanGlow);
/* =========================
WORLD
========================= */
/* WATER */
const water=new THREE.Mesh(
new THREE.PlaneGeometry(9000,9000),
new THREE.MeshStandardMaterial({
color:0x08293d,
metalness:0.75,
roughness:0.28
})
);
water.rotation.x=-Math.PI/2;
water.position.z=-250;
scene.add(water);
/* DOCK */
const dock=new THREE.Mesh(
new THREE.BoxGeometry(40,1,260),
new THREE.MeshStandardMaterial({
color:0x4a2f1d
})
);
dock.position.set(0,0.5,-40);
scene.add(dock);
/* MAIN STAGE */
const stage=new THREE.Mesh(
new THREE.CylinderGeometry(
50,
50,
4,
64
),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x003355,
emissiveIntensity:2
})
);
stage.position.set(0,2,-220);
scene.add(stage);
/* STAGE LIGHT RING */
for(let i=0;i<10;i++){
const light=new THREE.PointLight(
0x00aaff,
3,
200
);
light.position.set(
Math.cos(i/10*Math.PI*2)*60,
20,
-220 + Math.sin(i/10*Math.PI*2)*60
);
scene.add(light);
}
/* JUMBOTRON */
const jumbo=new THREE.Mesh(
new THREE.BoxGeometry(70,30,3),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x00aaff,
emissiveIntensity:2
})
);
jumbo.position.set(0,38,-150);
scene.add(jumbo);
/* MEGA YACHT */
const yacht=new THREE.Group();
const yachtBody=new THREE.Mesh(
new THREE.BoxGeometry(48,10,140),
new THREE.MeshStandardMaterial({
color:0xf1f1f1,
metalness:0.9,
roughness:0.2
})
);
yachtBody.position.y=8;
yacht.add(yachtBody);
const yachtTop=new THREE.Mesh(
new THREE.BoxGeometry(30,12,60),
new THREE.MeshStandardMaterial({
color:0xdedede,
metalness:0.8,
roughness:0.25
})
);
yachtTop.position.set(0,20,-10);
yacht.add(yachtTop);
const yachtGlass=new THREE.Mesh(
new THREE.BoxGeometry(26,7,34),
new THREE.MeshStandardMaterial({
color:0x66ccff,
transparent:true,
opacity:0.45,
emissive:0x113355
})
);
yachtGlass.position.set(0,20,-8);
yacht.add(yachtGlass);
yacht.position.set(0,0,-420);
scene.add(yacht);
/* CABINS */
for(let i=0;i<6;i++){
const cabinL=new THREE.Mesh(
new THREE.BoxGeometry(18,10,18),
new THREE.MeshStandardMaterial({
color:0x333333
})
);
cabinL.position.set(
-55,
5,
-30 - i*38
);
scene.add(cabinL);
const cabinR=cabinL.clone();
cabinR.position.x=55;
scene.add(cabinR);
}
/* CITY SKYLINE */
for(let i=0;i<120;i++){
const h=
20 + Math.random()*180;
const tower=new THREE.Mesh(
new THREE.BoxGeometry(
20+Math.random()*30,
h,
20+Math.random()*30
),
new THREE.MeshStandardMaterial({
color:0x101522,
emissive:0x111111
})
);
tower.position.set(
(Math.random()-0.5)*3000,
h/2,
-900 - Math.random()*1800
);
scene.add(tower);
}
/* MARINA LIGHTS */
for(let i=0;i<40;i++){
const lamp=
new THREE.PointLight(
0x88ccff,
1.4,
140
);
lamp.position.set(
(Math.random()-0.5)*400,
8,
-40 - Math.random()*500
);
scene.add(lamp);
}
/* PARTICLES */
const particleGeo=
new THREE.BufferGeometry();
const particleArray=[];
for(let i=0;i<3500;i++){
particleArray.push(
(Math.random()-0.5)*4000,
Math.random()*700,
(Math.random()-0.5)*4000
);
}
particleGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(
particleArray,
3
)
);
const particles=
new THREE.Points(
particleGeo,
new THREE.PointsMaterial({
color:0xffffff,
size:1.5,
transparent:true,
opacity:0.7
})
);
scene.add(particles);
/* =========================
PLAYER
========================= */
const player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({
color:0xffffff
})
);
player.position.set(0,1,20);
scene.add(player);
/* =========================
MOVEMENT
========================= */
const keys={};
let vel=new THREE.Vector3();
window.addEventListener(
"keydown",
e=>keys[e.key.toLowerCase()]=true
);
window.addEventListener(
"keyup",
e=>keys[e.key.toLowerCase()]=false
);
function move(){
let x=0;
let z=0;
if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;
let len=Math.hypot(x,z);
if(len>0){
x/=len;
z/=len;
}
vel.x+=x*0.12;
vel.z+=z*0.12;
vel.multiplyScalar(0.86);
player.position.x+=vel.x;
player.position.z+=vel.z;
}
/* =========================
UE5 CAMERA
========================= */
let camVel=new THREE.Vector3();
function cam(){
const target=
new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);
camVel.x+=
(target.x-camera.position.x)*0.045;
camVel.y+=
(target.y-camera.position.y)*0.045;
camVel.z+=
(target.z-camera.position.z)*0.045;
camVel.multiplyScalar(0.82);
camera.position.add(camVel);
/* SPEED FOV */
let speed=
Math.abs(vel.x)+
Math.abs(vel.z);
camera.fov=70+speed*25;
camera.updateProjectionMatrix();
/* SHAKE */
const shake=speed*1.5;
camera.position.x+=
(Math.random()-0.5)*shake;
camera.position.y+=
(Math.random()-0.5)*shake;
camera.lookAt(player.position);
}
/* =========================
ATMOSPHERE
========================= */
function worldFX(){
t+=0.0012;
const day=Math.sin(t);
ambient.intensity=
0.2+(1-day)*0.4;
sun.intensity=
2+day*1.4;
scene.fog.color=
new THREE.Color(
0.02+day*0.05,
0.06+day*0.08,
0.12+day*0.15
);
water.material.color.setRGB(
0.01+day*0.03,
0.08,
0.12+day*0.05
);
/* STAGE PULSE */
stage.material.emissiveIntensity=
1.5 + Math.sin(t*6)*0.8;
/* JUMBOTRON PULSE */
jumbo.material.emissiveIntensity=
1.8 + Math.sin(t*4)*0.6;
/* YACHT FLOAT */
yacht.position.y=
Math.sin(t*2)*1.2;
/* WATER MOTION */
water.position.x=
Math.sin(t*1.2)*3;
water.position.z=
-250 + Math.cos(t*1.1)*3;
}
/* =========================
INTRO CAMERA
========================= */
function introCam(){
introTime+=0.016;
if(introTime<6){
camera.position.lerp(
new THREE.Vector3(
Math.sin(introTime*0.4)*220,
60,
180-introTime*35
),
0.05
);
camera.lookAt(0,0,-160);
}
else if(introTime<12){
camera.position.lerp(
new THREE.Vector3(
0,
45,
50-(introTime-6)*40
),
0.05
);
camera.lookAt(0,0,-100);
}
else if(introTime<18){
camera.position.lerp(
new THREE.Vector3(
0,
50,
-100-(introTime-12)*50
),
0.05
);
camera.lookAt(0,0,-260);
}
else{
mode="play";
}
}
/* =========================
ENTER BUTTON
========================= */
document
.getElementById("enter")
.addEventListener("click",()=>{
document.getElementById("intro")
.style.display="none";
mode="cinematic";
introTime=0;
});
/* =========================
RESIZE
========================= */
window.addEventListener(
"resize",
()=>{
camera.aspect=
window.innerWidth/
window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(
window.innerWidth,
window.innerHeight
);
}
);
/* =========================
LOOP
========================= */
function animate(){
requestAnimationFrame(animate);
if(mode==="cinematic"){
introCam();
}
if(mode==="play"){
move();
cam();
worldFX();
}
renderer.render(scene,camera);
}
animate();
});
</script>
</body>
</html>
