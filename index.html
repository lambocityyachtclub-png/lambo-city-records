<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — STRUCTURE LOCKED UPGRADE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:10;
}

#ui {
position:absolute;
top:20px; left:20px;
color:white;
font-size:13px;
}

#zone {
position:absolute;
top:20px; right:20px;
color:#00ffff;
}

#msg {
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
color:white;
padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
display:none;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏡 Villa → 🌊 Dock → 🎤 Stage → 🚤 Yacht</div>
<div id="zone">INITIALIZING...</div>
<div id="msg">INTERIOR MODE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE WORLD
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const light = new THREE.PointLight(0x00ffff,2);
light.position.set(0,10,10);
scene.add(light);

/////////////////////////////////////////////////////
// PLAYER (FIRST PERSON BASE)
/////////////////////////////////////////////////////

const player = new THREE.Group();
scene.add(player);

const body = new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.add(body);

player.position.set(0,1,20);

/////////////////////////////////////////////////////
// WORLD BASE
/////////////////////////////////////////////////////

// WATER
const water = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<3000;i++){
arr.push(
(Math.random()-0.5)*1500,
Math.random()*600,
(Math.random()-0.5)*1500
);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
const dock = new THREE.Mesh(
new THREE.BoxGeometry(80,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-100);
scene.add(dock);

/////////////////////////////////////////////////////
// CABIN SYSTEM (FIXED STRUCTURE)
/////////////////////////////////////////////////////

const cabins = [];
let insideCabin = false;
let currentCabin = null;

function createCabin(x, z, color){

const group = new THREE.Group();

// FLOOR
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(8,8),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
floor.rotation.x = -Math.PI/2;
group.add(floor);

// BACK WALL
const wall = new THREE.Mesh(
new THREE.BoxGeometry(8,5,0.3),
new THREE.MeshStandardMaterial({color:0x111111})
);
wall.position.z = -4;
wall.position.y = 2.5;
group.add(wall);

// LIGHT
const light = new THREE.PointLight(color,1.2,20);
light.position.set(0,4,0);
group.add(light);

// FURNITURE
const couch = new THREE.Mesh(
new THREE.BoxGeometry(3,1,1),
new THREE.MeshStandardMaterial({color:0x333333})
);
couch.position.set(-1,0.5,0);
group.add(couch);

const bed = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.6,1.5),
new THREE.MeshStandardMaterial({color:0x444444})
);
bed.position.set(1,0.3,-2);
group.add(bed);

// POSITION GROUP
group.position.set(x,0,z);
scene.add(group);

// TRIGGER ZONE
const trigger = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshBasicMaterial({visible:false})
);
trigger.position.set(x,1,z);
scene.add(trigger);

cabins.push({group, trigger});
}

// spawn cabins
for(let i=0;i<5;i++){
createCabin(-20, -20-(i*25), 0x00ffff);
createCabin(20, -20-(i*25), 0xff00ff);
}

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
let started = false;

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
if(e.key.toLowerCase()==="e") toggleCabin();
});

document.addEventListener("keyup",e=>keys[e.key.toLowerCase()] = false);

function start(){
document.getElementById("start").style.display="none";
started = true;
document.getElementById("zone").innerText="WELCOME TO LAMBO CITY";
}

/////////////////////////////////////////////////////
// CABIN ENTRY SYSTEM
/////////////////////////////////////////////////////

function toggleCabin(){

if(insideCabin){
insideCabin = false;
currentCabin = null;
document.getElementById("msg").style.display="none";
return;
}

for(let c of cabins){
if(player.position.distanceTo(c.trigger.position) < 4){
insideCabin = true;
currentCabin = c;
document.getElementById("msg").style.display="block";
document.getElementById("zone").innerText="INSIDE CABIN";
break;
}
}
}

/////////////////////////////////////////////////////
// CAMERA SYSTEM (SMOOTH)
/////////////////////////////////////////////////////

function updateCamera(){

if(insideCabin && currentCabin){
camera.position.lerp(
new THREE.Vector3(
currentCabin.group.position.x,
3,
currentCabin.group.position.z + 3
),
0.08
);
camera.lookAt(currentCabin.group.position);
return;
}

camera.position.lerp(
new THREE.Vector3(
player.position.x,
player.position.y + 2,
player.position.z + 6
),
0.08
);

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function movePlayer(){

if(insideCabin) return;

if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!started) return;

movePlayer();
updateCamera();

stars.rotation.y += 0.0003;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
