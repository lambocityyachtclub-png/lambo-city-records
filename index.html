<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION LAYER v7 (STABLE)</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; } 

#start {
position:absolute; inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:10;
}

#ui {
position:absolute; top:20px; left:20px;
color:white; font-size:13px;
}

#zone {
position:absolute; top:20px; right:20px;
color:#00ffff;
}

#msg {
position:absolute; bottom:30px; left:50%;
transform:translateX(-50%);
color:white;
padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
display:none;
}
</style>
</head>

<body>
<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>
<div id="ui">
WASD MOVE • E ENTER / EXIT CABIN<br>
COINS: <span id="coins">0</span>
</div>
<div id="zone">
LOADING...
</div>
<div id="msg">
CABIN ACCESS ENABLED
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// 🌍 CORE WORLD
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.physicallyCorrectLights = true;  
const size = () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
window.addEventListener("resize", size);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

const light = new THREE.PointLight(0x00ffff,2);
light.position.set(0,10,10);
scene.add(light);

/////////////////////////////////////////////////////
// 🧍 PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);
player.position.set(0,1,20);

const keys = {};
let started = false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
  document.getElementById("start").style.display="none";
  started = true;
  document.getElementById("zone").innerText="WELCOME TO LAMBO CITY";

  updateHUD(); // ✅ ADD THIS

  music.currentTime = 0;
  music.play().catch(()=>{});
}
const WORLD_LIMIT = 120;
/////////////////////////////////////////////////////
// 🪙 ECONOMY CORE (LAMBO COIN SYSTEM)
/////////////////////////////////////////////////////

let coins = 0;

function updateHUD(){
  document.getElementById("coins").innerText = coins;
}

const Economy = {
  getBalance: () => coins,

  earn: (amount) => {
    coins += amount;
    updateHUD();
  },

  spend: (amount) => {
    if (coins >= amount) {
      coins -= amount;
      updateHUD();
      return true;
    }
    return false;
  }
};
  /////////////////////////////////////////////////////
// 🎯 STAGE EVENT SYSTEM (ONE-TIME TRIGGERS)
/////////////////////////////////////////////////////

let stageInside = false;

function checkStageEvents(){

  const dist = player.position.distanceTo(stage.position);

  if(dist < 25 && !stageInside){

    stageInside = true;

    console.log("ENTERED STAGE");

    rewardPlayer("stage_entry"); // temporary hook

  }

  if(dist >= 25){

    stageInside = false;

  }
}
  /////////////////////////////////////////////////////
// 🪙 REWARD SYSTEM (PLACEHOLDER - NOT BALANCED YET)
/////////////////////////////////////////////////////

function rewardPlayer(reason){

  console.log("Reward triggered:", reason);

  // TEMP TEST VALUE ONLY
  Economy.earn(1);

}
  /////////////////////////////////////////////////////
// 🎯 EVENT SYSTEM (FOUNDATION LAYER)
/////////////////////////////////////////////////////

const Events = {

  emit: (type, data = {}) => {
    handleEvent(type, data);
  }

};

function handleEvent(type, data){

  switch(type){

    case "ENTER_STAGE_ZONE":
      console.log("Player entered stage zone");
      rewardPlayer("stage_visit");
      break;

    case "ENTER_CABIN":
      console.log("Player entered cabin");
      rewardPlayer("cabin_entry");
      break;

    case "DOCK_TOUCH":
      console.log("Player at dock");
      rewardPlayer("dock_visit");
      break;
  }
}
/////////////////////////////////////////////////////
// 🔊 AUDIO SYSTEM (SAFE)
/////////////////////////////////////////////////////
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7d3c.mp3");
music.loop = true;
music.volume = 0.4;

/////////////////////////////////////////////////////
// 🌊 WORLD FLOOR
/////////////////////////////////////////////////////

const water = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

/////////////////////////////////////////////////////
// 🌟 STARS
/////////////////////////////////////////////////////

const starGeo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<3000;i++){
arr.push(
(Math.random()-0.5)*1500,
Math.random()*600,
(Math.random()-0.5)*1500
);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

/////////////////////////////////////////////////////
// 🚤 DOCK
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
new THREE.BoxGeometry(80,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-100);
scene.add(dock);
/////////////////////////////////////////////////////
// 🌊 MAIN FESTIVAL DISTRICT
/////////////////////////////////////////////////////

const stageDeck = new THREE.Mesh(
new THREE.CylinderGeometry(90,90,1,64),
new THREE.MeshStandardMaterial({
  color:0x3a2a1d
})
);

stageDeck.position.set(0,0,-170);

scene.add(stageDeck);
/////////////////////////////////////////////////////
// 🎤 FESTIVAL STAGE
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
new THREE.BoxGeometry(45,12,20),
new THREE.MeshStandardMaterial({
  color:0x111111,
  emissive:0x220033,
  emissiveIntensity:1
})
);

stage.position.set(0,6,-170);

scene.add(stage);

/////////////////////////////////////////////////////
// 🏡 CABINS
/////////////////////////////////////////////////////

const cabins = [];

function createCabin(x,z){

const base = new THREE.Group();

// FLOOR
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(8,8),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
floor.rotation.x = -Math.PI/2;
base.add(floor);

// WALLS
const wallMat = new THREE.MeshStandardMaterial({color:0x111111});

const back = new THREE.Mesh(new THREE.BoxGeometry(8,5,0.3), wallMat);
back.position.set(0,2.5,-4);
base.add(back);

const left = new THREE.Mesh(new THREE.BoxGeometry(0.3,5,8), wallMat);
left.position.set(-4,2.5,0);
base.add(left);

const right = left.clone();
right.position.x = 4;
base.add(right);

  // GLASS FRONT
const glass = new THREE.Mesh(
new THREE.BoxGeometry(8,5,0.1),
new THREE.MeshStandardMaterial({
  color:0x99ccff,
  transparent:true,
  opacity:0.25
})
);
glass.position.set(0,2.5,4);
base.add(glass);

  // BALCONY FLOOR
const balcony = new THREE.Mesh(
new THREE.BoxGeometry(8,0.2,3),
new THREE.MeshStandardMaterial({color:0x222222})
);
balcony.position.set(0,0.1,5.5);
base.add(balcony);

  // BALCONY RAIL
const rail = new THREE.Mesh(
new THREE.BoxGeometry(8,1,0.1),
new THREE.MeshStandardMaterial({
  color:0x99ccff,
  transparent:true,
  opacity:0.3
})
);
rail.position.set(0,0.8,7);
base.add(rail);

  // OCEAN REFLECTION LIGHT
const oceanGlow = new THREE.PointLight(0x00aaff,0.5,15);
oceanGlow.position.set(0,1,6);
base.add(oceanGlow);

// LIGHT
const light = new THREE.PointLight(0xffcc88,1.2,20);
light.position.set(0,4,0);
base.add(light);

// FURNITURE
const couch = new THREE.Mesh(
new THREE.BoxGeometry(3,1,1),
new THREE.MeshStandardMaterial({color:0x333333})
);
couch.position.set(-1,0.5,0);
base.add(couch);

const bed = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.6,1.5),
new THREE.MeshStandardMaterial({color:0x444444})
);
bed.position.set(1.5,0.3,-2);
base.add(bed);

// TRIGGER
const trigger = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshBasicMaterial({visible:false})
);
trigger.position.set(0,1,0);
base.add(trigger);

base.position.set(x,0,z);

scene.add(base);
cabins.push({group:base, trigger:trigger});
}

// SPAWN CABINS
for(let i=0;i<5;i++){
createCabin(-20,-20-(i*25));
createCabin(20,-20-(i*25));
}

/////////////////////////////////////////////////////
// 👥 CROWD SYSTEM (SAFE)
/////////////////////////////////////////////////////

const crowd = [];
const crowdBaseY = [];

for(let i=0;i<30;i++){

const npc.position.set(
  0 + (Math.random()-0.5)*55,
  0.6,
  -170 + (Math.random()-0.5)*35
);

  scene.add(npc);
  crowd.push(npc);
  crowdBaseY.push(npc.position.y);
}

  /////////////////////////////////////////////////////
// 🎤 STAGE LIGHTING
/////////////////////////////////////////////////////

const stageLight1 = new THREE.PointLight(0xff00ff,0,50);
const stageLight2 = new THREE.PointLight(0x00ffff,0,50);

scene.add(stageLight1);
scene.add(stageLight2);
  
/////////////////////////////////////////////////////
// 🎮 CABIN SYSTEM
/////////////////////////////////////////////////////

let inside = false;
let activeCabin = null;

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
toggleCabin();
}
});

function toggleCabin(){

if(inside){
inside = false;
activeCabin = null;
document.getElementById("msg").style.display="none";
document.getElementById("zone").innerText="OUTSIDE WORLD";
return;
}

for(let c of cabins){
if(player.position.distanceTo(c.group.position)<5){
inside = true;
activeCabin = c;
document.getElementById("msg").style.display="block";
document.getElementById("zone").innerText="INSIDE CABIN";
break;
}
}
}

/////////////////////////////////////////////////////
// 🎥 CAMERA
/////////////////////////////////////////////////////

function updateCamera(){

const targetX = inside && activeCabin
? activeCabin.group.position.x
: player.position.x;

const targetY = inside && activeCabin
? 3
: 6;

const targetZ = inside && activeCabin
? activeCabin.group.position.z
: player.position.z + 8;

// smooth follow (LERP)
camera.position.x += (targetX - camera.position.x) * 0.08;
camera.position.y += (targetY - camera.position.y) * 0.08;
camera.position.z += (targetZ - camera.position.z) * 0.08;

// look target
const lookTarget = inside && activeCabin
? activeCabin.group.position
: player.position;

camera.lookAt(lookTarget);
}

  /////////////////////////////////////////////////////
// 🎧 STAGE ENERGY SYSTEM
/////////////////////////////////////////////////////

/////////////////////////////////////////////////////
// 🎧 STAGE ENERGY SYSTEM (FIXED)
/////////////////////////////////////////////////////


function updateStageEnergy(){
  const dist = player.position.distanceTo(stage.position);

  if(dist < 25){

    document.getElementById("zone").innerText = "🔥 STAGE ACTIVE";

    let t = Date.now()*0.002;

    stageLight1.intensity = 2;
    stageLight2.intensity = 2;

    stageLight1.position.set(0 + Math.sin(t)*10, 10, -140);
    stageLight2.position.set(0 + Math.cos(t)*10, 10, -140);

    crowd.forEach((p,i)=>{
      p.lookAt(player.position);
      p.position.y = crowdBaseY[i] + Math.sin(Date.now()*0.005 + i)*0.25;
    });

  } else {

    document.getElementById("zone").innerText = "OUTSIDE STAGE";

    stageLight1.intensity = 0;
    stageLight2.intensity = 0;

    crowd.forEach((p,i)=>{
      p.position.y = crowdBaseY[i];
    });
  }
}
  
/////////////////////////////////////////////////////
// 🚶 MOVEMENT
/////////////////////////////////////////////////////

function move(){

  if(inside) return;

  if(keys["w"]) player.position.z -= 0.25;
  if(keys["s"]) player.position.z += 0.25;
  if(keys["a"]) player.position.x -= 0.25;
  if(keys["d"]) player.position.x += 0.25;

  // 🌍 WORLD BOUNDARY (MUST BE INSIDE MOVE)
  player.position.x = Math.max(-WORLD_LIMIT, Math.min(WORLD_LIMIT, player.position.x));
  player.position.z = Math.max(-WORLD_LIMIT, Math.min(WORLD_LIMIT, player.position.z));
}
/////////////////////////////////////////////////////
// 🔁 LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  if(!started) return;

  move();

  updateCamera();

  updateStageEnergy();

  checkStageEvents();

  stars.rotation.y += 0.0003;

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
