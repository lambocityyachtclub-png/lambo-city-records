<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | WORLD ENGINE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* CINEMATIC OVERLAY (GTA FADE + ZOOM FEEL) */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 1;
    transform: scale(1.1);
    transition: opacity 0.9s ease, transform 1.2s ease;
    z-index: 100;
}

/* WORLD SCREENS */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: transform 1s ease, opacity 1s ease;
}

/* ENVIRONMENTS */
#portal {
    background: radial-gradient(circle, #111, #000);
}

#city {
    background: radial-gradient(circle at top, #111, #000);
}

#vip {
    background: black;
}

/* TITLE */
.title {
    font-size: 36px;
    letter-spacing: 6px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 12px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.3s;
}

button:hover {
    background: white;
    color: black;
}

/* GTA STYLE “DEPTH SHIFT” */
.enter {
    transform: scale(1.08);
    opacity: 0;
}

.active {
    transform: scale(1);
    opacity: 1;
}

/* VIP STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- PORTAL -->
<div id="portal" class="screen">
    <div class="title">LAMBO CITY GATE</div>
    <button onclick="enterCity()">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="screen">
    <div class="title">LAMBO CITY</div>
    <button onclick="goVip()">YACHT CLUB</button>
    <button onclick="goPortal()">EXIT WORLD</button>
</div>

<!-- VIP -->
<div id="vip" class="screen">
    <div class="title">YACHT CLUB VIP</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="goCity()">BACK TO CITY</button>
</div>

<script>

let fade = document.getElementById("fade");

/* START WORLD (CINEMATIC DROP-IN) */
window.onload = () => {
    setTimeout(() => {
        fade.style.transform = "scale(1)";
        fade.style.opacity = "0";

        setTimeout(() => {
            show("portal");
        }, 900);

    }, 600);
};

/* WORLD ENGINE */
function show(id) {
    document.querySelectorAll(".screen").forEach(s => {
        s.style.display = "none";
        s.classList.remove("active");
    });

    let el = document.getElementById(id);
    el.style.display = "flex";

    // GTA-style “camera settle”
    setTimeout(() => {
        el.classList.add("active");
    }, 50);
}

/* GTA STYLE TRANSITION */
function transition(callback) {
    fade.style.opacity = "1";
    fade.style.transform = "scale(1.1)";

    setTimeout(() => {
        callback();

        setTimeout(() => {
            fade.style.opacity = "0";
            fade.style.transform = "scale(1)";
        }, 250);

    }, 700);
}

/* NAVIGATION */
function enterCity() {
    transition(() => show("city"));
}

function goVip() {
    transition(() => show("vip"));
}

function goCity() {
    transition(() => show("city"));
}

function goPortal() {
    transition(() => show("portal"));
}

</script>

</body>
</html>
