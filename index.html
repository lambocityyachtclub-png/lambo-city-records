<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — V2 CINEMATIC</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY — V2 CINEMATIC</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070a12);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 4000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// 🌅 CINEMATIC LIGHTING (KEY UPGRADE)
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x3a4a6a, 0.9);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffcc88, 1.2);
sun.position.set(120, 180, 80);
scene.add(sun);

const fill = new THREE.PointLight(0x4da3ff, 0.8, 2000);
fill.position.set(0, 80, 0);
scene.add(fill);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0x111111
  })
);

player.position.set(0,1,-10);
scene.add(player);

camera.position.set(0, 8, 14);

/////////////////////////////////////////////////////
// CONTROLS
/////////////////////////////////////////////////////

const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move(){
  if(keys["w"]) player.position.z -= 0.3;
  if(keys["s"]) player.position.z += 0.3;
  if(keys["a"]) player.position.x -= 0.3;
  if(keys["d"]) player.position.x += 0.3;
}

/////////////////////////////////////////////////////
// 🎥 CINEMATIC CAMERA (SMOOTH + FILM FEEL)
/////////////////////////////////////////////////////

function updateCamera(){
  const targetX = player.position.x;
  const targetY = player.position.y + 8;
  const targetZ = player.position.z + 14;

  camera.position.x += (targetX - camera.position.x) * 0.06;
  camera.position.y += (targetY - camera.position.y) * 0.06;
  camera.position.z += (targetZ - camera.position.z) * 0.06;

  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (VISUAL UPGRADE)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(4000, 4000, 80, 80);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x061a2b,
  metalness: 0.2,
  roughness: 0.8,
  emissive: 0x001022,
  emissiveIntensity: 0.25
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🌉 DOCK (CENTERPIECE)
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(250, 250, 2, 64),
  new THREE.MeshStandardMaterial({ color: 0x111111 })
);

dock.position.set(0,0.5,-60);
scene.add(dock);

/////////////////////////////////////////////////////
// 🏡 VILLAS (CINEMATIC PLACEMENT)
/////////////////////////////////////////////////////

function villa(x,z){
  const g = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x0f0f0f })
  );
  base.position.y = 0.5;
  g.add(base);

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({ color:0x151515 })
  );
  body.position.y = 4;
  g.add(body);

  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({ color:0x0a0a0a })
  );
  roof.position.y = 8;
  g.add(roof);

  const light = new THREE.PointLight(0x66ccff, 1.2, 30);
  light.position.set(0,4,0);
  g.add(light);

  g.position.set(x,0,z);
  scene.add(g);
}

for(let i=0;i<6;i++){
  villa(-25, -30 - i*25);
  villa(25, -30 - i*25);
}

/////////////////////////////////////////////////////
// 🚤 YACHT (NOW MOVING SLIGHTLY)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(16,4,45),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(8,1,-10);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

function check(){
  const d = player.position.distanceTo(hero.position);
  if(d<3) show("PRESS E TO TALK");
  else hide();
}

document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText =
        "HERO: Welcome to LAMBO CITY V2";
    }
  }
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  const time = Date.now() * 0.001;

  // ocean motion
  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];
    const wave =
      Math.sin(v.x * 0.015 + time) * 0.5 +
      Math.cos(v.z * 0.015 + time * 1.2) * 0.5;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  // yacht drift (cinematic feel)
  yacht.position.x += Math.sin(time * 0.2) * 0.01;

  renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
