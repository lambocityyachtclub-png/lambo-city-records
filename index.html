<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION CORE v3</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone {
position:absolute;
color:white;
font-family:Arial;
font-size:13px;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#start {
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
z-index:20;
}

#hint {
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 18px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
color:white;
}
</style>

</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD TO MOVE</div>
<div id="zone">LOADING LUXURY WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE STATE
/////////////////////////////////////////////////////

let started = false;

const STATE = {
  stageEnabled: false
};

/////////////////////////////////////////////////////
// SCENE / CAMERA / RENDERER
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x0a0f1a, 0.008);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  3000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (LUXURY TONE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const keyLight = new THREE.PointLight(0x00ffff, 1.6, 200);
keyLight.position.set(0,30,20);
scene.add(keyLight);

/////////////////////////////////////////////////////
// PLAYER (SMOOTH WALKER)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);

player.position.set(0,1,-30);
scene.add(player);

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/////////////////////////////////////////////////////
// CAMERA (CINEMATIC FOLLOW)
/////////////////////////////////////////////////////

function updateCamera(){

  const targetX = player.position.x;
  const targetY = 8;
  const targetZ = player.position.z + 14;

  camera.position.x += (targetX - camera.position.x) * 0.08;
  camera.position.y += (targetY - camera.position.y) * 0.08;
  camera.position.z += (targetZ - camera.position.z) * 0.08;

  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// OCEAN (LUXURY BASE)
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000),
  new THREE.MeshStandardMaterial({
    color:0x001426,
    metalness:0.4,
    roughness:0.3
  })
);

ocean.rotation.x = -Math.PI/2;
scene.add(ocean);

/////////////////////////////////////////////////////
// YACHT (VISUAL LUXURY OBJECT)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
  new THREE.BoxGeometry(14,3,50),
  new THREE.MeshStandardMaterial({ color:0xf2f2f2 })
);

hull.position.y = 2;
yacht.add(hull);

const deck = new THREE.Mesh(
  new THREE.BoxGeometry(12,2,30),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);

deck.position.y = 4;
yacht.add(deck);

yacht.position.set(35,0,-20);
scene.add(yacht);

/////////////////////////////////////////////////////
// CABINS (LUXURY STRUCTURES)
/////////////////////////////////////////////////////

function createCabin(x,z){

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({
      color:0x1a1a1a,
      metalness:0.2
    })
  );

  cabin.position.set(x,2,z);
  scene.add(cabin);

}

for(let i=0;i<3;i++){
  createCabin(-12, -10 - i*14);
  createCabin(12, -10 - i*14);
}

/////////////////////////////////////////////////////
// HERO NPC (CENTER FIGURE)
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2.5,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.2
  })
);

hero.position.set(8,1,-12);
scene.add(hero);

/////////////////////////////////////////////////////
// STAGE (VISUAL ONLY — NO GAMEPLAY)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.CylinderGeometry(20,20,1,32),
  new THREE.MeshStandardMaterial({
    color:0x111111,
    emissive:0x220044,
    emissiveIntensity:0.4
  })
);

stage.position.set(0,0,-60);
scene.add(stage);

/////////////////////////////////////////////////////
// CROWD (ATMOSPHERE ONLY)
/////////////////////////////////////////////////////

const crowd = [];

for(let i=0;i<14;i++){

  const npc = new THREE.Mesh(
    new THREE.CylinderGeometry(0.6,0.6,1.8,8),
    new THREE.MeshStandardMaterial({
      color:0x00ffff,
      emissive:0x00ffff,
      emissiveIntensity:1.2
    })
  );

  npc.position.set(
    (Math.random()-0.5)*30,
    1,
    -55 + (Math.random()-0.5)*20
  );

  scene.add(npc);
  crowd.push(npc);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){

  if(keys["w"]) player.position.z -= 0.2;
  if(keys["s"]) player.position.z += 0.2;
  if(keys["a"]) player.position.x -= 0.2;
  if(keys["d"]) player.position.x += 0.2;

}

/////////////////////////////////////////////////////
// HERO INTERACTION
/////////////////////////////////////////////////////

function checkHero(){

  const d = player.position.distanceTo(hero.position);

  if(d < 3){
    show("PRESS E TO TALK");
  } else {
    hide();
  }
}

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display = "block";
  hint.innerText = t;
}

function hide(){
  hint.style.display = "none";
}

/////////////////////////////////////////////////////
// START
/////////////////////////////////////////////////////

function start(){
  document.getElementById("start").style.display = "none";
  started = true;
  document.getElementById("zone").innerText = "IMMERSIVE WORLD ACTIVE";
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

  requestAnimationFrame(animate);

  if(!started){
    renderer.render(scene,camera);
    return;
  }

  move();
  updateCamera();
  checkHero();

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
