<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambo City OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/yourimage.jpg') no-repeat center center/cover;
  filter: brightness(0.4);
  z-index: -1;
}

.screen {
  min-height: 100vh;
  padding: 20px;
  background: rgba(0,0,0,0.75);
}

/* HEADER */
.header {
  text-align: center;
  font-size: 50px;
  color: gold;
  font-weight: bold;
}

/* LOGIN PANEL */
.login {
  max-width: 500px;
  margin: 60px auto;
  border: 2px solid gold;
  padding: 30px;
  text-align: center;
  background: rgba(255,255,255,0.05);
}

input {
  width: 80%;
  padding: 12px;
  margin-top: 10px;
  text-align: center;
}

button {
  width: 85%;
  padding: 12px;
  margin-top: 10px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  display: none;
}

/* GRID MENU */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.card {
  border: 1px solid gold;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* PANEL VIEW */
.panel {
  margin-top: 20px;
  border: 1px solid gold;
  padding: 20px;
  background: rgba(0,0,0,0.5);
}

/* FEED */
.feed {
  height: 120px;
  overflow: auto;
  border: 1px solid gold;
  margin-top: 20px;
  padding: 10px;
  background: rgba(0,0,0,0.4);
}

/* STATUS */
.status {
  color: lightgreen;
  text-align: center;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="screen">

<div class="header">LAMBO CITY OS</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>BOARDING PASS LOGIN</h2>

<input id="code" placeholder="Enter Code">

<button onclick="login()">ENTER CITY</button>

<p style="font-size:12px; color:gray;">
Guest: GUEST123 | VIP: VIP2026 | Founder: FOUNDER777
</p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<p class="status" id="status">SYSTEM ONLINE • CITY LOADED</p>

<div class="grid">

<div class="card" onclick="openZone('studio')">🎵 Studio District</div>
<div class="card" onclick="openZone('yacht')">🛥 Yacht Club</div>
<div class="card" onclick="openZone('drops')">🔥 Drop Hub</div>

<div class="card" onclick="openZone('vip')">🔐 VIP Vault</div>
<div class="card" onclick="openZone('map')">🗺 City Map</div>
<div class="card" onclick="logout()">🚪 Exit City</div>

</div>

<div class="panel" id="panel">
Welcome to Lambo City OS
</div>

<div class="feed" id="feed">
<p>SYSTEM: City initializing...</p>
</div>

</div>

</div>

<script>

const feed = document.getElementById("feed");
const panel = document.getElementById("panel");

const codes = {
  GUEST123: "guest",
  VIP2026: "vip",
  FOUNDER777: "founder"
};

let currentUser = null;

/* LOGIN */
function login() {
  const input = document.getElementById("code").value;

  if (codes[input]) {
    currentUser = codes[input];
    localStorage.setItem("lamboUser", currentUser);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    panel.innerHTML = "WELCOME " + currentUser.toUpperCase() + " USER";
  } else {
    alert("INVALID BOARDING PASS");
  }
}

/* ZONES */
function openZone(zone) {

  if (zone === "vip" && currentUser === "guest") {
    panel.innerHTML = "ACCESS DENIED: VIP REQUIRED";
    return;
  }

  if (zone === "studio") {
    panel.innerHTML = "🎵 Studio District: HERO is recording new drops...";
  }

  if (zone === "yacht") {
    panel.innerHTML = "🛥 Yacht Club: Private event loading...";
  }

  if (zone === "drops") {
    panel.innerHTML = "🔥 Next Drop: Coming Soon...";
  }

  if (zone === "vip") {
    panel.innerHTML = "🔐 VIP Vault: Exclusive content unlocked";
  }

  if (zone === "map") {
    panel.innerHTML = "🗺 City Map: Studio | Yacht | VIP | Drops";
  }
}

/* LOGOUT */
function logout() {
  localStorage.clear();
  location.reload();
}

/* FEED LOOP */
setInterval(() => {
  const msgs = [
    "SYSTEM: Yacht engines online...",
    "SYSTEM: Studio recording active...",
    "SYSTEM: Drop countdown syncing...",
    "SYSTEM: VIP vault secured...",
    "USER: Exploring city..."
  ];

  const p = document.createElement("p");
  p.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  feed.appendChild(p);
  feed.scrollTop = feed.scrollHeight;
}, 3000);

/* AUTO LOGIN */
window.onload = function () {
  const saved = localStorage.getItem("lamboUser");

  if (saved) {
    currentUser = saved;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    panel.innerHTML = "WELCOME BACK " + saved.toUpperCase();
  }
};

</script>

</body>
</html>
