<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — HERO SYSTEM</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0; background:black; color:white;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; z-index:1000;
}

#ui { position:absolute; top:20px; left:20px; color:white; }

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white; padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}

#status {
  position:absolute; bottom:90px; left:50%;
  transform:translateX(-50%);
  color:#00ffff;
  border:1px solid #00ffff;
  padding:8px 12px;
  display:none;
}

#locked {
  position:absolute; bottom:140px; left:50%;
  transform:translateX(-50%);
  color:red;
  border:1px solid red;
  padding:8px 12px;
  display:none;
}

/* NAME TAG */
#nameTag {
  position:absolute;
  color:white;
  font-size:12px;
  text-align:center;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="ui">W A S D TO MOVE</div>
<div id="msg">I brought you here.</div>
<div id="status"></div>
<div id="locked">ACCESS DENIED</div>

<div id="nameTag">
  <div style="font-weight:bold;">HERO</div>
  <div style="font-size:10px; color:#aaa;">Founder — LAMBO CITY</div>
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// SCENE
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

// ================= CHARACTER =================
let player = new THREE.Group();

// BODY
let torso = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,0.5),
  new THREE.MeshStandardMaterial({color:0xdddddd})
);
torso.position.y = 1.2;

// HEAD
let head = new THREE.Mesh(
  new THREE.BoxGeometry(0.6,0.6,0.6),
  new THREE.MeshStandardMaterial({color:0xffe0bd})
);
head.position.y = 2.2;

// LEGS
let legL = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,1,0.3),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
let legR = legL.clone();

legL.position.set(-0.2,0.5,0);
legR.position.set(0.2,0.5,0);

player.add(torso, head, legL, legR);
scene.add(player);

// 👑 FOUNDER AURA (subtle luxury)
let aura = new THREE.Mesh(
  new THREE.RingGeometry(1.2,1.5,32),
  new THREE.MeshBasicMaterial({color:0xffd700, side:THREE.DoubleSide})
);
aura.rotation.x = -Math.PI/2;
aura.position.y = 0.05;
aura.opacity = 0.4;
aura.transparent = true;
player.add(aura);

// ================= ROOM =================
let room = new THREE.Mesh(
  new THREE.BoxGeometry(12,6,12),
  new THREE.MeshStandardMaterial({color:0x111111, side:THREE.BackSide})
);
room.position.set(-35,3,20);
scene.add(room);

// ================= WORLD =================

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(800,800),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<4000;i++){
  arr.push((Math.random()-0.5)*800,Math.random()*300,(Math.random()-0.5)*800);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));
let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(220,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// CABINS
function createCabin(x,z,isKing=false){
  let size = isKing?14:8;
  let base = new THREE.Mesh(
    new THREE.BoxGeometry(size,5,size),
    new THREE.MeshStandardMaterial({color:isKing?0x222244:0x111111})
  );
  base.position.set(x,2.5,z);
  scene.add(base);
}

for(let i=0;i<5;i++){
  createCabin(-35,-20-(i*30),i===4);
}
for(let i=0;i<5;i++){
  createCabin(35,-20-(i*30));
}

// STAGE (upcoming artists)
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(20,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// YACHT (elite stage world)
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(45,6,20),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-400);
scene.add(yacht);

// CROWD
let crowd=[];
for(let i=0;i<30;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*40,0.6,-80+(Math.random()-0.5)*60);
  scene.add(p);
  crowd.push(p);
}

// ================= SYSTEM =================
let keys={},inWorld=false;

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
  document.getElementById("start").style.display="none";
  inWorld=true;
  player.position.set(-35,0,20);
}

// VOICE
function speak(text){
  document.getElementById("msg").innerText=text;
}

// LOOP
function animate(){
requestAnimationFrame(animate);
if(!inWorld) return;

// MOVE
let moving=false;
if(keys["w"]){ player.position.z-=0.12; moving=true; }
if(keys["s"]){ player.position.z+=0.12; moving=true; }
if(keys["a"]){ player.position.x-=0.12; moving=true; }
if(keys["d"]){ player.position.x+=0.12; moving=true; }

// ANIMATION
let t=Date.now()*0.01;
legL.rotation.x = moving ? Math.sin(t)*0.8 : 0;
legR.rotation.x = moving ? -Math.sin(t)*0.8 : 0;

// EXIT ROOM
if(player.position.z < 15){
  room.visible=false;
  speak("This is a cool city… you’ll see.");
}

// STAGE MOMENT
if(player.position.distanceTo(stage.position)<6){
  speak("You’ll understand when you earn it.");
}

// YACHT LOCK (others feel this, not you)
if(player.position.z < -300){
  player.position.z=-300;
  document.getElementById("locked").style.display="block";
}else{
  document.getElementById("locked").style.display="none";
}

// CAMERA
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (4-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.05;
camera.lookAt(player.position.x,player.position.y+1.5,player.position.z);

// NAME TAG FOLLOW
let vector = player.position.clone();
vector.y += 2.8;
vector.project(camera);

let x = (vector.x * 0.5 + 0.5) * innerWidth;
let y = (-vector.y * 0.5 + 0.5) * innerHeight;

let tag = document.getElementById("nameTag");
tag.style.left = x + "px";
tag.style.top = y + "px";

// LIFE
stars.rotation.y+=0.0005;
water.position.z=Math.sin(Date.now()*0.001)*1;

crowd.forEach(p=>{
  p.position.x+=Math.sin(Date.now()*0.001)*0.01;
});

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
