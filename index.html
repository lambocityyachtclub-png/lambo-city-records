<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY — PHASE 2</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

canvas { display:block; }

#hud {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  text-shadow:0 0 10px black;
  opacity:0.9;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  border:1px solid gold;
  padding:12px 16px;
  display:none;
  color:white;
  pointer-events:auto;
  text-align:center;
}

button {
  background:black;
  border:1px solid gold;
  color:white;
  padding:10px 14px;
  cursor:pointer;
}

#fade {
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  transition:opacity 1s;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud">
  🌍 LAMBO CITY<br>
  <span id="zone">ZONE: CABIN LOBBY</span><br>
  <span id="state">STATE: IDLE</span>
</div>

<div id="prompt">
  🚪 TRANSITION AVAILABLE<br>
  <button onclick="goDock()">ENTER DOCK</button>
</div>

<div id="fade"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let keys = {};
let time = 0;
let state = "lobby";

init();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050510, 0.03);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,2.5,5);

  renderer = new THREE.WebGLRenderer({ canvas:document.getElementById("c"), antialias:true });
  renderer.setSize(innerWidth, innerHeight);

  // LIGHT
  scene.add(new THREE.AmbientLight(0x1a1a2a, 1.2));

  const light = new THREE.PointLight(0x00aaff, 2.5, 120);
  light.position.set(0,8,0);
  scene.add(light);

  // PLAYER
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  player.position.set(0,0.5,0);
  scene.add(player);

  // CABIN LOBBY
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(14,6,14),
    new THREE.MeshStandardMaterial({color:0x070717, side:THREE.BackSide})
  );
  cabin.position.y = 3;
  scene.add(cabin);

  // WINDOW FRAME
  const windowFrame = new THREE.Mesh(
    new THREE.BoxGeometry(8,3,0.2),
    new THREE.MeshStandardMaterial({color:0x111122})
  );
  windowFrame.position.set(0,3,-6.8);
  scene.add(windowFrame);

  // DOCK
  const dock = new THREE.Mesh(
    new THREE.BoxGeometry(80,0.2,80),
    new THREE.MeshStandardMaterial({color:0x0b0b0b})
  );
  dock.position.set(0,0,-30);
  scene.add(dock);

  // YACHT
  yacht = new THREE.Mesh(
    new THREE.BoxGeometry(5,2,12),
    new THREE.MeshStandardMaterial({
      color:0xffd700,
      emissive:0x332200,
      emissiveIntensity:1
    })
  );
  yacht.position.set(0,1,-55);
  scene.add(yacht);

  const yachtLight = new THREE.PointLight(0xffaa00, 4, 140);
  yachtLight.position.set(0,6,-55);
  scene.add(yachtLight);

  // STARS
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0;i<1800;i++){
    pos.push((Math.random()-0.5)*300, Math.random()*140, (Math.random()-0.5)*300);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:0.6})));

  document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
  document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  time += 0.01;

  // MOVEMENT (slightly heavier feel)
  let speed = 0.09;

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;

  // CAMERA (smooth follow + slight sway)
  camera.position.x += (player.position.x - camera.position.x)*0.05;
  camera.position.z += (player.position.z + 5 - camera.position.z)*0.05;
  camera.position.y = 2.5 + Math.sin(time)*0.04;

  camera.lookAt(player.position);

  checkTransition();
  renderer.render(scene,camera);
}

function checkTransition(){

  const dist = Math.hypot(player.position.x, player.position.z + 6);

  if(state === "lobby" && dist < 2.5){
    document.getElementById("prompt").style.display="block";
  } else {
    document.getElementById("prompt").style.display="none";
  }
}

function goDock(){

  document.getElementById("fade").style.opacity = 1;

  setTimeout(()=>{

    state = "dock";

    document.getElementById("zone").innerText = "ZONE: DOCK AREA";
    document.getElementById("state").innerText = "STATE: EXPLORATION";

    document.getElementById("fade").style.opacity = 0;

  },900);
}

</script>

</body>
</html>
