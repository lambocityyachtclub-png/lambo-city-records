<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — UE5 AAA ENGINE</title>
<style>
html, body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}
/* CANVAS */
#c{
position:fixed;
inset:0;
width:100%;
height:100%;
display:block;
z-index:1;
}
/* UI */
#ui{
position:fixed;
top:20px;
left:20px;
color:white;
z-index:50;
font-size:18px;
letter-spacing:2px;
pointer-events:none;
}
/* VIGNETTE */
#vignette{
position:fixed;
inset:0;
pointer-events:none;
z-index:20;
background:
radial-gradient(circle at center,
rgba(0,0,0,0) 35%,
rgba(0,0,0,0.82) 100%);
}
/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:100;
overflow:hidden;
}
/* BACKGROUND IMAGE */
#intro img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.88;
pointer-events:none;
}
/* DARK OVERLAY */
#intro::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
}
/* BUTTON */
#enter{
position:relative;
z-index:200;
padding:20px 44px;
font-size:20px;
letter-spacing:4px;
color:white;
background:rgba(0,0,0,0.55);
border:2px solid #00aaff;
cursor:pointer;
transition:0.25s;
}
#enter:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00aaff;
}
</style>
</head>
<body>
<div id="intro">
<img src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enter">
ENTER LAMBO CITY
</button>
</div>
<div id="ui">
LAMBO CITY — UE5 AAA ENGINE
</div>
<div id="vignette"></div>
<canvas id="c"></canvas>
<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<!-- POST FX -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
/////////////////////////////////////////////////////
// STATE
/////////////////////////////////////////////////////
let mode = "intro";
let t = 0;
let introTime = 0;
/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050814);
scene.fog = new THREE.FogExp2(
0x050814,
0.0014
);
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
8000
);
camera.position.set(0,40,140);
const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(
window.innerWidth,
window.innerHeight
);
renderer.setPixelRatio(
Math.min(window.devicePixelRatio,2)
);
renderer.toneMapping =
THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace =
THREE.SRGBColorSpace;
/////////////////////////////////////////////////////
// POST PROCESSING
/////////////////////////////////////////////////////
const composer =
new THREE.EffectComposer(renderer);
const renderPass =
new THREE.RenderPass(scene,camera);
composer.addPass(renderPass);
const bloomPass =
new THREE.UnrealBloomPass(
new THREE.Vector2(
window.innerWidth,
window.innerHeight
),
1.2,
0.7,
0.15
);
composer.addPass(bloomPass);
/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////
const ambient =
new THREE.AmbientLight(
0x6fa6c8,
0.3
);
scene.add(ambient);
const sun =
new THREE.DirectionalLight(
0xfff1d6,
3.5
);
sun.position.set(250,300,150);
scene.add(sun);
const oceanGlow =
new THREE.PointLight(
0x00aaff,
2.5,
1400
);
oceanGlow.position.set(
0,
30,
-120
);
scene.add(oceanGlow);
/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////
const player =
new THREE.Mesh(
new THREE.BoxGeometry(2,4,2),
new THREE.MeshStandardMaterial({
color:0xffffff,
emissive:0x222222
})
);
player.position.set(0,2,20);
scene.add(player);
/////////////////////////////////////////////////////
// CONTROLS
/////////////////////////////////////////////////////
const keys = {};
window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});
window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});
let vel = new THREE.Vector3();
const speed = 0.13;
const friction = 0.86;
function move(){
let x = 0;
let z = 0;
if(keys.w) z -= 1;
if(keys.s) z += 1;
if(keys.a) x -= 1;
if(keys.d) x += 1;
const len = Math.hypot(x,z);
if(len > 0){
x /= len;
z /= len;
}
vel.x += x * speed;
vel.z += z * speed;
vel.multiplyScalar(friction);
player.position.x += vel.x;
player.position.z += vel.z;
}
/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////
const camVel = new THREE.Vector3();
function updateCamera(){
const target = new THREE.Vector3(
player.position.x,
player.position.y + 32,
player.position.z + 105
);
camVel.x += (target.x - camera.position.x) * 0.055;
camVel.y += (target.y - camera.position.y) * 0.055;
camVel.z += (target.z - camera.position.z) * 0.055;
camVel.multiplyScalar(0.82);
camera.position.add(camVel);
camera.lookAt(player.position);
}
/////////////////////////////////////////////////////
// WATER
/////////////////////////////////////////////////////
const water =
new THREE.Mesh(
new THREE.PlaneGeometry(9000,9000),
new THREE.MeshStandardMaterial({
color:0x08293d,
metalness:0.8,
roughness:0.25
})
);
water.rotation.x = -Math.PI/2;
water.position.z = -200;
scene.add(water);
/////////////////////////////////////////////////////
// BEACH
/////////////////////////////////////////////////////
const beach =
new THREE.Mesh(
new THREE.PlaneGeometry(2200,1200),
new THREE.MeshStandardMaterial({
color:0xcbb27a
})
);
beach.rotation.x = -Math.PI/2;
beach.position.set(0,-0.2,200);
scene.add(beach);
/////////////////////////////////////////////////////
// DOCK
/////////////////////////////////////////////////////
const dock =
new THREE.Mesh(
new THREE.BoxGeometry(40,1,260),
new THREE.MeshStandardMaterial({
color:0x4a2f1d
})
);
dock.position.set(0,0.5,-40);
scene.add(dock);
/////////////////////////////////////////////////////
// STAGE
/////////////////////////////////////////////////////
const stage =
new THREE.Mesh(
new THREE.CylinderGeometry(
50,
50,
3,
64
),
new THREE.MeshStandardMaterial({
color:0x111111,
emissive:0x002244,
emissiveIntensity:2
})
);
stage.position.set(0,2,-180);
scene.add(stage);
/////////////////////////////////////////////////////
// CABINS
/////////////////////////////////////////////////////
for(let i=0;i<6;i++){
const cabin =
new THREE.Mesh(
new THREE.BoxGeometry(18,10,18),
new THREE.MeshStandardMaterial({
color:0x333333
})
);
cabin.position.set(
-50,
5,
-20 - i*36
);
scene.add(cabin);
const cabin2 = cabin.clone();
cabin2.position.x = 50;
scene.add(cabin2);
}
/////////////////////////////////////////////////////
// STARS
/////////////////////////////////////////////////////
const starsGeo =
new THREE.BufferGeometry();
const starArr = [];
for(let i=0;i<2000;i++){
starArr.push(
(Math.random()-0.5)*5000,
Math.random()*1800,
(Math.random()-0.5)*5000
);
}
starsGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starArr,3)
);
const stars =
new THREE.Points(
starsGeo,
new THREE.PointsMaterial({
color:0xffffff,
size:2
})
);
scene.add(stars);
/////////////////////////////////////////////////////
// ATMOSPHERE
/////////////////////////////////////////////////////
function updateAtmosphere(){
t += 0.0012;
const day = Math.sin(t);
ambient.intensity =
0.2 + (1-day)*0.45;
sun.intensity =
2.2 + day*1.5;
scene.fog.color =
new THREE.Color(
0.02 + day*0.05,
0.06 + day*0.08,
0.12 + day*0.14
);
water.material.color.setRGB(
0.01 + day*0.03,
0.08,
0.12 + day*0.05
);
bloomPass.strength =
1.0 + day*0.5;
}
/////////////////////////////////////////////////////
// OCEAN MOTION
/////////////////////////////////////////////////////
function updateOcean(){
water.position.x =
Math.sin(t*1.2)*3;
water.position.z =
-200 + Math.cos(t*1.1)*3;
}
/////////////////////////////////////////////////////
// CINEMATIC INTRO
/////////////////////////////////////////////////////
function cinematicIntro(){
introTime += 0.016;
if(introTime < 6){
camera.position.lerp(
new THREE.Vector3(
Math.sin(introTime*0.4)*180,
55,
150 - introTime*28
),
0.05
);
camera.lookAt(0,0,-120);
}
else if(introTime < 12){
camera.position.lerp(
new THREE.Vector3(
0,
40,
70 - (introTime-6)*35
),
0.05
);
camera.lookAt(0,0,-40);
}
else if(introTime < 18){
camera.position.lerp(
new THREE.Vector3(
0,
45,
-40 - (introTime-12)*42
),
0.05
);
camera.lookAt(0,0,-180);
}
else{
mode = "play";
}
}
/////////////////////////////////////////////////////
// ENTER BUTTON FIX
/////////////////////////////////////////////////////
const enterBtn =
document.getElementById("enter");
enterBtn.addEventListener("click",()=>{
document.getElementById("intro").style.display = "none";
mode = "cinematic";
introTime = 0;
});
/////////////////////////////////////////////////////
// RESIZE
/////////////////////////////////////////////////////
window.addEventListener("resize",()=>{
camera.aspect =
window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(
window.innerWidth,
window.innerHeight
);
composer.setSize(
window.innerWidth,
window.innerHeight
);
});
/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////
function animate(){
requestAnimationFrame(animate);
if(mode === "cinematic"){
cinematicIntro();
}
if(mode === "play"){
move();
updateCamera();
updateAtmosphere();
updateOcean();
}
composer.render();
}
animate();
</script>
</body>
</html>
