<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | 3D ENGINE</title>

<style>
body { margin: 0; overflow: hidden; background: black; }

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    font-size: 12px;
    z-index: 10;
    opacity: 0.7;
}

/* UI BUTTONS */
#ui {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 10;
}

button {
    margin: 4px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid white;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // 3D ENGINE ACTIVE</div>

<div id="ui">
    <button onclick="go('city')">CITY</button>
    <button onclick="go('yacht')">YACHT</button>
    <button onclick="go('store')">STORE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🎮 BASIC 3D ENGINE SETUP
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

/* =========================
   🌍 ZONES (3D ROOMS)
========================= */
const zones = {};

function createZone(color, x) {
    const geo = new THREE.BoxGeometry(20, 10, 20);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = x;
    scene.add(mesh);
    return mesh;
}

zones.city = createZone(0x3a1f0a, 0);
zones.yacht = createZone(0x0a1a3a, 30);
zones.store = createZone(0x3a0a0a, -30);

/* CAMERA START */
camera.position.z = 10;

/* =========================
   🎮 WORLD NAVIGATION
========================= */
function go(zone) {

    if (zone === "city") {
        camera.position.x = 0;
    }

    if (zone === "yacht") {
        camera.position.x = 30;
    }

    if (zone === "store") {
        camera.position.x = -30;
    }
}

/* =========================
   🧠 MOUSE LOOK (GTA FEEL)
========================= */
let mouseX = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
});

/* =========================
   🎮 ANIMATION LOOP
========================= */
function animate() {

    requestAnimationFrame(animate);

    camera.position.y = 2;
    camera.rotation.y = mouseX * 0.2;

    renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
