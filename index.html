<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — BULLETPROOF BUILD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:999;
}

#enter{
padding:18px 40px;
font-size:20px;
border:2px solid #00aaff;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
letter-spacing:3px;
}

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="intro">
<button id="enter">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY — BULLETPROOF ENGINE</div>

<canvas id="c"></canvas>

<!-- ✅ OLD SCHOOL STABLE THREE.JS (NO MODULE ISSUES) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

let mode = "intro";

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814, 0.0014);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 6000);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth, innerHeight);

/* POST FX */
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloom = new THREE.UnrealBloomPass(
new THREE.Vector2(innerWidth, innerHeight),
1.2, 0.6, 0.2
);
composer.addPass(bloom);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0x6fa6c8, 0.3));

const sun = new THREE.DirectionalLight(0xffffff, 3);
sun.position.set(200,300,150);
scene.add(sun);

/* PLAYER */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

let vel = new THREE.Vector3();
const keys = {};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
let x=0,z=0;
if(keys.w) z-=1;
if(keys.s) z+=1;
if(keys.a) x-=1;
if(keys.d) x+=1;

let len=Math.hypot(x,z);
if(len>0){x/=len;z/=len;}

vel.x += x*0.14;
vel.z += z*0.14;

vel.multiplyScalar(0.86);
player.position.add(vel);
}

/* CAMERA */
function cam(){
camera.position.x += (player.position.x - camera.position.x)*0.06;
camera.position.y += ((player.position.y+30) - camera.position.y)*0.06;
camera.position.z += ((player.position.z+90) - camera.position.z)*0.06;
camera.lookAt(player.position);
}

/* WORLD */
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({color:0x08293d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* FIXED BUTTON */
window.onload = () => {
document.getElementById("enter").onclick = () => {
document.getElementById("intro").style.display = "none";
mode = "play";
};
};

/* RESIZE FIX */
addEventListener("resize", () => {
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
composer.setSize(innerWidth, innerHeight);
});

/* LOOP */
function animate(){
requestAnimationFrame(animate);

if(mode==="play"){
move();
cam();
}

composer.render();
}

animate();

</script>

</body>
</html>
