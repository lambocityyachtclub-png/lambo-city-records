<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — FIXED START BUILD</title>

<style>
body { margin:0; overflow:hidden; background:#050814; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY — FIX FIX PATCH</div>
<div id="zone">LOADING WORLD...</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1020);
scene.fog = new THREE.FogExp2(0x0a1020, 0.0012); // 🔥 FIXED (less fog = visible world)

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 10000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (BOOSTED VISIBILITY FIX)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 1.2));

const sun = new THREE.DirectionalLight(0xaaccff, 1.5);
sun.position.set(200,300,200);
scene.add(sun);

const glow = new THREE.PointLight(0x00ccff, 2, 1500);
glow.position.set(0,50,0);
scene.add(glow);

/////////////////////////////////////////////////////
// WORLD ANCHOR (DEBUG FIX - YOU MUST SEE THIS)
/////////////////////////////////////////////////////

const anchor = new THREE.Mesh(
new THREE.BoxGeometry(5,5,5),
new THREE.MeshStandardMaterial({color:0xff0000})
);
anchor.position.set(0,5,0);
scene.add(anchor);

/////////////////////////////////////////////////////
// PLAYER / CAR START FIX
/////////////////////////////////////////////////////

const car = new THREE.Mesh(
new THREE.BoxGeometry(3,1,6),
new THREE.MeshStandardMaterial({color:0xffcc00})
);

car.position.set(0,2,0); // 🔥 CENTERED START (FIX)
scene.add(car);

/////////////////////////////////////////////////////
// ISLAND (VISIBLE POSITION FIX)
/////////////////////////////////////////////////////

const island = new THREE.Mesh(
new THREE.CylinderGeometry(300,300,40,32),
new THREE.MeshStandardMaterial({color:0x1f3b1f})
);
island.position.y = -10;
scene.add(island);

/////////////////////////////////////////////////////
// OCEAN (VISIBLE UNDER ISLAND)
/////////////////////////////////////////////////////

const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({
color:0x061a2b
})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -12;
scene.add(ocean);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// CAMERA FIX (FORCE LOOK AT START)
/////////////////////////////////////////////////////

camera.position.set(0,20,30);
camera.lookAt(0,0,0); // 🔥 CRITICAL FIX

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
if(keys.w) car.position.z -= 0.4;
if(keys.s) car.position.z += 0.4;
if(keys.a) car.position.x -= 0.4;
if(keys.d) car.position.x += 0.4;
}

/////////////////////////////////////////////////////
// CAMERA FOLLOW FIX
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (car.position.x - camera.position.x)*0.08;
camera.position.y += ((car.position.y + 15) - camera.position.y)*0.08;
camera.position.z += ((car.position.z + 25) - camera.position.z)*0.08;

camera.lookAt(car.position);
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);

move();
updateCamera();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
