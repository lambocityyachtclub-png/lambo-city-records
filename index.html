<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — CHARACTER SYSTEM V2</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0;
  background:black; color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute; top:20px; left:20px;
  color:white; font-size:13px;
}

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white;
  padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}

#status {
  position:absolute; top:20px; right:20px;
  color:gold;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">🏠 Cabin → 🌉 Dock → 🎤 Stage → 💼 VIP → 🚤 Yacht</div>
<div id="msg">I brought you here.</div>
<div id="status">STATUS: VISITOR</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= SCENE =================
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));
let light = new THREE.PointLight(0x00aaff,2);
light.position.set(0,5,5);
scene.add(light);

// ================= INPUT =================
let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= HERO CHECK =================
let isHero = window.location.search.includes("hero=true");

// ================= PLAYER =================
let playerMaterial = new THREE.MeshStandardMaterial({color:0xffffff});

let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  playerMaterial
);
scene.add(player);

// ================= CHARACTER SYSTEM =================
let character = {
  rank: "visitor", // visitor → performer → vip → hero
  aura: null,
  color: 0xffffff
};

// ================= VISUAL UPDATE SYSTEM =================
function updateCharacterVisuals(){

  if(isHero){
    character.rank = "hero";
    character.color = 0x000000;
    character.aura = 0xffd700;
    document.getElementById("status").innerText = "STATUS: HERO";
  }

  if(character.rank === "visitor"){
    character.color = 0xffffff;
    character.aura = null;
    document.getElementById("status").innerText = "STATUS: VISITOR";
  }

  if(character.rank === "performer"){
    character.color = 0x00aaff;
    character.aura = 0x00ffff;
    document.getElementById("status").innerText = "STATUS: PERFORMER";
  }

  if(character.rank === "vip"){
    character.color = 0xffd700;
    character.aura = 0xffd700;
    document.getElementById("status").innerText = "STATUS: VIP MEMBER";
  }

  playerMaterial.color.setHex(character.color);
}

// ================= AURA OBJECT =================
let aura = new THREE.PointLight(0xffffff,0,10);
scene.add(aura);

// ================= START =================
function start(){
  document.getElementById("start").style.display="none";
  player.position.set(-35,0.5,20);
  updateCharacterVisuals();
}

// ================= WORLD =================

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(900,900),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<4000;i++){
  arr.push((Math.random()-0.5)*900,Math.random()*300,(Math.random()-0.5)*900);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));

let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(240,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// CABINS
function cabin(x,z){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,10),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  c.position.set(x,2.5,z);
  scene.add(c);
}

for(let i=0;i<5;i++){
  cabin(-35,-20-(i*30));
  cabin(35,-20-(i*30));
}

// STAGE
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(22,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// VIP ZONE
let vipZone = new THREE.Mesh(
  new THREE.BoxGeometry(22,1,20),
  new THREE.MeshStandardMaterial({color:0x001f2f})
);
vipZone.position.set(-30,0,-120);
scene.add(vipZone);

// YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(50,6,22),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-350);
scene.add(yacht);

// ================= LOOP =================
let hasPerformer=false;
let hasVIP=false;

function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z-=0.15;
if(keys["s"]) player.position.z+=0.15;
if(keys["a"]) player.position.x-=0.15;
if(keys["d"]) player.position.x+=0.15;

// ================= PROGRESSION =================

// STAGE → PERFORMER
if(player.position.distanceTo(stage.position)<6 && !hasPerformer){
  hasPerformer = true;
  character.rank = "performer";
  updateCharacterVisuals();
  document.getElementById("msg").innerText = "You got something? This is your shot.";
}

// VIP ZONE → VIP
if(player.position.distanceTo(vipZone.position)<8 && hasPerformer){
  hasVIP = true;
  character.rank = "vip";
  updateCharacterVisuals();
  document.getElementById("msg").innerText = "Connections start here.";
}

// ================= AURA SYSTEM =================
if(character.aura){
  aura.position.set(player.position.x,player.position.y+2,player.position.z);
  aura.color.setHex(character.aura);
  aura.intensity = 1.5;
} else {
  aura.intensity = 0;
}

// ================= CAMERA =================
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (4-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.05;
camera.lookAt(player.position);

// ================= ATMOSPHERE =================
stars.rotation.y += 0.0005;
water.position.z = Math.sin(Date.now()*0.001)*1;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
