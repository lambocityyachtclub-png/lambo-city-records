<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — RESET</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY — RESET MODE</div>
<div id="prompt">MOVE TO EXPLORE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,6);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0x1a2a3a, 1));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// SIMPLE FLOOR
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x111122})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// SIMPLE OBJECT (yacht placeholder)
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(10,2,10),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,1,-20);
scene.add(yacht);

// INPUT
let keys = {};

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z -= 0.1;
if(keys["s"]) player.position.z += 0.1;
if(keys["a"]) player.position.x -= 0.1;
if(keys["d"]) player.position.x += 0.1;

// CAMERA FOLLOW
camera.position.x += (player.position.x - camera.position.x)*0.05;
camera.position.z += (player.position.z + 6 - camera.position.z)*0.05;
camera.lookAt(player.position);

// UI DISTANCE CHECK
let dist = player.position.distanceTo(yacht.position);

document.getElementById("prompt").style.display = dist < 12 ? "block" : "none";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
