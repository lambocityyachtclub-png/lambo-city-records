<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY - OCEAN WORLD</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* UI LAYER */
#ui {
  position: absolute;
  z-index: 10;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* ENTRY */
#home {
  position: absolute;
  width: 100%;
  height: 100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: rgba(0,0,0,0.5);
  pointer-events: auto;
}

#enterBtn {
  padding: 14px 26px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* HUD */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.85;
}

/* BUTTONS */
button {
  padding: 10px;
  background: black;
  border: 1px solid gold;
  color: white;
  cursor: pointer;
  margin-right: 5px;
  pointer-events: auto;
}

/* VIP */
#vip {
  display:none;
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.95);
  z-index: 20;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<!-- THREE.JS CANVAS -->
<canvas id="c"></canvas>

<!-- UI -->
<div id="ui">

  <!-- ENTRY -->
  <div id="home">
    <h1>LAMBO CITY</h1>
    <button id="enterBtn" onclick="enterWorld()">ENTER WORLD</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="status">Ocean systems offline</div>
    <button onclick="openVIP()">VIP</button>
    <button onclick="toggleAudio()">RADIO</button>
  </div>

  <!-- VIP -->
  <div id="vip">
    <button onclick="closeVIP()" style="position:absolute;top:20px;right:20px;">EXIT VIP</button>
    <h1>YACHT CLUB</h1>
  </div>

</div>

<!-- AUDIO -->
<audio id="radio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== THREE.JS OCEAN WORLD =====
let scene, camera, renderer, water, time = 0;

function initOcean() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 10, 20);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("c"),
    alpha: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);

  // WATER PLANE
  const geometry = new THREE.PlaneGeometry(200, 200, 100, 100);

  const material = new THREE.MeshBasicMaterial({
    color: 0x001a33,
    wireframe: true
  });

  water = new THREE.Mesh(geometry, material);
  water.rotation.x = -Math.PI / 2;

  scene.add(water);

  animate();
}

function animate() {

  requestAnimationFrame(animate);

  time += 0.02;

  // wave motion
  const vertices = water.geometry.attributes.position.array;

  for (let i = 0; i < vertices.length; i += 3) {
    vertices[i + 2] = Math.sin((i + time) * 0.1) * 1.5;
  }

  water.geometry.attributes.position.needsUpdate = true;

  camera.position.x = Math.sin(time * 0.2) * 5;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

// ===== GAME SYSTEM =====

function enterWorld() {
  document.getElementById("home").style.display = "none";
  document.getElementById("status").innerText = "Ocean systems online";

  initOcean();

  document.getElementById("radio").play().catch(()=>{});
}

function openVIP() {
  document.getElementById("vip").style.display = "block";
}

function closeVIP() {
  document.getElementById("vip").style.display = "none";
}

function toggleAudio() {
  let audio = document.getElementById("radio");
  if (audio.paused) audio.play();
  else audio.pause();
}

</script>

</body>
</html>
