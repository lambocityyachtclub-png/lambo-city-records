<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V28 — AAA ENGINE MODE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui,#zone{
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui{top:20px;left:20px;}
#zone{top:20px;right:20px;color:#00ffff;}
</style>
</head>

<body>

<div id="ui">LAMBO CITY V28 — GAME ENGINE MODE</div>
<div id="zone">ZONE: BOOTING</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// ENGINE CORE STATE SYSTEM
/////////////////////////////////////////////////////

const GAME = {
mode: "walk",
speed: 0.35,
cameraLerp: 0.06
};

/////////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1a2e);
scene.fog = new THREE.Fog(0x0a1220, 80, 700);

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 10000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING SYSTEM
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x556677, 0.9));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(200,400,150);
scene.add(sun);

/////////////////////////////////////////////////////
// INPUT SYSTEM (ENGINE LEVEL)
/////////////////////////////////////////////////////

const keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

/////////////////////////////////////////////////////
// PLAYER SYSTEM
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,40);
scene.add(player);

/////////////////////////////////////////////////////
// WORLD SYSTEM (YOUR FULL LAYOUT RESTORED)
/////////////////////////////////////////////////////

function cabin(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(18,1,18),
new THREE.MeshStandardMaterial({color:0x2b2b2b})
);

const house = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);
house.position.y = 5;

g.add(base);
g.add(house);

g.position.set(x,0,z);
scene.add(g);
}

for(let i=0;i<6;i++){
cabin(-45,-20-i*35);
cabin(45,-20-i*35);
}

const dock = new THREE.Mesh(
new THREE.BoxGeometry(22,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({
color:0x000000,
emissive:0x0044ff,
emissiveIntensity:2
})
);
screen.position.set(0,18,-185);
scene.add(screen);

/////////////////////////////////////////////////////
// OCEAN SYSTEM (ENGINE ANIMATED)
/////////////////////////////////////////////////////

const oceanGeo = new THREE.PlaneGeometry(5000,5000,100,100);
const oceanMat = new THREE.MeshStandardMaterial({
color:0x061a2b,
metalness:0.4,
roughness:0.9
});

const ocean = new THREE.Mesh(oceanGeo,oceanMat);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -2;
scene.add(ocean);

const oceanPos = ocean.geometry.attributes.position;
const oceanBase = [];

for(let i=0;i<oceanPos.count;i++){
oceanBase.push({
x:oceanPos.getX(i),
z:oceanPos.getZ(i)
});
}

/////////////////////////////////////////////////////
// YACHT SYSTEM (MOVING ENTITY)
/////////////////////////////////////////////////////

const yacht = new THREE.Group();

const hull = new THREE.Mesh(
new THREE.BoxGeometry(20,2,60),
new THREE.MeshStandardMaterial({color:0xffffff})
);
hull.position.y = 1;

const cabinY = new THREE.Mesh(
new THREE.BoxGeometry(10,4,20),
new THREE.MeshStandardMaterial({color:0x222222})
);
cabinY.position.y = 5;

yacht.add(hull);
yacht.add(cabinY);
yacht.position.set(60,0,-120);
scene.add(yacht);

/////////////////////////////////////////////////////
// CAMERA SYSTEM (ENGINE FIXED)
/////////////////////////////////////////////////////

camera.position.set(0,22,35);

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*GAME.cameraLerp;
camera.position.y += ((player.position.y + 12) - camera.position.y)*GAME.cameraLerp;
camera.position.z += ((player.position.z + 25) - camera.position.z)*GAME.cameraLerp;

camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT SYSTEM
/////////////////////////////////////////////////////

function move(){

let speed = GAME.speed;

if(keys.w) player.position.z -= speed;
if(keys.s) player.position.z += speed;
if(keys.a) player.position.x -= speed;
if(keys.d) player.position.x += speed;
}

/////////////////////////////////////////////////////
// ENGINE SYSTEMS
/////////////////////////////////////////////////////

function updateOcean(t){
for(let i=0;i<oceanPos.count;i+=2){
const v = oceanBase[i];
oceanPos.setY(i,
Math.sin(v.x*0.02 + t)*0.8 +
Math.cos(v.z*0.02 + t*1.2)*0.8
);
}
oceanPos.needsUpdate = true;
}

function updateYacht(t){
yacht.position.z += Math.sin(t*0.5)*0.05;
yacht.position.x += Math.cos(t*0.3)*0.03;
}

/////////////////////////////////////////////////////
// ZONE SYSTEM
/////////////////////////////////////////////////////

function updateZone(){
let z = "DOCK CENTER";
if(player.position.z < -120) z = "STAGE AREA";
if(player.position.x > 40) z = "RIGHT CABINS";
if(player.position.x < -40) z = "LEFT CABINS";

document.getElementById("zone").innerText = "ZONE: " + z;
}

/////////////////////////////////////////////////////
// ENGINE LOOP (SEPARATED SYSTEMS)
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

const t = performance.now()*0.001;

move();
updateCamera();
updateOcean(t);
updateYacht(t);
updateZone();

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
