<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LUXURY WORLD CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
position:absolute;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LOADING LUXURY WORLD...</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

let started = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x070814, 0.012);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"), antialias:true});
renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (LUXURY LOOK)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const mainLight = new THREE.PointLight(0x66ccff, 1.5, 250);
mainLight.position.set(0,40,40);
scene.add(mainLight);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,-30);
scene.add(player);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.y += ((player.position.y+8) - camera.position.y)*0.08;
camera.position.z += ((player.position.z+14) - camera.position.z)*0.08;
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function move(){
if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (LUXURY VERSION - CLEAN CORE)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(1500, 1500, 80, 80);

const waterMat = new THREE.MeshStandardMaterial({
  color: 0x021428,
  metalness: 0.9,
  roughness: 0.25,
  emissive: 0x001122,
  emissiveIntensity: 0.4
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
scene.add(water);

// STORE VERTEX DATA (for wave animation)
const waterPos = water.geometry.attributes.position;
const waterBase = [];

for (let i = 0; i < waterPos.count; i++) {
  waterBase.push({
    x: waterPos.getX(i),
    z: waterPos.getZ(i)
  });
}
/////////////////////////////////////////////////////
// 🌌 ATMOSPHERE PACK (LUXURY WORLD DEPTH)
/////////////////////////////////////////////////////

// 🌫️ IMPROVED FOG (gives distance + scale)
scene.fog = new THREE.FogExp2(0x070b1a, 0.008);

// 🌌 STAR FIELD (SKY VISUAL DEPTH)
const starGeo = new THREE.BufferGeometry();
const starArr = [];

for (let i = 0; i < 600; i++) {

  starArr.push(
    (Math.random() - 0.5) * 2500,
    Math.random() * 900,
    (Math.random() - 0.5) * 2500
  );

}

starGeo.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(starArr, 3)
);

const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({
    color: 0xffffff,
    size: 1.2,
    transparent: true,
    opacity: 0.9
  })
);

scene.add(stars);

// 🌫️ SOFT AMBIENT FILL (fixes “too dark / flat” look)
const ambient = new THREE.AmbientLight(0x1a2a3a, 0.7);
scene.add(ambient);

// 🌙 SKY DEPTH LIGHT (adds cinematic blue tone)
const skyGlow = new THREE.HemisphereLight(
  0x4466ff,   // sky color
  0x0a0a0a,   // ground color
  0.6
);

scene.add(skyGlow);

// ✨ OPTIONAL: subtle world haze glow light
const hazeLight = new THREE.PointLight(0x3355ff, 0.4, 800);
hazeLight.position.set(0, 80, 0);
scene.add(hazeLight);
  
 /////////////////////////////////////////////////////
// 🌉 DOCK + LUXURY WALKWAY SYSTEM
/////////////////////////////////////////////////////

const dock = new THREE.Mesh(
  new THREE.CylinderGeometry(200, 200, 1, 64),
  new THREE.MeshStandardMaterial({
    color: 0x111111,
    metalness: 0.4,
    roughness: 0.6
  })
);

dock.position.set(0, 0.1, -80);
scene.add(dock);

// WALKWAY TO VILLAS
const walkway = new THREE.Mesh(
  new THREE.BoxGeometry(6, 0.5, 200),
  new THREE.MeshStandardMaterial({
    color: 0x0a0a0a,
    emissive: 0x001122,
    emissiveIntensity: 0.2
  })
);

walkway.position.set(0, 0.25, -60);
scene.add(walkway);

// WALKWAY TO YACHT
const yachtPath = new THREE.Mesh(
  new THREE.BoxGeometry(4, 0.5, 120),
  new THREE.MeshStandardMaterial({
    color: 0x0a0a0a,
    emissive: 0x002244,
    emissiveIntensity: 0.3
  })
);

yachtPath.position.set(20, 0.25, -80);
scene.add(yachtPath);
  
/////////////////////////////////////////////////////
// 🏡 LUXURY VILLA (FIXED — MULTI LEVEL)
/////////////////////////////////////////////////////
const villas = [];

function createVilla(x,z){

const villa = new THREE.Group();

const base = new THREE.Mesh(

new THREE.BoxGeometry(16,1,16),

new THREE.MeshStandardMaterial({color:0x0f0f0f})

);

base.position.y = 0.5;

villa.add(base);

const floor1 = new THREE.Mesh(

new THREE.BoxGeometry(16,5,16),

new THREE.MeshStandardMaterial({color:0x151515})

);

floor1.position.y = 3;

villa.add(floor1);

const floor2 = new THREE.Mesh(

new THREE.BoxGeometry(14,4,14),

new THREE.MeshStandardMaterial({color:0x101010})

);

floor2.position.y = 7.5;

villa.add(floor2);

const roof = new THREE.Mesh(

new THREE.BoxGeometry(17,1,17),

new THREE.MeshStandardMaterial({color:0x0a0a0a})

);

roof.position.y = 10;

villa.add(roof);

// BALCONY (IMPORTANT LUXURY FEEL)

const balcony = new THREE.Mesh(

new THREE.BoxGeometry(22,0.4,6),

new THREE.MeshStandardMaterial({color:0x222222})

);

balcony.position.set(0,4,10);

villa.add(balcony);

// GLASS RAIL

const rail = new THREE.Mesh(

new THREE.BoxGeometry(22,1.2,0.2),

new THREE.MeshStandardMaterial({

color:0x88ccff,

transparent:true,

opacity:0.3

})

);

rail.position.set(0,5,13);

villa.add(rail);

// FRONT GLASS

const glass = new THREE.Mesh(

new THREE.BoxGeometry(10,3,0.2),

new THREE.MeshStandardMaterial({

color:0x99ddff,

transparent:true,

opacity:0.35

})

);

glass.position.set(0,3,7.5);

villa.add(glass);

// LIGHT GLOW

const light = new THREE.PointLight(0x66ccff,1.2,30);

light.position.set(0,6,0);

villa.add(light);

villa.position.set(x,0,z);

scene.add(villa);

villas.push(villa);

}

for(let i=0;i<6;i++){

createVilla(-25,-20-i*25);

createVilla(25,-20-i*25);

}


/////////////////////////////////////////////////////
// 🚤 YACHT (SIMPLE CLEAN)
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
new THREE.BoxGeometry(16,4,45),
new THREE.MeshStandardMaterial({color:0xf2f2f2})
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({
color:0x00ffff,
emissive:0x00ffff
})
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
hint.style.display="block";
hint.innerText=t;
}

function hide(){
hint.style.display="none";
}

/////////////////////////////////////////////////////
// INTERACTIONS
/////////////////////////////////////////////////////

function check(){
const d = player.position.distanceTo(hero.position);
if(d<3) show("PRESS E TO TALK");
else hide();
}

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
if(player.position.distanceTo(hero.position)<3){
document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY";
}
}
});

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  /////////////////////////////////////////////////////
  // 🌊 OCEAN WAVE SYSTEM (CLEAN + STABLE)
  /////////////////////////////////////////////////////

  const time = Date.now() * 0.001;

  for (let i = 0; i < waterPos.count; i++) {

    const v = waterBase[i];

    const wave =
      Math.sin(v.x * 0.02 + time) * 0.4 +
      Math.cos(v.z * 0.02 + time * 1.3) * 0.4;

    waterPos.setY(i, wave);
  }

  waterPos.needsUpdate = true;

  /////////////////////////////////////////////////////
  // 🎥 RENDER FRAME
  /////////////////////////////////////////////////////

  renderer.render(scene, camera);
}

animate();
