<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | LIVING WORLD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* GLOBAL FADE */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 1;
    transition: 1s ease;
    z-index: 99;
}

/* WORLD CONTAINER */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* PORTAL */
#portal {
    background: radial-gradient(circle, #111, #000);
}

/* CITY */
#city {
    background: radial-gradient(circle at top, #111, #000);
}

/* VIP */
#vip {
    background: black;
}

.title {
    font-size: 34px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

button {
    margin: 10px;
    padding: 12px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}

iframe {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- PORTAL -->
<div id="portal" class="screen">
    <div class="title">LAMBO CITY GATE</div>
    <button onclick="enterCity()">ENTER CITY</button>
</div>

<!-- CITY -->
<div id="city" class="screen">
    <div class="title">LAMBO CITY</div>
    <button onclick="goVip()">YACHT CLUB</button>
    <button onclick="goPortal()">EXIT WORLD</button>
</div>

<!-- VIP -->
<div id="vip" class="screen">
    <div class="title">YACHT CLUB VIP</div>

    <iframe
        src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
        allowfullscreen>
    </iframe>

    <button onclick="goCity()">BACK TO CITY</button>
</div>

<script>

let fade = document.getElementById("fade");

/* START WORLD */
window.onload = () => {
    setTimeout(() => {
        fade.style.opacity = "0";
        show("portal");
    }, 600);
};

/* WORLD ENGINE */
function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "flex";
}

/* TRANSITION WRAPPER */
function transition(callback) {
    fade.style.opacity = "1";

    setTimeout(() => {
        callback();
        fade.style.opacity = "0";
    }, 800);
}

/* NAVIGATION */
function enterCity() {
    transition(() => show("city"));
}

function goVip() {
    transition(() => show("vip"));
}

function goCity() {
    transition(() => show("city"));
}

function goPortal() {
    transition(() => show("portal"));
}

</script>

</body>
</html>
