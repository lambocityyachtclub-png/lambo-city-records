<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V36 — CINEMATIC WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui{
position:absolute;
top:20px;left:20px;
color:white;
font-family:Arial;
z-index:10;
}

/* INTRO SCREEN */
#introScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
transition:opacity 2s ease;
}

#introImage{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#enterButton{
position:relative;
z-index:2;

padding:20px 40px;
font-size:22px;

background:rgba(0,0,0,0.7);
border:2px solid #00aaff;
color:white;
cursor:pointer;
letter-spacing:4px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
<img id="introImage" src="DE9FC752-FFAA-4E55-A7BB-904416E4EA23.png">
<button id="enterButton">ENTER LAMBO CITY</button>
</div>

<div id="ui">LAMBO CITY V36 — CINEMATIC WORLD</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE ENGINE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(0x06131f, 0.0035);

const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 5000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("c"),
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

/////////////////////////////////////////////////////
// WORLD STATE
/////////////////////////////////////////////////////

let worldTime = 0;

/////////////////////////////////////////////////////
// LIGHTING
/////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0x7fa6b8, 1.2);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xa6d0ff, 1.4);
sun.position.set(120,220,80);
scene.add(sun);

const oceanLight = new THREE.PointLight(0x1ec8ff, 1.8, 1200);
oceanLight.position.set(0,30,-50);
scene.add(oceanLight);

const stageGlow = new THREE.PointLight(0x00aaff, 2.2, 900);
stageGlow.position.set(0,20,-150);
scene.add(stageGlow);

/////////////////////////////////////////////////////
// PLAYER
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

player.position.set(0,1,20);
scene.add(player);

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////////
// MOVE SYSTEM
/////////////////////////////////////////////////////

const velocity = new THREE.Vector3();
const acceleration = 0.015;
const friction = 0.86;
const maxSpeed = 0.45;

function move(){

let x=0,z=0;

if(keys.w) z -= 1;
if(keys.s) z += 1;
if(keys.a) x -= 1;
if(keys.d) x += 1;

let len = Math.sqrt(x*x+z*z);
if(len>0){ x/=len; z/=len; }

velocity.x += x * acceleration;
velocity.z += z * acceleration;

velocity.x *= friction;
velocity.z *= friction;

velocity.x = Math.max(-maxSpeed,Math.min(maxSpeed,velocity.x));
velocity.z = Math.max(-maxSpeed,Math.min(maxSpeed,velocity.z));

player.position.x += velocity.x;
player.position.z += velocity.z;

// WORLD LIMITS
player.position.x = Math.max(-350, Math.min(350, player.position.x));
player.position.z = Math.max(-450, Math.min(250, player.position.z));
}

/////////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////////

function updateCamera(){

const target = new THREE.Vector3(
player.position.x,
player.position.y + 35,
player.position.z + 90
);

camera.position.lerp(target,0.08);
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

// WATER
const water = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({color:0x0a2233})
);
water.rotation.x = -Math.PI/2;
water.position.z = -200;
scene.add(water);

// BEACH
const beach = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xc2b280})
);
beach.rotation.x = -Math.PI/2;
beach.position.set(0,-0.2,150);
scene.add(beach);

// DOCK
const dock = new THREE.Mesh(
new THREE.BoxGeometry(25,1,180),
new THREE.MeshStandardMaterial({color:0x4a321d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

// STAGE
const stage = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,2,64),
new THREE.MeshStandardMaterial({color:0x111111})
);
stage.position.set(0,1,-150);
scene.add(stage);

// JUMBOTRON
const screen = new THREE.Mesh(
new THREE.BoxGeometry(40,20,2),
new THREE.MeshStandardMaterial({color:0x0044ff})
);
screen.position.set(0,18,-185);
scene.add(screen);

// YACHT VIP GLOW
const vipGlow = new THREE.PointLight(0x00d5ff,4,300);
vipGlow.position.set(0,25,-120);
scene.add(vipGlow);

/////////////////////////////////////////////////////
// MOUNTAINS
/////////////////////////////////////////////////////

for(let i=0;i<12;i++){

const m = new THREE.Mesh(
new THREE.ConeGeometry(100,200,4),
new THREE.MeshStandardMaterial({color:0x111111})
);

m.position.set(
-1200 + i*220,
100,
-900
);

scene.add(m);
}

/////////////////////////////////////////////////////
// CABINS
/////////////////////////////////////////////////////

for(let i=0;i<6;i++){

let c1 = new THREE.Mesh(
new THREE.BoxGeometry(16,8,16),
new THREE.MeshStandardMaterial({color:0x333333})
);

c1.position.set(-45,4,-20-i*30);
scene.add(c1);

let c2 = c1.clone();
c2.position.x = 45;
scene.add(c2);
}

/////////////////////////////////////////////////////
// CONTROLS SYSTEM
/////////////////////////////////////////////////////

let introScreen = document.getElementById("introScreen");
let enterButton = document.getElementById("enterButton");

enterButton.onclick = ()=>{

introScreen.style.opacity = "0";

setTimeout(()=>{
introScreen.style.display = "none";
},2000);

};

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

move();
updateCamera();

worldTime += 0.01;

// ocean motion
water.position.x = Math.sin(worldTime*0.3)*2;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
