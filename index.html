<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | FINAL WORLD ENGINE</title>

<style>
body { margin: 0; overflow: hidden; background: black; font-family: Arial; }

/* HUD */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.7;
    z-index: 10;
}

/* UI */
#ui {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 10;
}

button {
    margin: 4px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid white;
    color: white;
    cursor: pointer;
}

/* FADE CAMERA FX */
#fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: 0.4s;
    z-index: 9;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="hud">LAMBO CITY // FINAL ENGINE ACTIVE</div>
<div id="fade"></div>

<div id="ui">
    <button onclick="travel('city')">CITY</button>
    <button onclick="travel('yacht')">YACHT</button>
    <button onclick="travel('store')">STORE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   🌍 ENGINE SETUP
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

/* =========================
   🏙 WORLD ZONES
========================= */
function zone(color, x) {
    const geo = new THREE.BoxGeometry(18, 8, 18);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = x;
    scene.add(mesh);
    return mesh;
}

const city = zone(0x3a1f0a, 0);
const yacht = zone(0x0a1a3a, 30);
const store = zone(0x3a0a0a, -30);

/* CAMERA */
camera.position.z = 12;
camera.position.y = 2;

/* =========================
   🎮 SMOOTH CAMERA SYSTEM
========================= */
let targetX = 0;

/* FIXED NAVIGATION (THIS WAS YOUR ISSUE) */
function travel(area) {

    document.getElementById("fade").style.opacity = "1";

    setTimeout(() => {

        if (area === "city") targetX = 0;
        if (area === "yacht") targetX = 30;
        if (area === "store") targetX = -30;

        document.getElementById("fade").style.opacity = "0";

    }, 300);
}

/* =========================
   🧠 MOUSE LOOK (GTA FEEL)
========================= */
let mouseX = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
});

/* =========================
   🎮 GAME LOOP (SMOOTH LERP)
========================= */
function animate() {
    requestAnimationFrame(animate);

    // smooth camera movement (FIXED GTA FEEL)
    camera.position.x += (targetX - camera.position.x) * 0.08;

    camera.position.y = 2;
    camera.rotation.y = mouseX * 0.25;

    renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
