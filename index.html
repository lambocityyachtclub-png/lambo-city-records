<script>

/////////////////////////////////////////////////////
// 1. CORE STATE (MUST COME FIRST)
/////////////////////////////////////////////////////

let mode = "walk";

const game = {
  score: 0,
  inBasketZone: false,
  inGolfZone: false,
  raceStart: null,
  bestLap: null
};

const keys = {};

/////////////////////////////////////////////////////
// 2. INPUT
/////////////////////////////////////////////////////

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/////////////////////////////////////////////////////
// 3. HELPERS
/////////////////////////////////////////////////////

function smooth(a,b,s){
  return a + (b - a) * s;
}

/////////////////////////////////////////////////////
// 4. PLAYER CONTROLS
/////////////////////////////////////////////////////

function move(){

const speed = 0.22;

if(mode === "walk"){

player.position.x += (keys.d ? speed : 0) - (keys.a ? speed : 0);
player.position.z += (keys.s ? speed : 0) - (keys.w ? speed : 0);

}

if(mode === "car"){

const carSpeed = 0.22;
const turn = 0.02;

car.position.x -= Math.sin(car.rotation.y) * carSpeed;
car.position.z -= Math.cos(car.rotation.y) * carSpeed;

if(keys.a) car.rotation.y += turn;
if(keys.d) car.rotation.y -= turn;

}

}

/////////////////////////////////////////////////////
// 5. CAMERA SYSTEM
/////////////////////////////////////////////////////

function updateCamera(){

let tx, ty, tz;

if(mode === "walk"){
tx = player.position.x;
ty = player.position.y + 7.2;
tz = player.position.z + 12;
}

if(mode === "car"){
tx = car.position.x + Math.sin(car.rotation.y) * -10;
ty = car.position.y + 5.5;
tz = car.position.z + Math.cos(car.rotation.y) * -10;
}

camera.position.x = smooth(camera.position.x, tx, 0.06);
camera.position.y = smooth(camera.position.y, ty, 0.06);
camera.position.z = smooth(camera.position.z, tz, 0.06);

camera.lookAt(mode === "walk" ? player.position : car.position);

}

/////////////////////////////////////////////////////
// 6. GAMEPLAY SYSTEMS
/////////////////////////////////////////////////////

function checkBasket(){
const d = player.position.distanceTo(court.position);
game.inBasketZone = d < 25;

if(game.inBasketZone){
document.getElementById("zone").innerText = "LAMBO CITY • BASKETBALL ZONE";
}
}

function checkGolf(){
const d = player.position.distanceTo(golf.position);
game.inGolfZone = d < 35;

if(game.inGolfZone){
document.getElementById("zone").innerText = "LAMBO CITY • GOLF RANGE";
}
}

function checkRace(){
if(player.position.z > 80 && !game.raceStart){
game.raceStart = performance.now();
document.getElementById("zone").innerText = "RACE STARTED";
}
}

function finishRace(){
if(player.position.z < 10 && game.raceStart){

const time = (performance.now() - game.raceStart) / 1000;

game.bestLap = (!game.bestLap || time < game.bestLap) ? time : game.bestLap;

document.getElementById("hint").style.display = "block";
document.getElementById("hint").innerText =
`LAP: ${time.toFixed(2)}s | BEST: ${game.bestLap.toFixed(2)}s`;

game.raceStart = null;

setTimeout(()=>{
document.getElementById("hint").style.display = "none";
},1500);

}
}

/////////////////////////////////////////////////////
// 7. INTERACTIONS
/////////////////////////////////////////////////////

document.addEventListener("keydown", e => {

if(e.key.toLowerCase() === "e"){

// CAR TOGGLE
const dist = player.position.distanceTo(car.position);

if(mode === "walk" && dist < 4){
mode = "car";
player.visible = false;
return;
}

if(mode === "car"){
mode = "walk";
player.visible = true;

player.position.set(
car.position.x + 2,
car.position.y,
car.position.z
);
}

// BASKET SCORE
if(game.inBasketZone){
const d = player.position.distanceTo(hero.position);
if(d < 3){
game.score++;

document.getElementById("hint").style.display = "block";
document.getElementById("hint").innerText =
"SCORE: " + game.score;

setTimeout(()=>hint.style.display="none",1000);
}
}

// GOLF ACTION
if(game.inGolfZone){
document.getElementById("hint").style.display = "block";
document.getElementById("hint").innerText =
"SWING READY (V17 SYSTEM)";
setTimeout(()=>hint.style.display="none",1200);
}

}

});

/////////////////////////////////////////////////////
// 8. LOOP (MASTER CONTROL)
/////////////////////////////////////////////////////

camera.position.set(0,8,12);

function animate(){

const time = performance.now() * 0.001;

// ocean (keep your existing one)
if(waterPos){
for(let i=0;i<waterPos.count;i++){
const v = waterBase[i];

waterPos.setY(i,
Math.sin(v.x * 0.012 + time) * 0.6 +
Math.cos(v.z * 0.012 + time * 1.1) * 0.6
);
}
waterPos.needsUpdate = true;
}

move();
updateCamera();

checkBasket();
checkGolf();
checkRace();
finishRace();

// NPC movement
for(let n of npcs){
n.position.x += Math.cos(n.userData.dir) * n.userData.speed;
n.position.z += Math.sin(n.userData.dir) * n.userData.speed;
n.userData.dir += (Math.random() - 0.5) * 0.01;
}

renderer.render(scene,camera);
requestAnimationFrame(animate);

}

animate();

</script>
