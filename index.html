<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — ENGINE v2</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
position:fixed;
inset:0;
display:block;
}

#ui{
position:fixed;
top:20px;
left:20px;
color:white;
z-index:10;
letter-spacing:2px;
}

#rep{
position:fixed;
top:50px;
left:20px;
color:white;
z-index:10;
}

#zone{
position:fixed;
top:80px;
left:20px;
color:#00aaff;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">LAMBO CITY ENGINE v2</div>
<div id="rep">Reputation: 0</div>
<div id="zone">Zone: Dock</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded",()=>{

/* =========================
STATE HUB
========================= */
const GameState = {
mode:"play",
rep:0,
zone:"Dock",
time:0,
yachtUnlocked:false
};

/* =========================
ENGINE CORE
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050714);
scene.fog = new THREE.FogExp2(0x050814,0.0012);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,10000);
camera.position.set(0,40,120);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("c"),
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0x88aacc,0.35));
const sun = new THREE.DirectionalLight(0xfff1d6,3.2);
sun.position.set(250,300,150);
scene.add(sun);

/* =========================
PLAYER
========================= */
const player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,1,20);
scene.add(player);

const keys = {};
let vel = new THREE.Vector3();

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
let x=0,z=0;
if(keys.w)z-=1;
if(keys.s)z+=1;
if(keys.a)x-=1;
if(keys.d)x+=1;

let len=Math.hypot(x,z);
if(len){x/=len;z/=len;}

vel.x += x*0.12;
vel.z += z*0.12;
vel.multiplyScalar(0.86);

player.position.add(vel);
}

/* =========================
CAMERA
========================= */
const camVel = new THREE.Vector3();

function cam(){
const target = new THREE.Vector3(
player.position.x,
player.position.y+30,
player.position.z+95
);

camVel.lerp(target.clone().sub(camera.position).multiplyScalar(0.06),0.85);
camera.position.add(camVel);
camera.lookAt(player.position);
}

/* =========================
WORLD BASE
========================= */

/* 🌊 OCEAN SYSTEM (NEW) */
const ocean = new THREE.Mesh(
new THREE.PlaneGeometry(12000,12000),
new THREE.MeshStandardMaterial({
color:0x062a3a,
metalness:0.7,
roughness:0.3
})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.z = -400;
scene.add(ocean);

/* DOCK */
const dock = new THREE.Mesh(
new THREE.BoxGeometry(40,1,260),
new THREE.MeshStandardMaterial({color:0x4a2f1d})
);
dock.position.set(0,0.5,-40);
scene.add(dock);

/* =========================
YACHT SYSTEM (NEW CORE FEATURE)
========================= */
const yachtZone = {
active:false,
radius:120
};

const yacht = new THREE.Group();

/* yacht body */
const hull = new THREE.Mesh(
new THREE.BoxGeometry(60,12,160),
new THREE.MeshStandardMaterial({
color:0xf1f1f1,
metalness:0.9,
roughness:0.2
})
);

hull.position.y = 8;
yacht.add(hull);

/* yacht cabin */
const cabin = new THREE.Mesh(
new THREE.BoxGeometry(40,15,70),
new THREE.MeshStandardMaterial({
color:0xdedede,
metalness:0.6,
roughness:0.25
})
);

cabin.position.set(0,22,-10);
yacht.add(cabin);

/* glow deck */
const yachtLight = new THREE.PointLight(0x00aaff,2,400);
yachtLight.position.set(0,30,0);
yacht.add(yachtLight);

/* initial placement (far ocean) */
yacht.position.set(0,0,-700);
scene.add(yacht);

/* =========================
ZONE DETECTION SYSTEM
========================= */
function updateZone(){
const d = player.position.distanceTo(yacht.position);

if(d < yachtZone.radius){
GameState.zone = "Yacht Deck";
yachtZone.active = true;
} else if(player.position.z < -200){
GameState.zone = "Ocean";
} else {
GameState.zone = "Dock";
}

document.getElementById("zone").innerText =
"Zone: " + GameState.zone;
}

/* =========================
YACHT UNLOCK SYSTEM
========================= */
function checkYachtUnlock(){
if(GameState.rep >= 30 && !GameState.yachtUnlocked){
GameState.yachtUnlocked = true;

/* move yacht closer when unlocked */
yacht.position.set(0,0,-500);

console.log("🚢 YACHT UNLOCKED");
}
}

/* =========================
PROGRESSION SYSTEM
========================= */
function addRep(amount){
GameState.rep += amount;

document.getElementById("rep").innerText =
"Reputation: " + GameState.rep;

checkYachtUnlock();
}

/* =========================
ATMOSPHERE UPGRADE
========================= */
function atmosphere(){
GameState.time += 0.01;

const wave = Math.sin(GameState.time);

/* ocean breathing motion */
ocean.position.x = wave * 2;
ocean.position.z = -400 + Math.cos(GameState.time)*2;

/* yacht float */
yacht.position.y = Math.sin(GameState.time*2)*1.5;

/* lighting shift */
scene.fog.color = new THREE.Color(
0.02 + wave*0.02,
0.06,
0.12 + wave*0.03
);
}

/* =========================
CAM LOOP
========================= */
function animate(){
requestAnimationFrame(animate);

move();
cam();
updateZone();
atmosphere();

renderer.render(scene,camera);
}
animate();

/* =========================
TEST REPUTATION GAIN
========================= */
setInterval(()=>{
addRep(1);
},3000);

});
</script>

</body>
</html>
