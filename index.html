<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — CLEAN CORE</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:13px;
  z-index:10;
}

#prompt {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}

#start {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
  color:white;
  z-index:1000;
}
</style>
</head>

<body>

<div id="start">
<h2>LAMBO CITY</h2>
<button onclick="start()">ENTER</button>
</div>

<div id="ui">ZONE: DOCK</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, yacht;
let keys = {};
let state = "OUTSIDE";

// ================= START =================
function start(){

document.getElementById("start").style.display = "none";

// SCENE
scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);

// CAMERA
camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2.5,5);

// RENDERER
renderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS
scene.add(new THREE.AmbientLight(0x1a1a2a, 0.9));

const light1 = new THREE.PointLight(0x00aaff, 2);
light1.position.set(0,5,-10);
scene.add(light1);

// PLAYER
player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.y = 0.5;
scene.add(player);

// YACHT
yacht = new THREE.Mesh(
  new THREE.BoxGeometry(3,1,6),
  new THREE.MeshStandardMaterial({color:0xffd700})
);
yacht.position.set(0,0.5,-15);
scene.add(yacht);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// STARS (CLEAN + LIGHTWEIGHT)
const geo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<1500;i++){
  arr.push(
    (Math.random()-0.5)*300,
    Math.random()*150,
    (Math.random()-0.5)*300
  );
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

scene.add(new THREE.Points(
  geo,
  new THREE.PointsMaterial({color:0xffffff, size:0.7})
));

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="e") interact();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// START LOOP
animate();

}

// ================= INTERACTION =================
function interact(){

let dist = player.position.distanceTo(yacht.position);

if(state === "OUTSIDE" && dist < 3){
  state = "INSIDE_TRIGGER";
  document.getElementById("ui").innerText = "ENTERING YACHT...";
}

}

// ================= LOOP =================
function animate(){

requestAnimationFrame(animate);

// movement
if(keys["w"]) player.position.z -= 0.08;
if(keys["s"]) player.position.z += 0.08;
if(keys["a"]) player.position.x -= 0.08;
if(keys["d"]) player.position.x += 0.08;

// camera follow
camera.position.x += (player.position.x - camera.position.x)*0.03;
camera.position.z += (player.position.z + 6 - camera.position.z)*0.03;
camera.lookAt(player.position);

// yacht float
yacht.position.y = 0.5 + Math.sin(Date.now()*0.002)*0.15;
yacht.rotation.y += 0.002;

// prompt
if(state === "OUTSIDE"){
  let dist = player.position.distanceTo(yacht.position);
  document.getElementById("prompt").style.display = dist < 3 ? "block" : "none";
}

renderer.render(scene,camera);

}

</script>

</body>
</html>
