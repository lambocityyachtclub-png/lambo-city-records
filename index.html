<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — LIVE WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute; inset:0; background:black; color:white;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; z-index:1000;
}

#ui { position:absolute; top:20px; left:20px; color:white; }

#msg {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:white; padding:10px 14px;
  border:1px solid gold;
  background:rgba(0,0,0,0.6);
}

#status {
  position:absolute; bottom:90px; left:50%;
  transform:translateX(-50%);
  color:#00ffff;
  border:1px solid #00ffff;
  padding:8px 12px;
  display:none;
}

#locked {
  position:absolute; bottom:140px; left:50%;
  transform:translateX(-50%);
  color:red;
  border:1px solid red;
  padding:8px 12px;
  display:none;
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="ui">W A S D TO MOVE</div>
<div id="msg">You were invited…</div>
<div id="status"></div>
<div id="locked">ACCESS DENIED</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// SCENE
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(player);

// ================= ROOM =================
let room = new THREE.Mesh(
  new THREE.BoxGeometry(12,6,12),
  new THREE.MeshStandardMaterial({color:0x111111, side:THREE.BackSide})
);
room.position.set(-35,3,20);
scene.add(room);

// WINDOW
let windowView = new THREE.Mesh(
  new THREE.PlaneGeometry(6,3),
  new THREE.MeshBasicMaterial({color:0x000000})
);
windowView.position.set(-35,3,14);
scene.add(windowView);

// ================= WORLD =================

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(800,800),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
let arr=[];
for(let i=0;i<4000;i++){
  arr.push((Math.random()-0.5)*800,Math.random()*300,(Math.random()-0.5)*800);
}
starGeo.setAttribute("position",new THREE.Float32BufferAttribute(arr,3));
let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(220,1,320),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-120);
scene.add(dock);

// CABINS
function createCabin(x,z,isKing=false){
  let size = isKing?14:8;

  let base = new THREE.Mesh(
    new THREE.BoxGeometry(size,5,size),
    new THREE.MeshStandardMaterial({color:isKing?0x222244:0x111111})
  );
  base.position.set(x,2.5,z);
  scene.add(base);
}

// LEFT (last = YOURS)
for(let i=0;i<5;i++){
  createCabin(-35,-20-(i*30),i===4);
}
// RIGHT
for(let i=0;i<5;i++){
  createCabin(35,-20-(i*30));
}

// STAGE (LEFT)
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(20,2,14),
  new THREE.MeshStandardMaterial({color:0x6600aa})
);
stage.position.set(-30,1,-90);
scene.add(stage);

// BACKSTAGE ZONE
let backstage = new THREE.Mesh(
  new THREE.BoxGeometry(20,2,14),
  new THREE.MeshStandardMaterial({color:0x220044})
);
backstage.position.set(-30,1,-110);
scene.add(backstage);

// YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(45,6,20),
  new THREE.MeshStandardMaterial({color:0x222244})
);
yacht.position.set(0,3,-400);
scene.add(yacht);

// CROWD
let crowd=[];
for(let i=0;i<30;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  p.position.set((Math.random()-0.5)*40,0.6,-80+(Math.random()-0.5)*60);
  scene.add(p);
  crowd.push(p);
}

// ================= SYSTEM =================

let keys={},inWorld=false;
let hasBackstage=false;

// INPUT
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function start(){
  document.getElementById("start").style.display="none";
  inWorld=true;
  player.position.set(-35,1,20);
}

// VOICE SYSTEM
function speak(text){
  document.getElementById("msg").innerText = text;
}

// LOOP
function animate(){
requestAnimationFrame(animate);
if(!inWorld) return;

// MOVE
if(keys["w"]) player.position.z-=0.12;
if(keys["s"]) player.position.z+=0.12;
if(keys["a"]) player.position.x-=0.12;
if(keys["d"]) player.position.x+=0.12;

// EXIT ROOM
if(player.position.z < 15){
  room.visible=false;
  speak("Go see what they built…");
}

// STAGE TRIGGER → BACKSTAGE PASS
if(player.position.distanceTo(stage.position)<6 && !hasBackstage){
  hasBackstage=true;
  document.getElementById("status").style.display="block";
  document.getElementById("status").innerText="BACKSTAGE PASS UNLOCKED";
  speak("You moved different… take this.");
}

// BACKSTAGE ACCESS
if(player.position.distanceTo(backstage.position)<6 && !hasBackstage){
  player.position.z = -100;
  speak("You don’t belong back here.");
}

// YACHT LOCK
if(player.position.z < -300){
  player.position.z = -300;
  document.getElementById("locked").style.display="block";
  speak("You’re not ready.");
}else{
  document.getElementById("locked").style.display="none";
}

// CAMERA
camera.position.x += (player.position.x-camera.position.x)*0.05;
camera.position.y += (3-camera.position.y)*0.05;
camera.position.z += (player.position.z+10-camera.position.z)*0.05;
camera.lookAt(player.position);

// LIFE
stars.rotation.y+=0.0005;
water.position.z=Math.sin(Date.now()*0.001)*1;

crowd.forEach(p=>{
  p.position.x+=Math.sin(Date.now()*0.001)*0.01;
});

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
