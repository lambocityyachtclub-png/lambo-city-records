<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — IMMERSION LAYER v5</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#start {
position:absolute; inset:0;
display:flex; justify-content:center; align-items:center;
flex-direction:column;
background:black; color:white;
z-index:10;
}

#ui {
position:absolute; top:20px; left:20px;
color:white; font-size:13px;
}

#zone {
position:absolute; top:20px; right:20px;
color:#00ffff;
}

#msg {
position:absolute; bottom:30px; left:50%;
transform:translateX(-50%);
color:white;
padding:10px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.6);
display:none;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY</h1>
<button onclick="start()">ENTER WORLD</button>
</div>

<div id="ui">WASD MOVE • E ENTER CABIN</div>
<div id="zone">INITIALIZING...</div>
<div id="msg">INTERIOR MODE</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE WORLD
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const light = new THREE.PointLight(0x00ffff,2);
light.position.set(0,10,10);
scene.add(light);

/////////////////////////////////////////////////////
// PLAYER (FIRST PERSON READY)
/////////////////////////////////////////////////////

const player = new THREE.Group();
scene.add(player);

const body = new THREE.Mesh(
new THREE.BoxGeometry(1,1.8,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
player.add(body);

player.position.set(0,1,20);

/////////////////////////////////////////////////////
// WORLD
/////////////////////////////////////////////////////

// WATER
const water = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
const arr = [];

for(let i=0;i<3000;i++){
arr.push(
(Math.random()-0.5)*1500,
Math.random()*600,
(Math.random()-0.5)*1500
);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff,size:1})
);
scene.add(stars);

// DOCK
const dock = new THREE.Mesh(
new THREE.BoxGeometry(80,1,300),
new THREE.MeshStandardMaterial({color:0x111111})
);
dock.position.set(0,0,-100);
scene.add(dock);

/////////////////////////////////////////////////////
// 🏡 LUXURY PENTHOUSE INTERIORS (IMMERSION LAYER v6)
/////////////////////////////////////////////////////

const cabins = [];
const cabinLights = [];

function createCabin(i, x, z){

// FLOOR (wood / marble vibe)
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(8,8),
new THREE.MeshStandardMaterial({
color:0x1a1a1a,
roughness:0.4
})
);
floor.rotation.x = -Math.PI/2;
floor.position.set(x,0,z);
scene.add(floor);

// WALLS (open front penthouse feel)
const wallMat = new THREE.MeshStandardMaterial({
color:0x111111,
roughness:0.8
});

const backWall = new THREE.Mesh(
new THREE.BoxGeometry(8,5,0.3),
wallMat
);
backWall.position.set(x,2.5,z-4);
scene.add(backWall);

// SIDE WALLS
const leftWall = new THREE.Mesh(
new THREE.BoxGeometry(0.3,5,8),
wallMat
);
leftWall.position.set(x-4,2.5,z);
scene.add(leftWall);

const rightWall = leftWall.clone();
rightWall.position.x = x+4;
scene.add(rightWall);

// CEILING LIGHT PANEL (luxury glow)
const ceilingLight = new THREE.PointLight(0xffcc88,1.2,20);
ceilingLight.position.set(x,4.5,z);
scene.add(ceilingLight);

cabinLights.push(ceilingLight);

// 🛋️ FURNITURE SET

// couch
const couch = new THREE.Mesh(
new THREE.BoxGeometry(3,1,1),
new THREE.MeshStandardMaterial({color:0x333333})
);
couch.position.set(x-1,0.5,z);
scene.add(couch);

// table
const table = new THREE.Mesh(
new THREE.BoxGeometry(1.5,0.6,1),
new THREE.MeshStandardMaterial({color:0x222222})
);
table.position.set(x+1.5,0.3,z+1);
scene.add(table);

// bed (VIP suite feel)
const bed = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.6,1.5),
new THREE.MeshStandardMaterial({color:0x444444})
);
bed.position.set(x-1.5,0.3,z-2);
scene.add(bed);

// ambient decor glow
const decorLight = new THREE.PointLight(0x00ffff,0.4,10);
decorLight.position.set(x,1,z);
scene.add(decorLight);

// cabin trigger
const cabinCore = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshBasicMaterial({visible:false})
);

cabinCore.position.set(x,1,z);
scene.add(cabinCore);

cabins.push(cabinCore);
}

/////////////////////////////////////////////////////
// INTERIOR STATE
/////////////////////////////////////////////////////

let insideCabin = false;
let currentCabin = null;

/////////////////////////////////////////////////////
// INPUT
/////////////////////////////////////////////////////

const keys = {};
let started = false;

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;

if(e.key.toLowerCase()==="e"){
tryEnterCabin();
}
});

document.addEventListener("keyup",e=>keys[e.key.toLowerCase()] = false);

function start(){
document.getElementById("start").style.display="none";
started = true;
document.getElementById("zone").innerText="WELCOME TO LAMBO CITY";
}

/////////////////////////////////////////////////////
// CABIN SYSTEM
/////////////////////////////////////////////////////

function tryEnterCabin(){

if(insideCabin){
insideCabin = false;
document.getElementById("msg").style.display="none";
return;
}

for(let c of cabins){
if(player.position.distanceTo(c.position) < 4){
insideCabin = true;
currentCabin = c;
document.getElementById("msg").style.display="block";
document.getElementById("zone").innerText="INSIDE CABIN";
break;
}
}
}

/////////////////////////////////////////////////////
// CAMERA SYSTEM
/////////////////////////////////////////////////////

function updateCamera(){

if(insideCabin){
camera.position.x = currentCabin.position.x;
camera.position.y = 3;
camera.position.z = currentCabin.position.z;
camera.lookAt(currentCabin.position);
return;
}

// FIRST PERSON FOLLOW
camera.position.x = player.position.x;
camera.position.y = player.position.y + 2;
camera.position.z = player.position.z + 5;
camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////////

function movePlayer(){

if(insideCabin) return;

if(keys["w"]) player.position.z -= 0.25;
if(keys["s"]) player.position.z += 0.25;
if(keys["a"]) player.position.x -= 0.25;
if(keys["d"]) player.position.x += 0.25;
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
requestAnimationFrame(animate);
if(!started) return;

movePlayer();
updateCamera();

stars.rotation.y += 0.0003;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
