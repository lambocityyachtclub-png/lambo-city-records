<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAMBO CITY | ONLINE SESSION</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
    color: white;
}

/* =========================
   🎮 LOBBY LOADING SCREEN
========================= */
#lobby {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 2000;
    transition: opacity 1s ease;
}

#lobbyText {
    font-size: 14px;
    letter-spacing: 4px;
    opacity: 0.8;
}

#enterBtn {
    margin-top: 20px;
    padding: 10px 18px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* =========================
   🎥 CAMERA EFFECT LAYER
========================= */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transform: scale(1.3);
    transition: 0.5s ease;
    z-index: 999;
}

/* =========================
   🌆 WORLD ENGINE
========================= */
#world {
    position: absolute;
    width: 400%;
    height: 100%;
    display: flex;
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ZONES */
.zone {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* DISTRICTS (LONG BEACH INSPIRED FEEL) */
#portal { background: radial-gradient(circle, #050a1a, #000); }
#city   { background: radial-gradient(circle at top, #3a1f0a, #000); }
#vip    { background: radial-gradient(circle, #0f0f0f, #000); }
#store  { background: radial-gradient(circle, #2a0f0a, #000); }

/* TITLE */
.title {
    font-size: 40px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

/* BUTTONS */
button {
    margin: 8px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    letter-spacing: 2px;
}

button:hover {
    background: white;
    color: black;
}

/* STREAM */
iframe {
    width: 80%;
    max-width: 900px;
    height: 450px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* =========================
   💬 WORLD CHAT FEED
========================= */
#chat {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 260px;
    height: 180px;
    font-size: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px;
    overflow: hidden;
    z-index: 1000;
}

/* =========================
   🎬 WORLD MESSAGE HUD
========================= */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.6;
    z-index: 1000;
}
</style>
</head>

<body>

<!-- 🎮 LOBBY -->
<div id="lobby">
    <div id="lobbyText">CONNECTING TO LAMBO CITY ONLINE...</div>
    <button id="enterBtn" onclick="enterWorld()">ENTER CITY</button>
</div>

<div id="camera"></div>
<div id="hud">LAMBO CITY // HERO SESSION ACTIVE</div>
<div id="chat"></div>

<!-- 🌆 WORLD -->
<div id="world">

    <!-- PORTAL -->
    <div class="zone" id="portal">
        <div class="title">CITY GATE</div>
        <button onclick="walkTo(0)">ENTER CITY</button>
    </div>

    <!-- CITY -->
    <div class="zone" id="city">
        <div class="title">LAMBO CITY</div>

        <button onclick="walkTo(2)">YACHT CLUB</button>
        <button onclick="walkTo(3)">STORE</button>
    </div>

    <!-- VIP -->
    <div class="zone" id="vip">
        <div class="title">YACHT CLUB</div>

        <iframe
            src="https://player.twitch.tv/?channel=lambocityrecords&parent=lambocityrecords.com"
            allowfullscreen>
        </iframe>

        <button onclick="walkTo(1)">BACK TO CITY</button>
    </div>

    <!-- STORE -->
    <div class="zone" id="store">
        <div class="title">LAMBO CITY STORE</div>

        <button onclick="alert('HERO - Fly Away Soon Tee')">
            👕 HERO DROP
        </button>

        <button onclick="alert('LAMBO CITY CLASSIC')">
            🧢 CLASSIC COLLECTION
        </button>

        <button onclick="walkTo(1)">BACK TO CITY</button>
    </div>

</div>

<script>

const world = document.getElementById("world");
const camera = document.getElementById("camera");
const chat = document.getElementById("chat");
const lobby = document.getElementById("lobby");

let currentZone = 0;

/* =========================
   🎮 ENTER WORLD (LOBBY EXIT)
========================= */
function enterWorld() {
    lobby.style.opacity = "0";

    setTimeout(() => {
        lobby.style.display = "none";
        walkTo(0);
        startChat();
    }, 1000);
}

/* =========================
   🌆 WALK SYSTEM (GTA TRANSITION)
========================= */
function walkTo(zoneIndex) {

    camera.style.opacity = "1";
    camera.style.transform = "scale(1.6)";
    document.body.style.filter = "brightness(2) contrast(1.4)";

    setTimeout(() => {

        world.style.transform = `translateX(-${zoneIndex * 100}vw)`;
        currentZone = zoneIndex;

        setTimeout(() => {
            camera.style.opacity = "0";
            camera.style.transform = "scale(1)";
            document.body.style.filter = "brightness(1) contrast(1)";
        }, 400);

    }, 300);
}

/* =========================
   💬 LIVING WORLD CHAT
========================= */
function startChat() {

    const users = ["DJ HERO", "CITY_RUNNER", "VIP_ACE", "LAMBO_GUEST", "LONG_BEACH_KID"];
    const msgs = ["entered session", "is in Lambo City", "is at Yacht Club", "is shopping", "is cruising"];

    setInterval(() => {

        const u = users[Math.floor(Math.random() * users.length)];
        const m = msgs[Math.floor(Math.random() * msgs.length)];

        chat.innerHTML =
        "[" + ["PORTAL","CITY","VIP","STORE"][currentZone] + "] " +
        u + ": " + m + "<br>" + chat.innerHTML;

    }, 2000);
}

</script>

</body>
</html>
