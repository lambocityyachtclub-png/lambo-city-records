<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY YACHT CLUB — FINAL</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
}
</style>
</head>

<body>

<div id="start">
<h1>LAMBO CITY YACHT CLUB</h1>
<button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">START IN CABIN → WALK TO YACHT</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// SCENE
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.008);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.2));

// PLAYER
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,0);
scene.add(player);

// ================= CABIN =================

// FLOOR
let cabinFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabinFloor.rotation.x = -Math.PI/2;
scene.add(cabinFloor);

// WALL (FRONT OPENING)
let backWall = new THREE.Mesh(
  new THREE.BoxGeometry(20,10,0.5),
  new THREE.MeshStandardMaterial({color:0x222222})
);
backWall.position.set(0,5,5);
scene.add(backWall);

// SIDE WALLS
let leftWall = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,10,20),
  new THREE.MeshStandardMaterial({color:0x222222})
);
leftWall.position.set(-10,5,-5);
scene.add(leftWall);

let rightWall = leftWall.clone();
rightWall.position.set(10,5,-5);
scene.add(rightWall);

// CEILING
let ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x111111})
);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 10;
scene.add(ceiling);

// ================= OUTSIDE WORLD =================

// EXTENDED FLOOR / WALKWAY
let walkway = new THREE.Mesh(
  new THREE.PlaneGeometry(40,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
walkway.rotation.x = -Math.PI/2;
walkway.position.z = -80;
scene.add(walkway);

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({color:0x02121f})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// STARS
const starGeo = new THREE.BufferGeometry();
const starArr=[];
for(let i=0;i<4000;i++){
  starArr.push(
    (Math.random()-0.5)*800,
    Math.random()*300,
    (Math.random()-0.5)*800
  );
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr,3));

let stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({color:0xffffff,size:1.5})
);
scene.add(stars);

// 🌊 FAR YACHT (VISIBLE FROM CABIN)
let farYacht = new THREE.Mesh(
  new THREE.BoxGeometry(20,5,10),
  new THREE.MeshStandardMaterial({color:0x222244})
);
farYacht.position.set(0,3,-120);
scene.add(farYacht);

// 🚤 MAIN YACHT
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(40,10,20),
  new THREE.MeshStandardMaterial({color:0x333366, emissive:0x111133})
);
yacht.position.set(0,5,-70);
yacht.visible = false;
scene.add(yacht);

// CROWD
let crowd=[];
for(let i=0;i<30;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );

  p.position.set(
    (Math.random()-0.5)*30,
    0.6,
    -70+(Math.random()-0.5)*30
  );

  p.userData={
    dir:Math.random()*Math.PI*2,
    speed:0.02+Math.random()*0.03
  };

  p.visible=false;
  scene.add(p);
  crowd.push(p);
}

// LIGHTS
let lights=[];
for(let i=0;i<10;i++){
  let l=new THREE.PointLight(0x00ffff,3,100);
  l.position.set((i-5)*6,5,-70);
  l.visible=false;
  scene.add(l);
  lights.push(l);
}

// INPUT
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
});
document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()]=false;
});

function enterWorld(){
  document.getElementById("start").style.display="none";
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z-=0.15;
if(keys["s"]) player.position.z+=0.15;
if(keys["a"]) player.position.x-=0.15;
if(keys["d"]) player.position.x+=0.15;

// CAMERA
camera.position.x+=(player.position.x-camera.position.x)*0.08;
camera.position.z+=(player.position.z+8-camera.position.z)*0.08;
camera.lookAt(player.position);

// WORLD LIFE
water.position.z = Math.sin(Date.now()*0.001)*1;
stars.rotation.y += 0.0005;

// DISTANCE LOGIC
let z = player.position.z;

// REVEAL MAIN YACHT
if(z < -40){
  yacht.visible = true;
}

// ACTIVATE FULL CLUB
if(z < -55){
  crowd.forEach(p=>p.visible=true);
  lights.forEach(l=>l.visible=true);
  document.getElementById("ui").innerText = "YACHT CLUB — LIVE";
}

// CROWD MOVEMENT
crowd.forEach(p=>{
  p.position.x+=Math.cos(p.userData.dir)*p.userData.speed;
  p.position.z+=Math.sin(p.userData.dir)*p.userData.speed;

  if(Math.random()<0.02){
    p.userData.dir+=(Math.random()-0.5);
  }
});

// LIGHT FX
lights.forEach((l,i)=>{
  l.intensity=3+Math.sin(Date.now()*0.003+i)*3;
});

// YACHT MOTION
yacht.rotation.y += 0.001;
farYacht.rotation.y += 0.0005;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
