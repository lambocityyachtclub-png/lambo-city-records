<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY V10 — LUXURY ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#ui, #zone, #hint {
position:absolute;
font-family:Arial;
font-size:13px;
color:white;
z-index:10;
}

#ui { top:20px; left:20px; }
#zone { top:20px; right:20px; color:#00ffff; }

#hint {
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:10px 15px;
border:1px solid #00ffff;
background:rgba(0,0,0,0.7);
display:none;
}
</style>
</head>

<body>

<div id="ui">WASD MOVE • E INTERACT</div>
<div id="zone">LAMBO CITY V10 ACTIVE</div>
<div id="hint"></div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/////////////////////////////////////////////////////
// CORE
/////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.FogExp2(0x070b1a, 0.005);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2500);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("c"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/////////////////////////////////////////////////////
// LIGHTING (CINEMATIC UPGRADE)
/////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0x2a3b55, 0.9));

const sun = new THREE.DirectionalLight(0x66ccff, 1.3);
sun.position.set(80,120,60);
scene.add(sun);

const fill = new THREE.PointLight(0x4da3ff, 1.5, 1500);
fill.position.set(0,90,0);
scene.add(fill);

/////////////////////////////////////////////////////
// PLAYER (SMOOTHER CAMERA FEEL)
/////////////////////////////////////////////////////

const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0xffffff,
    emissive:0x111111
  })
);

player.position.set(0,1,-20);
scene.add(player);

camera.position.set(0,8,14);

const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function move(){
  if(keys["w"]) player.position.z -= 0.28;
  if(keys["s"]) player.position.z += 0.28;
  if(keys["a"]) player.position.x -= 0.28;
  if(keys["d"]) player.position.x += 0.28;
}

function updateCamera(){
  camera.position.x += (player.position.x - camera.position.x)*0.06;
  camera.position.y += ((player.position.y+9)-camera.position.y)*0.06;
  camera.position.z += ((player.position.z+16)-camera.position.z)*0.06;
  camera.lookAt(player.position);
}

/////////////////////////////////////////////////////
// 🌊 OCEAN (SMOOTHER + CINEMATIC COLOR)
/////////////////////////////////////////////////////

const waterGeo = new THREE.PlaneGeometry(2200,2200,90,90);

const waterMat = new THREE.MeshStandardMaterial({
  color:0x021a33,
  metalness:0.35,
  roughness:0.65,
  emissive:0x001122,
  emissiveIntensity:0.35
});

const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

const waterPos = water.geometry.attributes.position;
const waterBase = [];

for(let i=0;i<waterPos.count;i++){
  waterBase.push({
    x:waterPos.getX(i),
    z:waterPos.getZ(i)
  });
}

/////////////////////////////////////////////////////
// 🏡 VILLAS (INDIVIDUAL IDENTITY SYSTEM)
/////////////////////////////////////////////////////

function createVilla(x,z,i){

  const group = new THREE.Group();

  const hue = 0x111111 + (i * 0x101010);

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(16,1,16),
    new THREE.MeshStandardMaterial({color:0x111111})
  );

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(16,6,16),
    new THREE.MeshStandardMaterial({color:hue})
  );

  body.position.y = 3;

  const light = new THREE.PointLight(
    0x66ccff,
    1.2,
    60
  );

  light.position.set(0,5,0);

  group.add(base);
  group.add(body);
  group.add(light);

  group.position.set(x,0,z);
  scene.add(group);
}

for(let i=0;i<6;i++){
  createVilla(-25,-20-i*25,i);
  createVilla(25,-20-i*25,i+1);
}

/////////////////////////////////////////////////////
// 🚤 YACHT
/////////////////////////////////////////////////////

const yacht = new THREE.Mesh(
  new THREE.BoxGeometry(16,4,45),
  new THREE.MeshStandardMaterial({color:0xf2f2f2})
);

yacht.position.set(40,2,-80);
scene.add(yacht);

/////////////////////////////////////////////////////
// 🌟 HERO
/////////////////////////////////////////////////////

const hero = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff
  })
);

hero.position.set(10,1,-20);
scene.add(hero);

/////////////////////////////////////////////////////
// 🌉 JUMBOTRON STAGE (V10 UPGRADED VERSION)
/////////////////////////////////////////////////////

const stage = new THREE.Mesh(
  new THREE.BoxGeometry(34,2,14),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);

stage.position.set(0,1,-140);
scene.add(stage);

const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(22,12),
  new THREE.MeshStandardMaterial({
    color:0x00ffff,
    emissive:0x00ffff,
    emissiveIntensity:1.8
  })
);

screen.position.set(0,12,-147);
scene.add(screen);

/////////////////////////////////////////////////////
// UI
/////////////////////////////////////////////////////

const hint = document.getElementById("hint");

function show(t){
  hint.style.display="block";
  hint.innerText=t;
}

function hide(){
  hint.style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    if(player.position.distanceTo(hero.position)<3){
      document.getElementById("zone").innerText="HERO: Welcome to LAMBO CITY";
    }
  }
});

function check(){
  if(player.position.distanceTo(hero.position)<3) show("PRESS E TO TALK");
  else hide();
}

/////////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////////

function animate(){
  requestAnimationFrame(animate);

  move();
  updateCamera();
  check();

  const time = Date.now()*0.001;

  for(let i=0;i<waterPos.count;i++){
    const v = waterBase[i];

    const wave =
      Math.sin(v.x*0.02+time)*0.35 +
      Math.cos(v.z*0.02+time*1.2)*0.35;

    waterPos.setY(i,wave);
  }

  waterPos.needsUpdate=true;

  renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
