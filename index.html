<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBO CITY — YACHT CLUB JOURNEY WORLD</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

#start {
  position:absolute;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-size:14px;
}

#prompt {
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border:1px solid gold;
  color:white;
  display:none;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="start">
  <h1>LAMBO CITY YACHT CLUB</h1>
  <button onclick="enterWorld()">ENTER WORLD</button>
</div>

<div id="ui">CABIN → BRIDGE → DOCK → STAGE → YACHT</div>
<div id="prompt">PRESS E</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.01);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,8);

let renderer = new THREE.WebGLRenderer({canvas:c});
renderer.setSize(innerWidth, innerHeight);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff,1.2));

let neon = new THREE.PointLight(0x00aaff,2);
neon.position.set(0,5,0);
scene.add(neon);

// ================= PLAYER =================
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
player.position.set(0,0.5,3);
scene.add(player);

// ================= CABIN =================
let cabin = new THREE.Mesh(
  new THREE.BoxGeometry(20,10,20),
  new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.set(0,5,0);
scene.add(cabin);

// CONTROL SCREEN
let screen = new THREE.Mesh(
  new THREE.BoxGeometry(4,2,0.2),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
screen.position.set(0,4,6);
scene.add(screen);

// ================= BRIDGE =================
let bridge = new THREE.Mesh(
  new THREE.BoxGeometry(6,1,40),
  new THREE.MeshStandardMaterial({color:0x222222})
);
bridge.position.set(0,0,-30);
scene.add(bridge);

// ================= DOCK =================
let dock = new THREE.Mesh(
  new THREE.BoxGeometry(80,1,120),
  new THREE.MeshStandardMaterial({color:0x050505})
);
dock.position.set(0,-0.5,-90);
scene.add(dock);

// WATER
let water = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x020b1a})
);
water.rotation.x = -Math.PI/2;
water.position.y = -1;
scene.add(water);

// ================= REAL ESTATE (10 CABINS) =================
let houses = [];

// LEFT SIDE (5)
for(let i=0;i<5;i++){
  let h = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  h.position.set(-12,2,-50-(i*15));
  scene.add(h);
  houses.push(h);
}

// RIGHT SIDE (5)
for(let i=0;i<5;i++){
  let h = new THREE.Mesh(
    new THREE.BoxGeometry(6,4,6),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  h.position.set(12,2,-50-(i*15));
  scene.add(h);
  houses.push(h);
}

// ================= STAGE (LEFT SIDE NEAR END) =================
let stage = new THREE.Mesh(
  new THREE.BoxGeometry(20,2,15),
  new THREE.MeshStandardMaterial({color:0x5500aa})
);
stage.position.set(-20,1,-130);
scene.add(stage);

// ================= YACHT (VIP END) =================
let yacht = new THREE.Mesh(
  new THREE.BoxGeometry(40,10,20),
  new THREE.MeshStandardMaterial({color:0x111133})
);
yacht.position.set(0,5,-170);
scene.add(yacht);

// ================= CROWD =================
let crowd = [];
for(let i=0;i<40;i++){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1.2,0.6),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  c.position.set((Math.random()-0.5)*60,0.6,-100-(Math.random()*60));
  scene.add(c);
  crowd.push(c);
}

// ================= INPUT =================
let keys = {};

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

function enterWorld(){
  document.getElementById("start").style.display="none";
}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

// MOVE
if(keys["w"]) player.position.z -= 0.2;
if(keys["s"]) player.position.z += 0.2;
if(keys["a"]) player.position.x -= 0.2;
if(keys["d"]) player.position.x += 0.2;

// CAMERA
camera.position.x += (player.position.x - camera.position.x)*0.08;
camera.position.z += (player.position.z + 8 - camera.position.z)*0.08;
camera.lookAt(player.position);

// WATER LIFE
water.position.z = Math.sin(Date.now()*0.001)*1;

// CROWD LIFE
crowd.forEach(c=>{
  c.position.x += Math.sin(Date.now()*0.001 + c.position.z)*0.01;
});

// STAGE ENERGY
stage.rotation.y = Math.sin(Date.now()*0.0005)*0.1;

// YACHT ENERGY
yacht.rotation.y += 0.0005;

// UI ZONES
if(player.position.z < -20){
  document.getElementById("ui").innerText = "BRIDGE → ENTERING WORLD";
}

if(player.position.z < -60){
  document.getElementById("ui").innerText = "DOCK → REAL ESTATE ZONE";
}

if(player.position.z < -120){
  document.getElementById("ui").innerText = "STAGE → LIVE EVENT ZONE";
}

if(player.position.z < -160){
  document.getElementById("ui").innerText = "YACHT → VIP ACCESS";
}

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
